# Configuration of generators (defaults illustrated)
---
# The directory where the generated files are stored
# directory: "tmp"

# By default all generators are run. Specify here the ones to skip.
excludes:
  - markdown

# Alternatively only specify the generators to run
# (comment out the above "excludes" section)
# includes:
#   - markdown
#   - excel

# Set the arguments for the generators (no matter if they run or not)
#
# NOTE: Every generator block sets `importmap: tmp/importmap.json` so that the
# canonical URI-style imports (e.g. `dpvs:schema/dpvs_core`) used inside the
# schema YAMLs are resolved to local files during build. `gen-project` does
# not accept `--importmap` directly; it forwards each block below as kwargs
# to the per-generator `Generator.__init__`, which does accept it.
generator_args:
  excel:
    mergeimports: true
    importmap: tmp/importmap.json
  owl:
    mergeimports: true
    metaclasses: false
    type_objects: false
    add_root_classes: true
    mixins_as_expressions: true
    importmap: tmp/importmap.json
  markdown:
    mergeimports: true
    directory: "docs/elements"
    importmap: tmp/importmap.json
  graphql:
    mergeimports: true
    importmap: tmp/importmap.json
  # gen-java is not yet supported by gen-project.
  #   https://github.com/linkml/linkml/issues/2537
  # java:
  #   mergeimports: true
  #   metadata: true
  jsonld:
    mergeimports: true
    importmap: tmp/importmap.json
  jsonschema:
    mergeimports: true
    importmap: tmp/importmap.json
  jsonldcontext:
    mergeimports: true
    importmap: tmp/importmap.json
  # gen-pydantic is not yet supported by gen-project.
  #   https://github.com/linkml/linkml/issues/2537
  # pydantic:
  #   mergeimports: true
  python:
    mergeimports: true
    importmap: tmp/importmap.json
    # head: true  # Why does this not work?
  prefixmap:
    mergeimports: true
    importmap: tmp/importmap.json
  proto:
    mergeimports: true
    importmap: tmp/importmap.json
  shacl:
    mergeimports: true
    importmap: tmp/importmap.json
  shex:
    mergeimports: true
    importmap: tmp/importmap.json
  sqlddl:
    mergeimports: true
    importmap: tmp/importmap.json
  typescript:
    mergeimports: true
    metadata: true
    importmap: tmp/importmap.json
...
