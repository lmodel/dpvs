id: https://w3id.org/lmodel/dpv/legal_basis
name: dpv_legal_basis
title: DPV - Legal Basis
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/legal_basis-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv_core

subsets:

  legal_basis_subset:
    description: Entities from the DPV `legal_basis` module.

slots:

  has_indication_method:
    definition_uri: dpv:hasIndicationMethod
    description: |-
      Specifies the method by which an entity has indicated the specific
      context
    aliases:
      - has indication method
    multivalued: true
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:hasIndicationMethod
      - dpv_owl:hasIndicationMethod
    annotations:
      skos_in_scheme: legal-basis-properties

  has_legal_basis:
    definition_uri: dpv:hasLegalBasis
    description: Indicates use or applicability of a Legal Basis
    aliases:
      - has legal basis
    multivalued: true
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:hasLegalBasis
      - dpv_owl:hasLegalBasis
    annotations:
      skos_in_scheme: legal-basis-properties

  is_indicated_at_time:
    definition_uri: dpv:isIndicatedAtTime
    description: |-
      Specifies the temporal information for when the entity has indicated the
      specific context
    aliases:
      - is indicated at time
    multivalued: true
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:isIndicatedAtTime
      - dpv_owl:isIndicatedAtTime
    annotations:
      skos_in_scheme: legal-basis-properties

  is_indicated_by:
    definition_uri: dpv:isIndicatedBy
    description: Specifies entity who indicates the specific context
    aliases:
      - is indicated by
    multivalued: true
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:isIndicatedBy
      - dpv_owl:isIndicatedBy
    annotations:
      skos_in_scheme: legal-basis-properties

classes:

  Consent:
    is_a: LegalBasis
    class_uri: dpv:Consent
    description: Consent of the Data Subject for specified process or activity
    aliases:
      - Consent
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:Consent
      - dpv_owl:Consent
    annotations:
      skos_in_scheme: legal-basis-classes

  Contract:
    is_a: LegalBasis
    class_uri: dpv:Contract
    description: |-
      Creation, completion, fulfilment, or performance of a contract involving
      specified processing of data or technologies
    aliases:
      - Contract
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:Contract
      - dpv_owl:Contract
    annotations:
      skos_in_scheme: legal-basis-classes

  ContractPerformance:
    is_a: Contract
    mixins:
      - LegalBasis
    class_uri: dpv:ContractPerformance
    description: |-
      Fulfilment or performance of a contract involving specified processing
      of data or technologies
    aliases:
      - Contract Performance
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:ContractPerformance
      - dpv_owl:ContractPerformance
    annotations:
      skos_in_scheme: legal-basis-classes

  DataTransferLegalBasis:
    is_a: LegalBasis
    class_uri: dpv:DataTransferLegalBasis
    description: |-
      Specific or special categories and instances of legal basis intended for
      justifying data transfers
    aliases:
      - Data Transfer Legal Basis
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:DataTransferLegalBasis
      - dpv_owl:DataTransferLegalBasis
    annotations:
      skos_in_scheme: legal-basis-classes

  EnterIntoContract:
    is_a: Contract
    mixins:
      - LegalBasis
    class_uri: dpv:EnterIntoContract
    description: Processing necessary to enter into contract
    aliases:
      - Enter Into Contract
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:EnterIntoContract
      - dpv_owl:EnterIntoContract
    annotations:
      skos_in_scheme: legal-basis-classes

  LegalBasis:
    class_uri: dpv:LegalBasis
    description: |-
      Legal basis used to justify processing of data or use of technology in
      accordance with a law
    aliases:
      - Legal Basis
    comments:
      - |-
        Legal basis (plural: legal bases) are defined by legislations and
        regulations, whose applicability is usually restricted to specific
        jurisdictions which can be represented using dpv:hasJurisdiction or
        dpv:hasLaw. Legal basis can be used without such declarations, e.g.
        'Consent', however their interpretation will require association with a
        law, e.g. 'EU GDPR'.
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:LegalBasis
      - dpv_owl:LegalBasis
    annotations:
      skos_in_scheme: legal-basis-classes

  LegalObligation:
    is_a: LegalBasis
    class_uri: dpv:LegalObligation
    description: Legal Obligation to conduct the specified activities
    aliases:
      - Legal Obligation
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:LegalObligation
      - dpv_owl:LegalObligation
    annotations:
      skos_in_scheme: legal-basis-classes

  LegitimateInterest:
    is_a: LegalBasis
    class_uri: dpv:LegitimateInterest
    description: |-
      Legitimate Interests of a Party as justification for specified
      activities
    aliases:
      - Legitimate Interest
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:LegitimateInterest
      - dpv_owl:LegitimateInterest
    annotations:
      skos_in_scheme: legal-basis-classes

  LegitimateInterestOfController:
    is_a: LegitimateInterest
    mixins:
      - LegalBasis
    class_uri: dpv:LegitimateInterestOfController
    description: |-
      Legitimate Interests of a Data Controller in conducting specified
      activities
    aliases:
      - Legitimate Interest of Controller
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:LegitimateInterestOfController
      - dpv_owl:LegitimateInterestOfController
    annotations:
      skos_in_scheme: legal-basis-classes

  LegitimateInterestOfDataSubject:
    is_a: LegitimateInterest
    mixins:
      - LegalBasis
    class_uri: dpv:LegitimateInterestOfDataSubject
    description: |-
      Legitimate Interests of the Data Subject in conducting specified
      activities
    aliases:
      - Legitimate Interest of Data Subject
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:LegitimateInterestOfDataSubject
      - dpv_owl:LegitimateInterestOfDataSubject
    annotations:
      skos_in_scheme: legal-basis-classes

  LegitimateInterestOfThirdParty:
    is_a: LegitimateInterest
    mixins:
      - LegalBasis
    class_uri: dpv:LegitimateInterestOfThirdParty
    description: |-
      Legitimate Interests of a Third Party in conducting specified activities
    aliases:
      - Legitimate Interest of Third Party
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:LegitimateInterestOfThirdParty
      - dpv_owl:LegitimateInterestOfThirdParty
    annotations:
      skos_in_scheme: legal-basis-classes

  OfficialAuthorityOfController:
    is_a: LegalBasis
    class_uri: dpv:OfficialAuthorityOfController
    description: |-
      Activities are necessary or authorised through the official authority
      granted to or vested in the Data Controller
    aliases:
      - Official Authority of Controller
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:OfficialAuthorityOfController
      - dpv_owl:OfficialAuthorityOfController
    annotations:
      skos_in_scheme: legal-basis-classes

  PublicInterest:
    is_a: LegalBasis
    class_uri: dpv:PublicInterest
    description: |-
      Activities are necessary or beneficial for interest of the public or
      society at large
    aliases:
      - Public Interest
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:PublicInterest
      - dpv_owl:PublicInterest
    annotations:
      skos_in_scheme: legal-basis-classes

  VitalInterest:
    is_a: LegalBasis
    class_uri: dpv:VitalInterest
    description: |-
      Activities are necessary or required to protect vital interests of a
      data subject or other natural person
    aliases:
      - Vital Interest
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:VitalInterest
      - dpv_owl:VitalInterest
    annotations:
      skos_in_scheme: legal-basis-classes

  VitalInterestOfDataSubject:
    is_a: VitalInterestOfNaturalPerson
    mixins:
      - LegalBasis
    class_uri: dpv:VitalInterestOfDataSubject
    description: |-
      Activities are necessary or required to protect vital interests of a
      data subject
    aliases:
      - Vital Interest of Data Subject
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:VitalInterestOfDataSubject
      - dpv_owl:VitalInterestOfDataSubject
    annotations:
      skos_in_scheme: legal-basis-classes

  VitalInterestOfNaturalPerson:
    is_a: VitalInterest
    mixins:
      - LegalBasis
    class_uri: dpv:VitalInterestOfNaturalPerson
    description: |-
      Activities are necessary or required to protect vital interests of a
      natural person
    aliases:
      - Vital Interest of Natural Person
    in_subset:
      - legal_basis_subset
    exact_mappings:
      - dpv_upstream:VitalInterestOfNaturalPerson
      - dpv_owl:VitalInterestOfNaturalPerson
    annotations:
      skos_in_scheme: legal-basis-classes
