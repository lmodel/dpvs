id: https://w3id.org/lmodel/dpv/entities_datasubject
name: dpv_entities_datasubject
title: DPV - Entities Datasubject
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/entities_datasubject-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv

subsets:

  entities_datasubject_subset:
    description: Entities from the DPV `entities_datasubject` module.

slots:

  has_data_subject:
    is_a: has_human_subject
    definition_uri: dpv:hasDataSubject
    description: Indicates association with Data Subject
    aliases:
      - has data subject
    multivalued: true
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:hasDataSubject
      - dpv_owl:hasDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-properties

  has_human_subject:
    is_a: has_entity
    definition_uri: dpv:hasHumanSubject
    description: Indicates association with Human Subject
    aliases:
      - has human subject
    multivalued: true
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:hasHumanSubject
      - dpv_owl:hasHumanSubject
    annotations:
      skos_in_scheme: entities-datasubject-properties

  has_relation_with_data_subject:
    is_a: has_entity
    definition_uri: dpv:hasRelationWithDataSubject
    description: Indicates the relation between specified Entity and Data Subject
    aliases:
      - has relation with data subject
    multivalued: true
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:hasRelationWithDataSubject
      - dpv_owl:hasRelationWithDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-properties

classes:

  Adult:
    is_a: HumanSubject
    class_uri: dpv:Adult
    description: |-
      A natural person that is not a child i.e. has attained some legally
      specified age of adulthood
    aliases:
      - Adult
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Adult
      - dpv_owl:Adult
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Applicant:
    is_a: HumanSubject
    class_uri: dpv:Applicant
    description: Humans that are applicants in some context
    aliases:
      - Applicant
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Applicant
      - dpv_owl:Applicant
    annotations:
      skos_in_scheme: entities-datasubject-classes

  AsylumSeeker:
    is_a: VulnerableHuman
    mixins:
      - HumanSubject
    class_uri: dpv:AsylumSeeker
    description: Humans that are asylum seekers
    aliases:
      - Asylum Seeker
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:AsylumSeeker
      - dpv_owl:AsylumSeeker
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Child:
    is_a: VulnerableHuman
    mixins:
      - HumanSubject
    class_uri: dpv:Child
    description: |-
      A 'child' is a natural legal person who is below a certain legal age
      depending on the legal jurisdiction.
    aliases:
      - Child
    comments:
      - |-
        The legality of age defining a child varies by jurisdiction. In
        addition, 'child' is distinct from a 'minor'. For example, the legal age
        for consumption of alcohol can be 21, which makes a person of age 20 a
        'minor' in this context. In other cases, 'minor' and 'child' are used
        interchangeably to refer to a person below some legally defined age.
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Child
      - dpv_owl:Child
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Citizen:
    is_a: HumanSubject
    class_uri: dpv:Citizen
    description: Humans that are citizens (for a jurisdiction)
    aliases:
      - Citizen
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Citizen
      - dpv_owl:Citizen
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Client:
    is_a: DpvCustomer
    mixins:
      - HumanSubject
    class_uri: dpv:Client
    description: Humans that are clients or recipients of services
    aliases:
      - Client
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Client
      - dpv_owl:Client
    annotations:
      skos_in_scheme: entities-datasubject-classes

  DataSubject:
    is_a: HumanSubject
    class_uri: dpv:DataSubject
    description: |-
      The individual (or category of individuals) whose personal data is being
      processed
    aliases:
      - Data Subject
    comments:
      - |-
        The term 'data subject' is specific to the GDPR, but is functionally
        equivalent to the term 'individual associated with data' and the ISO/IEC
        term 'PII Principle'
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:DataSubject
      - dpv_owl:DataSubject
      - iso29100:PIIPrincipal
      - iso22989:DataSubject
    narrow_mappings:
      - common_domain_model:NaturalPerson
      - gists:Person
    related_mappings:
      - iso27001:InterestedParty
    annotations:
      skos_in_scheme: entities-datasubject-classes

  DpvConsumer:
    is_a: HumanSubject
    class_uri: dpv:Consumer
    description: Humans that consume goods or services for direct use
    aliases:
      - Consumer
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Consumer
      - dpv_owl:Consumer
    annotations:
      skos_in_scheme: entities-datasubject-classes

  DpvCustomer:
    is_a: HumanSubject
    class_uri: dpv:Customer
    description: Humans that purchase goods or services
    aliases:
      - Customer
    comments:
      - |-
        note: for B2B relations where customers are organisations, this concept
        only applies for data subjects
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Customer
      - dpv_owl:Customer
    annotations:
      skos_in_scheme: entities-datasubject-classes

  DpvUser:
    is_a: HumanSubject
    class_uri: dpv:User
    description: Humans that use service(s)
    aliases:
      - User
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:User
      - dpv_owl:User
    annotations:
      skos_in_scheme: entities-datasubject-classes

  ElderlyDataSubject:
    is_a: VulnerableDataSubject
    mixins:
      - HumanSubject
    class_uri: dpv:ElderlyDataSubject
    description: Data subjects that are considered elderly (i.e. based on age)
    aliases:
      - Elderly Data Subject
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:ElderlyDataSubject
      - dpv_owl:ElderlyDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-classes

  ElderlyHuman:
    is_a: VulnerableHuman
    mixins:
      - HumanSubject
    class_uri: dpv:ElderlyHuman
    description: Humans that are considered elderly (i.e. based on age)
    aliases:
      - Elderly Human
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:ElderlyHuman
      - dpv_owl:ElderlyHuman
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Employee:
    is_a: HumanSubject
    class_uri: dpv:Employee
    description: Humans that are employees
    aliases:
      - Employee
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Employee
      - dpv_owl:Employee
    annotations:
      skos_in_scheme: entities-datasubject-classes

  GuardianOfDataSubject:
    is_a: GuardianOfHuman
    mixins:
      - HumanSubject
    class_uri: dpv:GuardianOfDataSubject
    description: Guardian(s) of data subjects such as children
    aliases:
      - Guardian(s) of Data Subject
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:GuardianOfDataSubject
      - dpv_owl:GuardianOfDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-classes

  GuardianOfHuman:
    is_a: HumanSubject
    class_uri: dpv:GuardianOfHuman
    description: Guardian(s) of humans
    aliases:
      - Guardian(s) of Human
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:GuardianOfHuman
      - dpv_owl:GuardianOfHuman
    annotations:
      skos_in_scheme: entities-datasubject-classes

  HumanSubject:
    is_a: LegalEntity
    class_uri: dpv:HumanSubject
    description: |-
      The individual (or category of individuals) that is the subject within
      some context such as personal data (dpv:DataSubject) or technology
      (tech:Subject)
    aliases:
      - Human Subject
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:HumanSubject
      - dpv_owl:HumanSubject
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Immigrant:
    is_a: HumanSubject
    class_uri: dpv:Immigrant
    description: Humans that are immigrants (for a jurisdiction)
    aliases:
      - Immigrant
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Immigrant
      - dpv_owl:Immigrant
    annotations:
      skos_in_scheme: entities-datasubject-classes

  JobApplicant:
    is_a: HumanSubject
    class_uri: dpv:JobApplicant
    description: Humans that apply for jobs or employments
    aliases:
      - Job Applicant
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:JobApplicant
      - dpv_owl:JobApplicant
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Member:
    is_a: HumanSubject
    class_uri: dpv:Member
    description: Humans that are members of a group, organisation, or other collectives
    aliases:
      - Member
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Member
      - dpv_owl:Member
    annotations:
      skos_in_scheme: entities-datasubject-classes

  MentallyVulnerableDataSubject:
    is_a: MentallyVulnerableHuman
    mixins:
      - HumanSubject
      - VulnerableDataSubject
    class_uri: dpv:MentallyVulnerableDataSubject
    description: Data subjects that are considered mentally vulnerable
    aliases:
      - Mentally Vulnerable Data Subject
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:MentallyVulnerableDataSubject
      - dpv_owl:MentallyVulnerableDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-classes

  MentallyVulnerableHuman:
    is_a: VulnerableHuman
    mixins:
      - HumanSubject
    class_uri: dpv:MentallyVulnerableHuman
    description: Humans that are considered mentally vulnerable within the context
    aliases:
      - Mentally Vulnerable Human
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:MentallyVulnerableHuman
      - dpv_owl:MentallyVulnerableHuman
    annotations:
      skos_in_scheme: entities-datasubject-classes

  NonCitizen:
    is_a: HumanSubject
    class_uri: dpv:NonCitizen
    description: Humans that are not citizens (for a jurisdiction)
    aliases:
      - Non-Citizen
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:NonCitizen
      - dpv_owl:NonCitizen
    annotations:
      skos_in_scheme: entities-datasubject-classes

  ParentOfDataSubject:
    is_a: ParentOfHuman
    mixins:
      - HumanSubject
    class_uri: dpv:ParentOfDataSubject
    description: Parent(s) of data subjects such as children
    aliases:
      - Parent(s) of Data Subject
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:ParentOfDataSubject
      - dpv_owl:ParentOfDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-classes

  ParentOfHuman:
    is_a: HumanSubject
    class_uri: dpv:ParentOfHuman
    description: Parent(s) of humans
    aliases:
      - Parent of Human
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:ParentOfHuman
      - dpv_owl:ParentOfHuman
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Participant:
    is_a: HumanSubject
    class_uri: dpv:Participant
    description: |-
      Humans that participate in some context such as volunteers in a function
    aliases:
      - Participant
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Participant
      - dpv_owl:Participant
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Patient:
    is_a: HumanSubject
    class_uri: dpv:Patient
    description: |-
      Humans that receive medical attention, treatment, care, advice, or other
      health related services
    aliases:
      - Patient
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Patient
      - dpv_owl:Patient
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Student:
    is_a: HumanSubject
    class_uri: dpv:Student
    description: Humans that are students
    aliases:
      - Student
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Student
      - dpv_owl:Student
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Subscriber:
    is_a: HumanSubject
    class_uri: dpv:Subscriber
    description: Humans that subscribe to service(s)
    aliases:
      - Subscriber
    comments:
      - 'note: subscriber can be customer or consumer'
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Subscriber
      - dpv_owl:Subscriber
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Tourist:
    is_a: HumanSubject
    class_uri: dpv:Tourist
    description: Humans that are tourists i.e. not citizens and not immigrants
    aliases:
      - Tourist
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Tourist
      - dpv_owl:Tourist
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Visitor:
    is_a: HumanSubject
    class_uri: dpv:Visitor
    description: Humans that are temporary visitors
    aliases:
      - Visitor
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:Visitor
      - dpv_owl:Visitor
    annotations:
      skos_in_scheme: entities-datasubject-classes

  VulnerableDataSubject:
    is_a: VulnerableHuman
    mixins:
      - HumanSubject
    class_uri: dpv:VulnerableDataSubject
    description: |-
      Humans which should be considered 'vulnerable' and therefore would
      require additional measures and safeguards
    aliases:
      - Vulnerable Data Subject
    comments:
      - |-
        This concept denotes a Data Subject or a group are vulnerable, but not
        what vulnerability they possess or its context. This information can be
        provided additionally as comments, or as separate concepts and
        relations. Proposals for this are welcome.
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:VulnerableDataSubject
      - dpv_owl:VulnerableDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-classes

  VulnerableHuman:
    is_a: HumanSubject
    class_uri: dpv:VulnerableHuman
    description: Human(s) which should be considered 'vulnerable' within the context
    aliases:
      - Vulnerable Human
    in_subset:
      - entities_datasubject_subset
    exact_mappings:
      - dpv_upstream:VulnerableHuman
      - dpv_owl:VulnerableHuman
    annotations:
      skos_in_scheme: entities-datasubject-classes
