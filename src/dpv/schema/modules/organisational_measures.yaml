    - dpv_owl:ConsultationWithDataSubject
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsultationWithDataSubjectRepresentative:
    is_a: ConsultationWithDataSubject
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsultationWithDataSubjectRepresentative
    description: Consultation with representative of data subject(s)
    aliases:
    - Consultation with Data Subject Representative
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ConsultationWithDataSubjectRepresentative
    - dpv_owl:ConsultationWithDataSubjectRepresentative
    annotations:
      skos_in_scheme: organisational-measures-classes

