    mixins:
    - OrganisationalMeasure
    class_uri: dpv:CredentialManagement
    description: Management of credentials and their use in authorisations
    aliases:
    - Credential Management
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:CredentialManagement
    - dpv_owl:CredentialManagement
    annotations:
      skos_in_scheme: organisational-measures-classes

  CybersecurityTraining:
    is_a: StaffTraining
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:CybersecurityTraining
    description: Training methods related to cybersecurity
    aliases:
    - Cybersecurity Training
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:CybersecurityTraining
    - dpv_owl:CybersecurityTraining
    annotations:
      skos_in_scheme: organisational-measures-classes

  DataAvailabilityAssessment:
    is_a: DataGovernance
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataAvailabilityAssessment
    description: |-
      Measures associated with assessment of availability of data for specific
      task(s)
    aliases:
