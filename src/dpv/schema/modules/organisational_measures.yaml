default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv

subsets:

  organisational_measures_subset:
    description: Entities from the DPV `organisational_measures` module.

classes:

  AIGovernance:
    is_a: GovernanceProcedures
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AIGovernance
    description: |-
      Procedures related to governance of AI, including its procurement,
      development, deployment, and assessments
    aliases:
    - AI Governance
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:AIGovernance
    - dpv_owl:AIGovernance
    annotations:
      skos_in_scheme: organisational-measures-classes

    related_mappings:
    - iso22989:AILifecycleProcess
    - nist_ai_rmf:Function
    - nist_csf_v2:CSFFunction
    close_mappings:
    - iso42001:AIManagementSystem
  AILiteracy:
    is_a: DigitalLiteracy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AILiteracy
    description: |-
      Providing skills, knowledge, and understanding to enable reading,
      writing, analysing, reasoning, and communicating regarding AI
    aliases:
    - AI Literacy
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:AILiteracy
    - dpv_owl:AILiteracy
    annotations:
      skos_in_scheme: organisational-measures-classes

    related_mappings:
    - iso42001:AIReferenceControl
  AINotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AINotice
    description: |-
      A notice providing information regarding the particulars of an AI system
      such as its intended purpose and proper use
    aliases:
    - AI Notice
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:AINotice
    - dpv_owl:AINotice
    annotations:
      skos_in_scheme: organisational-measures-classes

    related_mappings:
    - iso42001:AISystem
  AcceptableUsePolicy:
    is_a: Policy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AcceptableUsePolicy
    description: |-
      Acceptable Use Policy (AUP) refers to conditions, contexts, or uses
      which are considered acceptable with the implication that those not
      covered by such a policy are to be considered unacceptable
    aliases:
    - Acceptable Use Policy
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:AcceptableUsePolicy
    - dpv_owl:AcceptableUsePolicy
    annotations:
      skos_in_scheme: organisational-measures-classes

  ApprovalProcedure:
    is_a: GovernanceProcedures
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ApprovalProcedure
    description: |-
      A procedure or process for determining and managing approvals for
      activities as part of governance
    aliases:
    - Approval Procedure
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ApprovalProcedure
    - dpv_owl:ApprovalProcedure
    annotations:
      skos_in_scheme: organisational-measures-classes

  Assessment:
    is_a: OrganisationalMeasure
    class_uri: dpv:Assessment
    description: |-
      The document, plan, or process for assessment or determination towards a
      purpose e.g. assessment of legality or impact assessments
    aliases:
    - Assessment
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:Assessment
    - dpv_owl:Assessment
    annotations:
      skos_in_scheme: organisational-measures-classes

  AssetManagementProcedures:
    is_a: GovernanceProcedures
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AssetManagementProcedures
    description: Procedures related to management of assets
    aliases:
