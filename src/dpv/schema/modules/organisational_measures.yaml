  ConsentNotice:
    is_a: PrivacyNotice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentNotice
    description: A Notice for information provision associated with Consent
    aliases:
    - Consent Notice
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ConsentNotice
    - dpv_owl:ConsentNotice
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsentReceipt:
    is_a: ConsentRecord
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentReceipt
    description: |-
      A record of consent or consent related activities that is provided to
      another entity
    aliases:
    - Consent Receipt
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ConsentReceipt
    - dpv_owl:ConsentReceipt
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsentRecord:
    is_a: DataProcessingRecord
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentRecord
    description: A Record of Consent or Consent related activities
    aliases:
    - Consent Record
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ConsentRecord
    - dpv_owl:ConsentRecord
    - iso29100:ConsentRecord
    annotations:
      skos_in_scheme: organisational-measures-classes

    related_mappings:
    - oscal:Resource
  Consultation:
    is_a: OrganisationalMeasure
    class_uri: dpv:Consultation
    description: |-
      Consultation is a process of receiving feedback, advice, or opinion from
      an external agency
    aliases:
    - Consultation
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:Consultation
    - dpv_owl:Consultation
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsultationWithAuthority:
    is_a: Consultation
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsultationWithAuthority
    description: Consultation with an authority or authoritative entity
    aliases:
    - Consultation with Authority
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ConsultationWithAuthority
    - dpv_owl:ConsultationWithAuthority
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsultationWithDPO:
    is_a: Consultation
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsultationWithDPO
