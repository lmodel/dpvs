    exact_mappings:
    - dpv_upstream:AssetManagementProcedures
    - dpv_owl:AssetManagementProcedures
    annotations:
      skos_in_scheme: organisational-measures-classes

  Audit:
    is_a: OrganisationalMeasure
    class_uri: dpv:Audit
    description: |-
      An audit is a systematic examination or evaluation of records,
      processes, or systems towards a specific objective such as to assess
      accuracy, compliance, effectiveness, or performance
    aliases:
    - Audit
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:Audit
    - dpv_owl:Audit
    annotations:
      skos_in_scheme: organisational-measures-classes

    close_mappings:
    - iso27001:InternalAudit
    - iso42001:InternalAudit
  AuthorisationProcedure:
    is_a: SecurityProcedure
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AuthorisationProcedure
    description: |-
      Procedures for determining authorisation through permission or authority
    aliases:
    - Authorisation Procedure
    comments:
    - |-
      non-technical authorisation procedures: How is it described on an
      organisational level, who gets access to the data
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:AuthorisationProcedure
    - dpv_owl:AuthorisationProcedure
    annotations:
      skos_in_scheme: organisational-measures-classes

  BackgroundChecks:
    is_a: SecurityProcedure
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:BackgroundChecks
    description: |-
      Procedure where the background of an entity is assessed to identity
      vulnerabilities and threats due to their current or intended role
    aliases:
    - Background Checks
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:BackgroundChecks
    - dpv_owl:BackgroundChecks
    annotations:
      skos_in_scheme: organisational-measures-classes

  Certification:
    is_a: CertificationSeal
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:Certification
    description: |-
      Certification mechanisms, seals, and marks for the purpose of
      demonstrating compliance
    aliases:
    - Certification
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:Certification
    - dpv_owl:Certification
    annotations:
      skos_in_scheme: organisational-measures-classes

  CertificationSeal:
    is_a: OrganisationalMeasure
    class_uri: dpv:CertificationSeal
