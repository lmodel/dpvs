    aliases:
    - Data Inventory Management
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataInventoryManagement
    - dpv_owl:DataInventoryManagement
    annotations:
      skos_in_scheme: organisational-measures-classes

  DataJurisdictionPolicy:
    is_a: DataProcessingPolicy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataJurisdictionPolicy
    description: Policy specifying jurisdictional requirements for data 
      processing
    aliases:
    - Data Jurisdiction Policy
    comments:
    - |-
      Jurisdictional requirements can refer to data being stored within
      specific jurisdictions, or that data must be in line with jurisdictional
      laws and norms
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataJurisdictionPolicy
    - dpv_owl:DataJurisdictionPolicy
    annotations:
      skos_in_scheme: organisational-measures-classes

  DataLiteracy:
    is_a: DigitalLiteracy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataLiteracy
    description: |-
      Providing skills, knowledge, and understanding to enable reading,
      writing, analysing, reasoning, and communicating regarding data
    aliases:
    - Data Literacy
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataLiteracy
    - dpv_owl:DataLiteracy
    annotations:
      skos_in_scheme: organisational-measures-classes

  DataProcessingPolicy:
    is_a: Policy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataProcessingPolicy
    description: Policy regarding data processing activities
    aliases:
    - Data Processing Policy
    comments:
    - |-
      This only refers to the policy or plan or procedure describing how the
      data processing should be conducted. To represent the granular details,
      see further concepts e.g. dpv:DataStoragePolicy to describe policy
      regarding storage, or dpv:DataStorageCondition to represent information
      within the policy for how information should be stored
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataProcessingPolicy
    - dpv_owl:DataProcessingPolicy
    annotations:
      skos_in_scheme: organisational-measures-classes

