    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataInteroperabilityImprovement
    - dpv_owl:DataInteroperabilityImprovement
    annotations:
      skos_in_scheme: organisational-measures-classes
      dct_source: DGA 12.d

  DataInteroperabilityManagement:
    is_a: DataGovernance
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataInteroperabilityManagement
    description: Measures associated with management of data interoperability
    aliases:
    - Data Interoperability Management
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataInteroperabilityManagement
    - dpv_owl:DataInteroperabilityManagement
    annotations:
      skos_in_scheme: organisational-measures-classes

  DataInventoryManagement:
    is_a: DataGovernance
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataInventoryManagement
    description: |-
      Measures associated with management of data inventory or a data asset
