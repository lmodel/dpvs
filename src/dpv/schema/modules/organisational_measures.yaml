    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataAvailabilityAssessment
    - dpv_owl:DataAvailabilityAssessment
    annotations:
      skos_in_scheme: organisational-measures-classes

  DataBreachNotice:
    is_a: SecurityIncidentNotice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataBreachNotice
    description: |-
      A notice providing information about data breach(es) i.e. unauthorised
      transfer, access, use, or modification of data
    aliases:
    - Data Breach Notice
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataBreachNotice
    - dpv_owl:DataBreachNotice
    annotations:
      skos_in_scheme: organisational-measures-classes
      dct_source: ' DGA 21.5 GDPR 33'

  DataBreachNotification:
    is_a: SecurityIncidentNotification
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataBreachNotification
    description: |-
      Notification of information about data breach(es) i.e. unauthorised
      transfer, access, use, or modification of data
    aliases:
    - Data Breach Notification
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataBreachNotification
    - dpv_owl:DataBreachNotification
    annotations:
      skos_in_scheme: organisational-measures-classes
      dct_source: ' DGA 21.5 GDPR 33'

  DataBreachRecord:
    is_a: RecordsOfActivities
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataBreachRecord
    description: Record of a data breach incident
    aliases:
    - Data Breach Record
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataBreachRecord
    - dpv_owl:DataBreachRecord
    annotations:
      skos_in_scheme: organisational-measures-classes

    close_mappings:
    - iso27001:InformationSecurityIncident
    - iso29100:PrivacyBreach
    related_mappings:
    - ocsf:FindingInfo
  DataDeletionPolicy:
    is_a: DataProcessingPolicy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataDeletionPolicy
    description: Policy regarding deletion of data
    aliases:
    - Data Deletion Policy
    comments:
    - |-
      Deletion and Erasure are distinct activities where deletion refers to
      logical removal of data with the possibility of retrieval whereas
      erasure refers to destruction of data such that it cannot be retrieved.
      See dpv:DataErasurePolicy
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataDeletionPolicy
    - dpv_owl:DataDeletionPolicy
    annotations:
      skos_in_scheme: organisational-measures-classes

  DataErasurePolicy:
    is_a: DataProcessingPolicy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataErasurePolicy
    description: Policy regarding erasure of data
    aliases:
    - Data Erasure Policy
    comments:
    - |-
      Erasure or data destruction or secure removal of data refers to
      irreversible erasure of data. See dpv:DataDeletion for reversible or
      logical deletion of data
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataErasurePolicy
    - dpv_owl:DataErasurePolicy
    annotations:
      skos_in_scheme: organisational-measures-classes

