    aliases:
    - Conformance Assessment
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ConformanceAssessment
    - dpv_owl:ConformanceAssessment
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsentManagement:
    is_a: PermissionManagement
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentManagement
    description: |-
      Methods to obtain, provide, modify, and withdraw consent along with
      maintaining a record of consent, retrieving records, and processing
