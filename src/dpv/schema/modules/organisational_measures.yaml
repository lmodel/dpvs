    - dpv_owl:ConsultationWithDPO
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsultationWithDataSubject:
    is_a: Consultation
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsultationWithDataSubject
    description: Consultation with data subject(s) or their representative(s)
    aliases:
