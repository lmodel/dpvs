    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:DataInteroperabilityAssessment
    - dpv_owl:DataInteroperabilityAssessment
    annotations:
      skos_in_scheme: organisational-measures-classes

