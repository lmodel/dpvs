    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:CodeOfConduct
    - dpv_owl:CodeOfConduct
    annotations:
      skos_in_scheme: organisational-measures-classes

  ComplianceAssessment:
    is_a: Assessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ComplianceAssessment
    description: Assessment regarding compliance (e.g. internal policy, 
      regulations)
    aliases:
    - Compliance Assessment
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ComplianceAssessment
    - dpv_owl:ComplianceAssessment
    annotations:
      skos_in_scheme: organisational-measures-classes

  ComplianceMonitoring:
    is_a: GovernanceProcedures
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ComplianceMonitoring
    description: Monitoring of compliance (e.g. internal policy, regulations)
    aliases:
    - Compliance Monitoring
    in_subset:
    - organisational_measures_subset
    exact_mappings:
    - dpv_upstream:ComplianceMonitoring
    - dpv_owl:ComplianceMonitoring
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConformanceAssessment:
    is_a: Assessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConformanceAssessment
    description: |-
      Assessment regarding conformance with standards or norms or guidelines
