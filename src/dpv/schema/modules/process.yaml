id: https://w3id.org/lmodel/dpv/process
name: dpv_process
title: DPV - Process
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/process-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv

subsets:

  process_subset:
    description: Entities from the DPV `process` module.

slots:

  has_non_personal_data_process:
    definition_uri: dpv:hasNonPersonalDataProcess
    description: Indicates association with a Non-Personal Data Process
    aliases:
      - has non-personal data process
    multivalued: true
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:hasNonPersonalDataProcess
      - dpv_owl:hasNonPersonalDataProcess
    annotations:
      skos_in_scheme: process-properties

  has_personal_data_handling:
    definition_uri: dpv:hasPersonalDataHandling
    description: Indicates association with Personal Data Handling
    aliases:
      - has personal data handling
    multivalued: true
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:hasPersonalDataHandling
      - dpv_owl:hasPersonalDataHandling
    annotations:
      skos_in_scheme: process-properties

  has_personal_data_process:
    definition_uri: dpv:hasPersonalDataProcess
    description: Indicates association with a Personal Data Process
    aliases:
      - has personal data process
    multivalued: true
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:hasPersonalDataProcess
      - dpv_owl:hasPersonalDataProcess
    annotations:
      skos_in_scheme: process-properties

  has_process:
    definition_uri: dpv:hasProcess
    description: Indicates association with a Process
    aliases:
      - has process
    multivalued: true
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:hasProcess
      - dpv_owl:hasProcess
    annotations:
      skos_in_scheme: process-properties

  has_service:
    definition_uri: dpv:hasService
    description: Indicates associated with the specified service
    aliases:
      - has service
    multivalued: true
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:hasService
      - dpv_owl:hasService
    annotations:
      skos_in_scheme: process-properties

classes:

  DpvProcess:
    class_uri: dpv:Process
    description: An action, activity, or method
    aliases:
      - Process
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:Process
      - dpv_owl:Process
    annotations:
      skos_in_scheme: process-classes

  DpvService:
    is_a: DpvProcess
    class_uri: dpv:Service
    description: |-
      A service is a process where one entity provides some benefit or
      assistance to another entity
    aliases:
      - Service
    comments:
      - |-
        Service Provider and Service Consumer reflect the roles associated with
        a service. 'Service' as a process is a distinct concept from the use of
        'service' as a provision method in Tech extension
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:Service
      - dpv_owl:Service
    annotations:
      skos_in_scheme: process-classes

  NonPersonalDataProcess:
    is_a: DpvProcess
    class_uri: dpv:NonPersonalDataProcess
    description: |-
      An action, activity, or method involving non-personal data, and
      asserting that no personal data is involved
    aliases:
      - Non-Personal Data Process
    comments:
      - |-
        Use of personal data within NonPersonalDataProcess should be considered
        a violation of the explicit constraint that no personal data is
        involved.
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:NonPersonalDataProcess
      - dpv_owl:NonPersonalDataProcess
    annotations:
      skos_in_scheme: process-classes

  PersonalDataHandling:
    is_a: DpvProcess
    class_uri: dpv:PersonalDataHandling
    description: An abstract concept describing 'personal data handling'
    aliases:
      - Personal Data Handling
    comments:
      - |-
        This concept will be deprecated in future updates. It is recommended to
        use dpv:Process as the equivalent alternative which is better aligned
        with legal and operational terminology.
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:PersonalDataHandling
      - dpv_owl:PersonalDataHandling
      - iso29100:PIIFlowScenario
    annotations:
      skos_in_scheme: process-classes

  PersonalDataProcess:
    is_a: DpvProcess
    class_uri: dpv:PersonalDataProcess
    description: An action, activity, or method involving personal data
    aliases:
      - Personal Data Process
    in_subset:
      - process_subset
    exact_mappings:
      - dpv_upstream:PersonalDataProcess
      - dpv_owl:PersonalDataProcess
      - iso29100:PIIProcessingActivity
    close_mappings:
      - iso22989:DataProcess
    annotations:
      skos_in_scheme: process-classes
