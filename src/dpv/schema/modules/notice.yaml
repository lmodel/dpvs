id: https://w3id.org/lmodel/dpv/notice
name: dpv_notice
title: DPV - Notice
description: |-
  LinkML schema generated from the DPV 2.3 module `modules/notice-owl.ttl`
  (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv
- https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv

subsets:

  notice_subset:
    description: Entities from the DPV `notice` module.

slots:

  has_notice:
    is_a: has_organisational_measure
    definition_uri: dpv:hasNotice
    description: |-
      Indicates the use or applicability of a Notice for the specified context
    aliases:
    - has notice
    multivalued: true
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:hasNotice
    - dpv_owl:hasNotice
    annotations:
      skos_in_scheme: notice-properties

  has_notice_icon:
    definition_uri: dpv:hasNoticeIcon
    description: |-
      Indicates the concept can be represented graphically using the specified
      icon
    aliases:
    - has notice icon
    multivalued: true
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:hasNoticeIcon
    - dpv_owl:hasNoticeIcon
    annotations:
      skos_in_scheme: notice-properties

  has_notice_layer:
    definition_uri: dpv:hasNoticeLayer
    description: |-
      Indicates the use of a notice layer within a notice or to associate a
      layer with another layer
    aliases:
    - has notice layer
    multivalued: true
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:hasNoticeLayer
    - dpv_owl:hasNoticeLayer
    annotations:
      skos_in_scheme: notice-properties

  has_notice_status:
    definition_uri: dpv:hasNoticeStatus
    description: Indicates the status of the associated notice
    aliases:
    - has notice status
    multivalued: true
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:hasNoticeStatus
    - dpv_owl:hasNoticeStatus
    annotations:
      skos_in_scheme: notice-properties

classes:

  ConsentNotice:
    is_a: PrivacyNotice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentNotice
    description: A Notice for information provision associated with Consent
    aliases:
    - Consent Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:ConsentNotice
    - dpv_owl:ConsentNotice
    annotations:
      skos_in_scheme: notice-classes

  DashboardNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DashboardNotice
    description: |-
      A notice that is provided within a dashboard also used for other
      purposes
    aliases:
    - Dashboard Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:DashboardNotice
    - dpv_owl:DashboardNotice
    annotations:
      skos_in_scheme: notice-classes

  DataBreachNotice:
    is_a: SecurityIncidentNotice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataBreachNotice
    description: |-
      A notice providing information about data breach(es) i.e. unauthorised
      transfer, access, use, or modification of data
    aliases:
    - Data Breach Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:DataBreachNotice
    - dpv_owl:DataBreachNotice
    annotations:
      skos_in_scheme: notice-classes
      dct_source: ' DGA 21.5 GDPR 33'

  DataTransferNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataTransferNotice
    description: Notice for the legal entity for the transfer of its data
    aliases:
    - Data Transfer Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:DataTransferNotice
    - dpv_owl:DataTransferNotice
    annotations:
      skos_in_scheme: notice-classes
      dct_source: DGA 5.9

  DeviceNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DeviceNotice
    description: |-
      A notice provided using the functionality provided by a device e.g.
      using the popup or alert feature
    aliases:
    - Device Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:DeviceNotice
    - dpv_owl:DeviceNotice
    annotations:
      skos_in_scheme: notice-classes

  GraphicalNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:GraphicalNotice
    description: A notice that uses graphical elements such as visualisations 
      and icons
    aliases:
    - Graphical Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:GraphicalNotice
    - dpv_owl:GraphicalNotice
    annotations:
      skos_in_scheme: notice-classes

  JITNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:JITNotice
    description: |-
      A notice that is provided "just in time" when collecting information or
      performing an activity
    aliases:
    - Just-in-time Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:JITNotice
    - dpv_owl:JITNotice
    annotations:
      skos_in_scheme: notice-classes

  LayeredNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:LayeredNotice
    description: A notice that contains layered elements
    aliases:
    - Layered Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:LayeredNotice
    - dpv_owl:LayeredNotice
    annotations:
      skos_in_scheme: notice-classes

  Notice:
    is_a: OrganisationalMeasure
    class_uri: dpv:Notice
    description: |-
      A notice is an artefact for providing information, choices, or controls
    aliases:
    - Notice
    comments:
    - |-
      Notice refers to the information whereas Notification refers to the
      provision of that notice. In several cases, they are used
      interchangeably - for example Privacy Notice as a measure or control
      refers to both the information as well as the act of making it
      available. For 'active' contexts where this distinction is important,
      e.g. data breach notifications, see Notification concept.
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:Notice
    - dpv_owl:Notice
    annotations:
      skos_in_scheme: notice-classes

  NoticeCommunicated:
    is_a: NoticeStatus
    class_uri: dpv:NoticeCommunicated
    description: Status indicating the notice has been communicated
    aliases:
    - Notice Communicated
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeCommunicated
    - dpv_owl:NoticeCommunicated
    annotations:
      skos_in_scheme: notice-classes

  NoticeGenerated:
    is_a: NoticeStatus
    class_uri: dpv:NoticeGenerated
    description: Status indicating the notice has been generated
    aliases:
    - Notice Generated
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeGenerated
    - dpv_owl:NoticeGenerated
    annotations:
      skos_in_scheme: notice-classes

  NoticeIcon:
    class_uri: dpv:NoticeIcon
    description: |-
      An icon within a notice associated with specific information or elements
    aliases:
    - Notice Icon
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeIcon
    - dpv_owl:NoticeIcon
    annotations:
      skos_in_scheme: notice-classes

  NoticeLatest:
    is_a: NoticeStatus
    class_uri: dpv:NoticeLatest
    description: Status indicating the notice is currently at its latest 
      iteration
    aliases:
    - Notice Latest
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeLatest
    - dpv_owl:NoticeLatest
    annotations:
      skos_in_scheme: notice-classes

  NoticeLayer:
    class_uri: dpv:NoticeLayer
    description: |-
      A layer within a layered notice where the layer can be used for
      providing specific information or controls
    aliases:
    - Notice Layer
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeLayer
    - dpv_owl:NoticeLayer
    annotations:
      skos_in_scheme: notice-classes

  NoticeStale:
    is_a: NoticeStatus
    class_uri: dpv:NoticeStale
    description: |-
      Status indicating the notice is stale or not up to date or not the
      latest version
    aliases:
    - Notice Stale
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeStale
    - dpv_owl:NoticeStale
    annotations:
      skos_in_scheme: notice-classes

  NoticeStatus:
    is_a: Status
    class_uri: dpv:NoticeStatus
    description: Status associated with notice provision, use, and management
    aliases:
    - Notice Status
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeStatus
    - dpv_owl:NoticeStatus
    annotations:
      skos_in_scheme: notice-classes

  NoticeUnused:
    is_a: NoticeStatus
    class_uri: dpv:NoticeUnused
    description: |-
      Status indicating the notice has been communicated but has not yet been
      used e.g. the recipient has not acknowledged it or has not taken the
      intended action
    aliases:
    - Notice Unused
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeUnused
    - dpv_owl:NoticeUnused
    annotations:
      skos_in_scheme: notice-classes

  NoticeUpdated:
    is_a: NoticeStatus
    class_uri: dpv:NoticeUpdated
    description: |-
      Status indicating the notice has been updated and its contents or
      implications have changed
    aliases:
    - Notice Updated
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeUpdated
    - dpv_owl:NoticeUpdated
    annotations:
      skos_in_scheme: notice-classes

  NoticeUsed:
    is_a: NoticeStatus
    class_uri: dpv:NoticeUsed
    description: |-
      Status indicating the notice has been communicated and has been used
      e.g. the recipient has acknowledged it or taken the intended action
    aliases:
    - Notice Used
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:NoticeUsed
    - dpv_owl:NoticeUsed
    annotations:
      skos_in_scheme: notice-classes

  OralNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:OralNotice
    description: A notice provided orally or verbally
    aliases:
    - Oral Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:OralNotice
    - dpv_owl:OralNotice
    annotations:
      skos_in_scheme: notice-classes

  PostedNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:PostedNotice
    description: A notice that is posted as a sign or banner
    aliases:
    - Posted Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:PostedNotice
    - dpv_owl:PostedNotice
    annotations:
      skos_in_scheme: notice-classes

  PrintedNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:PrintedNotice
    description: A notice that is provided in a printed form on or along with a 
      device
    aliases:
    - Printed Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:PrintedNotice
    - dpv_owl:PrintedNotice
    annotations:
      skos_in_scheme: notice-classes

  PrivacyNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:PrivacyNotice
    description: |-
      Represents a notice or document outlining information regarding privacy
    aliases:
    - Privacy Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:PrivacyNotice
    - dpv_owl:PrivacyNotice
    annotations:
      skos_in_scheme: notice-classes

    close_mappings:
    - iso29100:PrivacyPolicy
  SecurityIncidentNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:SecurityIncidentNotice
    description: A notice providing information about security incident(s)
    aliases:
    - Security Incident Notice
    in_subset:
    - notice_subset
    exact_mappings:
    - dpv_upstream:SecurityIncidentNotice
    - dpv_owl:SecurityIncidentNotice
    annotations:
      skos_in_scheme: notice-classes
