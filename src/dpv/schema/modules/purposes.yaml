id: https://w3id.org/lmodel/dpv/purposes
name: dpv_purposes
title: DPV - Purposes
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/purposes-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv_core

subsets:

  purposes_subset:
    description: Entities from the DPV `purposes` module.

slots:

  has_purpose:
    definition_uri: dpv:hasPurpose
    description: Indicates association with Purpose
    aliases:
      - has purpose
    multivalued: true
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:hasPurpose
      - dpv_owl:hasPurpose
    annotations:
      skos_in_scheme: purposes-properties

  has_sector:
    definition_uri: dpv:hasSector
    description: |-
      Indicates the purpose is associated with activities in the indicated
      (Economic) Sector(s)
    aliases:
      - has sector
    multivalued: true
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:hasSector
      - dpv_owl:hasSector
    annotations:
      skos_in_scheme: purposes-properties

classes:

  AcademicResearch:
    is_a: ResearchAndDevelopment
    mixins:
      - Purpose
    class_uri: dpv:AcademicResearch
    description: |-
      Purposes associated with conducting or assisting with research conducted
      in an academic context e.g. within universities
    aliases:
      - Academic Research
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:AcademicResearch
      - dpv_owl:AcademicResearch
    related_mappings:
      - svpu:Education
    annotations:
      skos_in_scheme: purposes-classes

  AccountManagement:
    is_a: Purpose
    class_uri: dpv:AccountManagement
    description: |-
      Account Management refers to purposes associated with account
      management, such as to create, provide, maintain, and manage accounts
    aliases:
      - Account Management
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:AccountManagement
      - dpv_owl:AccountManagement
    annotations:
      skos_in_scheme: purposes-classes

  Advertising:
    is_a: Marketing
    mixins:
      - Purpose
    class_uri: dpv:Advertising
    description: |-
      Purposes associated with conducting advertising i.e. process or artefact
      used to call attention to a product, service, etc. through
      announcements, notices, or other forms of communication
    aliases:
      - Advertising
    comments:
      - |-
        Advertising is a subset of Marketing. Advertising by itself does not
        indicate 'personalisation' i.e. personalised ads.
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:Advertising
      - dpv_owl:Advertising
    annotations:
      skos_in_scheme: purposes-classes

  AgeVerification:
    is_a: Verification
    mixins:
      - Purpose
    class_uri: dpv:AgeVerification
    description: |-
      Purposes associated with verifying or authenticating age or age related
      information as a form of security
    aliases:
      - Age Verification
    comments:
      - |-
        Age Verification can include verification of the exact age, e.g. being
        21 years old, a date, e.g. birth date is 01 January 1969, or a
        condition, e.g. age is over 21 years and the person is an adult.
        Specific dedicated resources should be used to further express
        information and processes associated with Age Verification, for example
        the Age Verification Vocabulary https://w3id.org/age/
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:AgeVerification
      - dpv_owl:AgeVerification
    annotations:
      skos_in_scheme: purposes-classes

  CombatClimateChange:
    is_a: PublicBenefit
    mixins:
      - Purpose
    class_uri: dpv:CombatClimateChange
    description: |-
      Purposes associated with combating the causes and consequences of
      climate change, including reducing gas emissions and fighting
      emergencies such as floods or wildfires
    aliases:
      - Combat Climate Change
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CombatClimateChange
      - dpv_owl:CombatClimateChange
    annotations:
      skos_in_scheme: purposes-classes
      dct_source: DGA 2.16

  CommercialPurpose:
    is_a: Purpose
    class_uri: dpv:CommercialPurpose
    description: |-
      Purposes associated with processing activities performed in a commercial
      setting or with intention to commercialise
    aliases:
      - Commercial Purpose
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CommercialPurpose
      - dpv_owl:CommercialPurpose
    annotations:
      skos_in_scheme: purposes-classes
      dct_source: DGA 4.4

  CommercialResearch:
    is_a: CommercialPurpose
    mixins:
      - Purpose
      - ResearchAndDevelopment
    class_uri: dpv:CommercialResearch
    description: |-
      Purposes associated with conducting research in a commercial setting or
      with intention to commercialise e.g. in a company or sponsored by a
      company
    aliases:
      - Commercial Research
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CommercialResearch
      - dpv_owl:CommercialResearch
    related_mappings:
      - svpu:Develop
    annotations:
      skos_in_scheme: purposes-classes

  CommunicationForCustomerCare:
    is_a: CommunicationManagement
    mixins:
      - Purpose
      - CustomerCare
    class_uri: dpv:CommunicationForCustomerCare
    description: |-
      Customer Care Communication refers to purposes associated with
      communicating with customers for assisting them, resolving issues,
      ensuring satisfaction, etc. in relation to services provided
    aliases:
      - Communication for Customer Care
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CommunicationForCustomerCare
      - dpv_owl:CommunicationForCustomerCare
    annotations:
      skos_in_scheme: purposes-classes

  CommunicationManagement:
    is_a: Purpose
    class_uri: dpv:CommunicationManagement
    description: |-
      Communication Management refers to purposes associated with providing or
      managing communication activities e.g. to send an email for notifying
      some information
    aliases:
      - Communication Management
    comments:
      - |-
        This purpose by itself does not sufficiently and clearly indicate what
        the communication is about. As such, it is recommended to combine it
        with another purpose to indicate the application. For example,
        Communication of Payment.
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CommunicationManagement
      - dpv_owl:CommunicationManagement
    annotations:
      skos_in_scheme: purposes-classes

  CounterMoneyLaundering:
    is_a: FraudPreventionAndDetection
    mixins:
      - Purpose
    class_uri: dpv:CounterMoneyLaundering
    description: |-
      Purposes associated with detection, prevention, and mitigation of
      mitigate money laundering
    aliases:
      - Counter Money Laundering
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CounterMoneyLaundering
      - dpv_owl:CounterMoneyLaundering
    annotations:
      skos_in_scheme: purposes-classes

  Counterterrorism:
    is_a: PublicBenefit
    mixins:
      - Purpose
    class_uri: dpv:Counterterrorism
    description: |-
      Purposes associated with activities that detect, prevent, mitigate, or
      otherwise perform activities to combat or eliminate terrorism (also
      referred to as anti-terrorism)
    aliases:
      - Counterterrorism
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:Counterterrorism
      - dpv_owl:Counterterrorism
    annotations:
      skos_in_scheme: purposes-classes

  CustomerCare:
    is_a: CustomerManagement
    mixins:
      - Purpose
    class_uri: dpv:CustomerCare
    description: |-
      Customer Care refers to purposes associated with purposes for providing
      assistance, resolving issues, ensuring satisfaction, etc. in relation to
      services provided
    aliases:
      - Customer Care
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CustomerCare
      - dpv_owl:CustomerCare
    related_mappings:
      - svpu:Feedback
    annotations:
      skos_in_scheme: purposes-classes

  CustomerClaimsManagement:
    is_a: CustomerManagement
    mixins:
      - Purpose
    class_uri: dpv:CustomerClaimsManagement
    description: |-
      Customer Claims Management refers to purposes associated with managing
      claims, including repayment of monies owed
    aliases:
      - Customer Claims Management
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CustomerClaimsManagement
      - dpv_owl:CustomerClaimsManagement
    annotations:
      skos_in_scheme: purposes-classes

  CustomerManagement:
    is_a: Purpose
    class_uri: dpv:CustomerManagement
    description: |-
      Customer Management refers to purposes associated with managing
      activities related with past, current, and future customers
    aliases:
      - Customer Management
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CustomerManagement
      - dpv_owl:CustomerManagement
    annotations:
      skos_in_scheme: purposes-classes

  CustomerOrderManagement:
    is_a: CustomerManagement
    mixins:
      - Purpose
    class_uri: dpv:CustomerOrderManagement
    description: |-
      Customer Order Management refers to purposes associated with managing
      customer orders i.e. processing of an order related to customer's
      purchase of good or services
    aliases:
      - Customer Order Management
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CustomerOrderManagement
      - dpv_owl:CustomerOrderManagement
    annotations:
      skos_in_scheme: purposes-classes

  CustomerRelationshipManagement:
    is_a: CustomerManagement
    mixins:
      - Purpose
    class_uri: dpv:CustomerRelationshipManagement
    description: |-
      Customer Relationship Management refers to purposes associated with
      managing and analysing interactions with past, current, and potential
      customers
    aliases:
      - Customer Relationship Management
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CustomerRelationshipManagement
      - dpv_owl:CustomerRelationshipManagement
    annotations:
      skos_in_scheme: purposes-classes

  CustomerSolvencyMonitoring:
    is_a: CustomerManagement
    mixins:
      - Purpose
    class_uri: dpv:CustomerSolvencyMonitoring
    description: |-
      Customer Solvency Monitoring refers to purposes associated with monitor
      solvency of customers for financial diligence
    aliases:
      - Customer Solvency Monitoring
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:CustomerSolvencyMonitoring
      - dpv_owl:CustomerSolvencyMonitoring
    annotations:
      skos_in_scheme: purposes-classes

  DataAltruism:
    is_a: PublicBenefit
    mixins:
      - Purpose
    class_uri: dpv:DataAltruism
    description: |-
      Purposes associated with the voluntary sharing of data for the general
      interest of the public, such as healthcare or combating climate change
    aliases:
      - Data Altruism
    comments:
      - |-
        Data Altruism as a purpose should be combined with other purposes to
        indicate their altruistic interpretation or application. E.g. improving
        healthcare and data altruism in combination.
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:DataAltruism
      - dpv_owl:DataAltruism
    annotations:
      skos_in_scheme: purposes-classes
      dct_source: DGA 2.16

  DeliveryOfGoods:
    is_a: RequestedServiceProvision
    mixins:
      - Purpose
    class_uri: dpv:DeliveryOfGoods
    description: |-
      Purposes associated with delivering goods and services requested or
      asked by consumer
    aliases:
      - Delivery of Goods
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:DeliveryOfGoods
      - dpv_owl:DeliveryOfGoods
    related_mappings:
      - svpu:Delivery
    annotations:
      skos_in_scheme: purposes-classes

  DirectMarketing:
    is_a: Marketing
    mixins:
      - Purpose
    class_uri: dpv:DirectMarketing
    description: |-
      Purposes associated with conducting direct marketing i.e. marketing
      communicated directly to the individual
    aliases:
      - Direct Marketing
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:DirectMarketing
      - dpv_owl:DirectMarketing
    annotations:
      skos_in_scheme: purposes-classes

  DisputeManagement:
    is_a: OrganisationGovernance
    mixins:
      - Purpose
    class_uri: dpv:DisputeManagement
    description: |-
      Purposes associated with activities that manage disputes by natural
      persons, private bodies, or public authorities relevant to organisation
    aliases:
      - Dispute Management
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:DisputeManagement
      - dpv_owl:DisputeManagement
    annotations:
      skos_in_scheme: purposes-classes

  EnforceAccessControl:
    is_a: EnforceSecurity
    mixins:
      - Purpose
    class_uri: dpv:EnforceAccessControl
    description: |-
      Purposes associated with conducting or enforcing access control as a
      form of security
    aliases:
      - Enforce Access Control
    comments:
      - |-
        Was previously "Access Control". Prefixed to distinguish from Technical
        Measure.
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:EnforceAccessControl
      - dpv_owl:EnforceAccessControl
    related_mappings:
      - svpu:Login
    annotations:
      skos_in_scheme: purposes-classes

  EnforceSecurity:
    is_a: Purpose
    class_uri: dpv:EnforceSecurity
    description: |-
      Purposes associated with ensuring and enforcing security for data,
      personnel, or other related matters
    aliases:
      - Enforce Security
    comments:
      - |-
        Was previous "Security". Prefixed to distinguish from TechOrg measures.
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:EnforceSecurity
      - dpv_owl:EnforceSecurity
    annotations:
      skos_in_scheme: purposes-classes

  EstablishContractualAgreement:
    is_a: Purpose
    class_uri: dpv:EstablishContractualAgreement
    description: |-
      Purposes associated with carrying out data processing to establish an
      agreement, such as for entering into a contract
    aliases:
      - Establish Contractual Agreement
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:EstablishContractualAgreement
      - dpv_owl:EstablishContractualAgreement
    annotations:
      skos_in_scheme: purposes-classes

  FraudPreventionAndDetection:
    is_a: MisusePreventionAndDetection
    mixins:
      - Purpose
    class_uri: dpv:FraudPreventionAndDetection
    description: Purposes associated with fraud detection, prevention, and mitigation
    aliases:
      - Fraud Prevention and Detection
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:FraudPreventionAndDetection
      - dpv_owl:FraudPreventionAndDetection
    related_mappings:
      - svpu:Government
    annotations:
      skos_in_scheme: purposes-classes

  FulfilmentOfContractualObligation:
    is_a: FulfilmentOfObligation
    mixins:
      - Purpose
    class_uri: dpv:FulfilmentOfContractualObligation
    description: |-
      Purposes associated with carrying out data processing to fulfill a
      contractual obligation
    aliases:
      - Fulfilment of Contractual Obligation
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:FulfilmentOfContractualObligation
      - dpv_owl:FulfilmentOfContractualObligation
    annotations:
      skos_in_scheme: purposes-classes

  FulfilmentOfObligation:
    is_a: Purpose
    class_uri: dpv:FulfilmentOfObligation
    description: |-
      Purposes associated with carrying out data processing to fulfill an
      obligation
    aliases:
      - Fulfilment of Obligation
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:FulfilmentOfObligation
      - dpv_owl:FulfilmentOfObligation
    annotations:
      skos_in_scheme: purposes-classes

  HumanResourceManagement:
    is_a: Purpose
    class_uri: dpv:HumanResourceManagement
    description: |-
      Purposes associated with managing humans and 'human resources' within
      the organisation for effective and efficient operations.
    aliases:
      - Human Resource Management
    comments:
      - |-
        HR is a broad concept. Its management includes, amongst others -
        recruiting employees and intermediaries e.g. brokers, independent
        representatives; payroll administration, remunerations, commissions, and
        wages; and application of social legislation.
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:HumanResourceManagement
      - dpv_owl:HumanResourceManagement
    annotations:
      skos_in_scheme: purposes-classes

  IdentityAuthentication:
    is_a: EnforceSecurity
    mixins:
      - Purpose
    class_uri: dpv:IdentityAuthentication
    description: |-
      Purposes associated with performing authentication based on identity as
      a form of security
    aliases:
      - Identity Authentication
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:IdentityAuthentication
      - dpv_owl:IdentityAuthentication
    annotations:
      skos_in_scheme: purposes-classes

  IdentityVerification:
    is_a: Verification
    mixins:
      - Purpose
    class_uri: dpv:IdentityVerification
    description: |-
      Purposes associated with verifying or authenticating identity as a form
      of security
    aliases:
      - Identity Verification
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:IdentityVerification
      - dpv_owl:IdentityVerification
    annotations:
      skos_in_scheme: purposes-classes

  ImproveExistingProductsAndServices:
    is_a: OptimisationForController
    mixins:
      - Purpose
    class_uri: dpv:ImproveExistingProductsAndServices
    description: Purposes associated with improving existing products and services
    aliases:
      - Improve Existing Products and Services
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:ImproveExistingProductsAndServices
      - dpv_owl:ImproveExistingProductsAndServices
    annotations:
      skos_in_scheme: purposes-classes

  ImproveHealthcare:
    is_a: PublicBenefit
    mixins:
      - Purpose
    class_uri: dpv:ImproveHealthcare
    description: |-
      Purposes associated with improving healthcare systems such as for
      personalised treatments and curing chronic diseases
    aliases:
      - Improve Healthcare
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:ImproveHealthcare
      - dpv_owl:ImproveHealthcare
    annotations:
      skos_in_scheme: purposes-classes
      dct_source: DGA 2.16

  ImproveInternalCRMProcesses:
    is_a: CustomerRelationshipManagement
    mixins:
      - Purpose
      - OptimisationForController
    class_uri: dpv:ImproveInternalCRMProcesses
    description: |-
      Purposes associated with improving customer-relationship management
      (CRM) processes
    aliases:
      - Improve Internal CRM Processes
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:ImproveInternalCRMProcesses
      - dpv_owl:ImproveInternalCRMProcesses
    annotations:
      skos_in_scheme: purposes-classes

  ImprovePublicServices:
    is_a: PublicBenefit
    mixins:
      - Purpose
    class_uri: dpv:ImprovePublicServices
    description: |-
      Purposes associated with improving the provision of public services,
      such as public safety, education or law enforcement
    aliases:
      - Improve Public Services
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:ImprovePublicServices
      - dpv_owl:ImprovePublicServices
    annotations:
      skos_in_scheme: purposes-classes
      dct_source: DGA 2.16

  ImproveTransportMobility:
    is_a: PublicBenefit
    mixins:
      - Purpose
    class_uri: dpv:ImproveTransportMobility
    description: |-
      Purposes associated with improving traffic, public transport systems or
      costs for drivers
    aliases:
      - Improve Transport and Mobility
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:ImproveTransportMobility
      - dpv_owl:ImproveTransportMobility
    annotations:
      skos_in_scheme: purposes-classes
      dct_source: DGA 2.16

  IncreaseServiceRobustness:
    is_a: OptimisationForController
    mixins:
      - Purpose
    class_uri: dpv:IncreaseServiceRobustness
    description: |-
      Purposes associated with improving robustness and resilience of services
    aliases:
      - Increase Service Robustness
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:IncreaseServiceRobustness
      - dpv_owl:IncreaseServiceRobustness
    annotations:
      skos_in_scheme: purposes-classes

  InternalResourceOptimisation:
    is_a: OptimisationForController
    mixins:
      - Purpose
    class_uri: dpv:InternalResourceOptimisation
    description: |-
      Purposes associated with optimisation of internal resource availability
      and usage for organisation
    aliases:
      - Internal Resource Optimisation
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:InternalResourceOptimisation
      - dpv_owl:InternalResourceOptimisation
    annotations:
      skos_in_scheme: purposes-classes

  LegalCompliance:
    is_a: FulfilmentOfObligation
    mixins:
      - Purpose
    class_uri: dpv:LegalCompliance
    description: |-
      Purposes associated with carrying out data processing to fulfill a legal
      or statutory obligation
    aliases:
      - Legal Compliance
    comments:
      - |-
        This purpose only refers to processing that is additionally required in
        order to fulfill the obligations and requirements associated with a law.
        For example, the use of consent would have its own separate purposes,
        with this purpose addressing a legal requirement for maintaining consent
        record (along with RecordManagement). This purpose will typically be
        used with Legal Obligation as the legal basis.
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:LegalCompliance
      - dpv_owl:LegalCompliance
    annotations:
      skos_in_scheme: purposes-classes

  MaintainFraudDatabase:
    is_a: FraudPreventionAndDetection
    mixins:
      - Purpose
    class_uri: dpv:MaintainFraudDatabase
    description: |-
      Purposes associated with maintaining a database related to identifying
      and identified fraud risks and fraud incidents
    aliases:
      - Maintain Fraud Database
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:MaintainFraudDatabase
      - dpv_owl:MaintainFraudDatabase
    annotations:
      skos_in_scheme: purposes-classes

  Marketing:
    is_a: Purpose
    class_uri: dpv:Marketing
    description: |-
      Purposes associated with conducting marketing in relation to
      organisation or products or services e.g. promoting, selling, and
      distributing
    aliases:
      - Marketing
    comments:
      - |-
        Was commercial interest, changed to consider Marketing a separate
        Purpose category by itself
    in_subset:
      - purposes_subset
    exact_mappings:
      - dpv_upstream:Marketing
      - dpv_owl:Marketing
    annotations:
      skos_in_scheme: purposes-classes

  MemberPartnerManagement:
    is_a: OrganisationGovernance
    mixins:
      - Purpose
    class_uri: dpv:MemberPartnerManagement
    description: |-
      Purposes associated with maintaining a registry of shareholders,
      members, or partners for governance, administration, and management
      functions
    aliases:
