id: https://w3id.org/lmodel/dpv/entities_authority
name: dpv_entities_authority
title: DPV - Entities Authority
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/entities_authority-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv

subsets:

  entities_authority_subset:
    description: Entities from the DPV `entities_authority` module.

slots:

  has_authority:
    definition_uri: dpv:hasAuthority
    description: Indicates applicability of authority for a jurisdiction
    aliases:
      - has authority
    multivalued: true
    in_subset:
      - entities_authority_subset
    exact_mappings:
      - dpv_upstream:hasAuthority
      - dpv_owl:hasAuthority
    annotations:
      skos_in_scheme: entities-authority-properties

  is_authority_for:
    definition_uri: dpv:isAuthorityFor
    description: Indicates area, scope, or applicability of an Authority
    aliases:
      - is authority for
    multivalued: true
    in_subset:
      - entities_authority_subset
    exact_mappings:
      - dpv_upstream:isAuthorityFor
      - dpv_owl:isAuthorityFor
    annotations:
      skos_in_scheme: entities-authority-properties

classes:

  DataProtectionAuthority:
    is_a: DpvAuthority
    class_uri: dpv:DataProtectionAuthority
    description: |-
      An authority tasked with overseeing legal compliance regarding privacy
      and data protection laws.
    aliases:
      - Data Protection Authority
    in_subset:
      - entities_authority_subset
    exact_mappings:
      - dpv_upstream:DataProtectionAuthority
      - dpv_owl:DataProtectionAuthority
    related_mappings:
      - nist_csf_v2:ResponsibleParty
      - oscal:ResponsibleParty
    annotations:
      skos_in_scheme: entities-authority-classes

  DpvAuthority:
    is_a: GovernmentalOrganisation
    class_uri: dpv:Authority
    description: |-
      An authority with the power to create or enforce laws, or determine
      their compliance.
    aliases:
      - Authority
    in_subset:
      - entities_authority_subset
    exact_mappings:
      - dpv_upstream:Authority
      - dpv_owl:Authority
    annotations:
      skos_in_scheme: entities-authority-classes

  NationalAuthority:
    is_a: DpvAuthority
    class_uri: dpv:NationalAuthority
    description: An authority tasked with overseeing legal compliance for a nation
    aliases:
      - National Authority
    in_subset:
      - entities_authority_subset
    exact_mappings:
      - dpv_upstream:NationalAuthority
      - dpv_owl:NationalAuthority
    annotations:
      skos_in_scheme: entities-authority-classes

  RegionalAuthority:
    is_a: DpvAuthority
    class_uri: dpv:RegionalAuthority
    description: An authority tasked with overseeing legal compliance for a region
    aliases:
      - Regional Authority
    in_subset:
      - entities_authority_subset
    exact_mappings:
      - dpv_upstream:RegionalAuthority
      - dpv_owl:RegionalAuthority
    annotations:
      skos_in_scheme: entities-authority-classes

  SupraNationalAuthority:
    is_a: DpvAuthority
    class_uri: dpv:SupraNationalAuthority
    description: |-
      An authority tasked with overseeing legal compliance for a
      supra-national union e.g. EU
    aliases:
      - Supranational Authority
    in_subset:
      - entities_authority_subset
    exact_mappings:
      - dpv_upstream:SupraNationalAuthority
      - dpv_owl:SupraNationalAuthority
    annotations:
      skos_in_scheme: entities-authority-classes
