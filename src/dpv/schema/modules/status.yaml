id: https://w3id.org/lmodel/dpv/status
name: dpv_status
title: DPV - Status
description: |-
  LinkML schema generated from the DPV 2.3 module `modules/status-owl.ttl`
  (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv

subsets:

  status_subset:
    description: Entities from the DPV `status` module.

slots:

  has_activity_status:
    is_a: has_status
    definition_uri: dpv:hasActivityStatus
    description: Indicates the status of activity of specified concept
    aliases:
      - has activity status
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasActivityStatus
      - dpv_owl:hasActivityStatus
    annotations:
      skos_in_scheme: status-properties

  has_audit_status:
    is_a: has_status
    definition_uri: dpv:hasAuditStatus
    description: Indicates the status of audit associated with specified concept
    aliases:
      - has audit status
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasAuditStatus
      - dpv_owl:hasAuditStatus
    annotations:
      skos_in_scheme: status-properties

  has_compliance_status:
    is_a: has_status
    definition_uri: dpv:hasComplianceStatus
    description: Indicates the status of compliance of specified concept
    aliases:
      - has compliance status
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasComplianceStatus
      - dpv_owl:hasComplianceStatus
    annotations:
      skos_in_scheme: status-properties

  has_conformance_status:
    definition_uri: dpv:hasConformanceStatus
    description: Indicates the status of being conformant or non-conformant
    aliases:
      - has conformance status
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasConformanceStatus
      - dpv_owl:hasConformanceStatus
    annotations:
      skos_in_scheme: status-properties

  has_expectation:
    is_a: has_status
    definition_uri: dpv:hasExpectation
    description: Indicates whether the specified context was expected or unexpected
    aliases:
      - has expectation
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasExpectation
      - dpv_owl:hasExpectation
    annotations:
      skos_in_scheme: status-properties

  has_informed_status:
    is_a: has_status
    definition_uri: dpv:hasInformedStatus
    description: Indicates whether an entity was informed or uninformed
    aliases:
      - has informed status
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasInformedStatus
      - dpv_owl:hasInformedStatus
    annotations:
      skos_in_scheme: status-properties

  has_intention:
    is_a: has_status
    definition_uri: dpv:hasIntention
    description: Indicates whether the specified context was intended or unintended
    aliases:
      - has intention
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasIntention
      - dpv_owl:hasIntention
    annotations:
      skos_in_scheme: status-properties

  has_involvement:
    is_a: has_status
    definition_uri: dpv:hasInvolvement
    description: Indicates the involvement status for the specified context
    aliases:
      - has involvement
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasInvolvement
      - dpv_owl:hasInvolvement
    annotations:
      skos_in_scheme: status-properties

  has_lawfulness:
    is_a: has_compliance_status
    definition_uri: dpv:hasLawfulness
    description: Indicates the status of being lawful or legally compliant
    aliases:
      - has lawfulness
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasLawfulness
      - dpv_owl:hasLawfulness
    annotations:
      skos_in_scheme: status-properties

  has_notification_status:
    definition_uri: dpv:hasNotificationStatus
    description: Indicates the status associated with a notice
    aliases:
      - has notification status
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasNotificationStatus
      - dpv_owl:hasNotificationStatus
    annotations:
      skos_in_scheme: status-properties

  has_request_status:
    definition_uri: dpv:hasRequestStatus
    description: Indicates the status associated with a request
    aliases:
      - has request status
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasRequestStatus
      - dpv_owl:hasRequestStatus
    annotations:
      skos_in_scheme: status-properties

  has_reuse_compatibility:
    is_a: has_status
    definition_uri: dpv:hasReuseCompatibility
    description: Indicates the reuse compatibility for the specified context
    aliases:
      - has reuse compatibility
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasReuseCompatibility
      - dpv_owl:hasReuseCompatibility
    annotations:
      skos_in_scheme: status-properties

  has_status:
    definition_uri: dpv:hasStatus
    description: Indicates the status of specified concept
    aliases:
      - has status
    multivalued: true
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:hasStatus
      - dpv_owl:hasStatus
    annotations:
      skos_in_scheme: status-properties

classes:

  ActivelyInvolved:
    is_a: InvolvementStatus
    class_uri: dpv:ActivelyInvolved
    description: Status indicating the specified context is 'actively' involved
    aliases:
      - Actively Involved
    comments:
      - |-
        An example of active involvement is a person directly using a system to
        enter information
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ActivelyInvolved
      - dpv_owl:ActivelyInvolved
    annotations:
      skos_in_scheme: status-classes

  ActivityCompleted:
    is_a: ActivityStatus
    class_uri: dpv:ActivityCompleted
    description: State of an activity that has completed i.e. is fully in the past
    aliases:
      - Activity Completed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ActivityCompleted
      - dpv_owl:ActivityCompleted
    annotations:
      skos_in_scheme: status-classes

  ActivityHalted:
    is_a: ActivityStatus
    class_uri: dpv:ActivityHalted
    description: |-
      State of an activity that was occurring in the past, and has been halted
      or paused or stopped
    aliases:
      - Activity Halted
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ActivityHalted
      - dpv_owl:ActivityHalted
    annotations:
      skos_in_scheme: status-classes

  ActivityNotCompleted:
    is_a: ActivityStatus
    class_uri: dpv:ActivityNotCompleted
    description: |-
      State of an activity that could not be completed, but has reached some
      end state
    aliases:
      - Activity Not Completed
    comments:
      - |-
        This relates to a 'Stop' state as distinct from a 'Halt' state. It makes
        no comments on whether the Activity can be resumed or continued towards
        completion.
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ActivityNotCompleted
      - dpv_owl:ActivityNotCompleted
    annotations:
      skos_in_scheme: status-classes

  ActivityOngoing:
    is_a: ActivityStatus
    class_uri: dpv:ActivityOngoing
    description: State of an activity occurring in continuation i.e. currently ongoing
    aliases:
      - Activity Ongoing
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ActivityOngoing
      - dpv_owl:ActivityOngoing
    annotations:
      skos_in_scheme: status-classes

  ActivityPlanned:
    is_a: ActivityStatus
    class_uri: dpv:ActivityPlanned
    description: |-
      State of an activity being planned with concrete plans for
      implementation
    aliases:
      - Activity Planned
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ActivityPlanned
      - dpv_owl:ActivityPlanned
    annotations:
      skos_in_scheme: status-classes

  ActivityProposed:
    is_a: ActivityStatus
    class_uri: dpv:ActivityProposed
    description: |-
      State of an activity being proposed without any concrete plans for
      implementation
    aliases:
      - Activity Proposed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ActivityProposed
      - dpv_owl:ActivityProposed
    annotations:
      skos_in_scheme: status-classes

  ActivityStatus:
    is_a: Status
    class_uri: dpv:ActivityStatus
    description: Status associated with activity operations and lifecycles
    aliases:
      - Activity Status
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ActivityStatus
      - dpv_owl:ActivityStatus
    annotations:
      skos_in_scheme: status-classes

  AuditApproved:
    is_a: AuditStatus
    class_uri: dpv:AuditApproved
    description: State of being approved through the audit
    aliases:
      - Audit Approved
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuditApproved
      - dpv_owl:AuditApproved
    annotations:
      skos_in_scheme: status-classes

  AuditConditionallyApproved:
    is_a: AuditStatus
    class_uri: dpv:AuditConditionallyApproved
    description: State of being conditionally approved through the audit
    aliases:
      - Audit Conditionally Approved
    comments:
      - |-
        A "conditional approval" is intended to reflect states where the audit
        has identified further changes which must be implemented before
        considering the audit has been 'passed', without requiring another audit
        to validate them. This is distinct from the case where an audit has
        state 'rejected', which means changes must be made and submitted for
        review. The requirements of a 'conditional acceptance' are expected to
        be minor or not significant enough to warrant another audit to review
        them.
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuditConditionallyApproved
      - dpv_owl:AuditConditionallyApproved
    annotations:
      skos_in_scheme: status-classes

  AuditNotRequired:
    is_a: AuditStatus
    class_uri: dpv:AuditNotRequired
    description: State where an audit is determined as not being required
    aliases:
      - Audit Not Required
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuditNotRequired
      - dpv_owl:AuditNotRequired
    annotations:
      skos_in_scheme: status-classes

  AuditRejected:
    is_a: AuditStatus
    class_uri: dpv:AuditRejected
    description: State of not being approved or being rejected through the audit
    aliases:
      - Audit Rejected
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuditRejected
      - dpv_owl:AuditRejected
    annotations:
      skos_in_scheme: status-classes

  AuditRequested:
    is_a: AuditStatus
    class_uri: dpv:AuditRequested
    description: State of an audit being requested whose outcome is not yet known
    aliases:
      - Audit Requested
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuditRequested
      - dpv_owl:AuditRequested
    annotations:
      skos_in_scheme: status-classes

  AuditRequired:
    is_a: AuditStatus
    class_uri: dpv:AuditRequired
    description: |-
      State where an audit is determined as being required but has not been
      conducted
    aliases:
      - Audit Required
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuditRequired
      - dpv_owl:AuditRequired
    annotations:
      skos_in_scheme: status-classes

  AuditStatus:
    is_a: Status
    class_uri: dpv:AuditStatus
    description: Status associated with Auditing or Investigation
    aliases:
      - Audit Status
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuditStatus
      - dpv_owl:AuditStatus
    annotations:
      skos_in_scheme: status-classes

  AuthorityInformed:
    is_a: EntityInformed
    mixins:
      - EntityInformedStatus
    class_uri: dpv:AuthorityInformed
    description: |-
      Status indicating Authority has been informed about the specified
      context
    aliases:
      - Authority Informed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuthorityInformed
      - dpv_owl:AuthorityInformed
    annotations:
      skos_in_scheme: status-classes

  AuthorityUninformed:
    is_a: EntityUninformed
    mixins:
      - EntityInformedStatus
    class_uri: dpv:AuthorityUninformed
    description: |-
      Status indicating Authority is uninformed i.e. has not been informed
      about the specified context
    aliases:
      - Authority Uninformed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:AuthorityUninformed
      - dpv_owl:AuthorityUninformed
    annotations:
      skos_in_scheme: status-classes

  CompatibilityUnknown:
    is_a: ReuseCompatibility
    class_uri: dpv:CompatibilityUnknown
    description: |-
      Status indicating the compatibility of the context with an earlier
      context is currently unknown
    aliases:
      - Compatibility Unknown
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:CompatibilityUnknown
      - dpv_owl:CompatibilityUnknown
    annotations:
      skos_in_scheme: status-classes

  ComplianceIndeterminate:
    is_a: ComplianceStatus
    class_uri: dpv:ComplianceIndeterminate
    description: |-
      State where the status of compliance has not been fully assessed,
      evaluated, or determined
    aliases:
      - Compliance Indeterminate
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ComplianceIndeterminate
      - dpv_owl:ComplianceIndeterminate
    annotations:
      skos_in_scheme: status-classes

  ComplianceStatus:
    is_a: Status
    class_uri: dpv:ComplianceStatus
    description: |-
      Status associated with Compliance with some norms, objectives, or
      requirements
    aliases:
      - Compliance Status
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ComplianceStatus
      - dpv_owl:ComplianceStatus
    annotations:
      skos_in_scheme: status-classes

  ComplianceUnknown:
    is_a: ComplianceStatus
    class_uri: dpv:ComplianceUnknown
    description: State where the status of compliance is unknown
    aliases:
      - Compliance Unknown
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ComplianceUnknown
      - dpv_owl:ComplianceUnknown
    annotations:
      skos_in_scheme: status-classes

  ComplianceViolation:
    is_a: ComplianceStatus
    class_uri: dpv:ComplianceViolation
    description: |-
      State where compliance cannot be achieved due to requirements being
      violated
    aliases:
      - Compliance Violation
    comments:
      - |-
        Changed from "violation of compliance" for consistency with other terms
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ComplianceViolation
      - dpv_owl:ComplianceViolation
    annotations:
      skos_in_scheme: status-classes

  Compliant:
    is_a: ComplianceStatus
    class_uri: dpv:Compliant
    description: State of being fully compliant
    aliases:
      - Compliant
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:Compliant
      - dpv_owl:Compliant
    annotations:
      skos_in_scheme: status-classes

  ConformanceStatus:
    is_a: Status
    class_uri: dpv:ConformanceStatus
    description: |-
      Status associated with conformance to a standard, guideline, code, or
      recommendation
    aliases:
      - Conformance Status
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ConformanceStatus
      - dpv_owl:ConformanceStatus
    annotations:
      skos_in_scheme: status-classes

  Conformant:
    is_a: ConformanceStatus
    class_uri: dpv:Conformant
    description: State of being conformant
    aliases:
      - Conformant
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:Conformant
      - dpv_owl:Conformant
    annotations:
      skos_in_scheme: status-classes

  ControllerInformed:
    is_a: EntityInformed
    mixins:
      - EntityInformedStatus
    class_uri: dpv:ControllerInformed
    description: |-
      Status indicating Controller has been informed about the specified
      context
    aliases:
      - Controller Informed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ControllerInformed
      - dpv_owl:ControllerInformed
    annotations:
      skos_in_scheme: status-classes

  ControllerUninformed:
    is_a: EntityUninformed
    mixins:
      - EntityInformedStatus
    class_uri: dpv:ControllerUninformed
    description: |-
      Status indicating Controller is uninformed i.e. has not been informed
      about the specified context
    aliases:
      - Controller Uninformed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ControllerUninformed
      - dpv_owl:ControllerUninformed
    annotations:
      skos_in_scheme: status-classes

  DataSubjectInformed:
    is_a: EntityInformed
    mixins:
      - EntityInformedStatus
    class_uri: dpv:DataSubjectInformed
    description: |-
      Status indicating DataSubject has been informed about the specified
      context
    aliases:
      - Data Subject Informed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:DataSubjectInformed
      - dpv_owl:DataSubjectInformed
    annotations:
      skos_in_scheme: status-classes

  DataSubjectUninformed:
    is_a: EntityUninformed
    mixins:
      - EntityInformedStatus
    class_uri: dpv:DataSubjectUninformed
    description: |-
      Status indicating DataSubject is uninformed i.e. has not been informed
      about the specified context
    aliases:
      - Data Subject Uninformed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:DataSubjectUninformed
      - dpv_owl:DataSubjectUninformed
    annotations:
      skos_in_scheme: status-classes

  EntityInformed:
    is_a: EntityInformedStatus
    class_uri: dpv:EntityInformed
    description: Status indicating entity has been informed about specified context
    aliases:
      - Entity Informed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:EntityInformed
      - dpv_owl:EntityInformed
    annotations:
      skos_in_scheme: status-classes

  EntityInformedStatus:
    is_a: Status
    class_uri: dpv:EntityInformedStatus
    description: |-
      Status indicating whether an entity is informed or uninformed about
      specified context
    aliases:
      - Entity Informed Status
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:EntityInformedStatus
      - dpv_owl:EntityInformedStatus
    annotations:
      skos_in_scheme: status-classes

  EntityUninformed:
    is_a: EntityInformedStatus
    class_uri: dpv:EntityUninformed
    description: |-
      Status indicating entity is uninformed i.e. has been not been informed
      about specified context
    aliases:
      - Entity Uninformed
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:EntityUninformed
      - dpv_owl:EntityUninformed
    annotations:
      skos_in_scheme: status-classes

  ExpectationStatus:
    class_uri: dpv:ExpectationStatus
    description: |-
      Status indicating whether the specified context was intended or
      unintended
    aliases:
      - Expectation Status
    comments:
      - |-
        Expectation is associated with the outcome of a goal or purpose for what
        is expected to happen i.e. an ex-post indication of what was expected to
        happen in the specified context. Intention and Expectation are closely
        related terms. We recommend using Intention when the entity has the
        ability to control the implementation and Expectation for when the
        entity does not have control or for what happens after or beyond the
        exercise of control.
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:ExpectationStatus
      - dpv_owl:ExpectationStatus
    annotations:
      skos_in_scheme: status-classes

  Expected:
    is_a: ExpectationStatus
    class_uri: dpv:Expected
    description: Status indicating the specified context was expected
    aliases:
      - Expected
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:Expected
      - dpv_owl:Expected
    annotations:
      skos_in_scheme: status-classes

  Intended:
    is_a: IntentionStatus
    class_uri: dpv:Intended
    description: Status indicating the specified context was intended
    aliases:
      - Intended
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:Intended
      - dpv_owl:Intended
    annotations:
      skos_in_scheme: status-classes

  IntentionStatus:
    is_a: Status
    class_uri: dpv:IntentionStatus
    description: |-
      Status indicating whether the specified context was intended or
      unintended
    aliases:
      - Intention Status
    comments:
      - |-
        Intention is associated with the goal or purpose for what is about to
        happen i.e. an ex-ante indication of whether the specified context
        is/was planned or intended. Intention and Expectation are closely
        related terms. We recommend using Intention when the entity has the
        ability to control the implementation and Expectation for when the
        entity does not have control or for what happens after or beyond the
        exercise of control.
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:IntentionStatus
      - dpv_owl:IntentionStatus
    annotations:
      skos_in_scheme: status-classes

  InvolvementStatus:
    is_a: Status
    class_uri: dpv:InvolvementStatus
    description: Status indicating whether the involvement of specified context
    aliases:
      - Involvement Status
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:InvolvementStatus
      - dpv_owl:InvolvementStatus
    annotations:
      skos_in_scheme: status-classes

  Lawful:
    is_a: Lawfulness
    class_uri: dpv:Lawful
    description: State of being lawful or legally compliant
    aliases:
      - Lawful
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:Lawful
      - dpv_owl:Lawful
    annotations:
      skos_in_scheme: status-classes

  Lawfulness:
    is_a: ComplianceStatus
    class_uri: dpv:Lawfulness
    description: Status associated with expressing lawfulness or legal compliance
    aliases:
      - Lawfulness
    in_subset:
      - status_subset
    exact_mappings:
      - dpv_upstream:Lawfulness
