id: https://w3id.org/lmodel/dpv/rules
name: dpv_rules
title: DPV - Rules
description: |-
  LinkML schema generated from the DPV 2.3 module `modules/rules-owl.ttl`
  (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv
- https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv

subsets:

  rules_subset:
    description: Entities from the DPV `rules` module.

slots:

  has_deterrence:
    is_a: has_rule
    definition_uri: dpv:hasDeterrence
    description: |-
      Specifies applicability or inclusion of a deterrence rule within
      specified context
    aliases:
    - has deterrence
    multivalued: true
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:hasDeterrence
    - dpv_owl:hasDeterrence
    annotations:
      skos_in_scheme: rules-properties

  has_fulfilment_status:
    is_a: has_status
    definition_uri: dpv:hasFulfilmentStatus
    description: Specifies the fulfillment status associated with a rule
    aliases:
    - has fulfilment status
    multivalued: true
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:hasFulfilmentStatus
    - dpv_owl:hasFulfilmentStatus
    annotations:
      skos_in_scheme: rules-properties

  has_obligation:
    is_a: has_rule
    definition_uri: dpv:hasObligation
    description: |-
      Specifies applicability or inclusion of an obligation rule within
      specified context
    aliases:
    - has obligation
    multivalued: true
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:hasObligation
    - dpv_owl:hasObligation
    annotations:
      skos_in_scheme: rules-properties

  has_permission:
    is_a: has_rule
    definition_uri: dpv:hasPermission
    description: |-
      Specifies applicability or inclusion of a permission rule within
      specified context
    aliases:
    - has permission
    multivalued: true
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:hasPermission
    - dpv_owl:hasPermission
    annotations:
      skos_in_scheme: rules-properties

  has_prohibition:
    is_a: has_rule
    definition_uri: dpv:hasProhibition
    description: |-
      Specifies applicability or inclusion of a prohibition rule within
      specified context
    aliases:
    - has prohibition
    multivalued: true
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:hasProhibition
    - dpv_owl:hasProhibition
    annotations:
      skos_in_scheme: rules-properties

  has_recommendation:
    is_a: has_rule
    definition_uri: dpv:hasRecommendation
    description: |-
      Specifies applicability or inclusion of a recommendation rule within
      specified context
    aliases:
    - has recommendation
    multivalued: true
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:hasRecommendation
    - dpv_owl:hasRecommendation
    annotations:
      skos_in_scheme: rules-properties

  has_rule:
    definition_uri: dpv:hasRule
    description: |-
      Specifies applicability or inclusion of a rule within specified context
    aliases:
    - has rule
    multivalued: true
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:hasRule
    - dpv_owl:hasRule
    annotations:
      skos_in_scheme: rules-properties

classes:

  AcceptableRule:
    is_a: Rule
    class_uri: dpv:AcceptableRule
    description: |-
      A rule that is acceptable where it is either desirable if it occurs or
      it is not unacceptable if it does
    aliases:
    - Acceptable Rule
    comments:
    - |-
      Acceptable is a subjective concept that enables distinguishing with
      "unacceptable". By itself it does not signal any permission or
      obligation - for which further specific concepts are defined
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:AcceptableRule
    - dpv_owl:AcceptableRule
    annotations:
      skos_in_scheme: rules-classes

  Deterrence:
    is_a: UnacceptableRule
    mixins:
    - Rule
    class_uri: dpv:Deterrence
    description: A rule describing a deterrence for performing an activity
    aliases:
    - Deterrence
    comments:
    - |-
      Deterrences are aligned with the term SHOULD NOT in RFC2119 where
      specified activities should be avoided from being carried out but are
      not prohibitions
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:Deterrence
    - dpv_owl:Deterrence
    annotations:
      skos_in_scheme: rules-classes

  DeterrenceFollowed:
    is_a: RuleFulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:DeterrenceFollowed
    description: |-
      Status indicating a deterrence has been followed i.e. the activity
      stated as being deterred has not been carried out
    aliases:
    - Deterrence Followed
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:DeterrenceFollowed
    - dpv_owl:DeterrenceFollowed
    annotations:
      skos_in_scheme: rules-classes

  DeterrenceNotFollowed:
    is_a: RuleUnfulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:DeterrenceNotFollowed
    description: |-
      Status indicating a deterrence has not been followed i.e. the activity
      stated as being deterred has been carried out
    aliases:
    - Deterrence Not Followed
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:DeterrenceNotFollowed
    - dpv_owl:DeterrenceNotFollowed
    annotations:
      skos_in_scheme: rules-classes

  Obligation:
    is_a: AcceptableRule
    mixins:
    - Rule
    class_uri: dpv:Obligation
    description: A rule describing an obligation for performing an activity
    aliases:
    - Obligation
    comments:
    - |-
      Obligations are aligned with the term MUST in RFC2119 where specified
      activities are mandatory to be carried out
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:Obligation
    - dpv_owl:Obligation
    annotations:
      skos_in_scheme: rules-classes

    close_mappings:
    - gists:ContingentObligation
  ObligationFulfilled:
    is_a: RuleFulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:ObligationFulfilled
    description: |-
      Status indicating an obligation has been fulfilled i.e. the activity
      stated as being required to be carried out has been successfully
      completed
    aliases:
    - Obligation Fulfilled
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:ObligationFulfilled
    - dpv_owl:ObligationFulfilled
    annotations:
      skos_in_scheme: rules-classes

  ObligationUnfulfilled:
    is_a: RuleUnfulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:ObligationUnfulfilled
    description: |-
      Status indicating an obligation has not been fulfilled i.e. the activity
      stated as being required to be carried out has not been carried out but
      this is not considered as a violation e.g. there is still time to
      conduct the activity
    aliases:
    - Obligation Unfulfilled
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:ObligationUnfulfilled
    - dpv_owl:ObligationUnfulfilled
    annotations:
      skos_in_scheme: rules-classes

  ObligationViolated:
    is_a: RuleViolated
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:ObligationViolated
    description: |-
      Status indicating an obligation has been violated i.e. the activity
      stated as being required to be carried out has not been carried out and
      this is considered as a violation i.e. the activity can no longer be
      carried out to fulfil the obligation
    aliases:
    - Obligation Violated
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:ObligationViolated
    - dpv_owl:ObligationViolated
    annotations:
      skos_in_scheme: rules-classes

  Permission:
    is_a: AcceptableRule
    mixins:
    - Rule
    class_uri: dpv:Permission
    description: A rule describing a permission to perform an activity
    aliases:
    - Permission
    comments:
    - |-
      Permissions are aligned with the term MAY in RFC2119 where specified
      activities may or may not be carried out
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:Permission
    - dpv_owl:Permission
    - gists:Permission
    annotations:
      skos_in_scheme: rules-classes

  PermissionNotUtilised:
    is_a: RuleFulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:PermissionNotUtilised
    description: |-
      Status indicating a permission has not been utilised i.e. the activity
      stated as being permitted has not been carried out
    aliases:
    - Permission Not Utilised
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:PermissionNotUtilised
    - dpv_owl:PermissionNotUtilised
    annotations:
      skos_in_scheme: rules-classes

  PermissionUtilised:
    is_a: RuleFulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:PermissionUtilised
    description: |-
      Status indicating a permission has been utilised i.e. the activity
      stated as being permitted has been carried out
    aliases:
    - Permission Utilised
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:PermissionUtilised
    - dpv_owl:PermissionUtilised
    annotations:
      skos_in_scheme: rules-classes

  Prohibition:
    is_a: UnacceptableRule
    mixins:
    - Rule
    class_uri: dpv:Prohibition
    description: A rule describing a prohibition to perform an activity
    aliases:
    - Prohibition
    comments:
    - |-
      Prohibitions are aligned with the term MUST NOT in RFC2119 where
      specified activities are prohibited from being carried out
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:Prohibition
    - dpv_owl:Prohibition
    annotations:
      skos_in_scheme: rules-classes

  ProhibitionUnviolated:
    is_a: RuleFulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:ProhibitionUnviolated
    description: |-
      Status indicating a prohibition has not been violated i.e. the activity
      stated as being prohibited has not been carried out
    aliases:
    - Prohibition Unviolated
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:ProhibitionUnviolated
    - dpv_owl:ProhibitionUnviolated
    annotations:
      skos_in_scheme: rules-classes

  ProhibitionViolated:
    is_a: RuleViolated
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:ProhibitionViolated
    description: |-
      Status indicating a prohibition has been violated i.e. the activity
      stated as being prohibited has been carried out
    aliases:
    - Prohibition Violated
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:ProhibitionViolated
    - dpv_owl:ProhibitionViolated
    annotations:
      skos_in_scheme: rules-classes

  Recommendation:
    is_a: AcceptableRule
    mixins:
    - Rule
    class_uri: dpv:Recommendation
    description: A rule describing a recommendation for performing an activity
    aliases:
    - Recommendation
    comments:
    - |-
      Recommendations are aligned with the term SHOULD in RFC2119 where
      specified activities should be carried out but are not obligations
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:Recommendation
    - dpv_owl:Recommendation
    annotations:
      skos_in_scheme: rules-classes

  RecommendationFollowed:
    is_a: RuleFulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:RecommendationFollowed
    description: |-
      Status indicating a recommendation has been followed i.e. the activity
      stated as being recommended has been carried out
    aliases:
    - Recommendation Followed
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:RecommendationFollowed
    - dpv_owl:RecommendationFollowed
    annotations:
      skos_in_scheme: rules-classes

  RecommendationNotFollowed:
    is_a: RuleUnfulfilled
    mixins:
    - RuleFulfilmentStatus
    class_uri: dpv:RecommendationNotFollowed
    description: |-
      Status indicating a recommendation has not been followed i.e. the
      activity stated as being recommended has not been carried out
    aliases:
    - Recommendation Not Followed
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:RecommendationNotFollowed
    - dpv_owl:RecommendationNotFollowed
    annotations:
      skos_in_scheme: rules-classes

  Rule:
    class_uri: dpv:Rule
    description: |-
      A rule describing a process or control that directs or determines if and
      how an activity should be conducted
    aliases:
    - Rule
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:Rule
    - dpv_owl:Rule
    annotations:
      skos_in_scheme: rules-classes

  RuleFulfilled:
    is_a: RuleFulfilmentStatus
    class_uri: dpv:RuleFulfilled
    description: Status indicating a rule has been fulfilled, completed, or 
      satisfied
    aliases:
    - Rule Fulfilled
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:RuleFulfilled
    - dpv_owl:RuleFulfilled
    annotations:
      skos_in_scheme: rules-classes

  RuleFulfilmentStatus:
    is_a: Status
    class_uri: dpv:RuleFulfilmentStatus
    description: |-
      Status associated with a rule for indicating whether it is applicable,
      or has been utilised, and whether the requirements of the rule have been
      fulfilled or violated
    aliases:
    - Rule Fulfilment Status
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:RuleFulfilmentStatus
    - dpv_owl:RuleFulfilmentStatus
    annotations:
      skos_in_scheme: rules-classes

  RuleUnfulfilled:
    is_a: RuleFulfilmentStatus
    class_uri: dpv:RuleUnfulfilled
    description: Status indicating a rule has not been fulfilled nor violated
    aliases:
    - Rule Unfulfilled
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:RuleUnfulfilled
    - dpv_owl:RuleUnfulfilled
    annotations:
      skos_in_scheme: rules-classes

  RuleViolated:
    is_a: RuleFulfilmentStatus
    class_uri: dpv:RuleViolated
    description: |-
      Status indicating a rule has been violated, breached, broken, or
      infracted
    aliases:
    - Rule Violated
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:RuleViolated
    - dpv_owl:RuleViolated
    annotations:
      skos_in_scheme: rules-classes

  UnacceptableRule:
    is_a: Rule
    class_uri: dpv:UnacceptableRule
    description: A rule that is unacceptable where it is not desirable if it 
      occurs
    aliases:
    - Unacceptable Rule
    comments:
    - |-
      Unacceptable is a subjective concept that enables specifying something
      is to be avoided as compared to "acceptable". By itself it does not
      signal any deterrence or prohibition - for which further specific
      concepts are defined
    in_subset:
    - rules_subset
    exact_mappings:
    - dpv_upstream:UnacceptableRule
    - dpv_owl:UnacceptableRule
    annotations:
      skos_in_scheme: rules-classes
