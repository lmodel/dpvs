id: https://w3id.org/lmodel/dpv/contract_status
name: dpv_contract_status
title: DPV - Contract Status
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/contract_status-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv

subsets:

  contract_status_subset:
    description: Entities from the DPV `contract_status` module.

classes:

  ContractActivationStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractActivationStatus
    description: |-
      Status associated with activation of a contract i.e. whether its terms
      are active and are required to be performed
    aliases:
      - Contract Activation Status
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractActivationStatus
      - dpv_owl:ContractActivationStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractActive:
    is_a: ContractActivationStatus
    class_uri: dpv:ContractActive
    description: |-
      Status representing contract that has been fully executed and whose
      terms are considered active i.e. they are applicable and are required to
      be performed
    aliases:
      - Contract Active
    comments:
      - |-
        A contract being active only refers to its terms now being required to
        be fulfilled, while dpv:ContractBeingPerformed states that they are
        being performed
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractActive
      - dpv_owl:ContractActive
    annotations:
      skos_in_scheme: contract-status-classes

  ContractAmended:
    is_a: ContractPerformanceStatus
    class_uri: dpv:ContractAmended
    description: |-
      Status representing contract that has been fully executed and whose
      terms have been amended through mutual agreement or other means such
      that the contract is still required to be performed
    aliases:
      - Contract Amended
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractAmended
      - dpv_owl:ContractAmended
    annotations:
      skos_in_scheme: contract-status-classes

  ContractApproved:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractApproved
    description: |-
      Status representing contract has been approved and can be used for
      signing
    aliases:
      - Contract Approved
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractApproved
      - dpv_owl:ContractApproved
    annotations:
      skos_in_scheme: contract-status-classes

  ContractBeingPerformed:
    is_a: ContractPerformanceStatus
    class_uri: dpv:ContractBeingPerformed
    description: |-
      Status representing contract that has been fully executed and whose
      terms are being carried out i.e. the contract is being performed
    aliases:
      - Contract Being Performed
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractBeingPerformed
      - dpv_owl:ContractBeingPerformed
    annotations:
      skos_in_scheme: contract-status-classes

  ContractBreached:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractBreached
    description: |-
      Status representing contract being breached where its terms are not
      fulfilled or are violated with legal consequences
    aliases:
      - Contract Breached
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractBreached
      - dpv_owl:ContractBreached
    annotations:
      skos_in_scheme: contract-status-classes

  ContractDisputed:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractDisputed
    description: |-
      Status representing contract being disputed where one or more parties
      have an issue regarding the interpretation and performance of the
      contract
    aliases:
      - Contract Disputed
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractDisputed
      - dpv_owl:ContractDisputed
    annotations:
      skos_in_scheme: contract-status-classes

  ContractDrafted:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractDrafted
    description: |-
      Status representing the drafting of contract text has been completed and
      it can now be offered for signing
    aliases:
      - Contract Drafted
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractDrafted
      - dpv_owl:ContractDrafted
    annotations:
      skos_in_scheme: contract-status-classes

  ContractExecutionStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractExecutionStatus
    description: |-
      Status associated with execution of a contract (i.e. signing and
      procedural aspects before the contract terms come in to effect)
    aliases:
      - Contract Execution Status
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractExecutionStatus
      - dpv_owl:ContractExecutionStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractExpired:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractExpired
    description: |-
      Status representing reaching the expiry defined in the contract, such as
      when the stated duration or the stated obligations have been completed
    aliases:
      - Contract Expired
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractExpired
      - dpv_owl:ContractExpired
    annotations:
      skos_in_scheme: contract-status-classes

  ContractExtended:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractExtended
    description: |-
      Status representing the duration associated with a contract being
      extended through mutual agreement or by a party
    aliases:
      - Contract Extended
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractExtended
      - dpv_owl:ContractExtended
    annotations:
      skos_in_scheme: contract-status-classes

  ContractFulfilled:
    is_a: ContractFulfilmentStatus
    class_uri: dpv:ContractFulfilled
    description: |-
      Status representing contract where all its terms have been fulfilled in
      a manner that does not constitute a violation or breach of the contract
    aliases:
      - Contract Fulfilled
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractFulfilled
      - dpv_owl:ContractFulfilled
    annotations:
      skos_in_scheme: contract-status-classes

  ContractFulfilmentStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractFulfilmentStatus
    description: Status associated with fulfilment of a contract
    aliases:
      - Contract Fulfilment Status
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractFulfilmentStatus
      - dpv_owl:ContractFulfilmentStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractFullyExecuted:
    is_a: ContractExecutionStatus
    class_uri: dpv:ContractFullyExecuted
    description: |-
      Status representing contract has been fully executed i.e. it has been
      signed by all parties and all other procedural aspects such as exchange
      of signed contract copies have been completed
    aliases:
      - Contract Fully Executed
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractFullyExecuted
      - dpv_owl:ContractFullyExecuted
    annotations:
      skos_in_scheme: contract-status-classes

  ContractFullySigned:
    is_a: ContractExecutionStatus
    class_uri: dpv:ContractFullySigned
    description: Status representing contract has been signed by all concerned parties
    aliases:
      - Contract Fully Signed
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractFullySigned
      - dpv_owl:ContractFullySigned
    annotations:
      skos_in_scheme: contract-status-classes

  ContractInactive:
    is_a: ContractActivationStatus
    class_uri: dpv:ContractInactive
    description: |-
      Status representing contract that has been fully executed and whose
      terms are not yet active i.e. they need to be performed at a later time
    aliases:
      - Contract Inactive
    comments:
      - |-
        An example of an inactive contract is where its terms need to be
        fulfilled at a later date, at which point the contract will become
        active
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractInactive
      - dpv_owl:ContractInactive
    annotations:
      skos_in_scheme: contract-status-classes

  ContractNegotiated:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractNegotiated
    description: |-
      Status representing contract has been successfully negotiated by
      involved parties
    aliases:
      - Contract Negotiated
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractNegotiated
      - dpv_owl:ContractNegotiated
    annotations:
      skos_in_scheme: contract-status-classes

  ContractNotFulfilled:
    is_a: ContractFulfilmentStatus
    class_uri: dpv:ContractNotFulfilled
    description: |-
      Status representing contract where none of its terms have been fulfilled
      in a manner that does not constitute a violation or breach of the
      contract i.e. there is still time and opportunity to complete the terms
    aliases:
      - Contract Not Fulfilled
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractNotFulfilled
      - dpv_owl:ContractNotFulfilled
    annotations:
      skos_in_scheme: contract-status-classes

  ContractOffered:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractOffered
    description: |-
      Status representing contract has been offered to a party or to parties
      for reviewing and signing
    aliases:
      - Contract Offered
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractOffered
      - dpv_owl:ContractOffered
    annotations:
      skos_in_scheme: contract-status-classes

  ContractPartiallyFulfilled:
    is_a: ContractFulfilmentStatus
    class_uri: dpv:ContractPartiallyFulfilled
    description: |-
      Status representing contract where some of its terms have been
      fulfilled, and others are yet to be fulfilled in a manner that does not
      constitute a violation or breach of the contract i.e. there is still
      time and opportunity to complete the terms
    aliases:
      - Contract Partially Fulfilled
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractPartiallyFulfilled
      - dpv_owl:ContractPartiallyFulfilled
    annotations:
      skos_in_scheme: contract-status-classes

  ContractPartiallySigned:
    is_a: ContractExecutionStatus
    class_uri: dpv:ContractPartiallySigned
    description: |-
      Status representing contract has been partially signed by parties i.e.
      some parties have signed the contract and others are yet to make a
      decision to sign it
    aliases:
      - Contract Partially Signed
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractPartiallySigned
      - dpv_owl:ContractPartiallySigned
    annotations:
      skos_in_scheme: contract-status-classes

  ContractPerformanceStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractPerformanceStatus
    description: Status associated with performance of a contract
    aliases:
      - Contract Performance Status
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractPerformanceStatus
      - dpv_owl:ContractPerformanceStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractPreparationStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractPreparationStatus
    description: |-
      Status associated with preparation of contracts before they are signed
      or accepted or executed
    aliases:
      - Contract Preparation Status
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractPreparationStatus
      - dpv_owl:ContractPreparationStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractRejected:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractRejected
    description: |-
      Status representing contract has been rejected and cannot be used for
      signing
    aliases:
      - Contract Rejected
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractRejected
      - dpv_owl:ContractRejected
    annotations:
      skos_in_scheme: contract-status-classes

  ContractRenewed:
    is_a: ContractPerformanceStatus
    class_uri: dpv:ContractRenewed
    description: |-
      Status representing contract being renewed with new duration and/or
      applicability where the contract has been fully executed in the past
    aliases:
      - Contract Renewed
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractRenewed
      - dpv_owl:ContractRenewed
    annotations:
      skos_in_scheme: contract-status-classes

  ContractSignedByParty:
    is_a: ContractExecutionStatus
    class_uri: dpv:ContractSignedByParty
    description: |-
      Status representing contract has been signed by the indicated signing
      party
    aliases:
      - Contract Signed By Party
    comments:
      - |-
        The signing party can be expressed using dpv:hasParty with the status
        along with metadata such as a timestamp, or the status can be used to
        list whether each party in the contract has signed or not e.g. it is
        reviewing the contract
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractSignedByParty
      - dpv_owl:ContractSignedByParty
    annotations:
      skos_in_scheme: contract-status-classes

  ContractStatus:
    is_a: Status
    class_uri: dpv:ContractStatus
    description: Status associated with a contract
    aliases:
      - Contract Status
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractStatus
      - dpv_owl:ContractStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractTemporarilySuspended:
    is_a: ContractPerformanceStatus
    class_uri: dpv:ContractTemporarilySuspended
    description: |-
      Status representing contract that has been temporarily suspended through
      mutual agreement or by some parties
    aliases:
      - Contract Temporarily Suspended
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractTemporarilySuspended
      - dpv_owl:ContractTemporarilySuspended
    annotations:
      skos_in_scheme: contract-status-classes

  ContractTerminated:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractTerminated
    description: Status representing contract being terminated by one or more parties
    aliases:
      - Contract Terminated
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractTerminated
      - dpv_owl:ContractTerminated
    annotations:
      skos_in_scheme: contract-status-classes

  ContractTerminationStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractTerminationStatus
    description: Status associated with termination of a contract
    aliases:
      - Contract Termination Status
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractTerminationStatus
      - dpv_owl:ContractTerminationStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractUnderNegotiation:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractUnderNegotiation
    description: Status representing contract is under negotiation between parties
    aliases:
      - Contract Under Negotiation
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractUnderNegotiation
      - dpv_owl:ContractUnderNegotiation
    annotations:
      skos_in_scheme: contract-status-classes

  ContractUnderReview:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractUnderReview
    description: |-
      Status representing contract is under review and is being considered for
      signing
    aliases:
      - Contract Under Review
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractUnderReview
      - dpv_owl:ContractUnderReview
    annotations:
      skos_in_scheme: contract-status-classes

  ContractViolated:
    is_a: ContractFulfilmentStatus
    class_uri: dpv:ContractViolated
    description: |-
      Status representing contract where one or more terms have not been
      fulfilled or have been fulfilled, where either is considered a violation
      of the terms
    aliases:
      - Contract Violated
    in_subset:
      - contract_status_subset
    exact_mappings:
      - dpv_upstream:ContractViolated
      - dpv_owl:ContractViolated
    annotations:
      skos_in_scheme: contract-status-classes
