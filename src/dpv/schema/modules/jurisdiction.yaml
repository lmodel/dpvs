id: https://w3id.org/lmodel/dpv/jurisdiction
name: dpv_jurisdiction
title: DPV - Jurisdiction
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/jurisdiction-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv

subsets:

  jurisdiction_subset:
    description: Entities from the DPV `jurisdiction` module.

slots:

  has_applicable_law:
    definition_uri: dpv:hasApplicableLaw
    description: Indicates applicability of a Law
    aliases:
      - has applicable law
    multivalued: true
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:hasApplicableLaw
      - dpv_owl:hasApplicableLaw
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_country:
    is_a: has_location
    definition_uri: dpv:hasCountry
    description: Indicates applicability of specified country
    aliases:
      - has country
    multivalued: true
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:hasCountry
      - dpv_owl:hasCountry
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_inverse_jurisdiction:
    is_a: has_location
    definition_uri: dpv:hasInverseJurisdiction
    description: Indicates the inverse jurisdiction for a given jurisdiction
    aliases:
      - has inverse jurisdiction
    comments:
      - |-
        Using this property gives the set of all other jurisdictions that are
        not part of the jurisdiction e.g. when used with a country, it refers to
        all other countries
    multivalued: true
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:hasInverseJurisdiction
      - dpv_owl:hasInverseJurisdiction
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_jurisdiction:
    definition_uri: dpv:hasJurisdiction
    description: Indicates applicability of specified jurisdiction
    aliases:
      - has jurisdiction
    multivalued: true
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:hasJurisdiction
      - dpv_owl:hasJurisdiction
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_location:
    definition_uri: dpv:hasLocation
    description: Indicates information about location
    aliases:
      - has location
    multivalued: true
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:hasLocation
      - dpv_owl:hasLocation
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_third_country:
    is_a: has_country
    definition_uri: dpv:hasThirdCountry
    description: Indicates applicability or relevance of a 'third country'
    aliases:
      - has third country
    multivalued: true
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:hasThirdCountry
      - dpv_owl:hasThirdCountry
    annotations:
      skos_in_scheme: jurisdiction-properties

  is_outside_of_location:
    is_a: has_location
    definition_uri: dpv:isOutsideOfLocation
    description: |-
      Indicates the interpretation where the location being referenced is
      outside of the indicated concept
    aliases:
      - is outside of location
    comments:
      - |-
        This property is helpful for cases where a distinction needs to be made
        between inside/outside of a concept, and the area outside of that
        concept is to be referenced. For example, using Home with
        dpv:hasLocation means inside the Home, and using this property along
        with Home means outside of Home - such as the yard or porch
    multivalued: true
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:isOutsideOfLocation
      - dpv_owl:isOutsideOfLocation
    annotations:
      skos_in_scheme: jurisdiction-properties

classes:

  City:
    is_a: DpvRegion
    class_uri: dpv:City
    description: A region consisting of urban population and commerce
    aliases:
      - City
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:City
      - dpv_owl:City
    annotations:
      skos_in_scheme: jurisdiction-classes

  CloudLocation:
    is_a: RemoteLocation
    mixins:
      - DpvLocation
    class_uri: dpv:CloudLocation
    description: |-
      Location that is in the 'cloud' i.e. a logical location operated over
      the internet
    aliases:
      - Cloud Location
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:CloudLocation
      - dpv_owl:CloudLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  DecentralisedLocations:
    is_a: LocationFixture
    class_uri: dpv:DecentralisedLocations
    description: |-
      Location that is spread across multiple separate areas with no
      distinction between their importance
    aliases:
      - Decentralised Locations
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:DecentralisedLocations
      - dpv_owl:DecentralisedLocations
    annotations:
      skos_in_scheme: jurisdiction-classes

  DpvCountry:
    is_a: DpvJurisdiction
    class_uri: dpv:Country
    description: |-
      A political entity indicative of a sovereign or non-sovereign
      territorial state comprising of distinct geographical areas
    aliases:
      - Country
    comments:
      - |-
        The definition of country is not intended for political interpretation.
        DPVCG welcomes alternate definitions based in existing sources with
        global scope, such as UN or ISO.
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:Country
      - dpv_owl:Country
    annotations:
      skos_in_scheme: jurisdiction-classes

  DpvJurisdiction:
    is_a: DpvLocation
    class_uri: dpv:Jurisdiction
    description: |-
      A jurisdiction represents the locations that define the extent of
      authority (or control) claimed, granted, or asserted by a legal entity
      (in particular a legal authority) to govern or enforce rules
    aliases:
      - Jurisdiction
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:Jurisdiction
      - dpv_owl:Jurisdiction
    annotations:
      skos_in_scheme: jurisdiction-classes

  DpvLocation:
    class_uri: dpv:Location
    description: A location is a position, site, or area where something is located
    aliases:
      - Location
    comments:
      - Location may be geographic, physical, or virtual.
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:Location
      - dpv_owl:Location
    annotations:
      skos_in_scheme: jurisdiction-classes

  DpvRegion:
    is_a: DpvCountry
    class_uri: dpv:Region
    description: A region is an area or site that is considered a location
    aliases:
      - Region
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:Region
      - dpv_owl:Region
    annotations:
      skos_in_scheme: jurisdiction-classes

  EconomicUnion:
    is_a: DpvJurisdiction
    class_uri: dpv:EconomicUnion
    description: |-
      A political union of two or more countries based on economic or trade
      agreements
    aliases:
      - Economic Union
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:EconomicUnion
      - dpv_owl:EconomicUnion
    annotations:
      skos_in_scheme: jurisdiction-classes

  FederatedLocations:
    is_a: LocationFixture
    class_uri: dpv:FederatedLocations
    description: |-
      Location that is federated across multiple separate areas with
      designation of a primary or central location
    aliases:
      - Federated Locations
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:FederatedLocations
      - dpv_owl:FederatedLocations
    annotations:
      skos_in_scheme: jurisdiction-classes

  FixedLocation:
    is_a: LocationFixture
    class_uri: dpv:FixedLocation
    description: Location that is fixed i.e. known to occur at a specific place
    aliases:
      - Fixed Location
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:FixedLocation
      - dpv_owl:FixedLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  FixedMultipleLocations:
    is_a: FixedLocation
    mixins:
      - LocationFixture
    class_uri: dpv:FixedMultipleLocations
    description: Location that is fixed with multiple places e.g. multiple cities
    aliases:
      - Fixed Multiple Locations
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:FixedMultipleLocations
      - dpv_owl:FixedMultipleLocations
    annotations:
      skos_in_scheme: jurisdiction-classes

  FixedSingularLocation:
    is_a: FixedLocation
    mixins:
      - LocationFixture
    class_uri: dpv:FixedSingularLocation
    description: Location that is fixed at a specific place e.g. a city
    aliases:
      - Fixed Singular Location
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:FixedSingularLocation
      - dpv_owl:FixedSingularLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  HybridPublicPrivateSpace:
    is_a: PrivateSpace
    mixins:
      - DpvLocation
      - PublicSpace
    class_uri: dpv:HybridPublicPrivateSpace
    description: |-
      A space that is a hybrid space i.e it has both public and private
      components - such as by having part of it be a private space or which is
      operated privately
    aliases:
      - Hybrid Public Private Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:HybridPublicPrivateSpace
      - dpv_owl:HybridPublicPrivateSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  InverseJurisdiction:
    is_a: DpvJurisdiction
    class_uri: dpv:InverseJurisdiction
    description: |-
      An inverse jurisdiction for a specific jurisdiction is the set of all
      other jurisdictions that are not part of the specific jurisdiction
    aliases:
      - Inverse Jurisdiction
    comments:
      - |-
        Inverse Jurisdictions are helpful when asserting and checking rules that
        involve a concept representing jurisdictions outside of a given
        jurisdiction. An inverse jurisdiction of an inverse jurisdiction should
        give back the same original jurisdiction but this is undefined and
        strongly dissuaded as it could lead to recursive definitions in some
        use-cases
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:InverseJurisdiction
      - dpv_owl:InverseJurisdiction
    annotations:
      skos_in_scheme: jurisdiction-classes

  Law:
    class_uri: dpv:Law
    description: A law is a set of rules created by government or authorities
    aliases:
      - Law
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:Law
      - dpv_owl:Law
    annotations:
      skos_in_scheme: jurisdiction-classes

  LocalLocation:
    is_a: LocationLocality
    mixins:
      - DpvLocation
    class_uri: dpv:LocalLocation
    description: Location is local
    aliases:
      - Local Location
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:LocalLocation
      - dpv_owl:LocalLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  LocationFixture:
    class_uri: dpv:LocationFixture
    description: The fixture of location refers to whether the location is fixed
    aliases:
      - Location Fixture
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:LocationFixture
      - dpv_owl:LocationFixture
    annotations:
      skos_in_scheme: jurisdiction-classes

  LocationLocality:
    is_a: DpvLocation
    class_uri: dpv:LocationLocality
    description: |-
      Locality refers to whether the specified location is local within some
      context, e.g. for the user
    aliases:
      - Location Locality
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:LocationLocality
      - dpv_owl:LocationLocality
    annotations:
      skos_in_scheme: jurisdiction-classes

  PersonalSpace:
    is_a: PrivateSpace
    mixins:
      - DpvLocation
    class_uri: dpv:PersonalSpace
    description: |-
      A private space associated with an individual in a personal capacity -
      such as their home or the space around their physical person e.g. my
      home or my room
    aliases:
      - Personal Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PersonalSpace
      - dpv_owl:PersonalSpace
    narrow_mappings:
      - gists:GeoRegion
    annotations:
      skos_in_scheme: jurisdiction-classes

  PrivateCommunalSpace:
    is_a: PrivateSpace
    mixins:
      - DpvLocation
    class_uri: dpv:PrivateCommunalSpace
    description: |-
      A space that is accessible to a group or a community within a private
      space and where members of the public do not have access to it e.g.
      society amenities such as gyms and pools
    aliases:
      - Private Communal Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PrivateCommunalSpace
      - dpv_owl:PrivateCommunalSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  PrivateLocation:
    is_a: LocalLocation
    mixins:
      - DpvLocation
    class_uri: dpv:PrivateLocation
    description: |-
      Location that is not or cannot be accessed by the public and is
      controlled as a private space
    aliases:
      - Private Location (deprecated)
    comments:
      - |-
        This concept will be deprecated in a future DPV release, it is suggested
        to use the better defined and legally aligned dpv:PrivateSpace instead
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PrivateLocation
      - dpv_owl:PrivateLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  PrivateSpace:
    is_a: DpvLocation
    class_uri: dpv:PrivateSpace
    description: |-
      A space that is owned or controlled by a private entity and where access
      to members of the public is restricted
    aliases:
      - Private Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PrivateSpace
      - dpv_owl:PrivateSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  PrivatelyOperatedPublicSpace:
    is_a: HybridPublicPrivateSpace
    mixins:
      - DpvLocation
      - PubliclyAccessibleSpace
    class_uri: dpv:PrivatelyOperatedPublicSpace
    description: |-
      A space that is operated or managed by a private entity but which is
      accessible to the public e.g. a public bus station operated by a
      specific company
    aliases:
      - Privately Operated Public Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PrivatelyOperatedPublicSpace
      - dpv_owl:PrivatelyOperatedPublicSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  PrivatelyOwnedPublicSpace:
    is_a: HybridPublicPrivateSpace
    mixins:
      - DpvLocation
      - PrivatelyOwnedSpace
    class_uri: dpv:PrivatelyOwnedPublicSpace
    description: |-
      A space that is privately owned but which is accessible and usable by
      the public - whether freely or through a process which is open to all
      members of the public e.g. hotel lobby, shopping mall atriums
    aliases:
      - Privately Owned Public Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PrivatelyOwnedPublicSpace
      - dpv_owl:PrivatelyOwnedPublicSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  PrivatelyOwnedSpace:
    is_a: PrivateSpace
    mixins:
      - DpvLocation
    class_uri: dpv:PrivatelyOwnedSpace
    description: A place that is privately owned e.g. offices, malls
    aliases:
      - Privately Owned Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PrivatelyOwnedSpace
      - dpv_owl:PrivatelyOwnedSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  PublicLocation:
    is_a: LocalLocation
    mixins:
      - DpvLocation
    class_uri: dpv:PublicLocation
    description: Location that is or can be accessed by the public
    aliases:
      - Public Location (deprecated)
    comments:
      - |-
        This concept will be deprecated in a future DPV release, it is suggested
        to use the better defined and legally aligned dpv:PublicSpace instead
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PublicLocation
      - dpv_owl:PublicLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  PublicSpace:
    is_a: DpvLocation
    class_uri: dpv:PublicSpace
    description: Any space that is accessible to the public or is owned by the public
    aliases:
      - Public Space
    comments:
      - |-
        Public space is distinct from places under (public) government ownership
        as such places can exclude public from accessing the place e.g.
        government military installations or reserved land
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PublicSpace
      - dpv_owl:PublicSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  PubliclyAccessibleSpace:
    is_a: PublicSpace
    mixins:
      - DpvLocation
    class_uri: dpv:PubliclyAccessibleSpace
    description: |-
      A space that is accessible to all members of the public e.g. parks,
      malls, train stations
    aliases:
      - Publicly Accessible Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PubliclyAccessibleSpace
      - dpv_owl:PubliclyAccessibleSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  PubliclyOwnedSpace:
    is_a: PublicSpace
    mixins:
      - DpvLocation
    class_uri: dpv:PubliclyOwnedSpace
    description: A space that is owned by the public e.g. national parks, forests
    aliases:
      - Publicly Owned Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:PubliclyOwnedSpace
      - dpv_owl:PubliclyOwnedSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  RandomLocation:
    is_a: LocationFixture
    class_uri: dpv:RandomLocation
    description: Location that is random or unknown
    aliases:
      - Random Location
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:RandomLocation
      - dpv_owl:RandomLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  RemoteLocation:
    is_a: LocationLocality
    mixins:
      - DpvLocation
    class_uri: dpv:RemoteLocation
    description: Location is remote i.e. not local
    aliases:
      - Remote Location
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:RemoteLocation
      - dpv_owl:RemoteLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  SemiPrivateSpace:
    is_a: PrivateSpace
    mixins:
      - DpvLocation
    class_uri: dpv:SemiPrivateSpace
    description: |-
      A private space that acts as a shared space with other entities but
      which is still essentially private for the individuals e.g. a
      semi-private hospital room shared with another patient
    aliases:
      - Semi Private Space
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:SemiPrivateSpace
      - dpv_owl:SemiPrivateSpace
    annotations:
      skos_in_scheme: jurisdiction-classes

  SupraNationalUnion:
    is_a: DpvJurisdiction
    class_uri: dpv:SupraNationalUnion
    description: |-
      A political union of two or more countries with an establishment of
      common authority
    aliases:
      - Supranational Union
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:SupraNationalUnion
      - dpv_owl:SupraNationalUnion
    annotations:
      skos_in_scheme: jurisdiction-classes

  ThirdCountry:
    is_a: DpvCountry
    class_uri: dpv:ThirdCountry
    description: |-
      Represents a country outside applicable or compatible jurisdiction as
      outlined in law
    aliases:
      - Third Country
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:ThirdCountry
      - dpv_owl:ThirdCountry
    annotations:
      skos_in_scheme: jurisdiction-classes

  VariableLocation:
    is_a: LocationFixture
    class_uri: dpv:VariableLocation
    description: |-
      Location that is known but is variable e.g. somewhere within a given
      area
    aliases:
      - Variable Location
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:VariableLocation
      - dpv_owl:VariableLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  WithinDevice:
    is_a: LocalLocation
    mixins:
      - DpvLocation
    class_uri: dpv:WithinDevice
    description: Location is local and entirely within a device, such as a smartphone
    aliases:
      - Within Device (deprecated)
    comments:
      - |-
        This concept will be deprecated in a future DPV release, it is suggested
        to use the existing concepts representing device as tech:Device to have
        parity and consistency between the use of device as a technology and for
        data storage
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:WithinDevice
      - dpv_owl:WithinDevice
    annotations:
      skos_in_scheme: jurisdiction-classes

  WithinPhysicalEnvironment:
    is_a: DpvLocation
    class_uri: dpv:WithinPhysicalEnvironment
    description: |-
      Location is local and entirely within a physical environment, such as a
      room
    aliases:
      - Within Physical Environment
    comments:
      - |-
        This concept will be deprecated in a future DPV release, it is suggested
        to use other concepts that also represent the nature of the location
        e.g. dpv:PrivateSpace or its accessibility dpv:PubliclyAccessibleSpace
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:WithinPhysicalEnvironment
      - dpv_owl:WithinPhysicalEnvironment
    annotations:
      skos_in_scheme: jurisdiction-classes

  WithinVirtualEnvironment:
    is_a: DpvLocation
    class_uri: dpv:WithinVirtualEnvironment
    description: |-
      Location is local and entirely within a virtual environment, such as a
      software system
    aliases:
      - Within Virtual Environment
    comments:
      - |-
        This concept will be deprecated in a future DPV release, it is suggested
        to use the existing concepts representing device as tech:Software and
        its taxonomy to have parity and consistency between the use of software
        as a technology and as a virtual environment for data storage and
        operations
    in_subset:
      - jurisdiction_subset
    exact_mappings:
      - dpv_upstream:WithinVirtualEnvironment
      - dpv_owl:WithinVirtualEnvironment
    annotations:
      skos_in_scheme: jurisdiction-classes
