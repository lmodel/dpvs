id: https://w3id.org/lmodel/dpv/contract_clause
name: dpv_contract_clause
title: DPV - Contract Clause
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/contract_clause-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv

subsets:

  contract_clause_subset:
    description: Entities from the DPV `contract_clause` module.

classes:

  ContractAmendmentClause:
    is_a: ContractualClause
    class_uri: dpv:ContractAmendmentClause
    description: |-
      A provision describing how changes or modifications to the contract can
      be made and the process for implementing them
    aliases:
      - Contract Amendment Clause
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractAmendmentClause
      - dpv_owl:ContractAmendmentClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractConfidentialityClause:
    is_a: ContractualClause
    class_uri: dpv:ContractConfidentialityClause
    description: |-
      A provision requiring parties to keep certain information confidential
      and not disclose it to third parties
    aliases:
      - Contract Confidentiality Clause
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractConfidentialityClause
      - dpv_owl:ContractConfidentialityClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractDefinitions:
    is_a: ContractualClause
    class_uri: dpv:ContractDefinitions
    description: |-
      A section specifying the meanings of key terms and phrases used
      throughout the contract
    aliases:
      - Contract Definitions
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractDefinitions
      - dpv_owl:ContractDefinitions
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractDisputeResolutionClause:
    is_a: ContractualClause
    class_uri: dpv:ContractDisputeResolutionClause
    description: |-
      A provision detailing the methods and procedures for resolving
      disagreements or conflicts arising from the contract
    aliases:
      - Contract DisputeResolution Clause
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractDisputeResolutionClause
      - dpv_owl:ContractDisputeResolutionClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractJurisdictionClause:
    is_a: ContractualClause
    class_uri: dpv:ContractJurisdictionClause
    description: |-
      A provision specifying the legal jurisdiction or court where disputes
      related to the contract will be resolved
    aliases:
      - Contract Jurisdiction Clause
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractJurisdictionClause
      - dpv_owl:ContractJurisdictionClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractPreamble:
    is_a: ContractualClause
    class_uri: dpv:ContractPreamble
    description: |-
      An introductory section outlining the background, context, and purpose
      of the contract
    aliases:
      - Contract Preamble
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractPreamble
      - dpv_owl:ContractPreamble
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractTerminationClause:
    is_a: ContractualClause
    class_uri: dpv:ContractTerminationClause
    description: |-
      A provision outlining the conditions under which the contract can be
      terminated before its completion, including any penalties or obligations
    aliases:
      - Contract Termination Clause
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractTerminationClause
      - dpv_owl:ContractTerminationClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractualClause:
    class_uri: dpv:ContractualClause
    description: A part or component within a contract that outlines its specifics
    aliases:
      - Contractual Clause
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractualClause
      - dpv_owl:ContractualClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractualClauseFulfilled:
    is_a: ContractualClauseFulfilmentStatus
    class_uri: dpv:ContractualClauseFulfilled
    description: |-
      Status indicating the terms of the contractual clause are fulfilled i.e.
      they have been successfully completed without violation
    aliases:
      - Contractual Clause Fulfilled
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractualClauseFulfilled
      - dpv_owl:ContractualClauseFulfilled
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractualClauseFulfilmentStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractualClauseFulfilmentStatus
    description: Status associated with fulfilment of a contractual clause
    aliases:
      - Contractual Clause Fulfilment Status
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractualClauseFulfilmentStatus
      - dpv_owl:ContractualClauseFulfilmentStatus
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractualClauseNotFulfilled:
    is_a: ContractualClauseFulfilmentStatus
    class_uri: dpv:ContractualClauseNotFulfilled
    description: |-
      Status indicating the terms of the contractual clause have not yet been
      fulfilled in a manner that does not constitute a violation i.e. there is
      still an opportunity to complete them
    aliases:
      - Contractual Clause Unfulfilled
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractualClauseNotFulfilled
      - dpv_owl:ContractualClauseNotFulfilled
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractualClausePartiallyFulfilled:
    is_a: ContractualClauseFulfilmentStatus
    class_uri: dpv:ContractualClausePartiallyFulfilled
    description: |-
      Status indicating some of the terms of the contractual clause have been
      fulfilled, and others have not yet been fulfilled in a manner that does
      not constitute a violation i.e. there is still an opportunity to
      complete them
    aliases:
      - Contractual Clause Partially Fulfilled
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractualClausePartiallyFulfilled
      - dpv_owl:ContractualClausePartiallyFulfilled
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractualClauseViolated:
    is_a: ContractualClauseFulfilmentStatus
    class_uri: dpv:ContractualClauseViolated
    description: |-
      Status indicating the terms of the contractual clause have been violated
    aliases:
      - Contractual Clause Breached
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:ContractualClauseViolated
      - dpv_owl:ContractualClauseViolated
    annotations:
      skos_in_scheme: contract-clause-classes

  TermsOfService:
    is_a: ContractualClause
    class_uri: dpv:TermsOfService
    description: |-
      Contractual clauses outlining the terms and conditions regarding the
      provision of a service, typically between a service provider and a
      service consumer, also know as 'Terms of Use' and 'Terms and Conditions'
      and commonly abbreviated as TOS, ToS, ToU, or T&C
    aliases:
      - Terms of Service
    in_subset:
      - contract_clause_subset
    exact_mappings:
      - dpv_upstream:TermsOfService
      - dpv_owl:TermsOfService
    annotations:
      skos_in_scheme: contract-clause-classes
