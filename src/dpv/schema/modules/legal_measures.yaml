id: https://w3id.org/lmodel/dpv/legal_measures
name: dpv_legal_measures
title: DPV - Legal Measures
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/legal_measures-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv

subsets:

  legal_measures_subset:
    description: Entities from the DPV `legal_measures` module.

classes:

  ConfidentialityAgreement:
    is_a: LegalAgreement
    mixins:
      - LegalMeasure
    class_uri: dpv:ConfidentialityAgreement
    description: |-
      Agreements that enforce confidentiality for e.g. to protect business,
      professional, or company secrets
    aliases:
      - Confidentiality Agreement
    in_subset:
      - legal_measures_subset
    exact_mappings:
      - dpv_upstream:ConfidentialityAgreement
      - dpv_owl:ConfidentialityAgreement
    annotations:
      skos_in_scheme: legal-measures-classes
      dct_source: DGA 3.1.a

  ContractualTerms:
    is_a: LegalMeasure
    class_uri: dpv:ContractualTerms
    description: Contractual terms governing data handling within or with an entity
    aliases:
      - Contractual Terms
    in_subset:
      - legal_measures_subset
    exact_mappings:
      - dpv_upstream:ContractualTerms
      - dpv_owl:ContractualTerms
    annotations:
      skos_in_scheme: legal-measures-classes

  DataHandlingClause:
    is_a: ContractualTerms
    mixins:
      - LegalMeasure
    class_uri: dpv:DataHandlingClause
    description: Contractual clauses governing handling of data within or by an entity
    aliases:
      - Data Handling Clause
    in_subset:
      - legal_measures_subset
    exact_mappings:
      - dpv_upstream:DataHandlingClause
      - dpv_owl:DataHandlingClause
    annotations:
      skos_in_scheme: legal-measures-classes

  LegalAgreement:
    is_a: LegalMeasure
    class_uri: dpv:LegalAgreement
    description: A legally binding agreement
    aliases:
      - Legal Agreement
    in_subset:
      - legal_measures_subset
    exact_mappings:
      - dpv_upstream:LegalAgreement
      - dpv_owl:LegalAgreement
    annotations:
      skos_in_scheme: legal-measures-classes

  NDA:
    is_a: LegalAgreement
    mixins:
      - LegalMeasure
    class_uri: dpv:NDA
    description: |-
      Non-disclosure Agreements e.g. preserving confidentiality of information
    aliases:
      - Non-Disclosure Agreement (NDA)
    in_subset:
      - legal_measures_subset
    exact_mappings:
      - dpv_upstream:NDA
      - dpv_owl:NDA
    annotations:
      skos_in_scheme: legal-measures-classes

  StatisticalConfidentialityAgreement:
    is_a: LegalAgreement
    mixins:
      - LegalMeasure
    class_uri: dpv:StatisticalConfidentialityAgreement
    description: |-
      An agreement outlining conditions, criteria, obligations,
      responsibilities, and specifics for classification and management of
      'confidential data' based on a statistical framework
    aliases:
      - Statistical Confidentiality Agreement
    in_subset:
      - legal_measures_subset
    exact_mappings:
      - dpv_upstream:StatisticalConfidentialityAgreement
      - dpv_owl:StatisticalConfidentialityAgreement
    annotations:
      skos_in_scheme: legal-measures-classes
