id: https://w3id.org/lmodel/dpv/tom
name: dpv_tom
title: DPV - Tom
description: |-
  LinkML schema generated from the DPV 2.3 module `modules/TOM-owl.ttl`
  (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv
- https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv

subsets:

  tom_subset:
    description: Entities from the DPV `tom` module.

slots:

  has_assessment:
    is_a: has_organisational_measure
    definition_uri: dpv:hasAssessment
    description: Indicates a relevant assessment associated with the specific 
      context
    aliases:
    - has assessment
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasAssessment
    - dpv_owl:hasAssessment

  has_entity_control:
    is_a: has_technical_organisational_measure
    definition_uri: dpv:hasEntityControl
    description: |-
      Indicates a control or measure provided for an entity to perform the
      specified action
    aliases:
    - has entity control
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasEntityControl
    - dpv_owl:hasEntityControl

  has_legal_measure:
    is_a: has_organisational_measure
    definition_uri: dpv:hasLegalMeasure
    description: Indicates use or applicability of Legal measure
    aliases:
    - has legal measure
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasLegalMeasure
    - dpv_owl:hasLegalMeasure

  has_organisational_measure:
    is_a: has_technical_organisational_measure
    definition_uri: dpv:hasOrganisationalMeasure
    description: Indicates use or applicability of Organisational measure
    aliases:
    - has organisational measure
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasOrganisationalMeasure
    - dpv_owl:hasOrganisationalMeasure

  has_physical_measure:
    is_a: has_technical_organisational_measure
    definition_uri: dpv:hasPhysicalMeasure
    description: Indicates use or applicability of Physical measure
    aliases:
    - has physical measure
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasPhysicalMeasure
    - dpv_owl:hasPhysicalMeasure

  has_policy:
    is_a: has_technical_organisational_measure
    definition_uri: dpv:hasPolicy
    description: Indicates policy applicable or used
    aliases:
    - has policy
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasPolicy
    - dpv_owl:hasPolicy

  has_record_of_activity:
    is_a: has_organisational_measure
    definition_uri: dpv:hasRecordOfActivity
    description: Indicates a relevant record of activity
    aliases:
    - has record of activity
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasRecordOfActivity
    - dpv_owl:hasRecordOfActivity

  has_technical_measure:
    is_a: has_technical_organisational_measure
    definition_uri: dpv:hasTechnicalMeasure
    description: Indicates use or applicability of Technical measure
    aliases:
    - has technical measure
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasTechnicalMeasure
    - dpv_owl:hasTechnicalMeasure

  has_technical_organisational_measure:
    definition_uri: dpv:hasTechnicalOrganisationalMeasure
    description: Indicates use or applicability of Technical or Organisational 
      measure
    aliases:
    - has technical and organisational measure
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:hasTechnicalOrganisationalMeasure
    - dpv_owl:hasTechnicalOrganisationalMeasure

  is_policy_for:
    definition_uri: dpv:isPolicyFor
    description: Indicates the context or application of policy
    aliases:
    - is policy for
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:isPolicyFor
    - dpv_owl:isPolicyFor

  supports_compliance_with:
    definition_uri: dpv:supportsComplianceWith
    description: |-
      Indicate the measure is required for meeting specified requirement or
      satisfying specified condition/constraint
    aliases:
    - supports Compliance With
    multivalued: true
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:supportsComplianceWith
    - dpv_owl:supportsComplianceWith

classes:

  LegalMeasure:
    is_a: TechnicalOrganisationalMeasure
    class_uri: dpv:LegalMeasure
    description: |-
      Legal measures used to safeguard and ensure good practices in connection
      with data and technologies
    aliases:
    - Legal Measure
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:LegalMeasure
    - dpv_owl:LegalMeasure

  OrganisationalMeasure:
    is_a: TechnicalOrganisationalMeasure
    class_uri: dpv:OrganisationalMeasure
    description: |-
      Organisational measures used to safeguard and ensure good practices in
      connection with data and technologies
    aliases:
    - Organisational Measure
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:OrganisationalMeasure
    - dpv_owl:OrganisationalMeasure

    narrow_mappings:
    - iso27001:SecurityControl
    - oscal:Control
    broad_mappings:
    - iso29100:PrivacyControl
    - nist_csf_v2:CSFSubcategory
  PhysicalMeasure:
    is_a: TechnicalOrganisationalMeasure
    class_uri: dpv:PhysicalMeasure
    description: |-
      Physical measures used to safeguard and ensure good practices in
      connection with data and technologies
    aliases:
    - Physical Measure
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:PhysicalMeasure
    - dpv_owl:PhysicalMeasure

  TechnicalMeasure:
    is_a: TechnicalOrganisationalMeasure
    class_uri: dpv:TechnicalMeasure
    description: |-
      Technical measures used to safeguard and ensure good practices in
      connection with data and technologies
    aliases:
    - Technical Measure
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:TechnicalMeasure
    - dpv_owl:TechnicalMeasure

    narrow_mappings:
    - iso27001:SecurityControl
    - oscal:Control
    broad_mappings:
    - iso29100:PrivacyControl
    - nist_csf_v2:CSFSubcategory
    related_mappings:
    - ocsf:DataSecurity
  TechnicalOrganisationalMeasure:
    class_uri: dpv:TechnicalOrganisationalMeasure
    description: |-
      Technical and Organisational measures used to safeguard and ensure good
      practices in connection with data and technologies
    aliases:
    - Technical and Organisational Measure
    in_subset:
    - tom_subset
    exact_mappings:
    - dpv_upstream:TechnicalOrganisationalMeasure
    - dpv_owl:TechnicalOrganisationalMeasure
    close_mappings:
    - oscal:Control
