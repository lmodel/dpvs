id: https://w3id.org/lmodel/dpv/dpv_legal_basis
name: dpv_legal_basis
title: DPV - Legal Basis
description: |-
  LinkML schema for DPV 2.3 semantic group: Legal basis, contracts, and
  lawfulness concepts. This schema imports only its direct upstream module
  dependencies (legal_basis, legal_basis_status, jurisdiction,
  legal_measures, contract, contract_clause, contract_control,
  contract_status, contract_types) rather than all 965 DPV classes.
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv
- https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv_common

subsets:

  legal_basis_subset:
    description: Entities from the DPV `legal_basis` semantic group.

slots:

  has_applicable_law:
    definition_uri: dpv:hasApplicableLaw
    description: Indicates applicability of a Law
    aliases:
    - has applicable law
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasApplicableLaw
    - dpv_owl:hasApplicableLaw
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_contract_control:
    definition_uri: dpv:hasContractControl
    description: Indicates the contract to be used with a contract
    aliases:
    - has contract control
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasContractControl
    - dpv_owl:hasContractControl
    annotations:
      skos_in_scheme: contract-properties

  has_contract_status:
    is_a: has_status
    definition_uri: dpv:hasContractStatus
    description: Indicates the status of the contract
    aliases:
    - has contract status
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasContractStatus
    - dpv_owl:hasContractStatus
    annotations:
      skos_in_scheme: contract-properties

  has_contractual_clause:
    definition_uri: dpv:hasContractualClause
    description: |-
      Indicates the association or involvement of specified contractual clause
    aliases:
    - has contractual clause
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasContractualClause
    - dpv_owl:hasContractualClause
    annotations:
      skos_in_scheme: contract-properties

  has_contractual_fulfilment_status:
    is_a: has_contract_status
    definition_uri: dpv:hasContractualFulfilmentStatus
    description: Indicates the fulfilment status of a contract or a contractual 
      clause
    aliases:
    - has contractual fulfilment status
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasContractualFulfilmentStatus
    - dpv_owl:hasContractualFulfilmentStatus
    annotations:
      skos_in_scheme: contract-properties

  has_country:
    is_a: has_location
    definition_uri: dpv:hasCountry
    description: Indicates applicability of specified country
    aliases:
    - has country
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasCountry
    - dpv_owl:hasCountry
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_indication_method:
    definition_uri: dpv:hasIndicationMethod
    description: |-
      Specifies the method by which an entity has indicated the specific
      context
    aliases:
    - has indication method
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasIndicationMethod
    - dpv_owl:hasIndicationMethod
    annotations:
      skos_in_scheme: legal-basis-properties

  has_inverse_jurisdiction:
    is_a: has_location
    definition_uri: dpv:hasInverseJurisdiction
    description: Indicates the inverse jurisdiction for a given jurisdiction
    aliases:
    - has inverse jurisdiction
    comments:
    - |-
      Using this property gives the set of all other jurisdictions that are
      not part of the jurisdiction e.g. when used with a country, it refers to
      all other countries
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasInverseJurisdiction
    - dpv_owl:hasInverseJurisdiction
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_jurisdiction:
    definition_uri: dpv:hasJurisdiction
    description: Indicates applicability of specified jurisdiction
    aliases:
    - has jurisdiction
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasJurisdiction
    - dpv_owl:hasJurisdiction
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_legal_basis:
    definition_uri: dpv:hasLegalBasis
    description: Indicates use or applicability of a Legal Basis
    aliases:
    - has legal basis
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasLegalBasis
    - dpv_owl:hasLegalBasis
    annotations:
      skos_in_scheme: legal-basis-properties

  has_location:
    definition_uri: dpv:hasLocation
    description: Indicates information about location
    aliases:
    - has location
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasLocation
    - dpv_owl:hasLocation
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_party:
    definition_uri: dpv:hasParty
    description: Indicates a legal entity involved as a party in a contract
    aliases:
    - has party
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasParty
    - dpv_owl:hasParty
    annotations:
      skos_in_scheme: contract-properties

  has_third_country:
    is_a: has_country
    definition_uri: dpv:hasThirdCountry
    description: Indicates applicability or relevance of a 'third country'
    aliases:
    - has third country
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:hasThirdCountry
    - dpv_owl:hasThirdCountry
    annotations:
      skos_in_scheme: jurisdiction-properties

  is_indicated_at_time:
    definition_uri: dpv:isIndicatedAtTime
    description: |-
      Specifies the temporal information for when the entity has indicated the
      specific context
    aliases:
    - is indicated at time
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:isIndicatedAtTime
    - dpv_owl:isIndicatedAtTime
    annotations:
      skos_in_scheme: legal-basis-properties

  is_indicated_by:
    definition_uri: dpv:isIndicatedBy
    description: Specifies entity who indicates the specific context
    aliases:
    - is indicated by
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:isIndicatedBy
    - dpv_owl:isIndicatedBy
    annotations:
      skos_in_scheme: legal-basis-properties

  is_outside_of_location:
    is_a: has_location
    definition_uri: dpv:isOutsideOfLocation
    description: |-
      Indicates the interpretation where the location being referenced is
      outside of the indicated concept
    aliases:
    - is outside of location
    comments:
    - |-
      This property is helpful for cases where a distinction needs to be made
      between inside/outside of a concept, and the area outside of that
      concept is to be referenced. For example, using Home with
      dpv:hasLocation means inside the Home, and using this property along
      with Home means outside of Home - such as the yard or porch
    multivalued: true
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:isOutsideOfLocation
    - dpv_owl:isOutsideOfLocation
    annotations:
      skos_in_scheme: jurisdiction-properties

classes:

  AcceptContract:
    is_a: ContractControl
    class_uri: dpv:AcceptContract
    description: Control for accepting a contract
    aliases:
    - Accept Contract
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:AcceptContract
    - dpv_owl:AcceptContract
    annotations:
      skos_in_scheme: contract-control-classes

  B2B2CContract:
    is_a: B2BContract
    mixins:
    - LegalBasis
    - B2CContract
    class_uri: dpv:B2B2CContract
    description: |-
      A contract between two businesses who partner together to provide
      services to a consumer
    aliases:
    - Business-to-Business-to-Consumer Contract
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:B2B2CContract
    - dpv_owl:B2B2CContract
    annotations:
      skos_in_scheme: contract-types-classes

  B2BContract:
    is_a: ContractByEntityType
    mixins:
    - LegalBasis
    class_uri: dpv:B2BContract
    description: A contract between two businesses
    aliases:
    - Business-to-Business Contract
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:B2BContract
    - dpv_owl:B2BContract
    annotations:
      skos_in_scheme: contract-types-classes

  B2CContract:
    is_a: ContractByEntityType
    mixins:
    - LegalBasis
    class_uri: dpv:B2CContract
    description: |-
      A contract between a business and a consumer where the business provides
      goods or services to the consumer
    aliases:
    - Business-to-Consumer Contract
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:B2CContract
    - dpv_owl:B2CContract
    annotations:
      skos_in_scheme: contract-types-classes

  C2BContract:
    is_a: ContractByEntityType
    mixins:
    - LegalBasis
    class_uri: dpv:C2BContract
    description: |-
      A contract between a consumer and a business where the business
      purchases goods or services from the consumer
    aliases:
    - Consumer-to-Business Contract
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:C2BContract
    - dpv_owl:C2BContract
    annotations:
      skos_in_scheme: contract-types-classes

  C2CContract:
    is_a: ContractByEntityType
    mixins:
    - LegalBasis
    class_uri: dpv:C2CContract
    description: A contract between two consumers
    aliases:
    - Consumer-to-Consumer Contract
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:C2CContract
    - dpv_owl:C2CContract
    annotations:
      skos_in_scheme: contract-types-classes

  City:
    is_a: DpvRegion
    class_uri: dpv:City
    description: A region consisting of urban population and commerce
    aliases:
    - City
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:City
    - dpv_owl:City
    annotations:
      skos_in_scheme: jurisdiction-classes

  CloudLocation:
    is_a: RemoteLocation
    mixins:
    - DpvLocation
    class_uri: dpv:CloudLocation
    description: |-
      Location that is in the 'cloud' i.e. a logical location operated over
      the internet
    aliases:
    - Cloud Location
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:CloudLocation
    - dpv_owl:CloudLocation
    annotations:
      skos_in_scheme: jurisdiction-classes

  ConfidentialityAgreement:
    is_a: LegalAgreement
    mixins:
    - LegalMeasure
    class_uri: dpv:ConfidentialityAgreement
    description: |-
      Agreements that enforce confidentiality for e.g. to protect business,
      professional, or company secrets
    aliases:
    - Confidentiality Agreement
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ConfidentialityAgreement
    - dpv_owl:ConfidentialityAgreement
    annotations:
      skos_in_scheme: legal-measures-classes
      dct_source: DGA 3.1.a

  Consent:
    is_a: LegalBasis
    class_uri: dpv:Consent
    description: Consent of the Data Subject for specified process or activity
    aliases:
    - Consent
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:Consent
    - dpv_owl:Consent
    annotations:
      skos_in_scheme: legal-basis-classes

  ConsumerStandardFormContract:
    is_a: StandardFormContract
    mixins:
    - LegalBasis
    class_uri: dpv:ConsumerStandardFormContract
    description: |-
      A contract where the terms and conditions are determined by parties in
      the role of a 'consumer' - whether an entity or an individual, and the
      other parties have negligible or no ability to negotiate the terms and
      conditions
    aliases:
    - Consumer Standard Form Contract
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ConsumerStandardFormContract
    - dpv_owl:ConsumerStandardFormContract
    annotations:
      skos_in_scheme: contract-types-classes

  Contract:
    is_a: LegalBasis
    class_uri: dpv:Contract
    description: |-
      Creation, completion, fulfilment, or performance of a contract involving
      specified processing of data or technologies
    aliases:
    - Contract
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:Contract
    - dpv_owl:Contract
    annotations:
      skos_in_scheme: legal-basis-classes

  ContractActivationStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractActivationStatus
    description: |-
      Status associated with activation of a contract i.e. whether its terms
      are active and are required to be performed
    aliases:
    - Contract Activation Status
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractActivationStatus
    - dpv_owl:ContractActivationStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractActive:
    is_a: ContractActivationStatus
    class_uri: dpv:ContractActive
    description: |-
      Status representing contract that has been fully executed and whose
      terms are considered active i.e. they are applicable and are required to
      be performed
    aliases:
    - Contract Active
    comments:
    - |-
      A contract being active only refers to its terms now being required to
      be fulfilled, while dpv:ContractBeingPerformed states that they are
      being performed
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractActive
    - dpv_owl:ContractActive
    annotations:
      skos_in_scheme: contract-status-classes

  ContractAmended:
    is_a: ContractPerformanceStatus
    class_uri: dpv:ContractAmended
    description: |-
      Status representing contract that has been fully executed and whose
      terms have been amended through mutual agreement or other means such
      that the contract is still required to be performed
    aliases:
    - Contract Amended
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractAmended
    - dpv_owl:ContractAmended
    annotations:
      skos_in_scheme: contract-status-classes

  ContractAmendmentClause:
    is_a: ContractualClause
    class_uri: dpv:ContractAmendmentClause
    description: |-
      A provision describing how changes or modifications to the contract can
      be made and the process for implementing them
    aliases:
    - Contract Amendment Clause
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractAmendmentClause
    - dpv_owl:ContractAmendmentClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractApproved:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractApproved
    description: |-
      Status representing contract has been approved and can be used for
      signing
    aliases:
    - Contract Approved
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractApproved
    - dpv_owl:ContractApproved
    annotations:
      skos_in_scheme: contract-status-classes

  ContractBeingPerformed:
    is_a: ContractPerformanceStatus
    class_uri: dpv:ContractBeingPerformed
    description: |-
      Status representing contract that has been fully executed and whose
      terms are being carried out i.e. the contract is being performed
    aliases:
    - Contract Being Performed
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractBeingPerformed
    - dpv_owl:ContractBeingPerformed
    annotations:
      skos_in_scheme: contract-status-classes

  ContractBreached:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractBreached
    description: |-
      Status representing contract being breached where its terms are not
      fulfilled or are violated with legal consequences
    aliases:
    - Contract Breached
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractBreached
    - dpv_owl:ContractBreached
    annotations:
      skos_in_scheme: contract-status-classes

  ContractByDomain:
    is_a: Contract
    mixins:
    - LegalBasis
    class_uri: dpv:ContractByDomain
    description: |-
      A generic concept representing contracts categorised by specific domains
      which dictate the drafting and interpretation of contracts
    aliases:
    - Contract by Domain
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractByDomain
    - dpv_owl:ContractByDomain
    annotations:
      skos_in_scheme: contract-types-classes

  ContractByEntityType:
    is_a: Contract
    mixins:
    - LegalBasis
    class_uri: dpv:ContractByEntityType
    description: |-
      A generic concept representing contracts categorised by the type of
      entities involved - such as Businesses (B), Consumers (C), and
      Governments (G)
    aliases:
    - Contract by Entity Type
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractByEntityType
    - dpv_owl:ContractByEntityType
    annotations:
      skos_in_scheme: contract-types-classes

  ContractByNegotiationType:
    is_a: Contract
    mixins:
    - LegalBasis
    class_uri: dpv:ContractByNegotiationType
    description: |-
      A generic concept representing contracts categorised based on their use
      or absence of negotiation in the contract forming process
    aliases:
    - Contract by Negotiation Type
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractByNegotiationType
    - dpv_owl:ContractByNegotiationType
    annotations:
      skos_in_scheme: contract-types-classes

  ContractConfidentialityClause:
    is_a: ContractualClause
    class_uri: dpv:ContractConfidentialityClause
    description: |-
      A provision requiring parties to keep certain information confidential
      and not disclose it to third parties
    aliases:
    - Contract Confidentiality Clause
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractConfidentialityClause
    - dpv_owl:ContractConfidentialityClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractControl:
    is_a: EntityInvolvement
    class_uri: dpv:ContractControl
    description: |-
      The control or activity associated with accepting, refusing, and other
      actions associated with a contract
    aliases:
    - Contract Control
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractControl
    - dpv_owl:ContractControl
    annotations:
      skos_in_scheme: contract-control-classes

  ContractDefinitions:
    is_a: ContractualClause
    class_uri: dpv:ContractDefinitions
    description: |-
      A section specifying the meanings of key terms and phrases used
      throughout the contract
    aliases:
    - Contract Definitions
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractDefinitions
    - dpv_owl:ContractDefinitions
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractDisputeResolutionClause:
    is_a: ContractualClause
    class_uri: dpv:ContractDisputeResolutionClause
    description: |-
      A provision detailing the methods and procedures for resolving
      disagreements or conflicts arising from the contract
    aliases:
    - Contract DisputeResolution Clause
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractDisputeResolutionClause
    - dpv_owl:ContractDisputeResolutionClause
    annotations:
      skos_in_scheme: contract-clause-classes

  ContractDisputed:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractDisputed
    description: |-
      Status representing contract being disputed where one or more parties
      have an issue regarding the interpretation and performance of the
      contract
    aliases:
    - Contract Disputed
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractDisputed
    - dpv_owl:ContractDisputed
    annotations:
      skos_in_scheme: contract-status-classes

  ContractDrafted:
    is_a: ContractPreparationStatus
    class_uri: dpv:ContractDrafted
    description: |-
      Status representing the drafting of contract text has been completed and
      it can now be offered for signing
    aliases:
    - Contract Drafted
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractDrafted
    - dpv_owl:ContractDrafted
    annotations:
      skos_in_scheme: contract-status-classes

  ContractExecutionStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractExecutionStatus
    description: |-
      Status associated with execution of a contract (i.e. signing and
      procedural aspects before the contract terms come in to effect)
    aliases:
    - Contract Execution Status
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractExecutionStatus
    - dpv_owl:ContractExecutionStatus
    annotations:
      skos_in_scheme: contract-status-classes

  ContractExpired:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractExpired
    description: |-
      Status representing reaching the expiry defined in the contract, such as
      when the stated duration or the stated obligations have been completed
    aliases:
    - Contract Expired
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractExpired
    - dpv_owl:ContractExpired
    annotations:
      skos_in_scheme: contract-status-classes

  ContractExtended:
    is_a: ContractTerminationStatus
    class_uri: dpv:ContractExtended
    description: |-
      Status representing the duration associated with a contract being
      extended through mutual agreement or by a party
    aliases:
    - Contract Extended
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractExtended
    - dpv_owl:ContractExtended
    annotations:
      skos_in_scheme: contract-status-classes

  ContractFulfilled:
    is_a: ContractFulfilmentStatus
    class_uri: dpv:ContractFulfilled
    description: |-
      Status representing contract where all its terms have been fulfilled in
      a manner that does not constitute a violation or breach of the contract
    aliases:
    - Contract Fulfilled
    in_subset:
    - legal_basis_subset
    exact_mappings:
    - dpv_upstream:ContractFulfilled
    - dpv_owl:ContractFulfilled
    annotations:
      skos_in_scheme: contract-status-classes

  ContractFulfilmentStatus:
    is_a: ContractStatus
    class_uri: dpv:ContractFulfilmentStatus
