id: https://w3id.org/lmodel/dpv/dpv_personal_data
name: dpv_personal_data
title: DPV - Personal Data
description: |-
  LinkML schema for DPV 2.3 semantic group: Data classification,
  sensitivity, and mitigation measures. This schema imports only its
  direct upstream module dependencies (personal_data, physical_measures,
  organisational_measures, technical_measures) rather than all 965 DPV
  classes.
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv
- https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv_common

subsets:

  personal_data_subset:
    description: Entities from the DPV `personal_data` semantic group.

slots:

  has_data:
    definition_uri: dpv:hasData
    description: Indicates associated with Data (may or may not be personal)
    aliases:
    - has data
    multivalued: true
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:hasData
    - dpv_owl:hasData
    annotations:
      skos_in_scheme: personal-data-properties

  has_personal_data:
    is_a: has_data
    definition_uri: dpv:hasPersonalData
    description: Indicates association with Personal Data
    aliases:
    - has personal data
    multivalued: true
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:hasPersonalData
    - dpv_owl:hasPersonalData
    annotations:
      skos_in_scheme: personal-data-properties

  has_uncategorised_data:
    is_a: has_data
    definition_uri: dpv:hasUncategorisedData
    description: Indicates association with the specified uncategorised data
    aliases:
    - has uncategorised data
    multivalued: true
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:hasUncategorisedData
    - dpv_owl:hasUncategorisedData
    annotations:
      skos_in_scheme: personal-data-properties

  has_unstructured_data:
    is_a: has_data
    definition_uri: dpv:hasUnstructuredData
    description: Indicates association with the specified unstructured data
    aliases:
    - has unstructured data
    multivalued: true
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:hasUnstructuredData
    - dpv_owl:hasUnstructuredData
    annotations:
      skos_in_scheme: personal-data-properties

classes:

  AIGovernance:
    is_a: GovernanceProcedures
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AIGovernance
    description: |-
      Procedures related to governance of AI, including its procurement,
      development, deployment, and assessments
    aliases:
    - AI Governance
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AIGovernance
    - dpv_owl:AIGovernance
    annotations:
      skos_in_scheme: organisational-measures-classes

    related_mappings:
    - iso22989:AILifecycleProcess
    - nist_ai_rmf:Function
    - nist_csf_v2:CSFFunction
    close_mappings:
    - iso42001:AIManagementSystem
  AILiteracy:
    is_a: DigitalLiteracy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AILiteracy
    description: |-
      Providing skills, knowledge, and understanding to enable reading,
      writing, analysing, reasoning, and communicating regarding AI
    aliases:
    - AI Literacy
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AILiteracy
    - dpv_owl:AILiteracy
    annotations:
      skos_in_scheme: organisational-measures-classes

    related_mappings:
    - iso42001:AIReferenceControl
  AINotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AINotice
    description: |-
      A notice providing information regarding the particulars of an AI system
      such as its intended purpose and proper use
    aliases:
    - AI Notice
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AINotice
    - dpv_owl:AINotice
    annotations:
      skos_in_scheme: organisational-measures-classes

    related_mappings:
    - iso42001:AISystem
  AcceptableUsePolicy:
    is_a: Policy
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AcceptableUsePolicy
    description: |-
      Acceptable Use Policy (AUP) refers to conditions, contexts, or uses
      which are considered acceptable with the implication that those not
      covered by such a policy are to be considered unacceptable
    aliases:
    - Acceptable Use Policy
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AcceptableUsePolicy
    - dpv_owl:AcceptableUsePolicy
    annotations:
      skos_in_scheme: organisational-measures-classes

  AccessControlMethod:
    is_a: TechnicalMeasure
    class_uri: dpv:AccessControlMethod
    description: Methods which restrict access to a place or resource
    aliases:
    - Access Control Method
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AccessControlMethod
    - dpv_owl:AccessControlMethod
    annotations:
      skos_in_scheme: technical-measures-classes

  ActivityMonitoring:
    is_a: TechnicalMeasure
    class_uri: dpv:ActivityMonitoring
    description: |-
      Monitoring of activities including assessing whether they have been
      successfully initiated and completed
    aliases:
    - Activity Monitoring
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ActivityMonitoring
    - dpv_owl:ActivityMonitoring
    annotations:
      skos_in_scheme: technical-measures-classes

  Anonymisation:
    is_a: Deidentification
    mixins:
    - TechnicalMeasure
    class_uri: dpv:Anonymisation
    description: |-
      Anonymisation is the process by which data is irreversibly altered in
      such a way that a data subject can no longer be identified directly or
      indirectly, either by the entity holding the data alone or in
      collaboration with other entities and information sources
    aliases:
    - Anonymisation
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:Anonymisation
    - dpv_owl:Anonymisation
    annotations:
      skos_in_scheme: technical-measures-classes

  AnonymisedData:
    is_a: NonPersonalData
    class_uri: dpv:AnonymisedData
    description: |-
      Personal Data that has been (fully and completely) anonymised so that it
      is no longer considered Personal Data
    aliases:
    - Anonymised Data
    comments:
    - |-
      It is advised to carefully consider indicating data is fully or
      completely anonymised by determining whether the data by itself or in
      combination with other data can identify a person. Failing this
      condition, the data should be denoted as PseudonymisedData. To indicate
      data is anonymised only for a specified entity (e.g. within an
      organisation), the concept ContextuallyAnonymisedData (as subclass of
      PseudonymisedData) should be used instead of AnonymisedData.
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AnonymisedData
    - dpv_owl:AnonymisedData
    annotations:
      skos_in_scheme: personal-data-classes

  ApprovalProcedure:
    is_a: GovernanceProcedures
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ApprovalProcedure
    description: |-
      A procedure or process for determining and managing approvals for
      activities as part of governance
    aliases:
    - Approval Procedure
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ApprovalProcedure
    - dpv_owl:ApprovalProcedure
    annotations:
      skos_in_scheme: organisational-measures-classes

  Assessment:
    is_a: OrganisationalMeasure
    class_uri: dpv:Assessment
    description: |-
      The document, plan, or process for assessment or determination towards a
      purpose e.g. assessment of legality or impact assessments
    aliases:
    - Assessment
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:Assessment
    - dpv_owl:Assessment
    annotations:
      skos_in_scheme: organisational-measures-classes

  AssetManagementProcedures:
    is_a: GovernanceProcedures
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AssetManagementProcedures
    description: Procedures related to management of assets
    aliases:
    - Asset Management Procedures
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AssetManagementProcedures
    - dpv_owl:AssetManagementProcedures
    annotations:
      skos_in_scheme: organisational-measures-classes

  AsymmetricCryptography:
    is_a: CryptographicMethods
    mixins:
    - TechnicalMeasure
    class_uri: dpv:AsymmetricCryptography
    description: |-
      Use of public-key cryptography or asymmetric cryptography involving a
      public and private pair of keys
    aliases:
    - Asymmetric Cryptography
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AsymmetricCryptography
    - dpv_owl:AsymmetricCryptography
    annotations:
      skos_in_scheme: technical-measures-classes

  AsymmetricEncryption:
    is_a: Encryption
    mixins:
    - TechnicalMeasure
    class_uri: dpv:AsymmetricEncryption
    description: Use of asymmetric cryptography to encrypt data
    aliases:
    - Asymmetric Encryption
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AsymmetricEncryption
    - dpv_owl:AsymmetricEncryption
    annotations:
      skos_in_scheme: technical-measures-classes

  Audit:
    is_a: OrganisationalMeasure
    class_uri: dpv:Audit
    description: |-
      An audit is a systematic examination or evaluation of records,
      processes, or systems towards a specific objective such as to assess
      accuracy, compliance, effectiveness, or performance
    aliases:
    - Audit
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:Audit
    - dpv_owl:Audit
    annotations:
      skos_in_scheme: organisational-measures-classes

    close_mappings:
    - iso27001:InternalAudit
    - iso42001:InternalAudit
  AuthenticationABC:
    is_a: CryptographicAuthentication
    mixins:
    - TechnicalMeasure
    class_uri: dpv:Authentication-ABC
    description: |-
      Use of Attribute Based Credentials (ABC) to perform and manage
      authentication
    aliases:
    - Authentication-ABC
    - Authentication using ABC
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:Authentication-ABC
    - dpv_owl:Authentication-ABC
    annotations:
      skos_in_scheme: technical-measures-classes

  AuthenticationPABC:
    is_a: CryptographicAuthentication
    mixins:
    - TechnicalMeasure
    class_uri: dpv:Authentication-PABC
    description: |-
      Use of Privacy-enhancing Attribute Based Credentials (ABC) to perform
      and manage authentication
    aliases:
    - Authentication-PABC
    - Authentication using PABC
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:Authentication-PABC
    - dpv_owl:Authentication-PABC
    annotations:
      skos_in_scheme: technical-measures-classes

  AuthenticationProtocols:
    is_a: TechnicalMeasure
    class_uri: dpv:AuthenticationProtocols
    description: |-
      Protocols involving validation of identity i.e. authentication of a
      person or information
    aliases:
    - Authentication Protocols
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AuthenticationProtocols
    - dpv_owl:AuthenticationProtocols
    annotations:
      skos_in_scheme: technical-measures-classes

  AuthorisationProcedure:
    is_a: SecurityProcedure
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:AuthorisationProcedure
    description: |-
      Procedures for determining authorisation through permission or authority
    aliases:
    - Authorisation Procedure
    comments:
    - |-
      non-technical authorisation procedures: How is it described on an
      organisational level, who gets access to the data
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AuthorisationProcedure
    - dpv_owl:AuthorisationProcedure
    annotations:
      skos_in_scheme: organisational-measures-classes

  AuthorisationProtocols:
    is_a: TechnicalMeasure
    class_uri: dpv:AuthorisationProtocols
    description: |-
      Protocols involving authorisation of roles or profiles to determine
      permission, rights, or privileges
    aliases:
    - Authorisation Protocols
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:AuthorisationProtocols
    - dpv_owl:AuthorisationProtocols
    annotations:
      skos_in_scheme: technical-measures-classes

  BackgroundChecks:
    is_a: SecurityProcedure
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:BackgroundChecks
    description: |-
      Procedure where the background of an entity is assessed to identity
      vulnerabilities and threats due to their current or intended role
    aliases:
    - Background Checks
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:BackgroundChecks
    - dpv_owl:BackgroundChecks
    annotations:
      skos_in_scheme: organisational-measures-classes

  BiometricAuthentication:
    is_a: AuthenticationProtocols
    mixins:
    - TechnicalMeasure
    class_uri: dpv:BiometricAuthentication
    description: Use of biometric data for authentication
    aliases:
    - Biometric Authentication
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:BiometricAuthentication
    - dpv_owl:BiometricAuthentication
    annotations:
      skos_in_scheme: technical-measures-classes

  Certification:
    is_a: CertificationSeal
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:Certification
    description: |-
      Certification mechanisms, seals, and marks for the purpose of
      demonstrating compliance
    aliases:
    - Certification
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:Certification
    - dpv_owl:Certification
    annotations:
      skos_in_scheme: organisational-measures-classes

  CertificationSeal:
    is_a: OrganisationalMeasure
    class_uri: dpv:CertificationSeal
    description: |-
      Certifications, seals, and marks indicating compliance to regulations or
      practices
    aliases:
    - Certification and Seal
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:CertificationSeal
    - dpv_owl:CertificationSeal
    annotations:
      skos_in_scheme: organisational-measures-classes

  CodeOfConduct:
    is_a: GuidelinesPrinciple
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:CodeOfConduct
    description: |-
      A set of rules or procedures outlining the norms and practices for
      conducting activities
    aliases:
    - Code of Conduct
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:CodeOfConduct
    - dpv_owl:CodeOfConduct
    annotations:
      skos_in_scheme: organisational-measures-classes

  CollectedData:
    is_a: DpvData
    class_uri: dpv:CollectedData
    description: Data that has been obtained by collecting it from a source
    aliases:
    - Collected Data
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:CollectedData
    - dpv_owl:CollectedData
    annotations:
      skos_in_scheme: personal-data-classes

  CollectedPersonalData:
    is_a: CollectedData
    mixins:
    - PersonalData
    class_uri: dpv:CollectedPersonalData
    description: |-
      Personal Data that has been collected from another source such as the
      Data Subject
    aliases:
    - Collected Personal Data
    comments:
    - |-
      To indicate the source of data, use the DataSource concept with the
      hasDataSource relation
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:CollectedPersonalData
    - dpv_owl:CollectedPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  CommerciallyConfidentialData:
    is_a: ConfidentialData
    class_uri: dpv:CommerciallyConfidentialData
    description: |-
      Data that is considered confidential due to business/trade secrets,
      confidentiality agreements, or company secrets
    aliases:
    - Commercially Confidential Data
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:CommerciallyConfidentialData
    - dpv_owl:CommerciallyConfidentialData
    annotations:
      skos_in_scheme: personal-data-classes
      dct_source: DGA 6.5(c)

  ComplianceAssessment:
    is_a: Assessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ComplianceAssessment
    description: Assessment regarding compliance (e.g. internal policy, 
      regulations)
    aliases:
    - Compliance Assessment
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ComplianceAssessment
    - dpv_owl:ComplianceAssessment
    annotations:
      skos_in_scheme: organisational-measures-classes

  ComplianceMonitoring:
    is_a: GovernanceProcedures
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ComplianceMonitoring
    description: Monitoring of compliance (e.g. internal policy, regulations)
    aliases:
    - Compliance Monitoring
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ComplianceMonitoring
    - dpv_owl:ComplianceMonitoring
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConfidentialData:
    is_a: DpvData
    class_uri: dpv:ConfidentialData
    description: Data deemed confidential
    aliases:
    - Confidential Data
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConfidentialData
    - dpv_owl:ConfidentialData
    annotations:
      skos_in_scheme: personal-data-classes
      dct_source: DGA 5.10

  ConformanceAssessment:
    is_a: Assessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConformanceAssessment
    description: |-
      Assessment regarding conformance with standards or norms or guidelines
      or similar instruments
    aliases:
    - Conformance Assessment
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConformanceAssessment
    - dpv_owl:ConformanceAssessment
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsentManagement:
    is_a: PermissionManagement
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentManagement
    description: |-
      Methods to obtain, provide, modify, and withdraw consent along with
      maintaining a record of consent, retrieving records, and processing
      changes in consent states
    aliases:
    - Consent Management
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConsentManagement
    - dpv_owl:ConsentManagement
    annotations:
      skos_in_scheme: organisational-measures-classes
      dct_source: DGA 12.n

  ConsentReceipt:
    is_a: ConsentRecord
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentReceipt
    description: |-
      A record of consent or consent related activities that is provided to
      another entity
    aliases:
    - Consent Receipt
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConsentReceipt
    - dpv_owl:ConsentReceipt
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsentRecord:
    is_a: DataProcessingRecord
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentRecord
    description: A Record of Consent or Consent related activities
    aliases:
    - Consent Record
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConsentRecord
    - dpv_owl:ConsentRecord
    - iso29100:ConsentRecord
    annotations:
      skos_in_scheme: organisational-measures-classes

    related_mappings:
    - oscal:Resource
  Consultation:
    is_a: OrganisationalMeasure
    class_uri: dpv:Consultation
    description: |-
      Consultation is a process of receiving feedback, advice, or opinion from
      an external agency
    aliases:
    - Consultation
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:Consultation
    - dpv_owl:Consultation
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsultationWithAuthority:
    is_a: Consultation
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsultationWithAuthority
    description: Consultation with an authority or authoritative entity
    aliases:
    - Consultation with Authority
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConsultationWithAuthority
    - dpv_owl:ConsultationWithAuthority
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsultationWithDPO:
    is_a: Consultation
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsultationWithDPO
    description: Consultation with Data Protection Officer(s)
    aliases:
    - Consultation with DPO
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConsultationWithDPO
    - dpv_owl:ConsultationWithDPO
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsultationWithDataSubject:
    is_a: Consultation
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsultationWithDataSubject
    description: Consultation with data subject(s) or their representative(s)
    aliases:
    - Consultation with Data Subject
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConsultationWithDataSubject
    - dpv_owl:ConsultationWithDataSubject
    annotations:
      skos_in_scheme: organisational-measures-classes

  ConsultationWithDataSubjectRepresentative:
    is_a: ConsultationWithDataSubject
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsultationWithDataSubjectRepresentative
    description: Consultation with representative of data subject(s)
    aliases:
    - Consultation with Data Subject Representative
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ConsultationWithDataSubjectRepresentative
    - dpv_owl:ConsultationWithDataSubjectRepresentative
    annotations:
      skos_in_scheme: organisational-measures-classes

  ContextuallyAnonymisedData:
    is_a: PseudonymisedData
    class_uri: dpv:ContextuallyAnonymisedData
    description: |-
      Data that can be considered as being fully anonymised within the context
      but in actuality is not fully anonymised and is still personal data as
      it can be de-anonymised outside that context
    aliases:
    - Contextually Anonymised Data
    comments:
    - |-
      To distinguish between partially anonymised data that can be effectively
      treated as anonymised data (e.g. in processing) within a context (e.g.
      an organisation), the concept ContextuallyAnonymisedData should be used
      instead of AnonymisedData. Transfer of this data outside of the context
      should consider that it is not fully anonymised and that it is still
      personal data
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:ContextuallyAnonymisedData
    - dpv_owl:ContextuallyAnonymisedData
    annotations:
