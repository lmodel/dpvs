    exact_mappings:
    - dpv_upstream:SingleSignOn
    - dpv_owl:SingleSignOn
    annotations:
      skos_in_scheme: technical-measures-classes

  SpecialCategoryPersonalData:
    is_a: SensitivePersonalData
    class_uri: dpv:SpecialCategoryPersonalData
    description: |-
      Sensitive Personal Data whose use requires specific additional legal
      permission or justification
    aliases:
    - Special Category Personal Data
    comments:
    - |-
      The term 'special category' is based on GDPR Art.9, but should not be
      considered as exclusive to it. DPV considers all Special Categories to
      also be Sensitive, but whose use is either prohibited or regulated and
      therefore requires additional legal basis for justification that is
      separate from that for general personal data.
    in_subset:
    - personal_data_subset
    exact_mappings:
    - dpv_upstream:SpecialCategoryPersonalData
    - dpv_owl:SpecialCategoryPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

