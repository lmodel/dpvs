id: https://w3id.org/lmodel/dpv/dpv_risk_notice
name: dpv_risk_notice
title: DPV - Risk Notice
description: |-
  LinkML schema for DPV 2.3 semantic group: Risk, notice, and complaint
  concepts. This schema imports only its direct upstream module
  dependencies (risk, notice) rather than all 965 DPV classes.
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv
- https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv_common

subsets:

  risk_notice_subset:
    description: Entities from the DPV `risk_notice` semantic group.

slots:

  has_consequence:
    definition_uri: dpv:hasConsequence
    description: Indicates consequence(s) possible or arising from specified 
      concept
    aliases:
    - has consequence
    comments:
    - Removed plural suffix for consistency
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasConsequence
    - dpv_owl:hasConsequence
    annotations:
      skos_in_scheme: risk-properties

  has_consequence_on:
    definition_uri: dpv:hasConsequenceOn
    description: |-
      Indicates the thing (e.g. plan, process, or entity) affected by a
      consequence
    aliases:
    - has consequence on
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasConsequenceOn
    - dpv_owl:hasConsequenceOn
    annotations:
      skos_in_scheme: risk-properties

  has_impact:
    is_a: has_consequence
    definition_uri: dpv:hasImpact
    description: |-
      Indicates impact(s) possible or arising as consequences from specified
      concept
    aliases:
    - has impact
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasImpact
    - dpv_owl:hasImpact
    annotations:
      skos_in_scheme: risk-properties

  has_impact_assessment:
    is_a: has_assessment
    definition_uri: dpv:hasImpactAssessment
    description: Indicates an impact assessment associated with the specific 
      context
    aliases:
    - has impact assessment
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasImpactAssessment
    - dpv_owl:hasImpactAssessment
    annotations:
      skos_in_scheme: risk-properties

  has_impact_on:
    is_a: has_consequence_on
    definition_uri: dpv:hasImpactOn
    description: |-
      Indicates the thing (e.g. plan, process, or entity) affected by an
      impact
    aliases:
    - has impact on
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasImpactOn
    - dpv_owl:hasImpactOn
    annotations:
      skos_in_scheme: risk-properties

  has_likelihood:
    definition_uri: dpv:hasLikelihood
    description: Indicates the likelihood associated with a concept
    aliases:
    - has likelihood
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasLikelihood
    - dpv_owl:hasLikelihood
    annotations:
      skos_in_scheme: risk-properties

  has_notice:
    is_a: has_organisational_measure
    definition_uri: dpv:hasNotice
    description: |-
      Indicates the use or applicability of a Notice for the specified context
    aliases:
    - has notice
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasNotice
    - dpv_owl:hasNotice
    annotations:
      skos_in_scheme: notice-properties

  has_notice_icon:
    definition_uri: dpv:hasNoticeIcon
    description: |-
      Indicates the concept can be represented graphically using the specified
      icon
    aliases:
    - has notice icon
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasNoticeIcon
    - dpv_owl:hasNoticeIcon
    annotations:
      skos_in_scheme: notice-properties

  has_notice_layer:
    definition_uri: dpv:hasNoticeLayer
    description: |-
      Indicates the use of a notice layer within a notice or to associate a
      layer with another layer
    aliases:
    - has notice layer
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasNoticeLayer
    - dpv_owl:hasNoticeLayer
    annotations:
      skos_in_scheme: notice-properties

  has_notice_status:
    definition_uri: dpv:hasNoticeStatus
    description: Indicates the status of the associated notice
    aliases:
    - has notice status
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasNoticeStatus
    - dpv_owl:hasNoticeStatus
    annotations:
      skos_in_scheme: notice-properties

  has_residual_risk:
    definition_uri: dpv:hasResidualRisk
    description: |-
      Indicates the associated risk is the remaining or residual risk from
      applying mitigation measures or treatments to this risk
    aliases:
    - has residual risk
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasResidualRisk
    - dpv_owl:hasResidualRisk
    annotations:
      skos_in_scheme: risk-properties

  has_risk:
    definition_uri: dpv:hasRisk
    description: Indicates applicability of Risk for this concept
    aliases:
    - has risk
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasRisk
    - dpv_owl:hasRisk
    annotations:
      skos_in_scheme: risk-properties

  has_risk_assessment:
    is_a: has_assessment
    definition_uri: dpv:hasRiskAssessment
    description: Indicates an associated risk assessment
    aliases:
    - has risk assessment
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasRiskAssessment
    - dpv_owl:hasRiskAssessment
    annotations:
      skos_in_scheme: risk-properties

  has_risk_level:
    definition_uri: dpv:hasRiskLevel
    description: Indicates the associated risk level associated with a risk
    aliases:
    - has risk level
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasRiskLevel
    - dpv_owl:hasRiskLevel
    annotations:
      skos_in_scheme: risk-properties

  has_sensitivity_level:
    definition_uri: dpv:hasSensitivityLevel
    description: Indicates the associated level of sensitivity
    aliases:
    - has sensitivity level
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasSensitivityLevel
    - dpv_owl:hasSensitivityLevel
    annotations:
      skos_in_scheme: risk-properties

  has_severity:
    definition_uri: dpv:hasSeverity
    description: Indicates the severity associated with a concept
    aliases:
    - has severity
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:hasSeverity
    - dpv_owl:hasSeverity
    annotations:
      skos_in_scheme: risk-properties

  is_mitigated_by_measure:
    is_a: has_technical_organisational_measure
    definition_uri: dpv:isMitigatedByMeasure
    description: Indicate a risk is mitigated by specified measure
    aliases:
    - is mitigated by measure
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:isMitigatedByMeasure
    - dpv_owl:isMitigatedByMeasure
    annotations:
      skos_in_scheme: risk-properties

  is_residual_risk_of:
    definition_uri: dpv:isResidualRiskOf
    description: |-
      Indicates this risk is the remaining or residual risk from applying
      mitigation measures or treatments to specified risk
    aliases:
    - is residual risk of
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:isResidualRiskOf
    - dpv_owl:isResidualRiskOf
    annotations:
      skos_in_scheme: risk-properties

  mitigates_risk:
    definition_uri: dpv:mitigatesRisk
    description: Indicates risks mitigated by this concept
    aliases:
    - mitigates risk
    multivalued: true
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:mitigatesRisk
    - dpv_owl:mitigatesRisk
    annotations:
      skos_in_scheme: risk-properties

classes:

  ConsentNotice:
    is_a: PrivacyNotice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ConsentNotice
    description: A Notice for information provision associated with Consent
    aliases:
    - Consent Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:ConsentNotice
    - dpv_owl:ConsentNotice
    annotations:
      skos_in_scheme: notice-classes, organisational-measures-classes

  Consequence:
    is_a: RiskConcept
    class_uri: dpv:Consequence
    description: The consequence(s) possible or arising from specified context
    aliases:
    - Consequence
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:Consequence
    - dpv_owl:Consequence
    annotations:
      skos_in_scheme: risk-classes

  ConsequenceAsSideEffect:
    is_a: Consequence
    class_uri: dpv:ConsequenceAsSideEffect
    description: |-
      The consequence(s) possible or arising as a side-effect of specified
      context
    aliases:
    - Consequence as Side-Effect
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:ConsequenceAsSideEffect
    - dpv_owl:ConsequenceAsSideEffect
    annotations:
      skos_in_scheme: risk-classes

  ConsequenceOfFailure:
    is_a: Consequence
    class_uri: dpv:ConsequenceOfFailure
    description: |-
      The consequence(s) possible or arising from failure of specified context
    aliases:
    - Consequence of Failure
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:ConsequenceOfFailure
    - dpv_owl:ConsequenceOfFailure
    annotations:
      skos_in_scheme: risk-classes

  ConsequenceOfSuccess:
    is_a: Consequence
    class_uri: dpv:ConsequenceOfSuccess
    description: |-
      The consequence(s) possible or arising from success of specified context
    aliases:
    - Consequence of Success
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:ConsequenceOfSuccess
    - dpv_owl:ConsequenceOfSuccess
    annotations:
      skos_in_scheme: risk-classes

  CybersecurityAssessment:
    is_a: SecurityAssessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:CybersecurityAssessment
    description: |-
      Assessment of cybersecurity capabilities in terms of vulnerabilities and
      effectiveness of controls
    aliases:
    - Cybersecurity Assessment
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:CybersecurityAssessment
    - dpv_owl:CybersecurityAssessment
    annotations:
      skos_in_scheme: risk-classes

  DPIA:
    is_a: RightsImpactAssessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DPIA
    description: |-
      Impact assessment determining the potential and actual impact of
      processing activities on individuals or groups of individuals and taking
      into account the impacts of activities on their rights and freedoms
    aliases:
    - Data Protection Impact Assessment (DPIA)
    comments:
    - |-
      Specific requirements and procedures for DPIA are defined in GDPR Art.35
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:DPIA
    - dpv_owl:DPIA
    annotations:
      skos_in_scheme: risk-classes
      dct_source: GDPR Art. 35

  DashboardNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DashboardNotice
    description: |-
      A notice that is provided within a dashboard also used for other
      purposes
    aliases:
    - Dashboard Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:DashboardNotice
    - dpv_owl:DashboardNotice
    annotations:
      skos_in_scheme: notice-classes

  DataBreachImpactAssessment:
    is_a: RightsImpactAssessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataBreachImpactAssessment
    description: |-
      Impact Assessment concerning the consequences and impacts of a data
      breach
    aliases:
    - Data Breach Impact Assessment (DBIA)
    comments:
    - |-
      Data Breach assessments can require additional non-security related
      assessments such as GDPR Art.34 Rights Impact Assessment
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:DataBreachImpactAssessment
    - dpv_owl:DataBreachImpactAssessment
    annotations:
      skos_in_scheme: risk-classes

  DataBreachNotice:
    is_a: SecurityIncidentNotice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataBreachNotice
    description: |-
      A notice providing information about data breach(es) i.e. unauthorised
      transfer, access, use, or modification of data
    aliases:
    - Data Breach Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:DataBreachNotice
    - dpv_owl:DataBreachNotice
    annotations:
      skos_in_scheme: notice-classes, organisational-measures-classes
      dct_source: ' DGA 21.5 GDPR 33'

  DataTransferImpactAssessment:
    is_a: ImpactAssessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataTransferImpactAssessment
    description: Impact Assessment for conducting data transfers
    aliases:
    - Data Transfer Impact Assessment
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:DataTransferImpactAssessment
    - dpv_owl:DataTransferImpactAssessment
    annotations:
      skos_in_scheme: risk-classes

  DataTransferNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DataTransferNotice
    description: Notice for the legal entity for the transfer of its data
    aliases:
    - Data Transfer Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:DataTransferNotice
    - dpv_owl:DataTransferNotice
    annotations:
      skos_in_scheme: notice-classes, organisational-measures-classes
      dct_source: DGA 5.9

  DeviceNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:DeviceNotice
    description: |-
      A notice provided using the functionality provided by a device e.g.
      using the popup or alert feature
    aliases:
    - Device Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:DeviceNotice
    - dpv_owl:DeviceNotice
    annotations:
      skos_in_scheme: notice-classes

  FRIA:
    is_a: RightsImpactAssessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:FRIA
    description: |-
      Impact assessment which assesses the potential and actual impact on
      fundamental rights occurring due to processing activities
    aliases:
    - Fundamental Rights Impact Assessment (FRIA)
    comments:
    - |-
      The fundamental rights and freedoms may be those defined in law or other
      norms, and may be bound to a jurisdiction - for example see EU Charter
      of Fundamental Rights
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:FRIA
    - dpv_owl:FRIA
    annotations:
      skos_in_scheme: risk-classes
      dct_source: AI Act Art.27

  GraphicalNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:GraphicalNotice
    description: A notice that uses graphical elements such as visualisations 
      and icons
    aliases:
    - Graphical Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:GraphicalNotice
    - dpv_owl:GraphicalNotice
    annotations:
      skos_in_scheme: notice-classes

  Impact:
    is_a: Consequence
    class_uri: dpv:Impact
    description: |-
      The impact(s) possible or arising as a consequence from specified
      context
    aliases:
    - Impact
    comments:
    - |-
      Impact is a stronger notion of consequence in terms of influence,
      change, or effect on something e.g. for impact assessments
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:Impact
    - dpv_owl:Impact
    annotations:
      skos_in_scheme: risk-classes

  ImpactAssessment:
    is_a: RiskAssessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:ImpactAssessment
    description: |-
      Calculating or determining the likelihood of impact of an existing or
      proposed process, which can involve risks or detriments.
    aliases:
    - Impact Assessment
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:ImpactAssessment
    - dpv_owl:ImpactAssessment
    annotations:
      skos_in_scheme: risk-classes

    close_mappings:
    - iso42001:AISystemImpactAssessment
    related_mappings:
    - nist_ai_rmf:Impact
  JITNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:JITNotice
    description: |-
      A notice that is provided "just in time" when collecting information or
      performing an activity
    aliases:
    - Just-in-time Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:JITNotice
    - dpv_owl:JITNotice
    annotations:
      skos_in_scheme: notice-classes

  LayeredNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:LayeredNotice
    description: A notice that contains layered elements
    aliases:
    - Layered Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:LayeredNotice
    - dpv_owl:LayeredNotice
    annotations:
      skos_in_scheme: notice-classes

  Likelihood:
    is_a: DpvThing
    class_uri: dpv:Likelihood
    description: |-
      The likelihood or probability or chance of something taking place or
      occurring
    aliases:
    - Likelihood
    comments:
    - |-
      Likelihood can be expressed in a subjective manner, such as 'Unlikely',
      or in a quantitative manner such as "Twice in a Day" (frequency per
      period). The suggestion is to use quantitative values, or to associate
      them with subjective terms used so as to enable accurate interpretations
      and interoperability. See the concepts related to Frequency and Duration
      for possible uses as a combination to express Likelihood.
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:Likelihood
    - dpv_owl:Likelihood
    annotations:
      skos_in_scheme: risk-classes

  Notice:
    is_a: OrganisationalMeasure
    class_uri: dpv:Notice
    description: |-
      A notice is an artefact for providing information, choices, or controls
    aliases:
    - Notice
    comments:
    - |-
      Notice refers to the information whereas Notification refers to the
      provision of that notice. In several cases, they are used
      interchangeably - for example Privacy Notice as a measure or control
      refers to both the information as well as the act of making it
      available. For 'active' contexts where this distinction is important,
      e.g. data breach notifications, see Notification concept.
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:Notice
    - dpv_owl:Notice
    annotations:
      skos_in_scheme: notice-classes, organisational-measures-classes

  NoticeCommunicated:
    is_a: NoticeStatus
    class_uri: dpv:NoticeCommunicated
    description: Status indicating the notice has been communicated
    aliases:
    - Notice Communicated
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:NoticeCommunicated
    - dpv_owl:NoticeCommunicated
    annotations:
      skos_in_scheme: notice-classes

  NoticeGenerated:
    is_a: NoticeStatus
    class_uri: dpv:NoticeGenerated
    description: Status indicating the notice has been generated
    aliases:
    - Notice Generated
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:NoticeGenerated
    - dpv_owl:NoticeGenerated
    annotations:
      skos_in_scheme: notice-classes

  NoticeIcon:
    is_a: DpvThing
    class_uri: dpv:NoticeIcon
    description: |-
      An icon within a notice associated with specific information or elements
    aliases:
    - Notice Icon
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:NoticeIcon
    - dpv_owl:NoticeIcon
    annotations:
      skos_in_scheme: notice-classes

  NoticeLatest:
    is_a: NoticeStatus
    class_uri: dpv:NoticeLatest
    description: Status indicating the notice is currently at its latest 
      iteration
    aliases:
    - Notice Latest
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:NoticeLatest
    - dpv_owl:NoticeLatest
    annotations:
      skos_in_scheme: notice-classes

  NoticeLayer:
    is_a: DpvThing
    class_uri: dpv:NoticeLayer
    description: |-
      A layer within a layered notice where the layer can be used for
      providing specific information or controls
    aliases:
    - Notice Layer
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:NoticeLayer
    - dpv_owl:NoticeLayer
    annotations:
      skos_in_scheme: notice-classes

  NoticeStale:
    is_a: NoticeStatus
    class_uri: dpv:NoticeStale
    description: |-
      Status indicating the notice is stale or not up to date or not the
      latest version
    aliases:
    - Notice Stale
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:NoticeStale
    - dpv_owl:NoticeStale
    annotations:
      skos_in_scheme: notice-classes

  NoticeStatus:
    is_a: Status
    class_uri: dpv:NoticeStatus
    description: Status associated with notice provision, use, and management
    aliases:
    - Notice Status
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:NoticeStatus
    - dpv_owl:NoticeStatus
    annotations:
      skos_in_scheme: notice-classes

  NoticeUnused:
    is_a: NoticeStatus
    class_uri: dpv:NoticeUnused
    description: |-
      Status indicating the notice has been communicated but has not yet been
      used e.g. the recipient has not acknowledged it or has not taken the
      intended action
    aliases:
    - Notice Unused
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:NoticeUnused
    - dpv_owl:NoticeUnused
    annotations:
      skos_in_scheme: notice-classes

