  Risk:
    is_a: RiskConcept
    class_uri: dpv:Risk
    description: |-
      A risk or possibility or uncertainty of negative effects, impacts, or
      consequences
    aliases:
    - Risk
    comments:
    - |-
      Risks can be associated with one or more different concepts such as
      purpose, processing, personal data, technical or organisational measure
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:Risk
    - dpv_owl:Risk
    annotations:
      skos_in_scheme: risk-classes

  RiskAssessment:
    is_a: Assessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:RiskAssessment
    description: Assessment involving identification, analysis, and evaluation 
      of risk
    aliases:
    - Risk Assessment
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:RiskAssessment
    - dpv_owl:RiskAssessment
    annotations:
      skos_in_scheme: risk-classes

    close_mappings:
    - iso27001:RiskAssessment
    - iso42001:AIRiskAssessment
    related_mappings:
    - nist_ai_rmf:Function
    - nist_csf_v2:CSFCategory
  RiskConcept:
    is_a: DpvThing
    class_uri: dpv:RiskConcept
    description: |-
      Parent concept for combining concepts associated with risk assessment
      such as actual and potential Risk, Risk Source, Consequences, and
      Impacts
    aliases:
    - Risk Concept
    comments:
    - |-
      RiskConcept is a generic concept used for creation of specific
      taxonomies in the RISK extension to provide guidance on how a concept
      can potentially be a risk, risk source, consequence, and impact. It is
      not intended to be used directly and is only created for organisation of
      concepts in DPV vocabularies
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:RiskConcept
    - dpv_owl:RiskConcept
    annotations:
      skos_in_scheme: risk-classes

  RiskLevel:
    is_a: DpvThing
    class_uri: dpv:RiskLevel
    description: |-
      The magnitude of a risk expressed as an indication to aid in its
      management
    aliases:
    - Risk Level
    comments:
    - |-
      Risk Levels can be defined as a combination of different
      characteristics. For example, ISO 31073:2022 defines it as a combination
      of consequences and their likelihood. Another example would be the Risk
      Matrix where Risk Level is defined as a combination of Likelihood and
      Severity associated with the Risk.
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:RiskLevel
    - dpv_owl:RiskLevel
    annotations:
      skos_in_scheme: risk-classes

  RiskMitigationMeasure:
    is_a: TechnicalOrganisationalMeasure
    class_uri: dpv:RiskMitigationMeasure
    description: Measures intended to mitigate, minimise, or prevent risk.
    aliases:
    - Risk Mitigation Measure
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:RiskMitigationMeasure
    - dpv_owl:RiskMitigationMeasure
    annotations:
      skos_in_scheme: risk-classes

    close_mappings:
    - iso27001:RiskTreatmentOption
    - iso29100:PrivacySafeguardingRequirement
    - iso42001:AIRiskTreatmentPlan
    - oscal:Control
    related_mappings:
    - nist_ai_rmf:Function
    - nist_csf_v2:CSFSubcategory
  SecurityAssessment:
    is_a: RiskAssessment
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:SecurityAssessment
    description: |-
      Assessment of security intended to identify gaps, vulnerabilities,
      risks, and effectiveness of controls
    aliases:
    - Security Assessment
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:SecurityAssessment
    - dpv_owl:SecurityAssessment
    annotations:
      skos_in_scheme: risk-classes

  SecurityIncidentNotice:
    is_a: Notice
    mixins:
    - OrganisationalMeasure
    class_uri: dpv:SecurityIncidentNotice
    description: A notice providing information about security incident(s)
    aliases:
    - Security Incident Notice
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:SecurityIncidentNotice
    - dpv_owl:SecurityIncidentNotice
    annotations:
      skos_in_scheme: notice-classes, organisational-measures-classes

  SensitivityLevel:
    is_a: Severity
    class_uri: dpv:SensitivityLevel
    description: |-
      Sensitivity' reflects the risk of impact if not secured or utilised with
      appropriate measures and controls e.g. for sensitive data
    aliases:
    - Sensitivity Level
    comments:
    - |-
      ISO/IEC TS 38505-3:2021 defines 'data sensitivity' as the potential harm
      of unauthorised disclosure. DPV's use of the concept goes beyond
      disclosure as it refers to the level of safeguards or controls the data
      requires as a reflection of its 'sensitive' nature. To indicate
      quantified levels of sensitivity, e.g. "high sensitivity", instances of
      severity can be directly used or specialised
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:SensitivityLevel
    - dpv_owl:SensitivityLevel
    annotations:
      skos_in_scheme: risk-classes

  Severity:
    is_a: DpvThing
    class_uri: dpv:Severity
    description: |-
      The magnitude of being unwanted or having negative effects such as
      harmful impacts
    aliases:
    - Severity
    comments:
    - Severity can be associated with Risk, or its Consequences and Impacts
    in_subset:
    - risk_notice_subset
    exact_mappings:
    - dpv_upstream:Severity
    - dpv_owl:Severity
    annotations:
      skos_in_scheme: risk-classes
