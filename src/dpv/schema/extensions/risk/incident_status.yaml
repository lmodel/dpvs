id: https://w3id.org/lmodel/dpv/risk/incident_status
name: dpv_risk_incident_status
title: DPV - Risk / Incident Status
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `risk/modules/incident_status-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/risk
  - https://w3c.github.io/dpv/2.3/risk/
source: https://w3id.org/dpv/risk/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: risk
  dpv_submodule: incident_status
  source_ttl: upstream-releases/dpv/risk/modules/incident_status-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/risk/modules/incident_status.ttl
  upstream_owl_namespace: https://w3id.org/dpv/risk/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/risk#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  risk: https://w3id.org/lmodel/dpv/risk/
  dpv_risk: https://w3id.org/dpv/risk#
  dpv_risk_owl: https://w3id.org/dpv/risk/owl#

default_prefix: risk
default_range: string
id_prefixes:
  - risk
  - dpv_risk
  - dpv_risk_owl

imports:
  - linkml:types
  - dpv:schema/dpv_common
  - dpv:schema/extensions/risk

subsets:

  risk_incident_status_subset:
    description: Entities from the DPV `risk/modules/incident_status` submodule.

classes:

  IncidentConcluded:
    is_a: IncidentStatus
    class_uri: risk:IncidentConcluded
    description: |-
      The incident has stopped or finished or concluded without any active
      mitigation and with a low likelihood of resuming or recurring
    aliases:
      - Incident Concluded
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentConcluded
      - dpv_risk_owl:IncidentConcluded
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentConcluded
      dpv_extension_slug: risk

  IncidentHalted:
    is_a: IncidentStatus
    class_uri: risk:IncidentHalted
    description: |-
      The incident has halted or paused with a high likelihood of resuming or
      recurring
    aliases:
      - Incident Halted
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentHalted
      - dpv_risk_owl:IncidentHalted
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentHalted
      dpv_extension_slug: risk

  IncidentInvestigationCompleted:
    is_a: IncidentInvestigationStatus
    class_uri: risk:IncidentInvestigationCompleted
    description: |-
      Status indicating the investigation has been completed and findings are
      available
    aliases:
      - Incident Investigation Completed
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentInvestigationCompleted
      - dpv_risk_owl:IncidentInvestigationCompleted
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentInvestigationCompleted
      dpv_extension_slug: risk

  IncidentInvestigationNotStarted:
    is_a: IncidentInvestigationStatus
    class_uri: risk:IncidentInvestigationNotStarted
    description: Status indicating the investigation has not yet been started
    aliases:
      - Incident Investigation Not Started
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentInvestigationNotStarted
      - dpv_risk_owl:IncidentInvestigationNotStarted
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentInvestigationNotStarted
      dpv_extension_slug: risk

  IncidentInvestigationOngoing:
    is_a: IncidentInvestigationStatus
    class_uri: risk:IncidentInvestigationOngoing
    description: Status indicating the investigation is ongoing
    aliases:
      - Incident Investigation Ongoing
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentInvestigationOngoing
      - dpv_risk_owl:IncidentInvestigationOngoing
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentInvestigationOngoing
      dpv_extension_slug: risk

  IncidentInvestigationPreliminary:
    is_a: IncidentInvestigationStatus
    class_uri: risk:IncidentInvestigationPreliminary
    description: |-
      Status indicating the investigation is at a preliminary stage with
      limited findings
    aliases:
      - Incident Investigation Preliminary
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentInvestigationPreliminary
      - dpv_risk_owl:IncidentInvestigationPreliminary
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentInvestigationPreliminary
      dpv_extension_slug: risk

  IncidentInvestigationStatus:
    is_a: Status
    class_uri: risk:IncidentInvestigationStatus
    description: Status associated with investigation of an incident
    aliases:
      - Incident Investigation Status
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentInvestigationStatus
      - dpv_risk_owl:IncidentInvestigationStatus
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentInvestigationStatus
      dpv_extension_slug: risk

  IncidentMitigated:
    is_a: IncidentStatus
    class_uri: risk:IncidentMitigated
    description: |-
      The incident has been mitigated against future recurrences i.e. a
      measure has been applied to prevent the same or similar incident from
      recurring
    aliases:
      - Incident Mitigated
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentMitigated
      - dpv_risk_owl:IncidentMitigated
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentMitigated
      dpv_extension_slug: risk

  IncidentNearMiss:
    is_a: IncidentStatus
    class_uri: risk:IncidentNearMiss
    description: |-
      The state where an incident was almost successful in taking place i.e.
      "it came very close"
    aliases:
      - Incident Near Miss
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentNearMiss
      - dpv_risk_owl:IncidentNearMiss
    related_mappings:
      - iso42001:AIIncident
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentNearMiss
      dpv_extension_slug: risk

  IncidentOngoing:
    is_a: IncidentStatus
    class_uri: risk:IncidentOngoing
    description: The incident is ongoing i.e. still active
    aliases:
      - Incident Ongoing
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentOngoing
      - dpv_risk_owl:IncidentOngoing
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentOngoing
      dpv_extension_slug: risk

  IncidentStatus:
    is_a: Status
    class_uri: risk:IncidentStatus
    description: Status associated with an incident
    aliases:
      - Incident Status
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentStatus
      - dpv_risk_owl:IncidentStatus
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentStatus
      dpv_extension_slug: risk

  IncidentStatusUnknown:
    is_a: IncidentStatus
    class_uri: risk:IncidentStatusUnknown
    description: The status of a incident is unknown
    aliases:
      - Incident Status Unknown
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentStatusUnknown
      - dpv_risk_owl:IncidentStatusUnknown
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentStatusUnknown
      dpv_extension_slug: risk

  IncidentSuspected:
    is_a: IncidentStatus
    class_uri: risk:IncidentSuspected
    description: |-
      The state where a incident is suspected, but has not yet been confirmed.
      This can be due to lack of information, or because the process of
      detection and investigation is still ongoing
    aliases:
      - Incident Suspected
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentSuspected
      - dpv_risk_owl:IncidentSuspected
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentSuspected
      dpv_extension_slug: risk

  IncidentTerminated:
    is_a: IncidentStatus
    class_uri: risk:IncidentTerminated
    description: |-
      The incident has been stopped or terminated through the use of a
      mitigation or deterrent measure with a low likelihood of resuming or
      recurring
    aliases:
      - Incident Terminated
    in_subset:
      - risk_incident_status_subset
    exact_mappings:
      - dpv_risk:IncidentTerminated
      - dpv_risk_owl:IncidentTerminated
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#IncidentTerminated
      dpv_extension_slug: risk
