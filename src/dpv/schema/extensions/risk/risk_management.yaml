classes:

  RiskAcceptance:
    is_a: RiskManagement
    class_uri: risk:RiskAcceptance
    description: Entity decision to accept or enable a particular risk
    aliases:
      - Risk Acceptance
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskAcceptance
      - dpv_risk_owl:RiskAcceptance
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskAcceptance
      dpv_extension_slug: risk

  RiskAnalysis:
    is_a: RiskAssessment
    class_uri: risk:RiskAnalysis
    description: |-
      A technique or method used to analyse and identify risk levels, sources,
      likelihoods, severities, and other necessary information required to
      conduct risk management procedures
    aliases:
      - Risk Analysis
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskAnalysis
      - dpv_risk_owl:RiskAnalysis
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskAnalysis
      dpv_extension_slug: risk

  RiskAssessment:
    is_a: RiskManagement
    class_uri: risk:RiskAssessment
    description: |-
      Assessment of risk involving its identification, analysis, and
      evaluation
    aliases:
      - Risk Assessment
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskAssessment
      - dpv_risk_owl:RiskAssessment
    annotations:
      dct_source: ISO 31073:2022 Risk management vocabulary
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskAssessment
      dpv_extension_slug: risk

  RiskCriteria:
    is_a: RiskManagement
    class_uri: risk:RiskCriteria
    description: Criteria for determining or evaluating significance of risk
    aliases:
      - Risk Criteria
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskCriteria
      - dpv_risk_owl:RiskCriteria
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskCriteria
      dpv_extension_slug: risk

  RiskEvaluation:
    is_a: RiskAssessment
    class_uri: risk:RiskEvaluation
    description: |-
      Process determining acceptability or tolerance of risk by comparing risk
      analysis outcomes against risk criteria
    aliases:
      - Risk Evaluation
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskEvaluation
      - dpv_risk_owl:RiskEvaluation
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskEvaluation
      dpv_extension_slug: risk

  RiskIdentification:
    is_a: RiskAssessment
    class_uri: risk:RiskIdentification
    description: |-
      Identification of risks involving identification of risk sources,
      potential incidents, their causes, and their potential consequences
    aliases:
      - Risk Identification
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskIdentification
      - dpv_risk_owl:RiskIdentification
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskIdentification
      dpv_extension_slug: risk

  RiskManagement:
    class_uri: risk:RiskManagement
    description: |-
      Systematic application of management policies, procedures, and practices
      for communicating, consulting, establishing context, and identifying,
      analysing, evaluating, treating, monitoring and reviewing risk. ISO
      31000 definition: coordinated activities to direct and control an
      organization with regard to risk
    aliases:
      - Risk Management
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskManagement
      - dpv_risk_owl:RiskManagement
    annotations:
      dct_source: ISO 31073:2022 Risk management vocabulary
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskManagement
      dpv_extension_slug: risk

  RiskMatrix:
    is_a: RiskAnalysis
    class_uri: risk:RiskMatrix
    description: |-
      Compares individual risks by selecting a consequence/ likelihood pair
      and displaying them on a matrix with consequence on one axis and
      likelihood on the other.
    aliases:
      - Risk Matrix
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskMatrix
      - dpv_risk_owl:RiskMatrix
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskMatrix
      dpv_extension_slug: risk

  RiskOwner:
    is_a: RiskManagement
    class_uri: risk:RiskOwner
    description: Entity accountable for managing risk
    aliases:
      - Risk Owner
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskOwner
      - dpv_risk_owl:RiskOwner
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskOwner
      dpv_extension_slug: risk

  RiskPerception:
    is_a: RiskManagement
    class_uri: risk:RiskPerception
    description: Perception or view on risk
    aliases:
      - Risk Perception
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskPerception
      - dpv_risk_owl:RiskPerception
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskPerception
      dpv_extension_slug: risk

  RiskSource:
    is_a: RiskIdentification
    class_uri: risk:RiskSource
    description: |-
      The 'cause' or 'source', which by itself or with another source has the
      potential to give rise to risk
    aliases:
      - Risk Source
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskSource
      - dpv_risk_owl:RiskSource
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskSource
      dpv_extension_slug: risk

  RiskTreatment:
    is_a: RiskManagement
    class_uri: risk:RiskTreatment
    description: Process by which risk is modified and mitigated
    aliases:
      - Risk Treatment
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:RiskTreatment
      - dpv_risk_owl:RiskTreatment
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RiskTreatment
      dpv_extension_slug: risk

  Threat:
    is_a: RiskIdentification
    class_uri: risk:Threat
    description: Risk source event which causes Risk
    aliases:
      - Threat
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:Threat
      - dpv_risk_owl:Threat
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#Threat
      dpv_extension_slug: risk

  ThreatSource:
    is_a: RiskIdentification
    class_uri: risk:ThreatSource
    description: Source of threat event, including both agent and non-agent sources
    aliases:
      - Threat Source
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:ThreatSource
      - dpv_risk_owl:ThreatSource
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#ThreatSource
      dpv_extension_slug: risk

  Vulnerability:
    is_a: RiskIdentification
    class_uri: risk:Vulnerability
    description: |-
      Intrinsic property of a system or asset that is utilised by the Threat
      Source in a Threat event to cause Risk
    aliases:
      - Vulnerability
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:Vulnerability
      - dpv_risk_owl:Vulnerability
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#Vulnerability
      dpv_extension_slug: risk
