    multivalued: true
    in_subset:
      - risk_risk_management_subset
    exact_mappings:
      - dpv_risk:causedByThreat
      - dpv_risk_owl:causedByThreat
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#causedByThreat
      dpv_extension_slug: risk

  caused_by_vulnerability:
    definition_uri: risk:causedByVulnerability
