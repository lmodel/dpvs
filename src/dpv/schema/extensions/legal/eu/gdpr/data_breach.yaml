      - dpv_legal_eu_gdpr_owl:DataBreach
    close_mappings:
      - iso27701:PrivacyIncident
    annotations:
      dct_source: GDPR Article 4(12)
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#DataBreach
      dpv_extension_slug: legal/eu/gdpr

