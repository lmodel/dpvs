  DataBreach:
    is_a: Incident
    class_uri: legal_eu_gdpr:DataBreach
    description: |-
      Data Breach' or ‘Personal Data Breach’ means a breach of security
      leading to the accidental or unlawful destruction, loss, alteration,
      unauthorised disclosure of, or access to, personal data transmitted,
      stored or otherwise processed
    aliases:
      - Data Breach
    comments:
      - |-
        GDPR's notion of data breach includes any incident that affects the
        confidentiality, integrity, and availability of personal data and its
        processing without distinguishing between internal or external actors
        involved in the incident
    in_subset:
      - legal_eu_gdpr_data_breach_subset
    exact_mappings:
