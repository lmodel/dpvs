  JustificationA33BreachedDataIneffective:
    is_a: ProcessSafeguarded
    mixins:
      - Justification
      - DataBreachJustification
    class_uri: legal_eu_gdpr:JustificationA33BreachedDataIneffective
    description: |-
      Justification that the personal data breach was not communicated to the
      data subject as the controller has implemented appropriate technical and
