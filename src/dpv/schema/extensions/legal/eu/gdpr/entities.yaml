classes:

  ConcernedSupervisoryAuthority:
    is_a: DataProtectionAuthority
    class_uri: legal_eu_gdpr:ConcernedSupervisoryAuthority
    description: |-
      Concerned Supervisory Authority' or 'supervisory authority concerned’
      means a supervisory authority which is concerned by the processing of
      personal data because: (a) the controller or processor is established on
      the territory of the Member State of that supervisory authority; (b)
      data subjects residing in the Member State of that supervisory authority
      are substantially affected or likely to be substantially affected by the
      processing; or (c) a complaint has been lodged with that supervisory
      authority
    aliases:
      - Concerned Supervisory Authority
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:ConcernedSupervisoryAuthority
      - dpv_legal_eu_gdpr_owl:ConcernedSupervisoryAuthority
    annotations:
      dct_source: |2-
         Guidelines 3/2018 on the territorial scope of the GDPR (Article 3)
        Version 2.1
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#ConcernedSupervisoryAuthority
      dpv_extension_slug: legal/eu/gdpr

  DataProtectionAuthority:
    class_uri: legal_eu_gdpr:DataProtectionAuthority
    description: |-
      ‘Supervisory Authority’ or 'Data Protection Authority' means an
      independent public authority which is established by a Member State
      pursuant to Article 51
    aliases:
      - Data Protection Authority
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:DataProtectionAuthority
      - dpv_legal_eu_gdpr_owl:DataProtectionAuthority
    close_mappings:
      - iso27701:SupervisoryAuthority
    annotations:
      dct_source: |2-
         Guidelines 3/2018 on the territorial scope of the GDPR (Article 3)
        Version 2.1
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#DataProtectionAuthority
      dpv_extension_slug: legal/eu/gdpr

  DataSubject:
    class_uri: legal_eu_gdpr:DataSubject
    description: |-
      Data Subject' means a natural person who can be identified, directly or
      indirectly, in particular by reference to an identifier such as a name,
      an identification number, location data, an online identifier or to one
      or more factors specific to the physical, physiological, genetic,
      mental, economic, cultural or social identity of that natural person
    aliases:
      - Data Subject
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:DataSubject
      - dpv_legal_eu_gdpr_owl:DataSubject
    close_mappings:
      - iso27701:PIIPrincipal
    annotations:
      dct_source: GDPR Art.4-1
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#DataSubject
      dpv_extension_slug: legal/eu/gdpr

  Establishment:
    is_a: DpvOrganisation
    class_uri: legal_eu_gdpr:Establishment
    description: |-
      Establishment is a Legal Entity which implies the effective and real
      exercise of activities through stable arrangements (with a presumed
      parent or primary establishment)
    aliases:
      - Establishment
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Establishment
      - dpv_legal_eu_gdpr_owl:Establishment
    annotations:
      dct_source: ' GDPR Art.56'
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Establishment
      dpv_extension_slug: legal/eu/gdpr

  InternationalOrganisation:
    class_uri: legal_eu_gdpr:InternationalOrganisation
    description: |-
      ‘International Organisation’ means an organisation and its subordinate
      bodies governed by public international law, or any other body which is
      set up by, or on the basis of, an agreement between two or more
      countries
    aliases:
      - International Organisation
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:InternationalOrganisation
      - dpv_legal_eu_gdpr_owl:InternationalOrganisation
    annotations:
      dct_source: GDPR Art.4-26
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#InternationalOrganisation
      dpv_extension_slug: legal/eu/gdpr

  LeadSupervisoryAuthority:
    is_a: DataProtectionAuthority
    class_uri: legal_eu_gdpr:LeadSupervisoryAuthority
    description: |-
      Authority with the primary responsibility for dealing with a
      cross-border data processing activity
    aliases:
      - Lead Supervisory Authority
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:LeadSupervisoryAuthority
      - dpv_legal_eu_gdpr_owl:LeadSupervisoryAuthority
    annotations:
      dct_source: |2-
         Guidelines 3/2018 on the territorial scope of the GDPR (Article 3)
        Version 2.1
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#LeadSupervisoryAuthority
      dpv_extension_slug: legal/eu/gdpr

  LegalEuGdprController:
    is_a: DataController
    class_uri: legal_eu_gdpr:Controller
    description: |-
      ‘Controller’ means the natural or legal person, public authority, agency
      or other body which, alone or jointly with others, determines the
      purposes and means of the processing of personal data; where the
      purposes and means of such processing are determined by Union or Member
      State law, the controller or the specific criteria for its nomination
      may be provided for by Union or Member State law
    aliases:
      - Controller
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Controller
      - dpv_legal_eu_gdpr_owl:Controller
    annotations:
      dct_source: GDPR Art.4-7
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Controller
      dpv_extension_slug: legal/eu/gdpr

  LegalEuGdprProcessor:
    is_a: DataProcessor
    class_uri: legal_eu_gdpr:Processor
    description: |-
      ‘Processor’ means a natural or legal person, public authority, agency or
      other body which processes personal data on behalf of the controller
    aliases:
      - Processor
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Processor
      - dpv_legal_eu_gdpr_owl:Processor
    annotations:
      dct_source: GDPR Art.4-8
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Processor
      dpv_extension_slug: legal/eu/gdpr

  LegalEuGdprRecipient:
    is_a: DpvRecipient
    class_uri: legal_eu_gdpr:Recipient
    description: |-
      ‘Recipient’ means a natural or legal person, public authority, agency or
      another body, to which the personal data are disclosed, whether a third
      party or not
    aliases:
      - Recipient
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Recipient
      - dpv_legal_eu_gdpr_owl:Recipient
    annotations:
      dct_source: GDPR Art.4-9
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Recipient
      dpv_extension_slug: legal/eu/gdpr

  LocalSupervisoryAuthority:
    is_a: DataProtectionAuthority
    class_uri: legal_eu_gdpr:LocalSupervisoryAuthority
    description: |-
      Authority associated with the main or local establishment of an
      organisation
    aliases:
      - Local Supervisory Authority
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:LocalSupervisoryAuthority
      - dpv_legal_eu_gdpr_owl:LocalSupervisoryAuthority
    annotations:
      dct_source: |2-
         Guidelines 3/2018 on the territorial scope of the GDPR (Article 3)
        Version 2.1
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#LocalSupervisoryAuthority
      dpv_extension_slug: legal/eu/gdpr

  MainEstablishment:
    is_a: Establishment
    class_uri: legal_eu_gdpr:MainEstablishment
    description: |-
      Main Establishment' means as regards a controller with establishments in
      more than one Member State, the place of its central administration in
      the Union, unless the decisions on the purposes and means of the
      processing of personal data are taken in another establishment of the
      controller in the Union and the latter establishment has the power to
      have such decisions implemented, in which case the establishment having
      taken such decisions is to be considered to be the main establishment;
      as regards a processor with establishments in more than one Member
      State, the place of its central administration in the Union, or, if the
      processor has no central administration in the Union, the establishment
      of the processor in the Union where the main processing activities in
      the context of the activities of an establishment of the processor take
      place to the extent that the processor is subject to specific
      obligations under this Regulation;
    aliases:
      - Main Establishment
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:MainEstablishment
      - dpv_legal_eu_gdpr_owl:MainEstablishment
    annotations:
      dct_source: ' GDPR Art.56'
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#MainEstablishment
      dpv_extension_slug: legal/eu/gdpr

  Representative:
    class_uri: legal_eu_gdpr:Representative
    description: |-
      Representative’ means a natural or legal person established in the Union
      who, designated by the controller or processor in writing pursuant to
      Article 27, represents the controller or processor with regard to their
      respective obligations under this Regulation
    aliases:
      - Representative
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Representative
      - dpv_legal_eu_gdpr_owl:Representative
    annotations:
      dct_source: GDPR Art.4-17
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Representative
      dpv_extension_slug: legal/eu/gdpr

  SingleEstablishment:
    is_a: Establishment
    class_uri: legal_eu_gdpr:SingleEstablishment
    description: A legal entity that is established in only one Member State
    aliases:
      - Single Establishment
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:SingleEstablishment
      - dpv_legal_eu_gdpr_owl:SingleEstablishment
    annotations:
      dct_source: GDPR Art.23
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#SingleEstablishment
      dpv_extension_slug: legal/eu/gdpr

  ThirdParty:
    class_uri: legal_eu_gdpr:ThirdParty
    description: |-
      ‘Third Party’ means a natural or legal person, public authority, agency
      or body other than the data subject, controller, processor and persons
      who, under the direct authority of the controller or processor, are
      authorised to process personal data
    aliases:
      - Third Party
    in_subset:
      - legal_eu_gdpr_entities_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:ThirdParty
      - dpv_legal_eu_gdpr_owl:ThirdParty
    close_mappings:
      - iso27701:ThirdParty
    annotations:
      dct_source: GDPR Art.4-10
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#ThirdParty
      dpv_extension_slug: legal/eu/gdpr
