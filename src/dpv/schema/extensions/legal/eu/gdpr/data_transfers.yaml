imports:
  - linkml:types
  - dpv:schema/dpv_common
  - dpv:schema/dpv_legal_basis
  - dpv:schema/extensions/legal/eu/gdpr

subsets:

  legal_eu_gdpr_data_transfers_subset:
    description: |-
      Entities from the DPV `legal/eu/gdpr/modules/data_transfers` submodule.

classes:

  AdHocContractualClauses:
    is_a: DataTransferTool
    mixins:
      - OrganisationalMeasure
      - Contract
    class_uri: legal_eu_gdpr:AdHocContractualClauses
    description: |-
      Contractual Clauses not drafted by the EU Commission, e.g. by the
      Controller
    aliases:
      - AdHoc Contractual Clauses
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:AdHocContractualClauses
      - dpv_legal_eu_gdpr_owl:AdHocContractualClauses
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#AdHocContractualClauses
      dpv_extension_slug: legal/eu/gdpr

  BindingCorporateRules:
    is_a: DataTransferTool
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_gdpr:BindingCorporateRules
    description: |-
      ‘Binding Corporate Rules’ means personal data protection policies which
      are adhered to by a controller or processor established on the territory
      of a Member State for transfers or a set of transfers of personal data
      to a controller or processor in one or more third countries within a
      group of undertakings, or group of enterprises engaged in a joint
      economic activity
    aliases:
      - Binding Corporate Rules (BCR)
    comments:
      - |-
        Binding corporate rules (BCR) are data protection policies adhered to by
        companies established in the EU for transfers of personal data outside
        the EU within a group of undertakings or enterprises.
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:BindingCorporateRules
      - dpv_legal_eu_gdpr_owl:BindingCorporateRules
    close_mappings:
      - iso27701:Clause_7_5_1
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#BindingCorporateRules
      dpv_extension_slug: legal/eu/gdpr

  CertificationMechanismsForDataTransfers:
    is_a: DataTransferTool
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_gdpr:CertificationMechanismsForDataTransfers
    description: |-
      Certification and its binding or specified mechanisms intended to
      provide sufficient safeguards for data transfers
    aliases:
      - Certification Mechanisms for Data Transfers
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:CertificationMechanismsForDataTransfers
      - dpv_legal_eu_gdpr_owl:CertificationMechanismsForDataTransfers
    annotations:
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/gdpr/owl#CertificationMechanismsForDataTransfers
      dpv_extension_slug: legal/eu/gdpr

  CodesOfConductForDataTransfers:
    is_a: DataTransferTool
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_gdpr:CodesOfConductForDataTransfers
    description: |-
      Codes of Conduct that outline sufficient safeguards for carrying out
      data transfers
    aliases:
      - Codes of Conduct for Data Transfers
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:CodesOfConductForDataTransfers
      - dpv_legal_eu_gdpr_owl:CodesOfConductForDataTransfers
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#CodesOfConductForDataTransfers
      dpv_extension_slug: legal/eu/gdpr

  DataTransferTool:
    is_a: OrganisationalMeasure
    class_uri: legal_eu_gdpr:DataTransferTool
    description: |-
      A legal instrument or tool intended to assist or justify data transfers
    aliases:
      - Data Transfer Tool
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:DataTransferTool
      - dpv_legal_eu_gdpr_owl:DataTransferTool
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#DataTransferTool
      dpv_extension_slug: legal/eu/gdpr

  SCCByCommission:
    is_a: DataTransferTool
    mixins:
      - OrganisationalMeasure
      - StandardContractualClauses
    class_uri: legal_eu_gdpr:SCCByCommission
    description: |-
      Standard contractual clauses adopted by the Commission in accordance
      with the examination procedure referred to in GDPR Article 93(2)
    aliases:
      - SCCs adopted by Commission
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:SCCByCommission
      - dpv_legal_eu_gdpr_owl:SCCByCommission
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#SCCByCommission
      dpv_extension_slug: legal/eu/gdpr

  SCCBySupervisoryAuthority:
    is_a: DataTransferTool
    mixins:
      - OrganisationalMeasure
      - StandardContractualClauses
    class_uri: legal_eu_gdpr:SCCBySupervisoryAuthority
    description: |-
      Standard data protection clauses adopted by a supervisory authority and
      approved by the Commission pursuant to the examination procedure
      referred to in GDPR Article 93(2)
    aliases:
      - SCCs adopted by Supervisory Authority
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:SCCBySupervisoryAuthority
      - dpv_legal_eu_gdpr_owl:SCCBySupervisoryAuthority
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#SCCBySupervisoryAuthority
      dpv_extension_slug: legal/eu/gdpr

  StandardContractualClauses:
    is_a: DataTransferTool
    mixins:
      - OrganisationalMeasure
      - Contract
    class_uri: legal_eu_gdpr:StandardContractualClauses
    description: |-
      Standard Contractual Clauses (SCCs) are pre-approved clauses by the EU
      for ensuring appropriate data protection safeguards intended for data
      transfers from the EU to third countries
    aliases:
      - Standard Contractual Clauses (SCC)
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:StandardContractualClauses
      - dpv_legal_eu_gdpr_owl:StandardContractualClauses
    close_mappings:
      - iso27701:Clause_7_5_2
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#StandardContractualClauses
      dpv_extension_slug: legal/eu/gdpr

  SupplementaryMeasure:
    is_a: DataTransferTool
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_gdpr:SupplementaryMeasure
    description: |-
      Supplementary measures are intended to additionally provide safeguards
      or guarantees to bring the resulting protection in line with EU
      requirements
    aliases:
      - Supplementary Measure
    in_subset:
      - legal_eu_gdpr_data_transfers_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:SupplementaryMeasure
      - dpv_legal_eu_gdpr_owl:SupplementaryMeasure
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#SupplementaryMeasure
      dpv_extension_slug: legal/eu/gdpr
