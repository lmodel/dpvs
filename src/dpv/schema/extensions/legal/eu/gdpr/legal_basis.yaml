classes:

  A61a:
    is_a: Consent
    mixins:
      - LegalBasis
      - ExpressedConsent
    class_uri: legal_eu_gdpr:A6-1-a
    description: |-
      Legal basis based on data subject's given consent to the processing of
      his or her personal data for one or more specific purposes
    aliases:
      - A6-1-a
      - Art.6(1-a) consent
    comments:
      - |-
        Consent can be explicit or non-explicit. To express these specifically,
        see the explicit and non-explicit variations provided for Art.6-1a.
    in_subset:
      - legal_eu_gdpr_legal_basis_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:A6-1-a
      - dpv_legal_eu_gdpr_owl:A6-1-a
    close_mappings:
      - iso27701:Clause_7_2_3
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#A6-1-a
      dpv_extension_slug: legal/eu/gdpr

  A61aexplicitconsent:
    is_a: A61a
    mixins:
      - LegalBasis
      - Consent
      - ExplicitlyExpressedConsent
    class_uri: legal_eu_gdpr:A6-1-a-explicit-consent
    description: |-
      Legal basis based on data subject's given explicit consent to the
      processing of his or her personal data for one or more specific purposes
    aliases:
      - A6-1-a-explicit-consent
      - Art 6(1-a) explicit consent
    comments:
      - |-
        Valid consent in this case would have requirements for being 'explicit'
        in addition to requirements defined by A4-11. This is also mentioned in
        the Article 29 Working Party document "Guidelines on Consent under
        Regulation 2016/679 (wp259rev.01)"
    in_subset:
      - legal_eu_gdpr_legal_basis_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:A6-1-a-explicit-consent
      - dpv_legal_eu_gdpr_owl:A6-1-a-explicit-consent
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#A6-1-a-explicit-consent
      dpv_extension_slug: legal/eu/gdpr

  A61anonexplicitconsent:
    is_a: A61a
    mixins:
      - LegalBasis
      - Consent
      - ExpressedConsent
    class_uri: legal_eu_gdpr:A6-1-a-non-explicit-consent
    description: |-
      Legal basis based on data subject's given non-explicit express consent
      to the processing of his or her personal data for one or more specific
      purposes
    aliases:
      - A6-1-a-non-explicit-consent
      - Art.6(1-a) regular consent
    comments:
      - |-
        Definition of consent: A data subject's unambiguous/clear affirmative
        action that signifies an agreement to process their personal data (Rigo
        Wenning) . What is referred to as 'non-explicit consent' here is also
        termed as 'regular' consent in the Article 29 Working Party document
        "Guidelines on Consent under Regulation 2016/679 (wp259rev.01)". This is
        the legal basis that requires consent but not at the level of being
        'explicit'.
    in_subset:
      - legal_eu_gdpr_legal_basis_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:A6-1-a-non-explicit-consent
      - dpv_legal_eu_gdpr_owl:A6-1-a-non-explicit-consent
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#A6-1-a-non-explicit-consent
      dpv_extension_slug: legal/eu/gdpr

