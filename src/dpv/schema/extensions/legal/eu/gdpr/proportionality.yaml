default_prefix: legal_eu_gdpr
default_range: string
id_prefixes:
  - legal_eu_gdpr
  - dpv_legal_eu_gdpr
  - dpv_legal_eu_gdpr_owl

imports:
  - linkml:types
  - dpv:schema/dpv_common
  - dpv:schema/dpv_personal_data
  - dpv:schema/dpv_risk_notice
  - dpv:schema/extensions/legal/eu/gdpr

subsets:

  legal_eu_gdpr_proportionality_subset:
    description: |-
      Entities from the DPV `legal/eu/gdpr/modules/proportionality` submodule.

classes:

  BalancingTest:
    is_a: ProportionalityAssessment
    mixins:
      - OrganisationalMeasure
      - Assessment
    class_uri: legal_eu_gdpr:BalancingTest
    description: |-
      An assessment of whether the individual's interests override the
      interests of the controller
    aliases:
      - Balancing Test
    comments:
      - |-
        While Balancing Test can be conducted on its own, it is an integral part
        of the Proportionality Assessment process
    in_subset:
      - legal_eu_gdpr_proportionality_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:BalancingTest
      - dpv_legal_eu_gdpr_owl:BalancingTest
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#BalancingTest
      dpv_extension_slug: legal/eu/gdpr

  Disproportionate:
    is_a: ProportionalityStatus
    class_uri: legal_eu_gdpr:Disproportionate
    description: |-
      Status representing the activity or context is disproportionate i.e. it
      is not proportionate
    aliases:
      - Disproportionate
    comments:
      - |-
        A Disproportinate status indicates that the process should not be
        continued as it risks impacting the rights of the data subject in an
        unacceptable manner
    in_subset:
      - legal_eu_gdpr_proportionality_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Disproportionate
      - dpv_legal_eu_gdpr_owl:Disproportionate
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Disproportionate
      dpv_extension_slug: legal/eu/gdpr

  NecessityAssessment:
    is_a: ProportionalityAssessment
    mixins:
      - OrganisationalMeasure
      - Assessment
    class_uri: legal_eu_gdpr:NecessityAssessment
    description: |-
      An assessment of whether the processing of personal data is necessary to
      achieve the stated aims, where necessary indicates a lack of other means
      which could have been used instead
    aliases:
      - Necessity Assessment
    comments:
      - |-
        While Necessity can be assessed on its own, it is an integral part of
        the Proportionality Assessment process
    in_subset:
      - legal_eu_gdpr_proportionality_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:NecessityAssessment
      - dpv_legal_eu_gdpr_owl:NecessityAssessment
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#NecessityAssessment
      dpv_extension_slug: legal/eu/gdpr

  ProportionalityAssessment:
    is_a: ImpactAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_gdpr:ProportionalityAssessment
    description: |-
      Proportionality is a general principle of EU law, which when applied for
      the GDPR requires striking a balance between the processing of personal
      data and the resulting impacts on rights. More simply, the processing
      should not result in a disproportionate impact on rights
    aliases:
      - Proportionality Assessment
    comments:
      - |-
        The assessment of proportionality requires an assessment of suitability
        (represented by `eu-gdpr:SuitabilityAssessment`), necessity (represented
        by `eu-gdpr:NecessityAssessment`), and a balancing test (represented by
        `eu-gdpr:BalancingTest`). The outcome of the proportionality assessment
        is represented as an instance of `eu-gdpr:ProportionalityStatus`
    in_subset:
      - legal_eu_gdpr_proportionality_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:ProportionalityAssessment
      - dpv_legal_eu_gdpr_owl:ProportionalityAssessment
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#ProportionalityAssessment
      dpv_extension_slug: legal/eu/gdpr

  ProportionalityStatus:
    is_a: Status
    class_uri: legal_eu_gdpr:ProportionalityStatus
    description: |-
      Status indicating whether the specific activity or context is
      proportionate
    aliases:
      - Proportionality Status
    in_subset:
      - legal_eu_gdpr_proportionality_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:ProportionalityStatus
      - dpv_legal_eu_gdpr_owl:ProportionalityStatus
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#ProportionalityStatus
      dpv_extension_slug: legal/eu/gdpr

  Proportionate:
    is_a: ProportionalityStatus
    class_uri: legal_eu_gdpr:Proportionate
    description: Status representing the activity or context is proportionate
    aliases:
      - Proportionate
    in_subset:
      - legal_eu_gdpr_proportionality_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Proportionate
      - dpv_legal_eu_gdpr_owl:Proportionate
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Proportionate
      dpv_extension_slug: legal/eu/gdpr

  SuitabilityAssessment:
    is_a: ProportionalityAssessment
    mixins:
      - OrganisationalMeasure
      - Assessment
    class_uri: legal_eu_gdpr:SuitabilityAssessment
    description: |-
      An assessment of whether the processing of personal data is suitable to
      achieve the stated aims
    aliases:
      - Suitability Assessment
    comments:
      - |-
        While Suitability Assessment can be carried out on its own, it is an
        integral part of the Proportionality Assessment process
    in_subset:
      - legal_eu_gdpr_proportionality_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:SuitabilityAssessment
      - dpv_legal_eu_gdpr_owl:SuitabilityAssessment
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#SuitabilityAssessment
      dpv_extension_slug: legal/eu/gdpr
