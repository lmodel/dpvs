    description: Entities from the DPV `legal/eu/gdpr/modules/misc_concepts` submodule.

classes:

  BiometricData:
    is_a: Biometric
    mixins:
      - PersonalData
    class_uri: legal_eu_gdpr:BiometricData
    description: |-
      ‘Biometric Data’ means personal data resulting from specific technical
      processing relating to the physical, physiological or behavioural
      characteristics of a natural person, which allow or confirm the unique
      identification of that natural person, such as facial images or
      dactyloscopic data
    aliases:
      - Biometric Data
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:BiometricData
      - dpv_legal_eu_gdpr_owl:BiometricData
    narrow_mappings:
      - iso27701:PII
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#BiometricData
      dpv_extension_slug: legal/eu/gdpr

  CrossBorderProcessing:
    is_a: Processing
    class_uri: legal_eu_gdpr:CrossBorderProcessing
    description: |-
      ‘Cross-Border Processing’ means either: (a) processing of personal data
      which takes place in the context of the activities of establishments in
      more than one Member State of a controller or processor in the Union
      where the controller or processor is established in more than one Member
      State; or (b) processing of personal data which takes place in the
      context of the activities of a single establishment of a controller or
      processor in the Union but which substantially affects or is likely to
      substantially affect data subjects in more than one Member State
    aliases:
      - Cross Border Processing
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:CrossBorderProcessing
      - dpv_legal_eu_gdpr_owl:CrossBorderProcessing
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#CrossBorderProcessing
      dpv_extension_slug: legal/eu/gdpr

  GeneticData:
    is_a: Genetic
    mixins:
      - PersonalData
    class_uri: legal_eu_gdpr:GeneticData
    description: |-
      ‘Genetic Data’ means personal data relating to the inherited or acquired
      genetic characteristics of a natural person which give unique
      information about the physiology or the health of that natural person
      and which result, in particular, from an analysis of a biological sample
      from the natural person in question
    aliases:
      - Genetic Data
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:GeneticData
      - dpv_legal_eu_gdpr_owl:GeneticData
    narrow_mappings:
      - iso27701:PII
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#GeneticData
      dpv_extension_slug: legal/eu/gdpr

  HealthData:
    is_a: MedicalHealth
    mixins:
      - PersonalData
    class_uri: legal_eu_gdpr:HealthData
    description: |-
      Health Data' or 'data concerning health’ means personal data related to
      the physical or mental health of a natural person, including the
      provision of health care services, which reveal information about his or
      her health status
    aliases:
      - Health Data
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:HealthData
      - dpv_legal_eu_gdpr_owl:HealthData
    narrow_mappings:
      - iso27701:PII
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#HealthData
      dpv_extension_slug: legal/eu/gdpr

  InformationSocietyService:
    is_a: DpvService
    class_uri: legal_eu_gdpr:InformationSocietyService
    description: |-
      Information Society Service’ means a service as defined in point (b) of
      Article 1(1) of Directive (EU) 2015/1535 of the European Parliament and
      of the Council
    aliases:
      - Information Society Service
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:InformationSocietyService
      - dpv_legal_eu_gdpr_owl:InformationSocietyService
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#InformationSocietyService
      dpv_extension_slug: legal/eu/gdpr

  PersonalData:
    class_uri: legal_eu_gdpr:PersonalData
    description: |-
      Personal Data' means any information relating to an identified or
      identifiable natural person (‘Data Subject’)
    aliases:
      - Personal Data
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:PersonalData
      - dpv_legal_eu_gdpr_owl:PersonalData
      - iso27701:PII
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#PersonalData
      dpv_extension_slug: legal/eu/gdpr

  Processing:
    class_uri: legal_eu_gdpr:Processing
    description: |-
      ‘Processing’ means any operation or set of operations which is performed
      on personal data or on sets of personal data, whether or not by
      automated means, such as collection, recording, organisation,
      structuring, storage, adaptation or alteration, retrieval, consultation,
      use, disclosure by transmission, dissemination or otherwise making
      available, alignment or combination, restriction, erasure or destruction
    aliases:
      - Processing
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Processing
      - dpv_legal_eu_gdpr_owl:Processing
      - iso27701:Processing
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Processing
      dpv_extension_slug: legal/eu/gdpr

  Profiling:
    mixins:
      - Processing
    class_uri: legal_eu_gdpr:Profiling
    description: |-
      ‘Profiling’ means any form of automated processing of personal data
      consisting of the use of personal data to evaluate certain personal
      aspects relating to a natural person, in particular to analyse or
      predict aspects concerning that natural person’s performance at work,
      economic situation, health, personal preferences, interests,
      reliability, behaviour, location or movements
    aliases:
      - Profiling
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Profiling
      - dpv_legal_eu_gdpr_owl:Profiling
    related_mappings:
      - iso27701:Processing
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Profiling
      dpv_extension_slug: legal/eu/gdpr

  Pseudonymisation:
    mixins:
      - TechnicalMeasure
    class_uri: legal_eu_gdpr:Pseudonymisation
    description: |-
      Pseudonymisation’ means the processing of personal data in such a manner
      that the personal data can no longer be attributed to a specific data
      subject without the use of additional information, provided that such
      additional information is kept separately and is subject to technical
      and organisational measures to ensure that the personal data are not
      attributed to an identified or identifiable natural person
    aliases:
      - Pseudonymisation
    in_subset:
      - legal_eu_gdpr_misc_concepts_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:Pseudonymisation
      - dpv_legal_eu_gdpr_owl:Pseudonymisation
    close_mappings:
      - iso27701:Pseudonymization
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#Pseudonymisation
      dpv_extension_slug: legal/eu/gdpr
