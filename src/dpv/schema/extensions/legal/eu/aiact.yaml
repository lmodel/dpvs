  legal_eu_aiact_capability_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/capability` submodule.

  legal_eu_aiact_compliance_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/compliance` submodule.

  legal_eu_aiact_data_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/data` submodule.

  legal_eu_aiact_docs_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/docs` submodule.

  legal_eu_aiact_highrisk-systems_subset:
    description: |-
      Entities from the DPV `legal/eu/aiact/modules/highrisk-systems`
      submodule.

  legal_eu_aiact_misc_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/misc` submodule.

  legal_eu_aiact_prohibited-systems_subset:
    description: |-
      Entities from the DPV `legal/eu/aiact/modules/prohibited-systems`
      submodule.

  legal_eu_aiact_risk_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/risk` submodule.

  legal_eu_aiact_risk_levels_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/risk_levels` submodule.

  legal_eu_aiact_roles_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/roles` submodule.

  legal_eu_aiact_sector_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/sector` submodule.

  legal_eu_aiact_status_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/status` submodule.

  legal_eu_aiact_system_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/system` submodule.

slots:

  has_change_category:
    is_a: has_context
    definition_uri: legal_eu_aiact:hasChangeCategory
    description: Associates the category of change to the AI
    aliases:
      - has change category
    multivalued: true
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:hasChangeCategory
      - dpv_legal_eu_aiact_owl:hasChangeCategory
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#hasChangeCategory
      dpv_extension_slug: legal/eu/aiact

  has_change_description:
    is_a: has_context
    definition_uri: legal_eu_aiact:hasChangeDescription
    description: Associates the change description to AI
    aliases:
      - has change description
    multivalued: true
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:hasChangeDescription
      - dpv_legal_eu_aiact_owl:hasChangeDescription
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#hasChangeDescription
      dpv_extension_slug: legal/eu/aiact

  has_risk_level:
    definition_uri: legal_eu_aiact:hasRiskLevel
    description: Indicates the risk level of the AI system under the AI Act
    aliases:
      - has risk level
    multivalued: true
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:hasRiskLevel
      - dpv_legal_eu_aiact_owl:hasRiskLevel
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#hasRiskLevel
      dpv_extension_slug: legal/eu/aiact

classes:

  AIActComplianceUnknown:
    is_a: AIActLawfulness
    mixins:
      - Lawfulness
    class_uri: legal_eu_aiact:AIActComplianceUnknown
    description: State where lawfulness or compliance with AI Act is unknown
    aliases:
      - AI Act Compliance Unknown
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIActComplianceUnknown
      - dpv_legal_eu_aiact_owl:AIActComplianceUnknown
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIActComplianceUnknown
      dpv_extension_slug: legal/eu/aiact

  AIActCompliant:
    is_a: AIActLawfulness
    mixins:
      - Lawfulness
    class_uri: legal_eu_aiact:AIActCompliant
    description: State of being lawful or legally compliant for AI Act
    aliases:
      - AI Act Compliant
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIActCompliant
      - dpv_legal_eu_aiact_owl:AIActCompliant
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIActCompliant
      dpv_extension_slug: legal/eu/aiact

  AIActLawfulness:
    is_a: Lawfulness
    class_uri: legal_eu_aiact:AIActLawfulness
    description: |-
      Status or state associated with being lawful or legally compliant
      regarding AI Act
    aliases:
      - AI Act Lawfulness
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIActLawfulness
      - dpv_legal_eu_aiact_owl:AIActLawfulness
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIActLawfulness
      dpv_extension_slug: legal/eu/aiact

  AIActNonCompliant:
    is_a: AIActLawfulness
    mixins:
      - Lawfulness
    class_uri: legal_eu_aiact:AIActNonCompliant
    description: State of being unlawful or legally non-compliant for AI Act
    aliases:
      - AI Act Non-compliant
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIActNonCompliant
      - dpv_legal_eu_aiact_owl:AIActNonCompliant
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIActNonCompliant
      dpv_extension_slug: legal/eu/aiact

  AIDeployer:
    is_a: AIOperator
    mixins:
      - Deployer
    class_uri: legal_eu_aiact:AIDeployer
    description: |-
      A natural or legal person, public authority, agency or other body using
      an AI system under its authority except where the AI system is used in
      the course of a personal non-professional activity
    aliases:
      - AI Deployer
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIDeployer
      - dpv_legal_eu_aiact_owl:AIDeployer
    close_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: AIA (Art. 3(4))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIDeployer
      dpv_extension_slug: legal/eu/aiact

  AIDistributor:
    is_a: AIOperator
    mixins:
      - Distributor
    class_uri: legal_eu_aiact:AIDistributor
    description: |-
      A natural or legal person in the supply chain, other than the provider
      or the importer, that makes an AI system available on the Union market
    aliases:
      - AI Distributor
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIDistributor
      - dpv_legal_eu_aiact_owl:AIDistributor
    related_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: AIA (Art. 3(7))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIDistributor
      dpv_extension_slug: legal/eu/aiact

  AIImporter:
    is_a: AIOperator
    mixins:
      - Importer
    class_uri: legal_eu_aiact:AIImporter
    description: |-
      A natural or legal person located or established in the Union that
      places on the market an AI system that bears the name or trademark of a
      natural or legal person established in a third country
    aliases:
      - AI Importer
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIImporter
      - dpv_legal_eu_aiact_owl:AIImporter
    related_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: AIA (Art. 3(6))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIImporter
      dpv_extension_slug: legal/eu/aiact

  AILiteracy:
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:AILiteracy
    description: |-
      Skills, knowledge and understanding that allow providers, deployers and
      affected persons, taking into account their respective rights and
      obligations in the context of this Regulation, to make an informed
      deployment of AI systems, as well as to gain awareness about the
      opportunities and risks of AI and possible harm it can cause
    aliases:
      - AI Literacy
    comments:
      - |-
        AI Literacy should take into account the subject's level of technical
        knowledge, experience, education and training -- these can be
        represented through the corresponding concepts in the PD extension
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AILiteracy
      - dpv_legal_eu_aiact_owl:AILiteracy
    related_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: AIA (Art. 3(56))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AILiteracy
      dpv_extension_slug: legal/eu/aiact

  AIOffice:
    is_a: DpvAuthority
    class_uri: legal_eu_aiact:AIOffice
    description: |-
      the Commission’s function of contributing to the implementation,
      monitoring and supervision of AI systems and general-purpose AI models,
      and AI governance, provided for in Commission Decision of 24 January
      2024; references in the AI Act to the AI Office shall be construed as
      references to the Commission
    aliases:
      - Artificial Intelligence Office
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIOffice
      - dpv_legal_eu_aiact_owl:AIOffice
    related_mappings:
      - iso42001:AIManagementSystem
    annotations:
      dct_source: AIA(Art. 3(47))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIOffice
      dpv_extension_slug: legal/eu/aiact

  AIOperator:
    is_a: DpvOperator
    class_uri: legal_eu_aiact:AIOperator
    description: |-
      A provider, product manufacturer, deployer, authorised representative,
      importer or distributor
    aliases:
      - AI Operator
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIOperator
      - dpv_legal_eu_aiact_owl:AIOperator
    close_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: AIA (Art. 3(8))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIOperator
      dpv_extension_slug: legal/eu/aiact

  AIProductManufacturer:
    is_a: AIOperator
    mixins:
      - Manufacturer
    class_uri: legal_eu_aiact:AIProductManufacturer
    description: Entity that manufactures an AI Product
    aliases:
      - AI Product Manufacturer
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIProductManufacturer
      - dpv_legal_eu_aiact_owl:AIProductManufacturer
    related_mappings:
      - iso42001:AIReferenceControl
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIProductManufacturer
      dpv_extension_slug: legal/eu/aiact

  AIProvider:
    is_a: AIOperator
    mixins:
      - DpvProvider
    class_uri: legal_eu_aiact:AIProvider
    description: |-
      A natural or legal person, public authority, agency or other body that
      develops an AI system or a general-purpose AI model or that has an AI
      system or a general-purpose AI model developed and places it on the
      market or puts the AI system into service under its own name or
      trademark, whether for payment or free of charge
    aliases:
      - AI Provider
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIProvider
      - dpv_legal_eu_aiact_owl:AIProvider
    close_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: AIA (Art. 3(3))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIProvider
      dpv_extension_slug: legal/eu/aiact

  AIRegulatorySandbox:
    is_a: RegulatorySandbox
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:AIRegulatorySandbox
    description: |-
      A controlled framework set up by a competent authority which offers
      providers or prospective providers of AI systems the possibility to
      develop, train, validate and test, where appropriate in real-world
      conditions, an innovative AI system, pursuant to a sandbox plan for a
      limited time under regulatory supervision
    aliases:
      - AI Regulatory Sandbox
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIRegulatorySandbox
      - dpv_legal_eu_aiact_owl:AIRegulatorySandbox
    related_mappings:
      - iso42001:AIManagementSystem
    annotations:
      dct_source: AIA (Art. 3(55))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIRegulatorySandbox
      dpv_extension_slug: legal/eu/aiact

  AISystem:
    class_uri: legal_eu_aiact:AISystem
    description: |-
      A machine-based system designed to operate with varying levels of
      autonomy and that may exhibit adaptiveness after deployment and that,
      for explicit or implicit objectives, infers, from the input it receives,
      how to generate outputs such as predictions, content, recommendations,
      or decisions that can influence physical or virtual environments.
    aliases:
      - AI System
    comments:
      - |-
        Note All references to the AI Act referred to the provisional agreement
        published in Feb 2024
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AISystem
      - dpv_legal_eu_aiact_owl:AISystem
      - iso42001:AISystem
    annotations:
      dct_source: AIA (Art. 3(1))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AISystem
      dpv_extension_slug: legal/eu/aiact

  AISystemPerformance:
    class_uri: legal_eu_aiact:AISystemPerformance
    description: The ability of an AI system to achieve its intended purpose
    aliases:
      - AI System Performance
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AISystemPerformance
      - dpv_legal_eu_aiact_owl:AISystemPerformance
    close_mappings:
      - iso42001:AISystem
    annotations:
      dct_source: AIA(Art. 3(18))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AISystemPerformance
      dpv_extension_slug: legal/eu/aiact

  AsylumSector:
    is_a: Sector
    class_uri: legal_eu_aiact:AsylumSector
    description: Sector related to asylum management
    aliases:
      - Asylum Sector
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AsylumSector
      - dpv_legal_eu_aiact_owl:AsylumSector
    annotations:
      dct_source: ' Annex III'
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AsylumSector
      dpv_extension_slug: legal/eu/aiact

  AuthorisedRepresentative:
    is_a: AIOperator
    mixins:
      - Representative
    class_uri: legal_eu_aiact:AuthorisedRepresentative
    description: |-
      A natural or legal person located or established in the Union who has
      received and accepted a written mandate from a provider of an AI system
      or a general-purpose AI model to, respectively, perform and carry out on
      its behalf the obligations and procedures established by the AI Act
    aliases:
      - Authorised Representative
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AuthorisedRepresentative
      - dpv_legal_eu_aiact_owl:AuthorisedRepresentative
    related_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: AIA (Art. 3(5))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AuthorisedRepresentative
      dpv_extension_slug: legal/eu/aiact

  AvailableOnEUMarket:
    is_a: AvailableOnMarket
    mixins:
      - MarketAvailabilityStatus
    class_uri: legal_eu_aiact:AvailableOnEUMarket
    description: |-
      Status associated with supply of an AI system or a general purpose AI
      model for distribution or use on the Union market in the course of a
      commercial activity, whether in return for payment or free of charge
    aliases:
      - Available on EU Market
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AvailableOnEUMarket
      - dpv_legal_eu_aiact_owl:AvailableOnEUMarket
    annotations:
      dct_source: AIA (Art. 3(10))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AvailableOnEUMarket
      dpv_extension_slug: legal/eu/aiact

  AvailableOnMarket:
    is_a: MarketAvailabilityStatus
    class_uri: legal_eu_aiact:AvailableOnMarket
    description: |-
      Status associated with supply of an AI system or a general purpose AI
      model for distribution or use on the market in the course of a
      commercial activity, whether in return for payment or free of charge
    aliases:
      - Available on Market
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AvailableOnMarket
      - dpv_legal_eu_aiact_owl:AvailableOnMarket
    annotations:
      dct_source: AIA (Art. 3(10))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AvailableOnMarket
      dpv_extension_slug: legal/eu/aiact

  AvailableOnNonEUMarket:
    is_a: AvailableOnMarket
    mixins:
      - MarketAvailabilityStatus
    class_uri: legal_eu_aiact:AvailableOnNonEUMarket
    description: |-
      Status associated with supply of an AI system or a general purpose AI
      model for distribution or use on any market except the Union market in
      the course of a commercial activity, whether in return for payment or
      free of charge
    aliases:
      - Available on Non-EU Market
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AvailableOnNonEUMarket
      - dpv_legal_eu_aiact_owl:AvailableOnNonEUMarket
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AvailableOnNonEUMarket
      dpv_extension_slug: legal/eu/aiact

  BiometricCategorisation:
    mixins:
      - Capability
    class_uri: legal_eu_aiact:BiometricCategorisation
    description: |-
      Capability where assigning natural persons to specific categories
      happens on the basis of their biometric data unless ancillary to another
      commercial service and strictly necessary for objective technical
      reasons
    aliases:
      - Biometric Categorisation
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:BiometricCategorisation
      - dpv_legal_eu_aiact_owl:BiometricCategorisation
    annotations:
      dct_source: AIA Art. 3(40)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#BiometricCategorisation
      dpv_extension_slug: legal/eu/aiact

  BiometricCategorisationSystem:
    is_a: AISystem
    class_uri: legal_eu_aiact:BiometricCategorisationSystem
    description: |-
      An AI system for the purpose of assigning natural persons to specific
      categories on the basis of their biometric data, unless it is ancillary
      to another commercial service and strictly necessary for objective
      technical reasons
    aliases:
