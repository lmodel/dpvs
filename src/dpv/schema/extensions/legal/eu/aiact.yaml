      dct_source: AIA(Art.5)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ProhibitedAISystem
      dpv_extension_slug: legal/eu/aiact

  ProhibitedAISystemA51a:
    is_a: ProhibitedAISystem
    class_uri: legal_eu_aiact:ProhibitedAISystem-A5-1-a
    description: |-
      Prohibited AI system according to Article 5(1a) of the AI Act,
      indicating an AI system that deploys subliminal techniques beyond a
      person’s consciousness or purposefully manipulative or deceptive
      techniques, with the objective, or the effect of materially distorting
      the behaviour of a person or a group of persons by appreciably impairing
      their ability to make an informed decision, thereby causing them to take
      a decision that they would not have otherwise taken in a manner that
      causes or is reasonably likely to cause that person, another person or
      group of persons significant harm.
    aliases:
      - ProhibitedAISystem-A5-1-a
      - Prohibited AI System - Article 5(1a)
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ProhibitedAISystem-A5-1-a
      - dpv_legal_eu_aiact_owl:ProhibitedAISystem-A5-1-a
    annotations:
      dct_source: AIA(Art.5(1a))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ProhibitedAISystem-A5-1-a
      dpv_extension_slug: legal/eu/aiact

  ProhibitedAISystemA51b:
    is_a: ProhibitedAISystem
    class_uri: legal_eu_aiact:ProhibitedAISystem-A5-1-b
    description: |-
      Prohibited AI system according to Article 5(1b) of the AI Act,
      indicating an AI system that exploits any of the vulnerabilities of a
      natural person or a specific group of persons due to their age,
      disability or a specific social or economic situation, with the
      objective, or the effect, of materially distorting the behaviour of that
      person or a person belonging to that group in a manner that causes or is
      reasonably likely to cause that person or another person significant
      harm.
    aliases:
      - ProhibitedAISystem-A5-1-b
      - Prohibited AI System - Article 5(1b)
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ProhibitedAISystem-A5-1-b
      - dpv_legal_eu_aiact_owl:ProhibitedAISystem-A5-1-b
    annotations:
      dct_source: AIA(Art.5(1b))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ProhibitedAISystem-A5-1-b
      dpv_extension_slug: legal/eu/aiact

  ProhibitedAISystemA51c:
    is_a: ProhibitedAISystem
    class_uri: legal_eu_aiact:ProhibitedAISystem-A5-1-c
    description: |-
      Prohibited AI system according to Article 5(1c) of the AI Act,
      indicating AI systems that evaluate or classify of natural persons or
      groups of persons over a certain period of time based on their social
      behaviour or known, inferred or predicted personal or personality
      characteristics, with the social score leading to either or both of the
      following:  (i) detrimental or unfavourable treatment of certain natural
      persons or groups of persons in social contexts that are unrelated to
      the contexts in which the data was originally generated or collected;
      (ii) detrimental or unfavourable treatment of certain natural persons or
      groups of persons that is unjustified or disproportionate to their
      social behaviour or its gravity;
    aliases:
      - ProhibitedAISystem-A5-1-c
      - Prohibited AI System - Article 5(1c)
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ProhibitedAISystem-A5-1-c
      - dpv_legal_eu_aiact_owl:ProhibitedAISystem-A5-1-c
    annotations:
      dct_source: AIA(Art.5(1c))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ProhibitedAISystem-A5-1-c
      dpv_extension_slug: legal/eu/aiact

  ProhibitedAISystemA51d:
    is_a: ProhibitedAISystem
    class_uri: legal_eu_aiact:ProhibitedAISystem-A5-1-d
    description: |-
      Prohibited AI system according to Article 5(1d) of the AI Act,
      indicating AI system used for making risk assessments of natural persons
      in order to assess or predict the risk of a natural person committing a
      criminal offence, based solely on the profiling of a natural person or
      on assessing their personality traits and characteristics; this
      prohibition shall not apply to AI systems used to support the human
      assessment of the involvement of a person in a criminal activity, which
      is already based on objective and verifiable facts directly linked to a
      criminal activity
    aliases:
      - ProhibitedAISystem-A5-1-d
      - Prohibited AI System -  Article 5(1d)
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ProhibitedAISystem-A5-1-d
      - dpv_legal_eu_aiact_owl:ProhibitedAISystem-A5-1-d
    annotations:
      dct_source: AIA(Art.5(1d))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ProhibitedAISystem-A5-1-d
      dpv_extension_slug: legal/eu/aiact

  ProhibitedAISystemA51e:
    is_a: ProhibitedAISystem
    class_uri: legal_eu_aiact:ProhibitedAISystem-A5-1-e
    description: |-
      Prohibited AI system according to Article 5(1e) of the AI Act,
      indicating AI systems that create or expand facial recognition databases
      through the untargeted scraping of facial images from the internet or
      CCTV footage
    aliases:
      - ProhibitedAISystem-A5-1-e
      - Prohibited AI System - Article 5(1e)
    in_subset:
      - legal_eu_aiact_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ProhibitedAISystem-A5-1-e
      - dpv_legal_eu_aiact_owl:ProhibitedAISystem-A5-1-e
    annotations:
