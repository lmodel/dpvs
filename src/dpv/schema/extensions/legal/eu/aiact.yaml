id: https://w3id.org/lmodel/dpv/legal/eu/aiact
name: dpv_legal_eu_aiact
title: DPV - Legal - Eu - Aiact
description: |-
  LinkML schema generated from the DPV 2.3 extension `legal/eu/aiact`
  (`eu-aiact-owl.ttl`), enriched with canonical SKOS metadata. Imports the
  aggregate core schema `dpv:schema/dpv_core` for the abstract parent
  classes this extension specialises.
