default_prefix: legal_eu_ehds
default_range: string
id_prefixes:
- legal_eu_ehds
- dpv_legal_eu_ehds
- dpv_legal_eu_ehds_owl

imports:
- linkml:types
- dpv:schema/dpv_common
- dpv:schema/dpv_entities
- dpv:schema/dpv_personal_data
- dpv:schema/dpv_processing
- dpv:schema/dpv_rights
- dpv:schema/extensions/sector/health

subsets:

  legal_eu_ehds_subset:
    description: All entities from the DPV `legal/eu/ehds` extension.

  legal_eu_ehds_TOM_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/TOM` submodule.

  legal_eu_ehds_data_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/data` submodule.

  legal_eu_ehds_entities_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/entities` 
      submodule.

  legal_eu_ehds_process_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/process` 
      submodule.

  legal_eu_ehds_purposes_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/purposes` 
      submodule.

  legal_eu_ehds_rights_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/rights` submodule.

  legal_eu_ehds_technology_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/technology` 
      submodule.

classes:

  A10:
    is_a: Right
    class_uri: legal_eu_ehds:A10
    description: |-
      Right of natural persons to opt out from the access to their personal
      electronic health data registered in an EHR system through the
      electronic health data access services
    aliases:
    - A10 Right of natural persons to opt out from primary use
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A10
    - dpv_legal_eu_ehds_owl:A10
    annotations:
      dct_source: EHDS Art.10
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A10
      dpv_extension_slug: legal/eu/ehds

  A100:
    is_a: Right
    class_uri: legal_eu_ehds:A100
    description: |-
      Right of natural and legal persons to receive compensation in accordance
      with EU and national law in case that they have suffered material or
      non-material damage as a result of an infringement of the EHDS
      Regulation
    aliases:
    - A100 Right to receive compensation
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A100
    - dpv_legal_eu_ehds_owl:A100
    annotations:
      dct_source: EHDS Art.100
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A100
      dpv_extension_slug: legal/eu/ehds

  A161:
    is_a: Right
    class_uri: legal_eu_ehds:A16-1
    description: |-
      Right of natural persons to identify themselves electronically using any
      electronic identification means which are recognised pursuant to Article
      6 of Regulation (EU) No 910/2014
    aliases:
    - A16-1
    - A16-1 Right of identification management
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A16-1
    - dpv_legal_eu_ehds_owl:A16-1
    annotations:
      dct_source: EHDS Art.16.1
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A16-1
      dpv_extension_slug: legal/eu/ehds

  A3:
    is_a: Right
    class_uri: legal_eu_ehds:A3
    description: |-
      Right of natural persons to access personal electronic health data
      relating to them that belong to the priority categories referred to in
      Article 14 and are processed for the provision of healthcare through the
      electronic health data access services referred to in Article 4
    aliases:
    - |-
      A3 Right of natural persons to access their personal electronic health
      data
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A3
    - dpv_legal_eu_ehds_owl:A3
    annotations:
      dct_source: EHDS Art.3
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A3
      dpv_extension_slug: legal/eu/ehds

  A5:
    is_a: Right
    class_uri: legal_eu_ehds:A5
    description: |-
      Right of natural persons to insert information in their EHR through
      electronic health data access services or applications linked to those
      services
    aliases:
    - A5 Right of natural persons to insert information in their own EHR
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A5
    - dpv_legal_eu_ehds_owl:A5
    annotations:
      dct_source: EHDS Art.5
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A5
      dpv_extension_slug: legal/eu/ehds

  A6:
    is_a: Right
    class_uri: legal_eu_ehds:A6
    description: |-
      Right of natural persons to request online the rectification of their
      personal electronic health data
    aliases:
    - A6 Right of natural persons to rectification
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A6
    - dpv_legal_eu_ehds_owl:A6
    annotations:
      dct_source: EHDS Art.6
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A6
      dpv_extension_slug: legal/eu/ehds

  A6811:
    is_a: Right
    class_uri: legal_eu_ehds:A68-11
    description: |-
      Right of health data users to access and process the electronic health
      data in a secure processing environment in accordance with the data
      permit issued to them
    aliases:
    - A68-11
    - A68-11 Right to process in a secure processing environment
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A68-11
    - dpv_legal_eu_ehds_owl:A68-11
    annotations:
      dct_source: EHDS Art.68.11
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A68-11
      dpv_extension_slug: legal/eu/ehds

  A7:
    is_a: Right
    class_uri: legal_eu_ehds:A7
    description: |-
      Right of natural persons to give access to, or to request a healthcare
      provider to transmit, all or part of their personal electronic health
      data to another healthcare provider of their choice
    aliases:
    - A7 Right to data portability for natural persons
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A7
    - dpv_legal_eu_ehds_owl:A7
    annotations:
      dct_source: EHDS Art.7
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A7
      dpv_extension_slug: legal/eu/ehds

  A71:
    is_a: Right
    class_uri: legal_eu_ehds:A71
    description: |-
      Right of natural persons to opt out at any time, and without providing
      any reason, from the processing of personal electronic health data
      relating to them for secondary use
    aliases:
    - A71 Right of natural persons to opt out from secondary use
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A71
    - dpv_legal_eu_ehds_owl:A71
    annotations:
      dct_source: EHDS Art.71
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A71
      dpv_extension_slug: legal/eu/ehds

  A8:
    is_a: Right
    class_uri: legal_eu_ehds:A8
    description: |-
      Right of natural persons to restrict the access of health professionals
      and healthcare providers to all or parts of their personal electronic
      health data
    aliases:
    - A8 Right to restrict access
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A8
    - dpv_legal_eu_ehds_owl:A8
    annotations:
      dct_source: EHDS Art.8
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A8
      dpv_extension_slug: legal/eu/ehds

  A9:
    is_a: Right
    class_uri: legal_eu_ehds:A9
    description: |-
      Right of natural persons to obtain information, including through
      automatic notifications, on any access to their personal electronic
      health data through the health professional access service obtained in
      the context of healthcare
    aliases:
    - A9 Right to obtain information on accessing data
    in_subset:
    - legal_eu_ehds_rights_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:A9
    - dpv_legal_eu_ehds_owl:A9
    annotations:
      dct_source: EHDS Art.9
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#A9
      dpv_extension_slug: legal/eu/ehds

  DataPermit:
    is_a: Policy
    mixins:
    - OrganisationalMeasure
    class_uri: legal_eu_ehds:DataPermit
    description: |-
      Permit issued by health data access bodies to health data applicants
      regarding health data access applications
    aliases:
    - Data Permit
    in_subset:
    - legal_eu_ehds_process_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:DataPermit
    - dpv_legal_eu_ehds_owl:DataPermit
    annotations:
      dct_source: EHDS Art.68
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#DataPermit
      dpv_extension_slug: legal/eu/ehds

    close_mappings:
    - iso27701:Clause_7_2_2
  DigitalHealthAuthorityActivityReport:
    is_a: RecordsOfActivities
    mixins:
    - OrganisationalMeasure
    class_uri: legal_eu_ehds:DigitalHealthAuthorityActivityReport
    description: |-
      Document containing an overview of activities reported by a digital
      health authority
    aliases:
    - Digital Health Authority Activity Report
    in_subset:
    - legal_eu_ehds_TOM_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:DigitalHealthAuthorityActivityReport
    - dpv_legal_eu_ehds_owl:DigitalHealthAuthorityActivityReport
    annotations:
      dct_source: EHDS Art.20
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/ehds/owl#DigitalHealthAuthorityActivityReport
      dpv_extension_slug: legal/eu/ehds

    close_mappings:
    - iso27701:Clause_7_2_8
  EHDSBoard:
    is_a: SupraNationalAuthority
    mixins:
    - LegalEntity
    class_uri: legal_eu_ehds:EHDSBoard
    description: |-
      An authority tasked with facilitating the cooperation and the exchange
      of information among Member States and the Commission for primary and
      secondary use
    aliases:
    - European Health Data Space Board
    in_subset:
    - legal_eu_ehds_entities_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:EHDSBoard
    - dpv_legal_eu_ehds_owl:EHDSBoard
    annotations:
      dct_source: EHDS Art.92
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#EHDSBoard
      dpv_extension_slug: legal/eu/ehds

    related_mappings:
    - iso27701:SupervisoryAuthority
  EHR:
    mixins:
    - PersonalData
    class_uri: legal_eu_ehds:EHR
    description: |-
      Electronic health record (EHR) means a collection of electronic health
      data related to a natural person and collected in the health system,
      processed for the purpose of the provision of healthcare
    aliases:
    - Electronic Health Record (EHR)
    comments:
    - |-
      This concept represents the EHR itself with EHRData referring to data
      within it
    in_subset:
    - legal_eu_ehds_data_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:EHR
    - dpv_legal_eu_ehds_owl:EHR
    annotations:
      dct_source: EHDS Art.2.2(j)
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#EHR
      dpv_extension_slug: legal/eu/ehds

    related_mappings:
    - iso27701:PII
  EHRSystemInformationSheet:
    is_a: OrganisationalMeasure
    class_uri: legal_eu_ehds:EHRSystemInformationSheet
    description: |-
      Technical documentation with information related to the EHR system,
      including its manufacturer, intended purpose and supported standards
    aliases:
    - EHR System Information Sheet
    in_subset:
    - legal_eu_ehds_TOM_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:EHRSystemInformationSheet
    - dpv_legal_eu_ehds_owl:EHRSystemInformationSheet
    annotations:
      dct_source: EHDS Art.38
      upstream_iri: 
        https://w3id.org/dpv/legal/eu/ehds/owl#EHRSystemInformationSheet
      dpv_extension_slug: legal/eu/ehds

    close_mappings:
    - iso27701:Clause_7_3_2
  EHRSystemTechnicalDocumentation:
    is_a: OrganisationalMeasure
    class_uri: legal_eu_ehds:EHRSystemTechnicalDocumentation
    description: |-
      Technical documentation that demonstrates that the EHR system
      manufacturers comply with the requirements laid down in Annex II
    aliases:
    - EHR System Technical Documentation
    in_subset:
    - legal_eu_ehds_TOM_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:EHRSystemTechnicalDocumentation
    - dpv_legal_eu_ehds_owl:EHRSystemTechnicalDocumentation
    annotations:
      dct_source: EHDS Art.37
      upstream_iri: 
        https://w3id.org/dpv/legal/eu/ehds/owl#EHRSystemTechnicalDocumentation
      dpv_extension_slug: legal/eu/ehds

    close_mappings:
    - iso27701:Clause_7_2_8
  EUDatabaseForRegistrationOfEHRSystems:
    is_a: OrganisationalMeasure
    class_uri: legal_eu_ehds:EUDatabaseForRegistrationOfEHRSystems
    description: |-
      Publicly available database established by the European Commission to
      maintain data on EHR systems for which an EU declaration of conformity
      has been issued according to EHDS Article 39
    aliases:
    - EU Database for Registration of EHR Systems
    in_subset:
    - legal_eu_ehds_TOM_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:EUDatabaseForRegistrationOfEHRSystems
    - dpv_legal_eu_ehds_owl:EUDatabaseForRegistrationOfEHRSystems
    annotations:
      dct_source: EHDS Art.49
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/ehds/owl#EUDatabaseForRegistrationOfEHRSystems
      dpv_extension_slug: legal/eu/ehds

  EUDatabaseForRegistrationOfWellnessApplications:
    is_a: OrganisationalMeasure
    class_uri: legal_eu_ehds:EUDatabaseForRegistrationOfWellnessApplications
    description: |-
      Publicly available database established by the European Commission to
      maintain data on wellness applications for which a label has been issued
      pursuant to EHDS Article 47
    aliases:
    - EU Database for Registration of Wellness Applications
    in_subset:
    - legal_eu_ehds_TOM_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:EUDatabaseForRegistrationOfWellnessApplications
    - dpv_legal_eu_ehds_owl:EUDatabaseForRegistrationOfWellnessApplications
    annotations:
      dct_source: EHDS Art.49
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/ehds/owl#EUDatabaseForRegistrationOfWellnessApplications
      dpv_extension_slug: legal/eu/ehds

  EuropeanDigitalTestingEnvironment:
    is_a: SecureProcessingEnvironment
    mixins:
    - OrganisationalMeasure
    class_uri: legal_eu_ehds:EuropeanDigitalTestingEnvironment
    description: |-
      Data processing environment for the assessment of harmonised software
      components of EHR systems
    aliases:
    - European Digital Testing Environment
    in_subset:
    - legal_eu_ehds_TOM_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:EuropeanDigitalTestingEnvironment
    - dpv_legal_eu_ehds_owl:EuropeanDigitalTestingEnvironment
    annotations:
      dct_source: EHDS Art.40
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/ehds/owl#EuropeanDigitalTestingEnvironment
      dpv_extension_slug: legal/eu/ehds

    related_mappings:
    - iso27701:Clause_6_5
  HealthDataRequest:
    is_a: Policy
    mixins:
    - OrganisationalMeasure
    class_uri: legal_eu_ehds:HealthDataRequest
    description: |-
      Request sent by health data applicants to health data access bodies,
      seeking access to statistically anonymised electronic health data for
      secondary use
    aliases:
    - Health Data Request
    in_subset:
    - legal_eu_ehds_process_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:HealthDataRequest
    - dpv_legal_eu_ehds_owl:HealthDataRequest
    annotations:
      dct_source: EHDS Art.69
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#HealthDataRequest
      dpv_extension_slug: legal/eu/ehds

    close_mappings:
