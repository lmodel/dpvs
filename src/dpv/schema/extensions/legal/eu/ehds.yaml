  HealthcareFinancingAggregatedData:
    is_a: HealthAggregatedData
    mixins:
    - AggregatedData
    class_uri: legal_eu_ehds:HealthcareFinancingAggregatedData
    description: |-
      Information about aggregated data on healthcare expenditure and
