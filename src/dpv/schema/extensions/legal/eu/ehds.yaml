id: https://w3id.org/lmodel/dpv/legal/eu/ehds
name: dpv_legal_eu_ehds
title: DPV - Legal - Eu - Ehds
description: |-
  LinkML schema generated from the DPV 2.3 extension `legal/eu/ehds`
  (`eu-ehds-owl.ttl`), enriched with canonical SKOS metadata. Imports the
  semantic-group schema(s) `dpv:schema/dpv_common`,
  `dpv:schema/dpv_entities`, `dpv:schema/dpv_personal_data`,
  `dpv:schema/dpv_processing`, `dpv:schema/dpv_rights` for the abstract
  parent classes this extension specialises (instead of the full umbrella
  `dpv:schema/dpv`).
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv/legal/eu/ehds
- https://w3c.github.io/dpv/2.3/legal/eu/ehds/
source: https://w3id.org/dpv/legal/eu/ehds/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/eu/ehds
  source_ttl: upstream-releases/dpv/legal/eu/ehds/eu-ehds-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/eu/ehds/eu-ehds.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/eu/ehds/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/eu/ehds#

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
