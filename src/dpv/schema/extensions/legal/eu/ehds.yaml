    aliases:
    - Healthcare Provision Aggregated Data
    in_subset:
    - legal_eu_ehds_data_subset
    - legal_eu_ehds_subset
    exact_mappings:
    - dpv_legal_eu_ehds:HealthcareProvisionAggregatedData
    - dpv_legal_eu_ehds_owl:HealthcareProvisionAggregatedData
    annotations:
