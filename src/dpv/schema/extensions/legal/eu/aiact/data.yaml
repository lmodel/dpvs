  ai: https://w3id.org/lmodel/dpv/ai/
  dpv_ai: https://w3id.org/dpv/ai#
  dpv_ai_owl: https://w3id.org/dpv/ai/owl#
  pd: https://w3id.org/lmodel/dpv/pd/
  dpv_pd: https://w3id.org/dpv/pd#
  dpv_pd_owl: https://w3id.org/dpv/pd/owl#

default_prefix: legal_eu_aiact
default_range: string
id_prefixes:
  - legal_eu_aiact
  - dpv_legal_eu_aiact
  - dpv_legal_eu_aiact_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/legal/eu/aiact
  - dpv:schema/extensions/ai
  - dpv:schema/extensions/pd

subsets:

  legal_eu_aiact_data_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/data` submodule.

classes:

  BiometricData:
    is_a: Biometric
    mixins:
      - PersonalData
    class_uri: legal_eu_aiact:BiometricData
    description: |-
      Personal data resulting from specific technical processing relating to
      the physical, physiological or behavioural characteristics of a natural
      person, such as facial images or dactyloscopic data
    aliases:
      - Biometric Data
    in_subset:
      - legal_eu_aiact_data_subset
    exact_mappings:
      - dpv_legal_eu_aiact:BiometricData
      - dpv_legal_eu_aiact_owl:BiometricData
    annotations:
      dct_source: AIA(Art. 3(34))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#BiometricData
      dpv_extension_slug: legal/eu/aiact

  TestingData:
    class_uri: legal_eu_aiact:TestingData
    description: |-
      Data used for providing an independent evaluation of the AI system in
      order to confirm the expected performance of that system before its
      placing on the market or putting into service
    aliases:
      - Testing Data
    in_subset:
      - legal_eu_aiact_data_subset
    exact_mappings:
      - dpv_legal_eu_aiact:TestingData
      - dpv_legal_eu_aiact_owl:TestingData
    close_mappings:
      - iso42001:DataResource
    annotations:
      dct_source: AIA (Art. 3(32))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#TestingData
      dpv_extension_slug: legal/eu/aiact

  TrainingData:
    class_uri: legal_eu_aiact:TrainingData
    description: |-
      Data used for training an AI system through fitting its learnable
      parameters
    aliases:
      - Training Data
    in_subset:
      - legal_eu_aiact_data_subset
    exact_mappings:
      - dpv_legal_eu_aiact:TrainingData
      - dpv_legal_eu_aiact_owl:TrainingData
    close_mappings:
      - iso42001:DataResource
    annotations:
      dct_source: AIA(Art. 3(29))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#TrainingData
      dpv_extension_slug: legal/eu/aiact

  ValidationData:
    class_uri: legal_eu_aiact:ValidationData
    description: |-
      Data used for providing an evaluation of the trained AI system and for
      tuning its non-learnable parameters and its learning process in order,
      inter alia, to prevent underfitting or overfitting
    aliases:
      - Validation Data
    in_subset:
      - legal_eu_aiact_data_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ValidationData
      - dpv_legal_eu_aiact_owl:ValidationData
    close_mappings:
      - iso42001:DataResource
    annotations:
      dct_source: AIA (Art. 3(30))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ValidationData
      dpv_extension_slug: legal/eu/aiact
