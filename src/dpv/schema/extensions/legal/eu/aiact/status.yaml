  has_change_description:
    is_a: has_context
    definition_uri: legal_eu_aiact:hasChangeDescription
    description: Associates the change description to AI
    aliases:
      - has change description
    multivalued: true
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:hasChangeDescription
      - dpv_legal_eu_aiact_owl:hasChangeDescription
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#hasChangeDescription
      dpv_extension_slug: legal/eu/aiact

classes:

  AvailableOnEUMarket:
    is_a: AvailableOnMarket
    mixins:
      - MarketAvailabilityStatus
    class_uri: legal_eu_aiact:AvailableOnEUMarket
    description: |-
      Status associated with supply of an AI system or a general purpose AI
      model for distribution or use on the Union market in the course of a
      commercial activity, whether in return for payment or free of charge
    aliases:
      - Available on EU Market
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AvailableOnEUMarket
      - dpv_legal_eu_aiact_owl:AvailableOnEUMarket
    annotations:
      dct_source: AIA (Art. 3(10))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AvailableOnEUMarket
      dpv_extension_slug: legal/eu/aiact

  AvailableOnMarket:
    is_a: MarketAvailabilityStatus
    class_uri: legal_eu_aiact:AvailableOnMarket
    description: |-
      Status associated with supply of an AI system or a general purpose AI
      model for distribution or use on the market in the course of a
      commercial activity, whether in return for payment or free of charge
    aliases:
      - Available on Market
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AvailableOnMarket
      - dpv_legal_eu_aiact_owl:AvailableOnMarket
    annotations:
      dct_source: AIA (Art. 3(10))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AvailableOnMarket
      dpv_extension_slug: legal/eu/aiact

  AvailableOnNonEUMarket:
    is_a: AvailableOnMarket
    mixins:
      - MarketAvailabilityStatus
    class_uri: legal_eu_aiact:AvailableOnNonEUMarket
    description: |-
      Status associated with supply of an AI system or a general purpose AI
      model for distribution or use on any market except the Union market in
      the course of a commercial activity, whether in return for payment or
      free of charge
    aliases:
      - Available on Non-EU Market
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AvailableOnNonEUMarket
      - dpv_legal_eu_aiact_owl:AvailableOnNonEUMarket
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AvailableOnNonEUMarket
      dpv_extension_slug: legal/eu/aiact

  ChangeCategory:
    is_a: Context
    class_uri: legal_eu_aiact:ChangeCategory
    description: A categorisation of the change associated with the AI system
    aliases:
      - Change Category
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ChangeCategory
      - dpv_legal_eu_aiact_owl:ChangeCategory
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ChangeCategory
      dpv_extension_slug: legal/eu/aiact

  ChangeDescription:
    is_a: Context
    class_uri: legal_eu_aiact:ChangeDescription
    description: A description of the change associated with the AI system
    aliases:
      - Change Description
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ChangeDescription
      - dpv_legal_eu_aiact_owl:ChangeDescription
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ChangeDescription
      dpv_extension_slug: legal/eu/aiact

  MarketAvailabilityStatus:
    class_uri: legal_eu_aiact:MarketAvailabilityStatus
    description: |-
      Status associated with whether the AI system or GPAI Model is available
      for distribution or use on the market in the course of a commercial
      activity
    aliases:
      - Market Availability Status
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:MarketAvailabilityStatus
      - dpv_legal_eu_aiact_owl:MarketAvailabilityStatus
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#MarketAvailabilityStatus
      dpv_extension_slug: legal/eu/aiact

  MarketPlacementStatus:
    is_a: MarketAvailabilityStatus
    class_uri: legal_eu_aiact:MarketPlacementStatus
    description: |-
      Status associated with whether the AI system or GPAI Model has been
      'first' made available on the market
    aliases:
      - Market Placement Status
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:MarketPlacementStatus
      - dpv_legal_eu_aiact_owl:MarketPlacementStatus
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#MarketPlacementStatus
      dpv_extension_slug: legal/eu/aiact

  NonpredeterminedChange:
    is_a: ChangeCategory
    class_uri: legal_eu_aiact:NonpredeterminedChange
    description: Change associated with the AI system that has not been pre-determined
    aliases:
      - Non-Predetermined Change
    comments:
      - |-
        What is considered "pre-determined" is not defined with this concept or
        within the AI Act, therefore if there are specific interpretations of
        "pre-determined", such as within a jurisdiction, sector, or for a
        particular technology, then this concept should be extended accordingly
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:NonpredeterminedChange
      - dpv_legal_eu_aiact_owl:NonpredeterminedChange
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#NonpredeterminedChange
      dpv_extension_slug: legal/eu/aiact

  NotAvailableOnMarket:
    is_a: MarketAvailabilityStatus
    class_uri: legal_eu_aiact:NotAvailableOnMarket
    description: not available on a market anywhere in EU or otherwise
    aliases:
      - Not Available on Market
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:NotAvailableOnMarket
      - dpv_legal_eu_aiact_owl:NotAvailableOnMarket
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#NotAvailableOnMarket
      dpv_extension_slug: legal/eu/aiact

  NotPutIntoService:
    is_a: ServiceSupplyStatus
    class_uri: legal_eu_aiact:NotPutIntoService
    description: Status associated with an AI system that has not been put into service
    aliases:
      - Not Put in to Service
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:NotPutIntoService
      - dpv_legal_eu_aiact_owl:NotPutIntoService
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#NotPutIntoService
      dpv_extension_slug: legal/eu/aiact

  PlacedOnEUMarket:
    is_a: PlacedOnMarket
    mixins:
      - MarketPlacementStatus
    class_uri: legal_eu_aiact:PlacedOnEUMarket
    description: |-
      Status indicating the first making available of an AI system or a
      general purpose AI model on the Union market
    aliases:
      - Placed on EU Market
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PlacedOnEUMarket
      - dpv_legal_eu_aiact_owl:PlacedOnEUMarket
    annotations:
      dct_source: AIA (Art. 3(9))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#PlacedOnEUMarket
      dpv_extension_slug: legal/eu/aiact

  PlacedOnMarket:
    is_a: MarketPlacementStatus
    class_uri: legal_eu_aiact:PlacedOnMarket
    description: |-
      Status indicating the first making available of an AI system or a
      general purpose AI model on the market
    aliases:
      - Placed on Market
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PlacedOnMarket
      - dpv_legal_eu_aiact_owl:PlacedOnMarket
    annotations:
      dct_source: AIA (Art. 3(9))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#PlacedOnMarket
      dpv_extension_slug: legal/eu/aiact

  PredeterminedChange:
    is_a: ChangeCategory
    class_uri: legal_eu_aiact:PredeterminedChange
    description: Change associated with the AI system that has been pre-determined
    aliases:
      - Predetermined Change
    comments:
      - |-
        What is considered "pre-determined" is not defined with this concept or
        within the AI Act, therefore if there are specific interpretations of
        "pre-determined", such as within a jurisdiction, sector, or for a
        particular technology, then this concept should be extended accordingly
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PredeterminedChange
      - dpv_legal_eu_aiact_owl:PredeterminedChange
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#PredeterminedChange
      dpv_extension_slug: legal/eu/aiact

  PutIntoService:
    is_a: ServiceSupplyStatus
    class_uri: legal_eu_aiact:PutIntoService
    description: |-
      Status associated with the supply of an AI system for first use directly
      to the deployer or for own use for its intended purpose
    aliases:
      - Put in to Service
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PutIntoService
      - dpv_legal_eu_aiact_owl:PutIntoService
    annotations:
      dct_source: AIA (Art. 3(11))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#PutIntoService
      dpv_extension_slug: legal/eu/aiact

  PutIntoServiceInEU:
    is_a: PutIntoService
    mixins:
      - ServiceSupplyStatus
    class_uri: legal_eu_aiact:PutIntoServiceInEU
    description: |-
      Status associated with the supply of an AI system for first use directly
      to the deployer or for own use in the Union for its intended purpose
    aliases:
      - Put in to Service In EU
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PutIntoServiceInEU
      - dpv_legal_eu_aiact_owl:PutIntoServiceInEU
    annotations:
      dct_source: AIA (Art. 3(11))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#PutIntoServiceInEU
      dpv_extension_slug: legal/eu/aiact

  RecalledFromService:
    is_a: ServiceSupplyStatus
    class_uri: legal_eu_aiact:RecalledFromService
    description: |-
      An AI system that is returned to the provider or taken out of service or
      use
    aliases:
      - Recalled from Service
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RecalledFromService
      - dpv_legal_eu_aiact_owl:RecalledFromService
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RecalledFromService
      dpv_extension_slug: legal/eu/aiact

  ServiceSupplyStatus:
    is_a: ProvisionStatus
    class_uri: legal_eu_aiact:ServiceSupplyStatus
    description: |-
      Status associated with whether the AI system has been supplied for use
      or put in to service or been recalled or withdrawn
    aliases:
      - Service Supply Status
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ServiceSupplyStatus
      - dpv_legal_eu_aiact_owl:ServiceSupplyStatus
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ServiceSupplyStatus
      dpv_extension_slug: legal/eu/aiact

  WithdrawnFromService:
    is_a: ServiceSupplyStatus
    class_uri: legal_eu_aiact:WithdrawnFromService
    description: |-
      An AI system that is prevented to be made available in the supply chain
    aliases:
      - Withdrawn from Service
    in_subset:
      - legal_eu_aiact_status_subset
    exact_mappings:
