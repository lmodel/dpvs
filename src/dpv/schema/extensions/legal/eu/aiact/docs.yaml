default_prefix: legal_eu_aiact
default_range: string
id_prefixes:
  - legal_eu_aiact
  - dpv_legal_eu_aiact
  - dpv_legal_eu_aiact_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/legal/eu/aiact
  - dpv:schema/extensions/tech

subsets:

  legal_eu_aiact_docs_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/docs` submodule.

classes:

  CommonSpecification:
    is_a: Specification
    mixins:
      - Documentation
    class_uri: legal_eu_aiact:CommonSpecification
    description: |-
      A set of technical specifications, as defined in point 4 of Article 2 of
      Regulation (EU) No 1025/2012 providing means to comply with certain
      requirements established under the AI Act
    aliases:
      - Common Specification
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:CommonSpecification
      - dpv_legal_eu_aiact_owl:CommonSpecification
    annotations:
      dct_source: AIA Art.3-28
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#CommonSpecification
      dpv_extension_slug: legal/eu/aiact

  EUDeclarationOfConformity:
    is_a: Documentation
    class_uri: legal_eu_aiact:EUDeclarationOfConformity
    description: |-
      Document providing the EU declaration of conformity, as required by the
      AI Act, Article 47
    aliases:
      - EU Declaration Of Conformity
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:EUDeclarationOfConformity
      - dpv_legal_eu_aiact_owl:EUDeclarationOfConformity
    close_mappings:
      - iso42001:AIManagementSystem
    annotations:
      dct_source: AI Act Art.47
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#EUDeclarationOfConformity
      dpv_extension_slug: legal/eu/aiact

  InstructionForUse:
    is_a: Instructions
    mixins:
      - Documentation
    class_uri: legal_eu_aiact:InstructionForUse
    description: |-
      The information provided by the provider to inform the deployer of, in
      particular, an AI system’s intended purpose and proper use
    aliases:
      - Instruction For Use
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:InstructionForUse
      - dpv_legal_eu_aiact_owl:InstructionForUse
    close_mappings:
      - iso42001:DataResource
    annotations:
      dct_source: AIA(Art.3(15))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#InstructionForUse
      dpv_extension_slug: legal/eu/aiact

  PostMarketMonitoringPlan:
    is_a: Plan
    mixins:
      - Documentation
    class_uri: legal_eu_aiact:PostMarketMonitoringPlan
    description: |-
      Description of the post-market monitoring plan, as required by the AI
      Act
    aliases:
      - Post-market Monitoring Plan
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PostMarketMonitoringPlan
      - dpv_legal_eu_aiact_owl:PostMarketMonitoringPlan
    close_mappings:
      - iso42001:AIIncident
    annotations:
      dct_source: AI Act Art.72
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#PostMarketMonitoringPlan
      dpv_extension_slug: legal/eu/aiact

  PostMarketMonitoringSystemDocumentation:
    is_a: Documentation
    class_uri: legal_eu_aiact:PostMarketMonitoringSystemDocumentation
    description: |-
      Documentation of the post-market monitoring system in place, as required
      by the AI Act
    aliases:
      - Post-market Monitoring System Documentation
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PostMarketMonitoringSystemDocumentation
      - dpv_legal_eu_aiact_owl:PostMarketMonitoringSystemDocumentation
    close_mappings:
      - iso42001:AIIncident
    annotations:
      dct_source: AI Act Art.72
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/aiact/owl#PostMarketMonitoringSystemDocumentation
      dpv_extension_slug: legal/eu/aiact

  RealWorldTestingPlan:
    is_a: Plan
    mixins:
      - Documentation
    class_uri: legal_eu_aiact:RealWorldTestingPlan
    description: |-
      A document that describes the objectives, methodology, geographical,
      population and temporal scope, monitoring, organisation and conduct of
      testing in real world conditions.
    aliases:
      - Real World Testing Plan
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RealWorldTestingPlan
      - dpv_legal_eu_aiact_owl:RealWorldTestingPlan
    annotations:
      dct_source: AIA Art.3-53
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RealWorldTestingPlan
      dpv_extension_slug: legal/eu/aiact

  SandboxPlan:
    is_a: Plan
    mixins:
      - Documentation
    class_uri: legal_eu_aiact:SandboxPlan
    description: |-
      A document agreed between the participating provider and the competent
      authority describing the objectives, conditions, timeframe, methodology
      and requirements for the activities carried out within the sandbox
    aliases:
      - Sandbox Plan
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:SandboxPlan
      - dpv_legal_eu_aiact_owl:SandboxPlan
    annotations:
      dct_source: AIA (Art.3(54))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#SandboxPlan
      dpv_extension_slug: legal/eu/aiact

  SystemArchitectureDescription:
    is_a: Documentation
    class_uri: legal_eu_aiact:SystemArchitectureDescription
    description: Documentation specifying the software architecture
    aliases:
      - System Architecture Description
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:SystemArchitectureDescription
      - dpv_legal_eu_aiact_owl:SystemArchitectureDescription
    annotations:
      dct_source: AI Act Annex.IV
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#SystemArchitectureDescription
      dpv_extension_slug: legal/eu/aiact

  TechnicalDocumentation:
    is_a: Documentation
    class_uri: legal_eu_aiact:TechnicalDocumentation
    description: Annex IV technical documentation
    aliases:
      - Technical Documentation
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:TechnicalDocumentation
      - dpv_legal_eu_aiact_owl:TechnicalDocumentation
    close_mappings:
      - iso42001:DataResource
    annotations:
      dct_source: ' AIA Annex.IV'
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#TechnicalDocumentation
      dpv_extension_slug: legal/eu/aiact

  TestLog:
    is_a: Documentation
    class_uri: legal_eu_aiact:TestLog
    description: Log of the tests performed
    aliases:
      - Test Log
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:TestLog
      - dpv_legal_eu_aiact_owl:TestLog
    annotations:
      dct_source: AI Act Annex.IV
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#TestLog
      dpv_extension_slug: legal/eu/aiact

  TestReport:
    is_a: Documentation
    class_uri: legal_eu_aiact:TestReport
    description: |-
      A document that includes a summary of test activities and their results
    aliases:
      - Test Report
    in_subset:
      - legal_eu_aiact_docs_subset
    exact_mappings:
      - dpv_legal_eu_aiact:TestReport
      - dpv_legal_eu_aiact_owl:TestReport
    annotations:
      dct_source: AI Act Annex.IV
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#TestReport
      dpv_extension_slug: legal/eu/aiact
