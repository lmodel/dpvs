  - dpv:schema/extensions/tech

subsets:

  legal_eu_aiact_system_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/system` submodule.

classes:

  AISystem:
    class_uri: legal_eu_aiact:AISystem
    description: |-
      A machine-based system designed to operate with varying levels of
      autonomy and that may exhibit adaptiveness after deployment and that,
      for explicit or implicit objectives, infers, from the input it receives,
      how to generate outputs such as predictions, content, recommendations,
      or decisions that can influence physical or virtual environments.
    aliases:
      - AI System
    comments:
      - |-
        Note All references to the AI Act referred to the provisional agreement
        published in Feb 2024
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AISystem
      - dpv_legal_eu_aiact_owl:AISystem
      - iso42001:AISystem
    annotations:
      dct_source: AIA (Art. 3(1))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AISystem
      dpv_extension_slug: legal/eu/aiact

  BiometricCategorisationSystem:
    is_a: AISystem
    class_uri: legal_eu_aiact:BiometricCategorisationSystem
    description: |-
      An AI system for the purpose of assigning natural persons to specific
      categories on the basis of their biometric data, unless it is ancillary
      to another commercial service and strictly necessary for objective
      technical reasons
    aliases:
      - Biometric Categorisation System
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:BiometricCategorisationSystem
      - dpv_legal_eu_aiact_owl:BiometricCategorisationSystem
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art. 3(40))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#BiometricCategorisationSystem
      dpv_extension_slug: legal/eu/aiact

  EmotionRecognitionSystem:
    is_a: AISystem
    class_uri: legal_eu_aiact:EmotionRecognitionSystem
    description: |-
      An AI system for the purpose of identifying or inferring emotions or
      intentions of natural persons on the basis of their biometric data.
    aliases:
      - Emotion Recognition System
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:EmotionRecognitionSystem
      - dpv_legal_eu_aiact_owl:EmotionRecognitionSystem
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art. 3(39))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#EmotionRecognitionSystem
      dpv_extension_slug: legal/eu/aiact

  GPAIModel:
    is_a: Model
    class_uri: legal_eu_aiact:GPAIModel
    description: |-
      An AI model, including where such an AI model is trained with a large
      amount of data using self-supervision at scale, that displays
      significant generality and is capable of competently performing a wide
      range of distinct tasks regardless of the way the model is placed on the
      market and that can be integrated into a variety of downstream systems
      or applications, except AI models that are used for research,
      development or prototyping activities before they are placed on the
      market
    aliases:
      - General Purpose AI Model
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:GPAIModel
      - dpv_legal_eu_aiact_owl:GPAIModel
    close_mappings:
      - iso42001:AISystem
    annotations:
      dct_source: AIA(Art. 3(63))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#GPAIModel
      dpv_extension_slug: legal/eu/aiact

  GPAISystem:
    is_a: AISystem
    class_uri: legal_eu_aiact:GPAISystem
    description: |-
      An AI system which is based on a general-purpose AI model and which has
      the capability to serve a variety of purposes, both for direct use as
      well as for integration in other AI systems
    aliases:
      - General Purpose AI System
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:GPAISystem
      - dpv_legal_eu_aiact_owl:GPAISystem
    close_mappings:
      - iso42001:AISystem
    annotations:
      dct_source: AIA(Art.3 (66))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#GPAISystem
      dpv_extension_slug: legal/eu/aiact

  HighRiskAISystem:
    is_a: AISystem
    class_uri: legal_eu_aiact:HighRiskAISystem
    description: High-risk AI system according to the AI Act
    aliases:
      - High Risk AI System
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:HighRiskAISystem
      - dpv_legal_eu_aiact_owl:HighRiskAISystem
    close_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art.6)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#HighRiskAISystem
      dpv_extension_slug: legal/eu/aiact

  PostRemoteBiometricIdentificationSystem:
    is_a: RemoteBiometricIdentificationSystem
    mixins:
      - AISystem
    class_uri: legal_eu_aiact:PostRemoteBiometricIdentificationSystem
    description: |-
      A remote biometric identification system other than a real-time remote
      biometric identification system
    aliases:
      - Post Remote Biometric Identification System
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PostRemoteBiometricIdentificationSystem
      - dpv_legal_eu_aiact_owl:PostRemoteBiometricIdentificationSystem
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art. 3(43))
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/aiact/owl#PostRemoteBiometricIdentificationSystem
      dpv_extension_slug: legal/eu/aiact

  ProhibitedAISystem:
    is_a: AISystem
    class_uri: legal_eu_aiact:ProhibitedAISystem
    description: Prohibited AI system according to Article 5, AI Act
    aliases:
      - Prohibited AI System
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ProhibitedAISystem
      - dpv_legal_eu_aiact_owl:ProhibitedAISystem
    close_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art.5)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ProhibitedAISystem
      dpv_extension_slug: legal/eu/aiact

  RealtimeRemoteBiometricIdentificationSystem:
    is_a: RemoteBiometricIdentificationSystem
    mixins:
      - AISystem
    class_uri: legal_eu_aiact:RealtimeRemoteBiometricIdentificationSystem
    description: |-
      A remote biometric identification system, whereby the capturing of
      biometric data, the comparison and the identification all occur without
      a significant delay, comprising not only instant identification, but
      also limited short delays in order to avoid circumvention
    aliases:
      - Real-time Remote Biometric Identification System
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RealtimeRemoteBiometricIdentificationSystem
      - dpv_legal_eu_aiact_owl:RealtimeRemoteBiometricIdentificationSystem
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art. 3(42))
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/aiact/owl#RealtimeRemoteBiometricIdentificationSystem
      dpv_extension_slug: legal/eu/aiact

  RemoteBiometricIdentificationSystem:
    is_a: AISystem
    class_uri: legal_eu_aiact:RemoteBiometricIdentificationSystem
    description: |-
      An AI system for the purpose of identifying natural persons, without
      their active involvement, typically at a distance through the comparison
      of a person’s biometric data with the biometric data contained in a
      reference database.
    aliases:
      - Remote Biometric Identification System
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RemoteBiometricIdentificationSystem
      - dpv_legal_eu_aiact_owl:RemoteBiometricIdentificationSystem
    annotations:
      dct_source: AIA(Art. 3(41))
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/aiact/owl#RemoteBiometricIdentificationSystem
      dpv_extension_slug: legal/eu/aiact

  SafetyComponent:
    is_a: DpvComponent
    class_uri: legal_eu_aiact:SafetyComponent
    description: |-
      A component of a product or of an AI system which fulfils a safety
      function for that product or AI system, or the failure or malfunctioning
      of which endangers the health and safety of persons or property
    aliases:
      - Safety Component
    in_subset:
      - legal_eu_aiact_system_subset
    exact_mappings:
      - dpv_legal_eu_aiact:SafetyComponent
      - dpv_legal_eu_aiact_owl:SafetyComponent
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA (Art. 3(14))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#SafetyComponent
      dpv_extension_slug: legal/eu/aiact
