  dpv_legal_eu_aiact_owl: https://w3id.org/dpv/legal/eu/aiact/owl#
  risk: https://w3id.org/lmodel/dpv/risk/
  dpv_risk: https://w3id.org/dpv/risk#
  dpv_risk_owl: https://w3id.org/dpv/risk/owl#

default_prefix: legal_eu_aiact
default_range: string
id_prefixes:
  - legal_eu_aiact
  - dpv_legal_eu_aiact
  - dpv_legal_eu_aiact_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/legal/eu/aiact
  - dpv:schema/extensions/risk

subsets:

  legal_eu_aiact_risk_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/risk` submodule.

classes:

  DeployerHumanOversightMeasure:
    is_a: HumanOversight
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:DeployerHumanOversightMeasure
    description: |-
      Human oversight measures  identified by the provider before placing the
      AI system on the market or putting it into service and that are
      appropriate to be implemented by the deployer.
    aliases:
      - Human Oversight Measure by Deployer
    in_subset:
      - legal_eu_aiact_risk_subset
    exact_mappings:
      - dpv_legal_eu_aiact:DeployerHumanOversightMeasure
      - dpv_legal_eu_aiact_owl:DeployerHumanOversightMeasure
    close_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: ' Art. 14 (3b)'
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#DeployerHumanOversightMeasure
      dpv_extension_slug: legal/eu/aiact

  ProviderHumanOversightMeasure:
    is_a: HumanOversight
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:ProviderHumanOversightMeasure
    description: |-
      Human oversight measures built into the AI system by the provider before
      it is placed on the market or put into service.
    aliases:
      - Human Oversight Measure by Provider
    in_subset:
      - legal_eu_aiact_risk_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ProviderHumanOversightMeasure
      - dpv_legal_eu_aiact_owl:ProviderHumanOversightMeasure
    close_mappings:
      - iso42001:AIReferenceControl
    annotations:
      dct_source: ' Art. 14 (3a)'
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ProviderHumanOversightMeasure
      dpv_extension_slug: legal/eu/aiact

  QualityManagementSystem:
    is_a: AIGovernance
    mixins:
      - DataQualityManagement
    class_uri: legal_eu_aiact:QualityManagementSystem
    description: |-
      A quality management system in place in relation to an AI system that
      ensures compliance with the AI Act
    aliases:
      - Quality Management System
    in_subset:
      - legal_eu_aiact_risk_subset
    exact_mappings:
      - dpv_legal_eu_aiact:QualityManagementSystem
      - dpv_legal_eu_aiact_owl:QualityManagementSystem
    close_mappings:
      - iso42001:AIManagementSystem
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#QualityManagementSystem
      dpv_extension_slug: legal/eu/aiact

  ReasonablyForeseeableMisuse:
    is_a: Misuse
    mixins:
      - RiskConcept
    class_uri: legal_eu_aiact:ReasonablyForeseeableMisuse
    description: |-
      The use of an AI system in a way that is not in accordance with its
      intended purpose, but which may result from reasonably foreseeable human
      behaviour or interaction with other systems, including other AI systems
    aliases:
      - Reasonably Foreseeable Misuse
    comments:
      - |-
        Misuse should be provided through the Risk extension, along with
        taxonomy e.g. Misuse -> Foreseeable -> Reasonably and NonReasonably
        Foreseeable; and Misuse -> Unforeseeable Misuse.
    in_subset:
      - legal_eu_aiact_risk_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ReasonablyForeseeableMisuse
      - dpv_legal_eu_aiact_owl:ReasonablyForeseeableMisuse
    close_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA (Art. 3(13))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ReasonablyForeseeableMisuse
      dpv_extension_slug: legal/eu/aiact

  Risk:
    class_uri: legal_eu_aiact:Risk
    description: |-
      The combination of the probability of an occurrence of harm and the
      severity of that harm
    aliases:
      - Risk
    in_subset:
      - legal_eu_aiact_risk_subset
    exact_mappings:
      - dpv_legal_eu_aiact:Risk
      - dpv_legal_eu_aiact_owl:Risk
    close_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA (Art. 3(2))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#Risk
      dpv_extension_slug: legal/eu/aiact

  RiskManagementSystem:
    is_a: RiskManagement
    class_uri: legal_eu_aiact:RiskManagementSystem
    description: |-
      A risk management system is a continuous iterative process planned and
      run throughout the entire lifecycle of a high-risk AI system, requiring
      regular systematic review and updating
    aliases:
      - Risk Management System
    in_subset:
      - legal_eu_aiact_risk_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskManagementSystem
      - dpv_legal_eu_aiact_owl:RiskManagementSystem
    close_mappings:
      - iso42001:AIManagementSystem
    annotations:
      dct_source: AI Act
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskManagementSystem
      dpv_extension_slug: legal/eu/aiact

  SeriousIncident:
    is_a: Incident
    class_uri: legal_eu_aiact:SeriousIncident
    description: |-
      an incident or malfunctioning of an AI system that directly or indirectly leads to any of the following:
      (a) the death of a person, or serious harm to a person’s health;
      (b) a serious and irreversible disruption of the management or operation of critical infrastructure;
      (c) the infringement of obligations under Union law intended to protect fundamental rights;
      (d) serious harm to property or the environment;
    aliases:
      - Serious Incident
    in_subset:
      - legal_eu_aiact_risk_subset
    exact_mappings:
      - dpv_legal_eu_aiact:SeriousIncident
      - dpv_legal_eu_aiact_owl:SeriousIncident
    close_mappings:
      - iso42001:AIIncident
    annotations:
      dct_source: AIA (Art. 3(49))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#SeriousIncident
      dpv_extension_slug: legal/eu/aiact

  SystemicRisk:
    is_a: Risk
    class_uri: legal_eu_aiact:SystemicRisk
    description: |-
      Q risk that is specific to the high-impact capabilities of
      general-purpose AI models, having a significant impact on the Union
      market due to their reach, or due to actual or reasonably foreseeable
      negative effects on public health, safety, public security, fundamental
      rights, or the society as a whole, that can be propagated at scale
      across the value chain
    aliases:
      - Systemic Risk
    in_subset:
      - legal_eu_aiact_risk_subset
    exact_mappings:
      - dpv_legal_eu_aiact:SystemicRisk
      - dpv_legal_eu_aiact_owl:SystemicRisk
    close_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art.3 (65))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#SystemicRisk
      dpv_extension_slug: legal/eu/aiact
