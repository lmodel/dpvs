  source_ttl: upstream-releases/dpv/legal/eu/aiact/modules/risk-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/eu/aiact/modules/risk.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/eu/aiact/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/eu/aiact#

