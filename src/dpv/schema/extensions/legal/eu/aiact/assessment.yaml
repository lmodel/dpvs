id: https://w3id.org/lmodel/dpv/legal/eu/aiact/assessment
name: dpv_legal_eu_aiact_assessment
title: DPV - Legal - Eu - Aiact / Assessment
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `legal/eu/aiact/modules/assessment-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/legal/eu/aiact
  - https://w3c.github.io/dpv/2.3/legal/eu/aiact/
source: https://w3id.org/dpv/legal/eu/aiact/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/eu/aiact
  dpv_submodule: assessment
  source_ttl: upstream-releases/dpv/legal/eu/aiact/modules/assessment-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/eu/aiact/modules/assessment.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/eu/aiact/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/eu/aiact#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  legal_eu_aiact: https://w3id.org/lmodel/dpv/legal/eu/aiact/
  dpv_legal_eu_aiact: https://w3id.org/dpv/legal/eu/aiact#
  dpv_legal_eu_aiact_owl: https://w3id.org/dpv/legal/eu/aiact/owl#

default_prefix: legal_eu_aiact
default_range: string
id_prefixes:
  - legal_eu_aiact
  - dpv_legal_eu_aiact
  - dpv_legal_eu_aiact_owl

imports:
  - linkml:types
  - dpv:schema/dpv_common
  - dpv:schema/dpv_legal_basis
  - dpv:schema/dpv_entities
  - dpv:schema/dpv_personal_data
  - dpv:schema/extensions/legal/eu/aiact

subsets:

  legal_eu_aiact_assessment_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/assessment` submodule.

classes:

  AIRegulatorySandbox:
    is_a: RegulatorySandbox
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:AIRegulatorySandbox
    description: |-
      A controlled framework set up by a competent authority which offers
      providers or prospective providers of AI systems the possibility to
      develop, train, validate and test, where appropriate in real-world
      conditions, an innovative AI system, pursuant to a sandbox plan for a
      limited time under regulatory supervision
    aliases:
      - AI Regulatory Sandbox
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AIRegulatorySandbox
      - dpv_legal_eu_aiact_owl:AIRegulatorySandbox
    related_mappings:
      - iso42001:AIManagementSystem
    annotations:
      dct_source: AIA (Art. 3(55))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AIRegulatorySandbox
      dpv_extension_slug: legal/eu/aiact

  AISystemPerformance:
    class_uri: legal_eu_aiact:AISystemPerformance
    description: The ability of an AI system to achieve its intended purpose
    aliases:
      - AI System Performance
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:AISystemPerformance
      - dpv_legal_eu_aiact_owl:AISystemPerformance
    close_mappings:
      - iso42001:AISystem
    annotations:
      dct_source: AIA(Art. 3(18))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#AISystemPerformance
      dpv_extension_slug: legal/eu/aiact

  CEMarking:
    is_a: CertificationSeal
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:CEMarking
    description: |-
      A marking by which a provider indicates that an AI system is in
      conformity with the requirements set out in Chapter III, Section 2 and
      other applicable Union harmonisation legislation providing for its
      affixing
    aliases:
      - CE Marking
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:CEMarking
      - dpv_legal_eu_aiact_owl:CEMarking
    related_mappings:
      - iso42001:AIManagementSystem
    annotations:
      dct_source: AIA(Art. 3(24))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#CEMarking
      dpv_extension_slug: legal/eu/aiact

  ConformityAssessment:
    is_a: Assessment
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:ConformityAssessment
    description: |-
      The process of demonstrating whether the requirements set out in Chapter
      III, Section 2 relating to a high-risk AI system have been fulfilled
    aliases:
      - Conformity Assessment
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:ConformityAssessment
      - dpv_legal_eu_aiact_owl:ConformityAssessment
    close_mappings:
      - iso42001:AIManagementSystem
    annotations:
      dct_source: AIA(Art. 3(20))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#ConformityAssessment
      dpv_extension_slug: legal/eu/aiact

  FRIA:
    is_a: Assessment
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:FRIA
    description: |-
      An assessment undertaken to evaluate how the AI use of an AI system
      might impact fundamental rights
    aliases:
      - Fundamental Rights Impact Assessment
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:FRIA
      - dpv_legal_eu_aiact_owl:FRIA
    close_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art. 27)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#FRIA
      dpv_extension_slug: legal/eu/aiact

  HighRiskAIAssessment:
    is_a: Assessment
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_aiact:HighRiskAIAssessment
    description: |-
      An assessment undertaken to determine whether the AI system is
      classified as high-risk under the AI Act
    aliases:
      - High Risk AI Assessment
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:HighRiskAIAssessment
      - dpv_legal_eu_aiact_owl:HighRiskAIAssessment
    close_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art. 6)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#HighRiskAIAssessment
      dpv_extension_slug: legal/eu/aiact

  InformedConsent:
    mixins:
      - LegalBasis
    class_uri: legal_eu_aiact:InformedConsent
    description: |-
      Informed consent means a (real world test) subject’s freely given,
      specific, unambiguous and voluntary expression of his or her willingness
      to participate in a particular testing in real world conditions, after
      having been informed of all aspects of the testing that are relevant to
      the subject’s decision to participate
    aliases:
      - Informed Consent
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:InformedConsent
      - dpv_legal_eu_aiact_owl:InformedConsent
    annotations:
      dct_source: AIA (Art. 3(59))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#InformedConsent
      dpv_extension_slug: legal/eu/aiact

  PostMarketMonitoringSystem:
    is_a: OrganisationalMeasure
    class_uri: legal_eu_aiact:PostMarketMonitoringSystem
    description: |-
      All activities carried out by providers of AI systems to collect and review experience gained from the use of AI systems they
      place on the market or put into service for the purpose of identifying any need to immediately apply any necessary corrective or preventive actions
    aliases:
      - Post-Market Monitoring System
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:PostMarketMonitoringSystem
      - dpv_legal_eu_aiact_owl:PostMarketMonitoringSystem
    close_mappings:
      - iso42001:AIIncident
    annotations:
      dct_source: AIA(Art. 3(25))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#PostMarketMonitoringSystem
      dpv_extension_slug: legal/eu/aiact

  RealWorldTestSubject:
    is_a: NaturalPerson
    class_uri: legal_eu_aiact:RealWorldTestSubject
    description: A natural person who participates in testing in real world conditions
    aliases:
      - Real World Test Subject
    comments:
      - |-
        Note: The term "Real World Test Subject" is defined as just "Subject" in
        the AI Act. We emphasise its distinction from other subjects, e.g. AI
        Subject, with this phrasing of the term.
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RealWorldTestSubject
      - dpv_legal_eu_aiact_owl:RealWorldTestSubject
    annotations:
      dct_source: AIA (Art. 3(58))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RealWorldTestSubject
      dpv_extension_slug: legal/eu/aiact

  TestingRealWorldConditions:
    is_a: OrganisationalMeasure
    class_uri: legal_eu_aiact:TestingRealWorldConditions
    description: |-
      The temporary testing of an AI system for its intended purpose in
      real-world conditions outside a laboratory or otherwise simulated
      environment, with a view to gathering reliable and robust data and to
      assessing and verifying the conformity of the AI system with the
      requirements of the AI Act and it does not qualify as placing the AI
      system on the market or putting it into service within the meaning of
      the AI Act, provided that all the conditions laid down in Article 57 or
      60 are fulfilled
    aliases:
      - Testing In Real World Conditions
    in_subset:
      - legal_eu_aiact_assessment_subset
    exact_mappings:
      - dpv_legal_eu_aiact:TestingRealWorldConditions
      - dpv_legal_eu_aiact_owl:TestingRealWorldConditions
    related_mappings:
      - iso42001:AIManagementSystem
    annotations:
      dct_source: AIA (Art. 3(57))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#TestingRealWorldConditions
      dpv_extension_slug: legal/eu/aiact
