  dpv_submodule: risk_levels
  source_ttl: upstream-releases/dpv/legal/eu/aiact/modules/risk_levels-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/eu/aiact/modules/risk_levels.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/eu/aiact/owl#
