  dpv_legal_eu_aiact_owl: https://w3id.org/dpv/legal/eu/aiact/owl#

default_prefix: legal_eu_aiact
default_range: string
id_prefixes:
  - legal_eu_aiact
  - dpv_legal_eu_aiact
  - dpv_legal_eu_aiact_owl

imports:
  - linkml:types
  - dpv:schema/extensions/legal/eu/aiact

subsets:

  legal_eu_aiact_risk_levels_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/risk_levels` submodule.

slots:

  has_risk_level:
    definition_uri: legal_eu_aiact:hasRiskLevel
    description: Indicates the risk level of the AI system under the AI Act
    aliases:
      - has risk level
    multivalued: true
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:hasRiskLevel
      - dpv_legal_eu_aiact_owl:hasRiskLevel
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#hasRiskLevel
      dpv_extension_slug: legal/eu/aiact

classes:

  RiskLevel:
    class_uri: legal_eu_aiact:RiskLevel
    description: |-
      Enumeration of AI Act's risk-based categorisation which determines the
      prohibitions and obligations for AI systems
    aliases:
      - Risk Level
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevel
      - dpv_legal_eu_aiact_owl:RiskLevel
    close_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AI Act
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevel
      dpv_extension_slug: legal/eu/aiact

  RiskLevelHigh:
    is_a: RiskLevelPermitted
    mixins:
      - RiskLevel
    class_uri: legal_eu_aiact:RiskLevelHigh
    description: |-
      Risk Level categorising an AI system as "high-risk" as defined in the AI
      Act Article 6
    aliases:
      - Risk Level - High
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevelHigh
      - dpv_legal_eu_aiact_owl:RiskLevelHigh
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art.6)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevelHigh
      dpv_extension_slug: legal/eu/aiact

  RiskLevelHighA61:
    is_a: RiskLevelHigh
    mixins:
      - RiskLevel
    class_uri: legal_eu_aiact:RiskLevelHigh-A6-1
    description: |-
      Risk Level categorising an AI system as "high-risk" as defined in the AI
      Act Article 6(1), which specifies the sectorial laws mentiond in Annex I
    aliases:
      - RiskLevelHigh-A6-1
      - Risk Level - High per Article 6(1)
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevelHigh-A6-1
      - dpv_legal_eu_aiact_owl:RiskLevelHigh-A6-1
    annotations:
      dct_source: AIA(Art.6(1))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevelHigh-A6-1
      dpv_extension_slug: legal/eu/aiact

  RiskLevelHighA62:
    is_a: RiskLevelHigh
    mixins:
      - RiskLevel
    class_uri: legal_eu_aiact:RiskLevelHigh-A6-2
    description: |-
      Risk Level categorising an AI system as "high-risk" as defined in the AI
      Act Article 6(1), which specifies applications of AI in Annex III
    aliases:
      - RiskLevelHigh-A6-2
      - Risk Level - High per Article 6(2)
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevelHigh-A6-2
      - dpv_legal_eu_aiact_owl:RiskLevelHigh-A6-2
    annotations:
      dct_source: AIA(Art.6(2))
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevelHigh-A6-2
      dpv_extension_slug: legal/eu/aiact

  RiskLevelMinimal:
    is_a: RiskLevelNotHigh
    mixins:
      - RiskLevel
    class_uri: legal_eu_aiact:RiskLevelMinimal
    description: |-
      Risk Level categorising an AI system as not being prohibited or
      high-risk or transparency required as defined in the AI Act
    aliases:
      - Risk Level - Minimal
    comments:
      - |-
        The minimal risk level does not indicate there is no risk, but instead
        indicates that it is not sufficient to be regulated under the
        categorisations of the AI Act
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevelMinimal
      - dpv_legal_eu_aiact_owl:RiskLevelMinimal
    related_mappings:
      - iso42001:AIRisk
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevelMinimal
      dpv_extension_slug: legal/eu/aiact

  RiskLevelNotHigh:
    is_a: RiskLevelPermitted
    mixins:
      - RiskLevel
    class_uri: legal_eu_aiact:RiskLevelNotHigh
    description: |-
      Risk Level categorising an AI system as not being "high-risk" as defined
      in the AI Act
    aliases:
      - Risk Level - Not High
    comments:
      - |-
        The "not high" risk level is useful for indicating the outcomes of
        assessments determining whether something is high-risk
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevelNotHigh
      - dpv_legal_eu_aiact_owl:RiskLevelNotHigh
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevelNotHigh
      dpv_extension_slug: legal/eu/aiact

  RiskLevelPermitted:
    is_a: RiskLevel
    class_uri: legal_eu_aiact:RiskLevelPermitted
    description: |-
      Risk Level representing "AI practices" are permitted i.e. not prohibited
      under the AI Act
    aliases:
      - Risk Level - Permitted
    comments:
      - |-
        The permitted risk level is useful for representing outcomes of
        assessments determining whether something is prohibited
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevelPermitted
      - dpv_legal_eu_aiact_owl:RiskLevelPermitted
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevelPermitted
      dpv_extension_slug: legal/eu/aiact

  RiskLevelProhibited:
    is_a: RiskLevel
    class_uri: legal_eu_aiact:RiskLevelProhibited
    description: |-
      Risk Level prohibiting "AI practices" as defined in the AI Act Article 5
    aliases:
      - Risk Level - Prohibited
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevelProhibited
      - dpv_legal_eu_aiact_owl:RiskLevelProhibited
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art.5)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevelProhibited
      dpv_extension_slug: legal/eu/aiact

  RiskLevelTransparencyRequired:
    is_a: RiskLevelNotHigh
    mixins:
      - RiskLevel
    class_uri: legal_eu_aiact:RiskLevelTransparencyRequired
    description: |-
      Risk Level categorising an AI system as not high-risk but where
      transparency is require as defined in the AI Act
    aliases:
      - Risk Level - Transparency Required
    in_subset:
      - legal_eu_aiact_risk_levels_subset
    exact_mappings:
      - dpv_legal_eu_aiact:RiskLevelTransparencyRequired
      - dpv_legal_eu_aiact_owl:RiskLevelTransparencyRequired
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA(Art.50)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#RiskLevelTransparencyRequired
      dpv_extension_slug: legal/eu/aiact
