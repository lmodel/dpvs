imports:
  - linkml:types
  - dpv:schema/dpv_processing
  - dpv:schema/extensions/legal/eu/aiact
  - dpv:schema/extensions/ai
  - dpv:schema/extensions/tech

subsets:

  legal_eu_aiact_capability_subset:
    description: Entities from the DPV `legal/eu/aiact/modules/capability` submodule.

classes:

  BiometricCategorisation:
    mixins:
      - Capability
    class_uri: legal_eu_aiact:BiometricCategorisation
    description: |-
      Capability where assigning natural persons to specific categories
      happens on the basis of their biometric data unless ancillary to another
      commercial service and strictly necessary for objective technical
      reasons
    aliases:
      - Biometric Categorisation
    in_subset:
      - legal_eu_aiact_capability_subset
    exact_mappings:
      - dpv_legal_eu_aiact:BiometricCategorisation
      - dpv_legal_eu_aiact_owl:BiometricCategorisation
    annotations:
      dct_source: AIA Art. 3(40)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#BiometricCategorisation
      dpv_extension_slug: legal/eu/aiact

  BiometricIdentification:
    mixins:
      - Capability
    class_uri: legal_eu_aiact:BiometricIdentification
    description: |-
      Capability where the automated recognition of physical, physiological,
      behavioural, and psychological human features are used for the purpose
      of establishing the identity of a natural person by comparing biometric
      data of that individual to to biometric data of individuals stored in a
      database
    aliases:
      - Biometric Identification
    in_subset:
      - legal_eu_aiact_capability_subset
    exact_mappings:
      - dpv_legal_eu_aiact:BiometricIdentification
      - dpv_legal_eu_aiact_owl:BiometricIdentification
    annotations:
      dct_source: AIA Art. 3(35)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#BiometricIdentification
      dpv_extension_slug: legal/eu/aiact

  BiometricVerification:
    is_a: IdentityVerification
    mixins:
      - Capability
    class_uri: legal_eu_aiact:BiometricVerification
    description: |-
      The automated, one-to-one verification, including authentication, of the
      identity of natural persons by comparing their biometric data to
      previously provided biometric data
    aliases:
      - Biometric Verification
    in_subset:
      - legal_eu_aiact_capability_subset
    exact_mappings:
      - dpv_legal_eu_aiact:BiometricVerification
      - dpv_legal_eu_aiact_owl:BiometricVerification
    annotations:
      dct_source: AIA Art.3 (36)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#BiometricVerification
      dpv_extension_slug: legal/eu/aiact

  DeepFakeGeneration:
    is_a: BiometricIdentification
    mixins:
      - Capability
    class_uri: legal_eu_aiact:DeepFakeGeneration
    description: |-
      Capability to generate or manipulate image, audio or video content that
      resembles existing persons, objects, places, entities or events and
      would falsely appear to a person to be authentic or truthful;l
    aliases:
      - Deep Fake Generation
    in_subset:
      - legal_eu_aiact_capability_subset
    exact_mappings:
      - dpv_legal_eu_aiact:DeepFakeGeneration
      - dpv_legal_eu_aiact_owl:DeepFakeGeneration
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: AIA Art. 3(60)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#DeepFakeGeneration
      dpv_extension_slug: legal/eu/aiact

  EmotionRecognition:
    mixins:
      - Capability
    class_uri: legal_eu_aiact:EmotionRecognition
    description: |-
      Capability of a technology to identify or infer emotions or intentions
      of natural persons (on the basis of their biometric data)
    aliases:
      - Emotion Recognition
    in_subset:
      - legal_eu_aiact_capability_subset
    exact_mappings:
      - dpv_legal_eu_aiact:EmotionRecognition
      - dpv_legal_eu_aiact_owl:EmotionRecognition
    annotations:
      dct_source: AIA Art. 3(39)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#EmotionRecognition
      dpv_extension_slug: legal/eu/aiact

  HighImpactCapabilityGPAIModel:
    is_a: Capability
    class_uri: legal_eu_aiact:HighImpactCapabilityGPAIModel
    description: |-
      ‘High-impact Capabilities’ in general purpose AI models means
      capabilities that match or exceed the capabilities recorded in the most
      advanced general purpose AI models
    aliases:
      - High-Impact Capability in General Purpose AI Models
    in_subset:
      - legal_eu_aiact_capability_subset
    exact_mappings:
      - dpv_legal_eu_aiact:HighImpactCapabilityGPAIModel
      - dpv_legal_eu_aiact_owl:HighImpactCapabilityGPAIModel
    close_mappings:
      - iso42001:AISystem
    annotations:
      dct_source: AIA Art. 3(64)
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#HighImpactCapabilityGPAIModel
      dpv_extension_slug: legal/eu/aiact

  SubliminalCapability:
    is_a: HumanOrientedCapability
    mixins:
      - Capability
    class_uri: legal_eu_aiact:SubliminalCapability
    description: |-
      Capability that operates beyond (below or above) the threshold of
      conscious awareness
    aliases:
      - Subliminal Capability
    in_subset:
      - legal_eu_aiact_capability_subset
    exact_mappings:
      - dpv_legal_eu_aiact:SubliminalCapability
      - dpv_legal_eu_aiact_owl:SubliminalCapability
    annotations:
      dct_source: |2-
         Commission guidelines on prohibited AI practices established by AI Act
      upstream_iri: https://w3id.org/dpv/legal/eu/aiact/owl#SubliminalCapability
      dpv_extension_slug: legal/eu/aiact
