id: https://w3id.org/lmodel/dpv/legal/eu/ehds/entities
name: dpv_legal_eu_ehds_entities
title: DPV - Legal - Eu - Ehds / Entities
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `legal/eu/ehds/modules/entities-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/legal/eu/ehds
  - https://w3c.github.io/dpv/2.3/legal/eu/ehds/
source: https://w3id.org/dpv/legal/eu/ehds/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/eu/ehds
  dpv_submodule: entities
  source_ttl: upstream-releases/dpv/legal/eu/ehds/modules/entities-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/eu/ehds/modules/entities.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/eu/ehds/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/eu/ehds#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  legal_eu_ehds: https://w3id.org/lmodel/dpv/legal/eu/ehds/
  dpv_legal_eu_ehds: https://w3id.org/dpv/legal/eu/ehds#
  dpv_legal_eu_ehds_owl: https://w3id.org/dpv/legal/eu/ehds/owl#
  sector_health: https://w3id.org/lmodel/dpv/sector/health/
  dpv_sector_health: https://w3id.org/dpv/sector/health#
  dpv_sector_health_owl: https://w3id.org/dpv/sector/health/owl#

  iso27701: https://w3id.org/lmodel/iso27701/
default_prefix: legal_eu_ehds
default_range: string
id_prefixes:
  - legal_eu_ehds
  - dpv_legal_eu_ehds
  - dpv_legal_eu_ehds_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/legal/eu/ehds
  - dpv:schema/extensions/sector/health

subsets:

  legal_eu_ehds_entities_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/entities` submodule.

classes:

  AuthorisedRepresentative:
    is_a: Representative
    mixins:
      - LegalEntity
    class_uri: legal_eu_ehds:AuthorisedRepresentative
    description: |-
      Legal representative established in the EU of a manufacturer of an EHR
      system established outside of the EU
    aliases:
      - Authorised Representative
    in_subset:
      - legal_eu_ehds_entities_subset
    exact_mappings:
      - dpv_legal_eu_ehds:AuthorisedRepresentative
      - dpv_legal_eu_ehds_owl:AuthorisedRepresentative
    close_mappings:
      - iso27701:Clause_7_2_4
    annotations:
      dct_source: EHDS Art.31
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#AuthorisedRepresentative
      dpv_extension_slug: legal/eu/ehds

  EHDSBoard:
    is_a: SupraNationalAuthority
    mixins:
      - LegalEntity
    class_uri: legal_eu_ehds:EHDSBoard
    description: |-
      An authority tasked with facilitating the cooperation and the exchange
      of information among Member States and the Commission for primary and
      secondary use
    aliases:
      - European Health Data Space Board
    in_subset:
      - legal_eu_ehds_entities_subset
    exact_mappings:
      - dpv_legal_eu_ehds:EHDSBoard
      - dpv_legal_eu_ehds_owl:EHDSBoard
    related_mappings:
      - iso27701:SupervisoryAuthority
    annotations:
      dct_source: EHDS Art.92
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#EHDSBoard
      dpv_extension_slug: legal/eu/ehds

  HealthDataAccessBody:
    mixins:
      - LegalEntity
    class_uri: legal_eu_ehds:HealthDataAccessBody
    description: |-
      An entity governed by public law responsible for granting access to
      electronic health data for secondary use
    aliases:
      - Health Data Access Body
    in_subset:
      - legal_eu_ehds_entities_subset
    exact_mappings:
      - dpv_legal_eu_ehds:HealthDataAccessBody
      - dpv_legal_eu_ehds_owl:HealthDataAccessBody
    close_mappings:
      - iso27701:SupervisoryAuthority
    annotations:
      dct_source: EHDS Art.55
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#HealthDataAccessBody
      dpv_extension_slug: legal/eu/ehds

  HealthDataHolder:
    mixins:
      - LegalEntity
    class_uri: legal_eu_ehds:HealthDataHolder
    description: |-
      An entity in the healthcare sector who has the right to process personal
      electronic health data or make available non-personal electronic health
      data
    aliases:
      - Health Data Holder
    in_subset:
      - legal_eu_ehds_entities_subset
    exact_mappings:
      - dpv_legal_eu_ehds:HealthDataHolder
      - dpv_legal_eu_ehds_owl:HealthDataHolder
    close_mappings:
      - iso27701:PIIController
    annotations:
      dct_source: EHDS Art.2.2(t)
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#HealthDataHolder
      dpv_extension_slug: legal/eu/ehds

  HealthDataUser:
    mixins:
      - LegalEntity
    class_uri: legal_eu_ehds:HealthDataUser
    description: |-
      An entity in the healthcare sector who was granted access to electronic
      health data for secondary use
    aliases:
      - Health Data User
    in_subset:
      - legal_eu_ehds_entities_subset
    exact_mappings:
      - dpv_legal_eu_ehds:HealthDataUser
      - dpv_legal_eu_ehds_owl:HealthDataUser
    close_mappings:
      - iso27701:ThirdParty
    annotations:
      dct_source: EHDS Art.2.2(u)
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#HealthDataUser
      dpv_extension_slug: legal/eu/ehds

  TrustedHealthDataHolder:
    is_a: HealthDataHolder
    mixins:
      - LegalEntity
    class_uri: legal_eu_ehds:TrustedHealthDataHolder
    description: |-
      A health data holder that meets the conditions for the simplified
      procedure to access electronic health data
    aliases:
      - Trusted Health Data Holder
    in_subset:
      - legal_eu_ehds_entities_subset
    exact_mappings:
      - dpv_legal_eu_ehds:TrustedHealthDataHolder
      - dpv_legal_eu_ehds_owl:TrustedHealthDataHolder
    close_mappings:
      - iso27701:PIIController
    annotations:
      dct_source: EHDS Art.72
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#TrustedHealthDataHolder
      dpv_extension_slug: legal/eu/ehds
