subsets:

  legal_eu_ehds_technology_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/technology` submodule.

classes:

  EHRSystem:
    mixins:
      - Technology
    class_uri: legal_eu_ehds:EHRSystem
    description: |-
      A system whereby the software and/or hardware allows personal electronic
      health data to be collected and processed, to be used by healthcare
      providers when providing patient care or by patients when accessing
      their electronic health data
    aliases:
      - Electronic Health Record System
    in_subset:
      - legal_eu_ehds_technology_subset
    exact_mappings:
      - dpv_legal_eu_ehds:EHRSystem
      - dpv_legal_eu_ehds_owl:EHRSystem
    related_mappings:
      - iso27701:Clause_6_5
    annotations:
      dct_source: EHDS Art.2.2(i)
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#EHRSystem
      dpv_extension_slug: legal/eu/ehds

  ElectronicHealthDataAccessService:
    mixins:
      - Technology
    class_uri: legal_eu_ehds:ElectronicHealthDataAccessService
    description: |-
      Technical service, such as an online portal or application, that allows
      data subjects to access their electronic health data or the electronic
      health data of those natural persons whose electronic health data they
      are legally authorised to access
    aliases:
      - Electronic Health Data Access Service
    in_subset:
      - legal_eu_ehds_technology_subset
    exact_mappings:
      - dpv_legal_eu_ehds:ElectronicHealthDataAccessService
      - dpv_legal_eu_ehds_owl:ElectronicHealthDataAccessService
    close_mappings:
      - iso27701:Clause_7_3_8
    annotations:
      dct_source: EHDS Art.2.2(h)
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/ehds/owl#ElectronicHealthDataAccessService
      dpv_extension_slug: legal/eu/ehds

  HealthProfessionalAccessService:
    mixins:
      - Technology
    class_uri: legal_eu_ehds:HealthProfessionalAccessService
    description: |-
      Technical service, supported by an EHR system, that enables health
      professionals to access data of natural persons under their care
    aliases:
      - Health Professional Access Service
    in_subset:
      - legal_eu_ehds_technology_subset
    exact_mappings:
      - dpv_legal_eu_ehds:HealthProfessionalAccessService
      - dpv_legal_eu_ehds_owl:HealthProfessionalAccessService
    close_mappings:
      - iso27701:Clause_7_3_8
    annotations:
      dct_source: EHDS Art.2.2(h)
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#HealthProfessionalAccessService
      dpv_extension_slug: legal/eu/ehds

  InteroperabilitySoftwareForEHRSystem:
    mixins:
      - Technology
    class_uri: legal_eu_ehds:InteroperabilitySoftwareForEHRSystem
    description: |-
      Software component of the EHR system which provides and receives
      personal electronic health data under a priority category for primary
      use established under the EHDS Regulation in the European electronic
      health record exchange format
    aliases:
      - Interoperability Software for EHR System
    in_subset:
      - legal_eu_ehds_technology_subset
    exact_mappings:
      - dpv_legal_eu_ehds:InteroperabilitySoftwareForEHRSystem
      - dpv_legal_eu_ehds_owl:InteroperabilitySoftwareForEHRSystem
    annotations:
      dct_source: EHDS Art.2.2(n)
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/ehds/owl#InteroperabilitySoftwareForEHRSystem
      dpv_extension_slug: legal/eu/ehds

  LoggingSoftwareForEHRSystem:
    mixins:
      - Technology
    class_uri: legal_eu_ehds:LoggingSoftwareForEHRSystem
    description: |-
      Software component of the EHR system which provides logging information
      related to access by health professionals or other individuals to
      priority categories of personal electronic health data
    aliases:
      - Logging Software for EHR System
    in_subset:
      - legal_eu_ehds_technology_subset
    exact_mappings:
      - dpv_legal_eu_ehds:LoggingSoftwareForEHRSystem
      - dpv_legal_eu_ehds_owl:LoggingSoftwareForEHRSystem
    annotations:
      dct_source: EHDS Art.2.2(o)
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#LoggingSoftwareForEHRSystem
      dpv_extension_slug: legal/eu/ehds

  WellnessApplication:
    mixins:
      - Technology
    class_uri: legal_eu_ehds:WellnessApplication
    description: |-
      Software component for the processing of electronic health data,
      specifically for providing information on the health of natural persons,
      or the delivery of care for purposes other than the provision of
      healthcare
    aliases:
      - Wellness Application
    in_subset:
      - legal_eu_ehds_technology_subset
    exact_mappings:
      - dpv_legal_eu_ehds:WellnessApplication
      - dpv_legal_eu_ehds_owl:WellnessApplication
    related_mappings:
      - iso27701:Clause_6_5
    annotations:
      dct_source: EHDS Art.2.2(ab)
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#WellnessApplication
      dpv_extension_slug: legal/eu/ehds
