subsets:

  legal_eu_ehds_process_subset:
    description: Entities from the DPV `legal/eu/ehds/modules/process` submodule.

classes:

  DataPermit:
    is_a: Policy
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_ehds:DataPermit
    description: |-
      Permit issued by health data access bodies to health data applicants
      regarding health data access applications
    aliases:
      - Data Permit
    in_subset:
      - legal_eu_ehds_process_subset
    exact_mappings:
      - dpv_legal_eu_ehds:DataPermit
      - dpv_legal_eu_ehds_owl:DataPermit
    close_mappings:
      - iso27701:Clause_7_2_2
    annotations:
      dct_source: EHDS Art.68
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#DataPermit
      dpv_extension_slug: legal/eu/ehds

  HealthDataAccessApplication:
    class_uri: legal_eu_ehds:HealthDataAccessApplication
    description: |-
      Application sent by a natural or legal person to health data access
      bodies, seeking access to electronic health data for secondary use
    aliases:
      - Health Data Access Application
    in_subset:
      - legal_eu_ehds_process_subset
    exact_mappings:
      - dpv_legal_eu_ehds:HealthDataAccessApplication
      - dpv_legal_eu_ehds_owl:HealthDataAccessApplication
    close_mappings:
      - iso27701:Clause_7_3_8
    annotations:
      dct_source: EHDS Art.67
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#HealthDataAccessApplication
      dpv_extension_slug: legal/eu/ehds

  HealthDataRequest:
    is_a: Policy
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_ehds:HealthDataRequest
    description: |-
      Request sent by health data applicants to health data access bodies,
      seeking access to statistically anonymised electronic health data for
      secondary use
    aliases:
      - Health Data Request
    in_subset:
      - legal_eu_ehds_process_subset
    exact_mappings:
      - dpv_legal_eu_ehds:HealthDataRequest
      - dpv_legal_eu_ehds_owl:HealthDataRequest
    close_mappings:
      - iso27701:Clause_7_5_4
    annotations:
      dct_source: EHDS Art.69
      upstream_iri: https://w3id.org/dpv/legal/eu/ehds/owl#HealthDataRequest
      dpv_extension_slug: legal/eu/ehds
