      dct_source: DGA 2.11
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DataIntermediationService
      dpv_extension_slug: legal/eu/dga

  DataIntermediationServiceBetweenHoldersUsers:
    is_a: DataIntermediationService
    class_uri: legal_eu_dga:DataIntermediationServiceBetweenHoldersUsers
    description: |-
      Data intermediation service for data shared between Data Holders and
      Data Users
