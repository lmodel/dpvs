  DataIntermediationService:
    is_a: DpvService
    class_uri: legal_eu_dga:DataIntermediationService
    description: |-
      Service of data intermediation which aims to facilitate the sharing of
      data between Data Subjects, Data Holders and Data Users
    aliases:
      - Data Intermediation Service
    in_subset:
      - legal_eu_dga_services_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataIntermediationService
      - dpv_legal_eu_dga_owl:DataIntermediationService
    related_mappings:
      - iso27701:PIIProcessor
