      - Data Intermediation Service between Data Holders and Data Users
    in_subset:
      - legal_eu_dga_services_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataIntermediationServiceBetweenHoldersUsers
      - dpv_legal_eu_dga_owl:DataIntermediationServiceBetweenHoldersUsers
    related_mappings:
      - iso27701:PIIProcessor
    annotations:
      dct_source: DGA 10.a
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/dga/owl#DataIntermediationServiceBetweenHoldersUsers
      dpv_extension_slug: legal/eu/dga

  DataIntermediationServiceBetweenSubjectsUsers:
    is_a: DataIntermediationService
    class_uri: legal_eu_dga:DataIntermediationServiceBetweenSubjectsUsers
    description: |-
      Data intermediation service for data shared between Data Subjects,
      Natural Persons who are Data Holders and Data Users
    aliases:
      - Data Intermediation Service between Data Subjects and Data Users
    in_subset:
      - legal_eu_dga_services_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataIntermediationServiceBetweenSubjectsUsers
      - dpv_legal_eu_dga_owl:DataIntermediationServiceBetweenSubjectsUsers
    related_mappings:
      - iso27701:PIIProcessor
    annotations:
      dct_source: DGA 10.b
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/dga/owl#DataIntermediationServiceBetweenSubjectsUsers
      dpv_extension_slug: legal/eu/dga

  SingleInformationPoint:
    is_a: DpvService
    class_uri: legal_eu_dga:SingleInformationPoint
    description: |-
      Service responsible for receiving and transmitting requests for the
      re-use of public data
    aliases:
