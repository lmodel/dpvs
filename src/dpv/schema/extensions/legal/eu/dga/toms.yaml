classes:

  DISPEUApproval:
    is_a: CertificationSeal
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_dga:DISPEUApproval
    description: |-
      Confirmation and approval by a competent authority for the Data
      Intermediation Service Provider's compliance with Article 11 and Article
      12 of the DGA
    aliases:
      - EU Approval for Data Intermediation Service Provider
    in_subset:
      - legal_eu_dga_toms_subset
    exact_mappings:
      - dpv_legal_eu_dga:DISPEUApproval
      - dpv_legal_eu_dga_owl:DISPEUApproval
    annotations:
      dct_source: DGA 11.9
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DISPEUApproval
      dpv_extension_slug: legal/eu/dga

  DISPNotice:
    is_a: Notice
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_dga:DISPNotice
    description: |-
      Notification by a Data Intermediation Service Provider to a competent
      authority concerning changes to details regarding its Data
      Intermediation Service
    aliases:
      - Data Intermediation Service Notification
    in_subset:
      - legal_eu_dga_toms_subset
    exact_mappings:
      - dpv_legal_eu_dga:DISPNotice
      - dpv_legal_eu_dga_owl:DISPNotice
