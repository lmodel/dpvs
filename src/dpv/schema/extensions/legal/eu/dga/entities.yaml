classes:

  DISP:
    is_a: LegalEntity
    class_uri: legal_eu_dga:DISP
    description: |-
      An entity who establishes commercial relationships for the data sharing
      between data subjects and data holders on the one hand and data users on
      the other
    aliases:
      - Data Intermediation Service Provider
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DISP
      - dpv_legal_eu_dga_owl:DISP
    annotations:
      dct_source: DGA 2.11
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DISP
      dpv_extension_slug: legal/eu/dga

  DISPForDataHolder:
    is_a: DISP
    class_uri: legal_eu_dga:DISPForDataHolder
    description: |-
      An entity who makes data holders' data available for potential data
      users, including bilateral or multilateral exchanges of data and
      platforms and databases for the joint exploitation of data
    aliases:
      - Data Intermediation Service Provider for Data Holder
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DISPForDataHolder
      - dpv_legal_eu_dga_owl:DISPForDataHolder
    annotations:
      dct_source: DGA 10.a
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DISPForDataHolder
      dpv_extension_slug: legal/eu/dga

  DISPForDataSubject:
    is_a: DISP
    class_uri: legal_eu_dga:DISPForDataSubject
    description: |-
      An entity who makes data subjects' personal data available for potential
      data users
    aliases:
      - Data Intermediation Service Provider for Data Subject
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DISPForDataSubject
      - dpv_legal_eu_dga_owl:DISPForDataSubject
    annotations:
      dct_source: DGA 10.b
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DISPForDataSubject
      dpv_extension_slug: legal/eu/dga

  DataAltruismAuthority:
    is_a: DpvAuthority
    class_uri: legal_eu_dga:DataAltruismAuthority
    description: |-
      An authority tasked with overseeing the activity of data altruism
      organisations and maintaining a public register of said entities
    aliases:
      - Data Altruism Authority
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataAltruismAuthority
      - dpv_legal_eu_dga_owl:DataAltruismAuthority
    close_mappings:
      - iso27701:SupervisoryAuthority
    annotations:
      dct_source: DGA 23
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DataAltruismAuthority
      dpv_extension_slug: legal/eu/dga

  DataAltruismOrganisation:
    is_a: NonProfitOrganisation
    class_uri: legal_eu_dga:DataAltruismOrganisation
    description: |-
      An non-profit organisation who collects and shares data for altruistic
      purposes
    aliases:
      - Data Altruism Organisation
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataAltruismOrganisation
      - dpv_legal_eu_dga_owl:DataAltruismOrganisation
    related_mappings:
      - iso27701:PIIController
    annotations:
      dct_source: ' 18'
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DataAltruismOrganisation
      dpv_extension_slug: legal/eu/dga

  DataCooperative:
    is_a: DISP
    class_uri: legal_eu_dga:DataCooperative
    description: |-
      An entity constituted by data subjects, one-person undertakings or SMEs
      who provides data intermediation services and supports its members in
      the exercise of their data-related rights
    aliases:
      - Data Cooperative
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataCooperative
      - dpv_legal_eu_dga_owl:DataCooperative
    related_mappings:
      - iso27701:PIIController
    annotations:
      dct_source: ' 10.c'
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DataCooperative
      dpv_extension_slug: legal/eu/dga

  DataHolder:
    is_a: LegalEntity
    class_uri: legal_eu_dga:DataHolder
    description: |-
      An entity who has the right to grant access to or to share certain
      personal data or non-personal data
    aliases:
      - Data Holder
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataHolder
      - dpv_legal_eu_dga_owl:DataHolder
    close_mappings:
      - iso27701:PIIController
    annotations:
      dct_source: DGA 2.8
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DataHolder
      dpv_extension_slug: legal/eu/dga

  DataIntermediationAuthority:
    is_a: DpvAuthority
    class_uri: legal_eu_dga:DataIntermediationAuthority
    description: |-
      An authority tasked with overseeing the activity of data intermediation
      service providers and maintaining a public register of said entities
    aliases:
      - Data Intermediation Authority
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataIntermediationAuthority
      - dpv_legal_eu_dga_owl:DataIntermediationAuthority
    close_mappings:
      - iso27701:SupervisoryAuthority
    annotations:
      dct_source: DGA 13
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DataIntermediationAuthority
      dpv_extension_slug: legal/eu/dga

  DataReuseAssistant:
    is_a: DpvEntity
    class_uri: legal_eu_dga:DataReuseAssistant
    description: |-
      An entity designated by the Member State to provide technical support
      and guidance to public sector bodies regarding access and reuse of data
      and for requesting consent and permissions
    aliases:
      - Data Reuse Assistant
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataReuseAssistant
      - dpv_legal_eu_dga_owl:DataReuseAssistant
    annotations:
      dct_source: DGA 7
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DataReuseAssistant
      dpv_extension_slug: legal/eu/dga

  DataUser:
    is_a: LegalEntity
    class_uri: legal_eu_dga:DataUser
    description: |-
      An entity who has access and the right to use personal or non-personal
      data for commercial or non-commercial purposes
    aliases:
      - Data User
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:DataUser
      - dpv_legal_eu_dga_owl:DataUser
    close_mappings:
      - iso27701:ThirdParty
    annotations:
      dct_source: DGA 2.9
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#DataUser
      dpv_extension_slug: legal/eu/dga

  EUSIPProvider:
    is_a: SIPProvider
    class_uri: legal_eu_dga:EUSIPProvider
    description: |-
      An entity who is responsible for receiving and transmitting requests for
      the reuse of public data in the EU
    aliases:
      - EU Single Information Point Provider
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:EUSIPProvider
      - dpv_legal_eu_dga_owl:EUSIPProvider
    annotations:
      dct_source: DGA 8.4
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#EUSIPProvider
      dpv_extension_slug: legal/eu/dga

  EuropeanDataInnovationBoard:
    is_a: SupraNationalAuthority
    class_uri: legal_eu_dga:EuropeanDataInnovationBoard
    description: |-
      An authority tasked with overseeing the activities of data
      intermediation service providers and data altruism organisations
    aliases:
      - European Data Innovation Board
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:EuropeanDataInnovationBoard
      - dpv_legal_eu_dga_owl:EuropeanDataInnovationBoard
    annotations:
      dct_source: DGA 29
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#EuropeanDataInnovationBoard
      dpv_extension_slug: legal/eu/dga

  LegalRepresentative:
    is_a: Representative
    class_uri: legal_eu_dga:LegalRepresentative
    description: |-
      Legal Representative' means a natural or legal person established in the
      Union explicitly designated to act on behalf of a data intermediation
      services provider or an entity that collects data for objectives of
      general interest made available by natural or legal persons on the basis
      of data altruism not established in the Union, which may be addressed by
      the competent authorities for data intermediation services and the
      competent authorities for the registration of data altruism
      organisations in addition to or instead of the data intermediation
      services provider or entity with regard to the obligations under this
      Regulation, including with regard to initiating enforcement proceedings
      against a non-compliant data intermediation services provider or entity
      not established in the Union
    aliases:
      - Legal Representative
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:LegalRepresentative
      - dpv_legal_eu_dga_owl:LegalRepresentative
    related_mappings:
      - iso27701:Clause_7_2_4
    annotations:
      dct_source: DGA 2.21
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#LegalRepresentative
      dpv_extension_slug: legal/eu/dga

  LocalSIPProvider:
    is_a: SIPProvider
    class_uri: legal_eu_dga:LocalSIPProvider
    description: |-
      A local entity who is responsible for receiving and transmitting
      requests for the reuse of public data
    aliases:
      - Local Single Information Point Provider
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:LocalSIPProvider
      - dpv_legal_eu_dga_owl:LocalSIPProvider
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#LocalSIPProvider
      dpv_extension_slug: legal/eu/dga

  NationalSIPProvider:
    is_a: SIPProvider
    class_uri: legal_eu_dga:NationalSIPProvider
    description: |-
      A national entity who is responsible for receiving and transmitting
      requests for the reuse of public data
    aliases:
      - National Single Information Point Provider
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:NationalSIPProvider
      - dpv_legal_eu_dga_owl:NationalSIPProvider
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#NationalSIPProvider
      dpv_extension_slug: legal/eu/dga

  PublicLawGovernedBody:
    is_a: LegalEntity
    class_uri: legal_eu_dga:PublicLawGovernedBody
    description: |-
      Public Law Governed Body' or 'Body Governed by Public Law' means bodies
      that have the following characteristics: (a) they are established for
      the specific purpose of meeting needs in the general interest, and do
      not have an industrial or commercial character; (b) they have legal
      personality; (c) they are financed, for the most part, by the State,
      regional or local authorities, or other bodies governed by public law,
      are subject to management supervision by those authorities or bodies, or
      have an administrative, managerial or supervisory board, more than half
      of whose members are appointed by the State, regional or local
      authorities, or by other bodies governed by public law;
    aliases:
      - Public Law Governed Body
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:PublicLawGovernedBody
      - dpv_legal_eu_dga_owl:PublicLawGovernedBody
    annotations:
      dct_source: DGA 2.18
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#PublicLawGovernedBody
      dpv_extension_slug: legal/eu/dga

  PublicSectorBody:
    class_uri: legal_eu_dga:PublicSectorBody
    description: |-
      ‘Public Sector Body’ means the State, regional or local authorities,
      bodies governed by public law or associations formed by one or more such
      authorities, or one or more such bodies governed by public law
    aliases:
      - Public Sector Body
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:PublicSectorBody
      - dpv_legal_eu_dga_owl:PublicSectorBody
    related_mappings:
      - iso27701:PIIController
    annotations:
      dct_source: DGA 2.17
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#PublicSectorBody
      dpv_extension_slug: legal/eu/dga

  RegionalSIPProvider:
    is_a: SIPProvider
    class_uri: legal_eu_dga:RegionalSIPProvider
    description: |-
      A regional entity who is responsible for receiving and transmitting
      requests for the reuse of public data
    aliases:
      - Regional Single Information Point Provider
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:RegionalSIPProvider
      - dpv_legal_eu_dga_owl:RegionalSIPProvider
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#RegionalSIPProvider
      dpv_extension_slug: legal/eu/dga

  SIPProvider:
    is_a: LegalEntity
    class_uri: legal_eu_dga:SIPProvider
    description: |-
      An entity who is responsible for receiving and transmitting requests for
      the reuse of public data
    aliases:
      - Single Information Point Provider
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:SIPProvider
      - dpv_legal_eu_dga_owl:SIPProvider
    annotations:
      dct_source: DGA 8
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#SIPProvider
      dpv_extension_slug: legal/eu/dga

  SectorialSIPProvider:
    is_a: SIPProvider
    class_uri: legal_eu_dga:SectorialSIPProvider
    description: |-
      An entity who is responsible for receiving and transmitting requests for
      the reuse of public data for a particular sector
    aliases:
      - Sectorial Single Information Point Provider
    in_subset:
      - legal_eu_dga_entities_subset
    exact_mappings:
      - dpv_legal_eu_dga:SectorialSIPProvider
      - dpv_legal_eu_dga_owl:SectorialSIPProvider
    annotations:
