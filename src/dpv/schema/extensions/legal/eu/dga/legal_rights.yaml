  A28:
    is_a: Right
    class_uri: legal_eu_dga:A28
    description: |-
      Right of affected natural and legal persons to an effective judicial
      remedy
    aliases:
      - A28 Right to an effective judicial remedy
    comments:
      - |-
        The right is scoped to legally binding decisions referred to in Article
        14 taken by the competent authorities for data intermediation services
        in the management, control and enforcement of the notification regime
        for data intermediation services providers and legally binding decisions
        referred to in Articles 19 and 24 taken by the competent authorities for
        the registration of data altruism organisations in the monitoring of
        recognised data altruism organisations
    in_subset:
      - legal_eu_dga_legal_rights_subset
    exact_mappings:
      - dpv_legal_eu_dga:A28
      - dpv_legal_eu_dga_owl:A28
    annotations:
      dct_source: DGA 28
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#A28
      dpv_extension_slug: legal/eu/dga

  A283:
    is_a: A28
    mixins:
      - Right
    class_uri: legal_eu_dga:A28-3
    description: |-
      Right of natural and legal persons to get a review by an impartial body
      with the appropriate expertise
    aliases:
      - A28-3
      - A28-3 Right to Impartial Review
    in_subset:
      - legal_eu_dga_legal_rights_subset
    exact_mappings:
      - dpv_legal_eu_dga:A28-3
      - dpv_legal_eu_dga_owl:A28-3
    annotations:
      dct_source: DGA 28.3
      upstream_iri: https://w3id.org/dpv/legal/eu/dga/owl#A28-3
      dpv_extension_slug: legal/eu/dga

  A92:
    is_a: Right
    class_uri: legal_eu_dga:A9-2
    description: |-
      Right of redress for a natural or legal person directly affected by a
      decision regarding reuse (A9-1), in the Member State where the relevant
      body is located
