  ProportionalityAssessment:
    is_a: ImpactAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: legal_eu_gdpr:ProportionalityAssessment
    description: |-
      Proportionality is a general principle of EU law, which when applied for
      the GDPR requires striking a balance between the processing of personal
      data and the resulting impacts on rights. More simply, the processing
      should not result in a disproportionate impact on rights
    aliases:
      - Proportionality Assessment
    comments:
      - |-
        The assessment of proportionality requires an assessment of suitability
        (represented by `eu-gdpr:SuitabilityAssessment`), necessity (represented
        by `eu-gdpr:NecessityAssessment`), and a balancing test (represented by
        `eu-gdpr:BalancingTest`). The outcome of the proportionality assessment
        is represented as an instance of `eu-gdpr:ProportionalityStatus`
    in_subset:
      - legal_eu_gdpr_subset
