  JustificationA12Complexity:
    is_a: ComplexityOfProcess
    mixins:
      - Justification
      - JustificationA12Delay
    class_uri: legal_eu_gdpr:JustificationA12Complexity
    description: |-
      Justification that the request under A15-A22 is delayed due to
      complexity in fulfilling it
    aliases:
      - Justification A12 - Complexity
    in_subset:
      - legal_eu_gdpr_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:JustificationA12Complexity
      - dpv_legal_eu_gdpr_owl:JustificationA12Complexity
    annotations:
      dct_source: GDPR Art.12-3
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#JustificationA12Complexity
      dpv_extension_slug: legal/eu/gdpr

  JustificationA12Delay:
    is_a: DelayJustification
    mixins:
      - Justification
    class_uri: legal_eu_gdpr:JustificationA12Delay
    description: Justification that the request under A15-A22 is delayed
    aliases:
      - Justification A12 - Delay
    comments:
      - |-
        The justification is for when the initial process, which is to be
        completed within one month of receipt of the request, is delayed with
        Art.12-3 stating a duration of two further months where necessary taking
        into account the complexity and number of the requests. In such cases,
        the controller is needed to inform the data subject of the extension
        within one month of receipt of the request together with the reasons for
        the delay - which is done through this extension. Information about
        expected duration of response can be provided through use of
        dpv:hasDuration. The specific nature of delay can be expressed through
        use of eu-gdpr:A12ComplexityOfRequest or eu-gdpr:A12HighVolumeOfRequest
    in_subset:
      - legal_eu_gdpr_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:JustificationA12Delay
      - dpv_legal_eu_gdpr_owl:JustificationA12Delay
    annotations:
      dct_source: GDPR Art.12-3
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#JustificationA12Delay
      dpv_extension_slug: legal/eu/gdpr

  JustificationA12HighVolume:
    is_a: HighVolumeOfProcesses
    mixins:
      - Justification
      - JustificationA12Delay
    class_uri: legal_eu_gdpr:JustificationA12HighVolume
    description: |-
      Justification that the request under A15-A22 is delayed due to high
      volume of similar requestes required to be fulfilled
    aliases:
      - Justification A12 - High Volume
    in_subset:
      - legal_eu_gdpr_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:JustificationA12HighVolume
      - dpv_legal_eu_gdpr_owl:JustificationA12HighVolume
    annotations:
      dct_source: GDPR Art.12-3
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#JustificationA12HighVolume
      dpv_extension_slug: legal/eu/gdpr

  JustificationA12IdentityFailure:
    is_a: IdentityVerificationFailure
    mixins:
      - Justification
    class_uri: legal_eu_gdpr:JustificationA12IdentityFailure
    description: |-
      Justification that a request under A14-21 could not be fulfilled due to
      lack of identity verification
    aliases:
      - Justification A12 - Identity Failure
    comments:
      - |-
        For justifications where identity cannot be verified and requires
        additional information, eu-gdpr:A12IdentityVerificationRequired should
        be used
    in_subset:
      - legal_eu_gdpr_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:JustificationA12IdentityFailure
      - dpv_legal_eu_gdpr_owl:JustificationA12IdentityFailure
    annotations:
      dct_source: GDPR Art.12-6
      upstream_iri: https://w3id.org/dpv/legal/eu/gdpr/owl#JustificationA12IdentityFailure
      dpv_extension_slug: legal/eu/gdpr

  JustificationA12IdentityRequired:
    is_a: IdentityVerificationRequired
    mixins:
      - Justification
    class_uri: legal_eu_gdpr:JustificationA12IdentityRequired
    description: |-
      Justification that a request under A14-21 could not be fulfilled due to
      lack of identity verification, and therefore requires additional
      information to complete the identity verification request
    aliases:
      - Justification A12 - Identity Required
    comments:
      - |-
        If the purpose of this justification is to ask for identity
        verification, then it requires information on what information is
        considered as an acceptable form of identity, which can ideally be
        expressed through dpv:Process and relevant dpv:PersonalData categories,
        or through a comment or description for the justification
    in_subset:
      - legal_eu_gdpr_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:JustificationA12IdentityRequired
      - dpv_legal_eu_gdpr_owl:JustificationA12IdentityRequired
    annotations:
      dct_source: GDPR Art.12-6
      upstream_iri: |-
        https://w3id.org/dpv/legal/eu/gdpr/owl#JustificationA12IdentityRequired
      dpv_extension_slug: legal/eu/gdpr

  JustificationA12InformationRequired:
    is_a: InformationRequired
    mixins:
      - Justification
    class_uri: legal_eu_gdpr:JustificationA12InformationRequired
    description: |-
      Justification that the request under A14-21 could not be fulfilled due
      to additional information being required
    aliases:
      - Justification A12 - Information Required
    comments:
      - |-
        If the purpose of this justification is to ask for identity
        verification, then eu-gdpr:A12IdentityVerificationRequired should be
        used. The information required can be expressed using dpv:Process, which
        allows also expressing the purpose for why it is required and relevant
        dpv:PersonalData categories, or through a comment or description for the
        justification
    in_subset:
      - legal_eu_gdpr_subset
    exact_mappings:
      - dpv_legal_eu_gdpr:JustificationA12InformationRequired
      - dpv_legal_eu_gdpr_owl:JustificationA12InformationRequired
    annotations:
