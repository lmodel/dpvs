id: https://w3id.org/lmodel/dpv/legal/eu/nis2/notice
name: dpv_legal_eu_nis2_notice
title: DPV - Legal - Eu - Nis2 / Notice
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `legal/eu/nis2/modules/notice-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/legal/eu/nis2
  - https://w3c.github.io/dpv/2.3/legal/eu/nis2/
source: https://w3id.org/dpv/legal/eu/nis2/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/eu/nis2
  dpv_submodule: notice
  source_ttl: upstream-releases/dpv/legal/eu/nis2/modules/notice-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/eu/nis2/modules/notice.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/eu/nis2/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/eu/nis2#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
