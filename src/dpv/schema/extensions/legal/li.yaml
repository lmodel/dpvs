id: https://w3id.org/lmodel/dpv/legal/li
name: dpv_legal_li
title: DPV - Legal - Li
description: |-
  LinkML schema generated from the DPV 2.3 extension `legal/li`
  (`legal-li-owl.ttl`), enriched with canonical SKOS metadata. Imports the
  semantic-group schema(s) `dpv:schema/dpv_legal_basis`,
  `dpv:schema/dpv_entities` for the abstract parent classes this extension
  specialises (instead of the full umbrella `dpv:schema/dpv`).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/legal/li
  - https://w3c.github.io/dpv/2.3/legal/li/
source: https://w3id.org/dpv/legal/li/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/li
  source_ttl: upstream-releases/dpv/legal/li/legal-li-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/li/legal-li.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/li/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/li#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  legal_li: https://w3id.org/lmodel/dpv/legal/li/
  dpv_legal_li: https://w3id.org/dpv/legal/li#
  dpv_legal_li_owl: https://w3id.org/dpv/legal/li/owl#
  legal_eu_gdpr: https://w3id.org/lmodel/dpv/legal/eu/gdpr/
  dpv_legal_eu_gdpr: https://w3id.org/dpv/legal/eu/gdpr#
  dpv_legal_eu_gdpr_owl: https://w3id.org/dpv/legal/eu/gdpr/owl#

default_prefix: legal_li
default_range: string
id_prefixes:
  - legal_li
  - dpv_legal_li
  - dpv_legal_li_owl

imports:
  - linkml:types
  - dpv:schema/dpv_legal_basis
  - dpv:schema/dpv_entities
  - dpv:schema/extensions/legal/eu/gdpr

subsets:

  legal_li_subset:
    description: All entities from the DPV `legal/li` extension.

  legal_li_li_subset:
    description: Entities from the DPV `legal/li/modules/li` submodule.

classes:

  DPALI:
    is_a: DataProtectionAuthority
    mixins:
      - Law
    class_uri: legal_li:DPA-LI
    aliases:
      - DPA-LI
      - State Data Protection Inspectorate
    in_subset:
      - legal_li_subset
    exact_mappings:
      - dpv_legal_li:DPA-LI
      - dpv_legal_li_owl:DPA-LI
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/li/owl#DPA-LI
      dpv_extension_slug: legal/li
