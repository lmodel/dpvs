id: https://w3id.org/lmodel/dpv/legal/ph
name: dpv_legal_ph
title: DPV - Legal - Ph
description: |-
  LinkML schema generated from the DPV 2.3 extension `legal/ph`
  (`legal-ph-owl.ttl`), enriched with canonical SKOS metadata. Imports the
  aggregate core schema `dpv:schema/dpv_core` for the abstract parent
  classes this extension specialises.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/legal/ph
  - https://w3c.github.io/dpv/2.3/legal/ph/
source: https://w3id.org/dpv/legal/ph/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/ph
  source_ttl: upstream-releases/dpv/legal/ph/legal-ph-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/ph/legal-ph.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/ph/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/ph#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  legal_ph: https://w3id.org/lmodel/dpv/legal/ph/
  dpv_legal_ph: https://w3id.org/dpv/legal/ph#
  dpv_legal_ph_owl: https://w3id.org/dpv/legal/ph/owl#

default_prefix: legal_ph
default_range: string
id_prefixes:
  - legal_ph
  - dpv_legal_ph
  - dpv_legal_ph_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core

subsets:

  legal_ph_subset:
    description: All entities from the DPV `legal/ph` extension.

  legal_ph_ph_subset:
    description: Entities from the DPV `legal/ph/modules/ph` submodule.

classes:

  DPAPH:
    is_a: DataProtectionAuthority
    mixins:
      - Law
    class_uri: legal_ph:DPA-PH
    aliases:
      - DPA-PH
      - National Privacy Commission (NPC)
    in_subset:
      - legal_ph_subset
    exact_mappings:
      - dpv_legal_ph:DPA-PH
      - dpv_legal_ph_owl:DPA-PH
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/ph/owl#DPA-PH
      dpv_extension_slug: legal/ph

  lawDPA:
    is_a: Law
    class_uri: legal_ph:law-DPA
    aliases:
      - law-DPA
      - Data Privacy Act of 2012 (Republic Act No. 10173) (DPA)
    in_subset:
      - legal_ph_subset
    exact_mappings:
      - dpv_legal_ph:law-DPA
      - dpv_legal_ph_owl:law-DPA
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/ph/owl#law-DPA
      dpv_extension_slug: legal/ph
