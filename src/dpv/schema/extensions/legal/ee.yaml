id: https://w3id.org/lmodel/dpv/legal/ee
name: dpv_legal_ee
title: DPV - Legal - Ee
description: |-
  LinkML schema generated from the DPV 2.3 extension `legal/ee`
  (`legal-ee-owl.ttl`), enriched with canonical SKOS metadata. Imports the
  semantic-group schema(s) `dpv:schema/dpv_legal_basis` for the abstract
  parent classes this extension specialises (instead of the full umbrella
  `dpv:schema/dpv`).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/legal/ee
  - https://w3c.github.io/dpv/2.3/legal/ee/
source: https://w3id.org/dpv/legal/ee/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/ee
  source_ttl: upstream-releases/dpv/legal/ee/legal-ee-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/ee/legal-ee.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/ee/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/ee#

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  legal_ee: https://w3id.org/lmodel/dpv/legal/ee/
  dpv_legal_ee: https://w3id.org/dpv/legal/ee#
  dpv_legal_ee_owl: https://w3id.org/dpv/legal/ee/owl#
  legal_eu_gdpr: https://w3id.org/lmodel/dpv/legal/eu/gdpr/
  dpv_legal_eu_gdpr: https://w3id.org/dpv/legal/eu/gdpr#
  dpv_legal_eu_gdpr_owl: https://w3id.org/dpv/legal/eu/gdpr/owl#

default_prefix: legal_ee
default_range: string
id_prefixes:
  - legal_ee
  - dpv_legal_ee
  - dpv_legal_ee_owl

imports:
  - linkml:types
  - dpv:schema/dpv_legal_basis
  - dpv:schema/extensions/legal/eu/gdpr

subsets:

  legal_ee_subset:
    description: All entities from the DPV `legal/ee` extension.

  legal_ee_ee_subset:
    description: Entities from the DPV `legal/ee/modules/ee` submodule.

classes:

  DPAEE:
    is_a: LegalEuGdprDataProtectionAuthority
    mixins:
      - Law
    class_uri: legal_ee:DPA-EE
    aliases:
      - DPA-EE
      - Data Protection Inspectorate (AKI)
    in_subset:
      - legal_ee_ee_subset
      - legal_ee_subset
    exact_mappings:
      - dpv_legal_ee:DPA-EE
      - dpv_legal_ee_owl:DPA-EE
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/ee/owl#DPA-EE
      dpv_extension_slug: legal/ee
