id: https://w3id.org/lmodel/dpv/legal/hr
name: dpv_legal_hr
title: DPV - Legal - Hr
description: |-
  LinkML schema generated from the DPV 2.3 extension `legal/hr`
  (`legal-hr-owl.ttl`), enriched with canonical SKOS metadata. Imports the
  aggregate core schema `dpv:schema/dpv_core` for the abstract parent
  classes this extension specialises.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/legal/hr
  - https://w3c.github.io/dpv/2.3/legal/hr/
source: https://w3id.org/dpv/legal/hr/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/hr
  source_ttl: upstream-releases/dpv/legal/hr/legal-hr-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/hr/legal-hr.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/hr/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/hr#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  legal_hr: https://w3id.org/lmodel/dpv/legal/hr/
  dpv_legal_hr: https://w3id.org/dpv/legal/hr#
  dpv_legal_hr_owl: https://w3id.org/dpv/legal/hr/owl#
  legal_eu_gdpr: https://w3id.org/lmodel/dpv/legal/eu/gdpr/
  dpv_legal_eu_gdpr: https://w3id.org/dpv/legal/eu/gdpr#
  dpv_legal_eu_gdpr_owl: https://w3id.org/dpv/legal/eu/gdpr/owl#

default_prefix: legal_hr
default_range: string
id_prefixes:
  - legal_hr
  - dpv_legal_hr
  - dpv_legal_hr_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/legal/eu/gdpr

subsets:

  legal_hr_subset:
    description: All entities from the DPV `legal/hr` extension.

  legal_hr_hr_subset:
    description: Entities from the DPV `legal/hr/modules/hr` submodule.

classes:

  DPAHR:
    is_a: DataProtectionAuthority
    mixins:
      - Law
    class_uri: legal_hr:DPA-HR
    aliases:
      - DPA-HR
      - Personal Data Protection Agency (AZOP)
    in_subset:
      - legal_hr_subset
    exact_mappings:
      - dpv_legal_hr:DPA-HR
      - dpv_legal_hr_owl:DPA-HR
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/hr/owl#DPA-HR
      dpv_extension_slug: legal/hr
