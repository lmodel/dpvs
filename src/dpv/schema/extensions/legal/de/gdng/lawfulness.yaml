  P61:
    class_uri: legal_de_gdng:P6-1
    description: |-
      Weiterverarbeitung von Daten auf Basis der Rechtsgrundlage § 6(1) GDNG
      unter Berücksichtigung aller sich daraus ergebenden Rechte und Pflichten
    aliases:
      - P6-1
      - Rechtsgrundlage nach § 6(1) GDNG
    comments:
      - |-
        Compliance with all rights and obligations from § 6(1) GDNG must be
        ensured. These include, among others: Processing of lawfully stored data
        pursuant to Regulation (EU) 2016/679 Art. 9(2) points (h) and (i)  for
        the purposes of quality assurance, patient safety, or for medical,
        rehabilitative and nursing research or for statistical purposes,
        including health reporting. Processed personal data shall be
        pseudonymised and, as soon as possible, anonymised. Further processing
        by natural persons requires a rights and roles concept. Further
        processed data shall be erased no later than after 30 years. § 14 of the
        Transplantation Act shall be observed
    in_subset:
      - legal_de_gdng_lawfulness_subset
    exact_mappings:
      - dpv_legal_de_gdng:P6-1
      - dpv_legal_de_gdng_owl:P6-1
    annotations:
      dct_source: '[[GDNG]] § 6(1)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#P6-1
      dpv_extension_slug: legal/de/gdng

  P63Consent:
    class_uri: legal_de_gdng:P6-3-Consent
    description: |-
      Weitergabe von personenbezogenen Daten an Dritte auf Grundlage einer
      Einwilligung der betroffenen Person nach § 6(3) GDNG, unter
      Berücksichtigung aller sich daraus ergebenden Rechte und Pflichten
    aliases:
      - P6-3-Consent
      - Rechtsgrundlage durch Einwilligung gemäß § 6(3) GDNG
    comments:
      - |-
        Compliance with all rights and obligations from § 6(3) GDNG must be
        ensured. These include, among others: Transfer of personal data to third
        parties based on consent of the data subject, in compliance with all
        requirements of § 6(3) GDNG for the purposes defined in § 6(1) GDNG
    in_subset:
      - legal_de_gdng_lawfulness_subset
    exact_mappings:
      - dpv_legal_de_gdng:P6-3-Consent
      - dpv_legal_de_gdng_owl:P6-3-Consent
    annotations:
      dct_source: '[[GDNG]] § 6(3)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#P6-3-Consent
      dpv_extension_slug: legal/de/gdng

  P63PublicJointResearch:
    class_uri: legal_de_gdng:P6-3-PublicJointResearch
    description: |-
      Weitergabe von personenbezogenen Daten an Dritte innerhalb von
      öffentlich geförderten Zusammenschlüssen von datenverarbeitenden
      Gesundheitseinrichtungen nach § 6(3) GDNG, unter Berücksichtigung aller
      sich daraus ergebenden Rechte und Pflichten
    aliases:
      - P6-3-PublicJointResearch
      - |-
        Rechtsgrundlage Verbundforschung in öffentlich geförderten
        Zusammenschlüssen gemäß § 6(3) GDNG
    comments:
      - |-
        Compliance with all rights and obligations from § 6(3) GDNG must be
        ensured. These include, among others: Transfer of personal data to third
        parties within publicly funded networks of data processing healthcare
        facilitys, including joint research projects and research practice
        networks, in compliance with all requirements of § 6(3) GDNG for the
        purposes defined in § 6(1) GDNG
    in_subset:
      - legal_de_gdng_lawfulness_subset
    exact_mappings:
      - dpv_legal_de_gdng:P6-3-PublicJointResearch
      - dpv_legal_de_gdng_owl:P6-3-PublicJointResearch
    annotations:
      dct_source: '[[GDNG]] § 6(3)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#P6-3-PublicJointResearch
      dpv_extension_slug: legal/de/gdng

