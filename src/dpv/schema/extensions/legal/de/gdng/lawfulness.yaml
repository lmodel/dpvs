  RightsRolesConcept:
    class_uri: legal_de_gdng:RightsRolesConcept
    description: |-
      Nach der Rechtsgrundlage § 6(1) GDNG weitervarbeitete personenbezogene
      Daten dürfen von natürlichen Personen nur an Gesundheitseinrichtungen
      weiterverarbeitet werden, wenn dort ein Rechte- und Rollenkonzept
