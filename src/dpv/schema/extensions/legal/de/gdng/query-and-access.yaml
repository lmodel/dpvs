classes:

  HealthDataAccessApplication:
    class_uri: legal_de_gdng:HealthDataAccessApplication
    description: |-
      Prozess zur Beantragung von Zugang zu Gesundheitsdaten bei
      datenhaltenden Stellen durch Datennutzende, der durch die DACO
      unterstützt und koordiniert wird
    aliases:
      - Antrag auf Zugang zu Gesundheitsdaten
    in_subset:
      - legal_de_gdng_query-and-access_subset
    exact_mappings:
      - dpv_legal_de_gdng:HealthDataAccessApplication
      - dpv_legal_de_gdng_owl:HealthDataAccessApplication
    annotations:
      dct_source: '4'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#HealthDataAccessApplication
      dpv_extension_slug: legal/de/gdng

  HealthDataAccessApplicationRecord:
    class_uri: legal_de_gdng:HealthDataAccessApplicationRecord
    description: |-
      Im Rahmen der Antragsstellung des Zugangs auf Gesundheitsdaten zu
      erfassende und anfallende Daten, die auch im öffentlichen
      Antragsregister veröffentlicht werden
    aliases:
      - Gesundheitsdatenzugangsantragsdaten
    in_subset:
      - legal_de_gdng_query-and-access_subset
    exact_mappings:
      - dpv_legal_de_gdng:HealthDataAccessApplicationRecord
      - dpv_legal_de_gdng_owl:HealthDataAccessApplicationRecord
    annotations:
      dct_source: '4'
      upstream_iri: |-
        https://w3id.org/dpv/legal/de/gdng/owl#HealthDataAccessApplicationRecord
      dpv_extension_slug: legal/de/gdng

  HealthDataQuery:
    class_uri: legal_de_gdng:HealthDataQuery
    description: |-
      Prozess der Identifizierung und Lokalisierung von Gesundheitsdaten durch
      Datennutzende für ihre Zwecke, welche dazu von der DACO beraten werden
    aliases:
      - Identifizierung und Lokalisierung von Gesundheitsdaten
    in_subset:
      - legal_de_gdng_query-and-access_subset
    exact_mappings:
      - dpv_legal_de_gdng:HealthDataQuery
      - dpv_legal_de_gdng_owl:HealthDataQuery
    annotations:
      dct_source: '[[GDNG]] § 3(2) point 2'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#HealthDataQuery
      dpv_extension_slug: legal/de/gdng

  HealthDataQueryRecord:
    class_uri: legal_de_gdng:HealthDataQueryRecord
    description: |-
      Die im Rahmen der Identifikation und Lokalisierung von Gesundheitsdaten
      zu erfassenden und anfallende Daten
    aliases:
      - Gesundheitsdatenanfragedaten
    in_subset:
      - legal_de_gdng_query-and-access_subset
    exact_mappings:
      - dpv_legal_de_gdng:HealthDataQueryRecord
      - dpv_legal_de_gdng_owl:HealthDataQueryRecord
    annotations:
      dct_source: '[[GDNG]] § 3(2) point 2'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#HealthDataQueryRecord
      dpv_extension_slug: legal/de/gdng

  PublicHealthDataAccessApplicationRegister:
    class_uri: legal_de_gdng:PublicHealthDataAccessApplicationRegister
    description: |-
      Von der DACO gepflegtes, öffentliches Register mit Informationen zu den
      über die DACO gestellten Anträgen auf Zugang zu Gesundheitsdaten, zu den
      Datennutzenden, zu den Vorhaben, für die Daten beantragt wurden, und zu
      deren Ergebnissen
    aliases:
      - Öffentliches Antragsregister
    in_subset:
      - legal_de_gdng_query-and-access_subset
    exact_mappings:
      - dpv_legal_de_gdng:PublicHealthDataAccessApplicationRegister
      - dpv_legal_de_gdng_owl:PublicHealthDataAccessApplicationRegister
    annotations:
      dct_source: '[[GDNG]] § 3(2) point7'
      upstream_iri: |-
        https://w3id.org/dpv/legal/de/gdng/owl#PublicHealthDataAccessApplicationRegister
      dpv_extension_slug: legal/de/gdng

  PublicMetadataCatalogue:
    class_uri: legal_de_gdng:PublicMetadataCatalogue
    description: |-
      Von der DACO barrierefrei zu führender und pflegender Katalog, in dem zu
      Transparenzzwecken Informationen über die im deutschen Gesundheitswesen
      vorhandenen und öffentlich zugänglichen Gesundheitsdaten und über die
      jeweiligen Halter dieser Daten gesammelt werden
    aliases:
      - Öffentlicher Metadaten-Katalog
    in_subset:
      - legal_de_gdng_query-and-access_subset
    exact_mappings:
      - dpv_legal_de_gdng:PublicMetadataCatalogue
      - dpv_legal_de_gdng_owl:PublicMetadataCatalogue
    annotations:
      dct_source: '[[GDNG]] § 3(2) point 1'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#PublicMetadataCatalogue
      dpv_extension_slug: legal/de/gdng

  SecureProcessingEnvironment:
    class_uri: legal_de_gdng:SecureProcessingEnvironment
    description: |-
      Durch die DACO konzeptionierte Maßnahme zur Verbesserung des
      Datenschutzes und der Datensicherheit im Rahmen der Weiterverarbeitung
      von Gesundheitsdaten zu Forschungszwecken und weiteren im Gemeinwohl
      liegenden Zwecken
    aliases:
      - Sichere Verarbeitungsumgebung
    in_subset:
      - legal_de_gdng_query-and-access_subset
    exact_mappings:
      - dpv_legal_de_gdng:SecureProcessingEnvironment
      - dpv_legal_de_gdng_owl:SecureProcessingEnvironment
    annotations:
      dct_source: '[[GDNG]] § 3(2) point 9'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#SecureProcessingEnvironment
      dpv_extension_slug: legal/de/gdng
