classes:

  AuthorizedPerson:
    class_uri: legal_de_gdng:AuthorizedPerson
    description: |-
      Eine natürliche Person die nach einem Rechte- und Rollenkonzept die
      Weiterverarbeitung von Gesundheitsdaten nach der Rechtsgrundlage § 6(1)
      GDNG an einer Gesundheitseinrichtung durchführt
    aliases:
      - Befugte Person
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:AuthorizedPerson
      - dpv_legal_de_gdng_owl:AuthorizedPerson
    annotations:
      dct_source: '[[GDNG]] § 6(1)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#AuthorizedPerson
      dpv_extension_slug: legal/de/gdng

  DataAccessAndCoordinationOffice:
    is_a: DpvAuthority
    class_uri: legal_de_gdng:DataAccessAndCoordinationOffice
    description: |-
      Datenzugangs- und Koordinierungsstelle für Gesundheitsdaten (DACO),
      angesiedelt beim Bundesinstitut für Arzneimittel und Medizinprodukte
      (BfArM)
    aliases:
      - Datenzugangs- und Koordinierungsstelle für Gesundheitsdaten (DACO)
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:DataAccessAndCoordinationOffice
      - dpv_legal_de_gdng_owl:DataAccessAndCoordinationOffice
    annotations:
      dct_source: '[[GDNG]] § 3(1)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#DataAccessAndCoordinationOffice
      dpv_extension_slug: legal/de/gdng

  DataInfrastructure:
    is_a: HealthDataHolder
    class_uri: legal_de_gdng:DataInfrastructure
    description: Zusammenschlüsse von datenhaltenden Stellen zu Dateninfrastrukturen
    aliases:
      - Dateninfrastruktur
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:DataInfrastructure
      - dpv_legal_de_gdng_owl:DataInfrastructure
    annotations:
      dct_source: '[[GDNG]] § 2'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#DataInfrastructure
      dpv_extension_slug: legal/de/gdng

  DataPlatform:
    is_a: HealthDataHolder
    class_uri: legal_de_gdng:DataPlatform
    description: Zusammenschlüsse von datenhaltenden Stellen zu Datenplattformen
    aliases:
      - Datenplattform
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:DataPlatform
      - dpv_legal_de_gdng_owl:DataPlatform
    annotations:
      dct_source: '[[GDNG]] § 2'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#DataPlatform
      dpv_extension_slug: legal/de/gdng

  DataProcessingHealthcareFacility:
    class_uri: legal_de_gdng:DataProcessingHealthcareFacility
    description: |-
      Einrichtung, in der für Zwecke der Gesundheitsvorsorge oder der
      Arbeitsmedizin, für die Beurteilung der Arbeitsfähigkeit des
      Beschäftigten, für die medizinische Diagnostik oder für Zwecke der
      Versorgung oder Behandlung im Gesundheits- oder Sozialbereich Daten von
      oder unter der Verantwortung von Angehörigen eines Heilberufs
      verarbeitet werden, der für die Berufsausübung oder die Führung der
      Berufsbezeichnung eine staatlich geregelte Ausbildung erfordert
    aliases:
      - Datenverarbeitende Gesundheitseinrichtung
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:DataProcessingHealthcareFacility
      - dpv_legal_de_gdng_owl:DataProcessingHealthcareFacility
    annotations:
      dct_source: '[[GDNG]] § 2'
      upstream_iri: |-
        https://w3id.org/dpv/legal/de/gdng/owl#DataProcessingHealthcareFacility
      dpv_extension_slug: legal/de/gdng

  DataSubject:
    class_uri: legal_de_gdng:DataSubject
    aliases:
      - Betroffene Person
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:DataSubject
      - dpv_legal_de_gdng_owl:DataSubject
