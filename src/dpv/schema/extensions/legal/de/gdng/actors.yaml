      dct_source: '[[GDNG]] § 6(3)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#DataSubject
      dpv_extension_slug: legal/de/gdng

  FederalStateCentresForCancerRegistryData:
    is_a: HealthDataHolder
    class_uri: legal_de_gdng:FederalStateCentresForCancerRegistryData
    description: |-
      Die klinischen Krebsregister der Länder nach § 65c des Fünften Buches
      Sozialgesetzbuch
    aliases:
      - klinische Krebsregister der Länder
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:FederalStateCentresForCancerRegistryData
      - dpv_legal_de_gdng_owl:FederalStateCentresForCancerRegistryData
    annotations:
      dct_source: '[[GDNG]] § 3(2) point 10'
      upstream_iri: |-
        https://w3id.org/dpv/legal/de/gdng/owl#FederalStateCentresForCancerRegistryData
      dpv_extension_slug: legal/de/gdng

  GermanCentreForCancerRegistryData:
    is_a: RegulatedHealthDataHolder
    class_uri: legal_de_gdng:GermanCentreForCancerRegistryData
    description: |-
      Zentrum für Krebsregisterdaten nach § 1 Bundeskrebsregisterdaten­gesetz
    aliases:
      - Zentrum für Krebsregisterdaten beim Robert-Koch-Institut
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:GermanCentreForCancerRegistryData
      - dpv_legal_de_gdng_owl:GermanCentreForCancerRegistryData
    annotations:
      dct_source: '[[GDNG]] § 2'
      upstream_iri: |-
        https://w3id.org/dpv/legal/de/gdng/owl#GermanCentreForCancerRegistryData
      dpv_extension_slug: legal/de/gdng

  HealthDataHolder:
    class_uri: legal_de_gdng:HealthDataHolder
    description: |-
      Natürliche oder juristische Personen, die berechtigt oder verpflichtet
      sind, Gesundheitsdaten für Forschungszwecke zu verarbeiten
    aliases:
      - Datenhaltende Stelle
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:HealthDataHolder
      - dpv_legal_de_gdng_owl:HealthDataHolder
    annotations:
      dct_source: '[[GDNG]] § 2(3)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#HealthDataHolder
      dpv_extension_slug: legal/de/gdng

  HealthDataLab:
    is_a: RegulatedHealthDataHolder
    class_uri: legal_de_gdng:HealthDataLab
    description: |-
      Forschungsdatenzentrum Gesundheit nach § 303d des Fünften Buches
      Sozialgesetzbuch
    aliases:
      - Forschungsdatenzentrum Gesundheit
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:HealthDataLab
      - dpv_legal_de_gdng_owl:HealthDataLab
    annotations:
      dct_source: '[[GDNG]] § 2'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#HealthDataLab
      dpv_extension_slug: legal/de/gdng

  HealthDataUser:
    class_uri: legal_de_gdng:HealthDataUser
    description: |-
      Natürliche und juristische Personen, die Zugang zu Gesundheitsdaten zu
      Forschungszwecken und weiteren Zwecken begehren oder erhalten haben
    aliases:
      - Datennutzende
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:HealthDataUser
      - dpv_legal_de_gdng_owl:HealthDataUser
    annotations:
      dct_source: '[[GDNG]] § 2'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#HealthDataUser
      dpv_extension_slug: legal/de/gdng

  LegalDeGdngController:
    class_uri: legal_de_gdng:Controller
    aliases:
      - Controller
      - Datenschutzrechtlich verantwortliche Stelle
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:Controller
      - dpv_legal_de_gdng_owl:Controller
    annotations:
      dct_source: '[[GDNG]] § 6(3)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#Controller
      dpv_extension_slug: legal/de/gdng

  ModelProjectGenomeSequencingPlatform:
    is_a: RegulatedHealthDataHolder
    class_uri: legal_de_gdng:ModelProjectGenomeSequencingPlatform
    description: |-
      Plattform nach § 64e Modellvorhaben zur umfassenden Diagnostik und
      Therapiefindung mittels Genomsequenzierung bei seltenen und bei
      onkologischen Erkrankungen, Verordnungsermächtigung des Fünften Buches
      Sozialgesetzbuch
    aliases:
      - Plattform des Modellvorhabens Genomsequenzierung
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:ModelProjectGenomeSequencingPlatform
      - dpv_legal_de_gdng_owl:ModelProjectGenomeSequencingPlatform
    annotations:
      dct_source: '[[GDNG]] § 2'
      upstream_iri: |-
        https://w3id.org/dpv/legal/de/gdng/owl#ModelProjectGenomeSequencingPlatform
      dpv_extension_slug: legal/de/gdng

  PublicJointHealthResearchNetwork:
    class_uri: legal_de_gdng:PublicJointHealthResearchNetwork
    description: |-
      Öffentlich geförderte Zusammenschlüsse von datenverarbeitenden
      Gesundheitseinrichtungen einschließlich Verbundforschungsvorhaben und
      Forschungspraxennetzwerken, die nach § 6(1) GDNG Gesundheitsdaten
      gemeinsam nutzen und verarbeiten
    aliases:
      - |-
        Öffentlich geförderte Zusammenschlüsse von datenverarbeitenden
        Gesundheitseinrichtungen
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:PublicJointHealthResearchNetwork
      - dpv_legal_de_gdng_owl:PublicJointHealthResearchNetwork
    annotations:
      dct_source: '[[GDNG]] § 6(3)'
      upstream_iri: |-
        https://w3id.org/dpv/legal/de/gdng/owl#PublicJointHealthResearchNetwork
      dpv_extension_slug: legal/de/gdng

  RegulatedHealthDataHolder:
    is_a: HealthDataHolder
    class_uri: legal_de_gdng:RegulatedHealthDataHolder
    description: |-
      Solche datenhaltenden Stellen, die gesetzlich geregelt sind, wie das
      Forschungsdatenzentrum Gesundheit, das Zentrum für Krebregisterdaten
      beim RKI und die Plattform nach §64e Abs.9 des fünften Buches
      Sozialgesetzbuch
    aliases:
      - Gesetzlich geregelte datenhaltende Stelle
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:RegulatedHealthDataHolder
      - dpv_legal_de_gdng_owl:RegulatedHealthDataHolder
    annotations:
      dct_source: '[[GDNG]] § 2(3)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#RegulatedHealthDataHolder
      dpv_extension_slug: legal/de/gdng

  ResponsibleDataHoldingAndMediatingBody:
    is_a: HealthDataHolder
    class_uri: legal_de_gdng:ResponsibleDataHoldingAndMediatingBody
    description: |-
      Diejenige datenhaltende und -mittelnde Stelle, die für ein konkretes
      Forschungsvorhaben zuständig ist
    aliases:
      - Zuständige datenhaltende und mittelnde Stelle
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:ResponsibleDataHoldingAndMediatingBody
      - dpv_legal_de_gdng_owl:ResponsibleDataHoldingAndMediatingBody
    annotations:
      dct_source: '[[GDNG]] § 3(2) point 4'
      upstream_iri: |-
        https://w3id.org/dpv/legal/de/gdng/owl#ResponsibleDataHoldingAndMediatingBody
      dpv_extension_slug: legal/de/gdng

  ThirdParty:
    class_uri: legal_de_gdng:ThirdParty
    aliases:
      - Dritte
    in_subset:
      - legal_de_gdng_actors_subset
    exact_mappings:
      - dpv_legal_de_gdng:ThirdParty
      - dpv_legal_de_gdng_owl:ThirdParty
    annotations:
      dct_source: '[[GDNG]] § 6(3)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#ThirdParty
      dpv_extension_slug: legal/de/gdng
