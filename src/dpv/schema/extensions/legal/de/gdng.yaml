      Einrichtung, in der für Zwecke der Gesundheitsvorsorge oder der
      Arbeitsmedizin, für die Beurteilung der Arbeitsfähigkeit des
      Beschäftigten, für die medizinische Diagnostik oder für Zwecke der
      Versorgung oder Behandlung im Gesundheits- oder Sozialbereich Daten von
      oder unter der Verantwortung von Angehörigen eines Heilberufs
      verarbeitet werden, der für die Berufsausübung oder die Führung der
      Berufsbezeichnung eine staatlich geregelte Ausbildung erfordert
