classes:

  Anonymization:
    class_uri: legal_de_gdng:Anonymization
    description: |-
      Nach der Rechtsgrundlage § 6(1) GDNG weitervarbeitete personenbezogene
      Daten müssen anonymisiert  werden, soweit die dort definierten Zwecke
      dies zuslassen
    aliases:
      - Anonymisierung von Gesundheitsdaten
    in_subset:
      - legal_de_gdng_lawfulness_subset
      - legal_de_gdng_subset
    exact_mappings:
      - dpv_legal_de_gdng:Anonymization
      - dpv_legal_de_gdng_owl:Anonymization
    annotations:
      dct_source: '[[GDNG]] § 6(1)'
      upstream_iri: https://w3id.org/dpv/legal/de/gdng/owl#Anonymization
      dpv_extension_slug: legal/de/gdng

  AuthorizedPerson:
    class_uri: legal_de_gdng:AuthorizedPerson
    description: |-
      Eine natürliche Person die nach einem Rechte- und Rollenkonzept die
      Weiterverarbeitung von Gesundheitsdaten nach der Rechtsgrundlage § 6(1)
      GDNG an einer Gesundheitseinrichtung durchführt
    aliases:
      - Befugte Person
    in_subset:
      - legal_de_gdng_actors_subset
      - legal_de_gdng_subset
    exact_mappings:
