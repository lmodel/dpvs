    class_uri: legal_de_gdng:DeletionPolicy
    description: |-
      Nach der Rechtsgrundlage § 6(1) weitervarbeitete personenbezogene Daten
      müssen spätestens 30 Jahre nach Beginn der Weiterverarbeitung gelöscht
      werden
