id: https://w3id.org/lmodel/dpv/legal/my
name: dpv_legal_my
title: DPV - Legal - My
description: |-
  LinkML schema generated from the DPV 2.3 extension `legal/my`
  (`legal-my-owl.ttl`), enriched with canonical SKOS metadata. Imports the
  semantic-group schema(s) `dpv:schema/dpv_legal_basis`,
  `dpv:schema/dpv_entities` for the abstract parent classes this extension
  specialises (instead of the full umbrella `dpv:schema/dpv`).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/legal/my
  - https://w3c.github.io/dpv/2.3/legal/my/
source: https://w3id.org/dpv/legal/my/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: legal/my
  source_ttl: upstream-releases/dpv/legal/my/legal-my-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/legal/my/legal-my.ttl
  upstream_owl_namespace: https://w3id.org/dpv/legal/my/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/legal/my#

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  legal_my: https://w3id.org/lmodel/dpv/legal/my/
  dpv_legal_my: https://w3id.org/dpv/legal/my#
  dpv_legal_my_owl: https://w3id.org/dpv/legal/my/owl#

default_prefix: legal_my
default_range: string
id_prefixes:
  - legal_my
  - dpv_legal_my
  - dpv_legal_my_owl

imports:
  - linkml:types
  - dpv:schema/dpv_legal_basis
  - dpv:schema/dpv_entities

subsets:

  legal_my_subset:
    description: All entities from the DPV `legal/my` extension.

  legal_my_my_subset:
    description: Entities from the DPV `legal/my/modules/my` submodule.

classes:

  DPAMY:
    is_a: DataProtectionAuthority
    mixins:
      - Law
    class_uri: legal_my:DPA-MY
    aliases:
      - DPA-MY
      - Personal Data Protection Commissioner
    in_subset:
      - legal_my_my_subset
      - legal_my_subset
    exact_mappings:
      - dpv_legal_my:DPA-MY
      - dpv_legal_my_owl:DPA-MY
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/my/owl#DPA-MY
      dpv_extension_slug: legal/my

  LegalMylawPDPA:
    is_a: Law
    class_uri: legal_my:law-PDPA
    aliases:
      - law-PDPA
      - Personal Data Protection Act 2010 (Act 709) (PDPA)
    in_subset:
      - legal_my_my_subset
      - legal_my_subset
    exact_mappings:
      - dpv_legal_my:law-PDPA
      - dpv_legal_my_owl:law-PDPA
    annotations:
      upstream_iri: https://w3id.org/dpv/legal/my/owl#law-PDPA
      dpv_extension_slug: legal/my
