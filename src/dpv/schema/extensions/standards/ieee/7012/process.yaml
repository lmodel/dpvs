classes:

  Agreement:
    is_a: ContractualClause
    class_uri: standards_ieee_7012:Agreement
    description: |-
      A compound set of terms or clauses, proposed and offered before a formal
      contract between parties, and also referred to as a "proposal" pr
      "proposed agreement"
    aliases:
      - Agreement
    in_subset:
      - standards_ieee_7012_process_subset
    exact_mappings:
      - dpv_standards_ieee_7012:Agreement
      - dpv_standards_ieee_7012_owl:Agreement
