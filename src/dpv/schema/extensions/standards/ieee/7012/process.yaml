      - dpv_standards_ieee_7012_owl:AgreementNegotiation
    annotations:
      upstream_iri: https://w3id.org/dpv/standards/ieee/7012/owl#AgreementNegotiation
      dpv_extension_slug: standards/ieee/7012

  AgreementNegotiationRequest:
    is_a: DpvProcess
    class_uri: standards_ieee_7012:AgreementNegotiationRequest
    description: |-
      A request to initiate negotiation with the goal of finding an acceptable
      agreement
    aliases:
      - Agreement Negotiation Request
    in_subset:
      - standards_ieee_7012_process_subset
    exact_mappings:
      - dpv_standards_ieee_7012:AgreementNegotiationRequest
      - dpv_standards_ieee_7012_owl:AgreementNegotiationRequest
    annotations:
      upstream_iri: |-
        https://w3id.org/dpv/standards/ieee/7012/owl#AgreementNegotiationRequest
      dpv_extension_slug: standards/ieee/7012

  AgreementPreference:
    is_a: Rule
    class_uri: standards_ieee_7012:AgreementPreference
    description: |-
      A preference regarding agreements, such as to indicate which terms are
      acceptable or unacceptable
    aliases:
      - Agreement Preference
    in_subset:
      - standards_ieee_7012_process_subset
    exact_mappings:
      - dpv_standards_ieee_7012:AgreementPreference
      - dpv_standards_ieee_7012_owl:AgreementPreference
    annotations:
