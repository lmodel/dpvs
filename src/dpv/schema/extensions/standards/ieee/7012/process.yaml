      dpv_extension_slug: standards/ieee/7012

  AgreementInteractionRecord:
    is_a: RecordsOfActivities
    class_uri: standards_ieee_7012:AgreementInteractionRecord
    description: |-
      A record of a interactions conducted in the course of establishing and
      negotiating agreements, including failed attempts, creation of
      contracts, and subsequent interactions
    aliases:
      - Agreement Interaction Record
    in_subset:
      - standards_ieee_7012_process_subset
    exact_mappings:
      - dpv_standards_ieee_7012:AgreementInteractionRecord
      - dpv_standards_ieee_7012_owl:AgreementInteractionRecord
    annotations:
      upstream_iri: |-
        https://w3id.org/dpv/standards/ieee/7012/owl#AgreementInteractionRecord
      dpv_extension_slug: standards/ieee/7012

  AgreementNegotiation:
    is_a: DpvProcess
    class_uri: standards_ieee_7012:AgreementNegotiation
    description: A negotiation between parties regarding an agreement
    aliases:
      - Agreement Negotiation
    in_subset:
      - standards_ieee_7012_process_subset
