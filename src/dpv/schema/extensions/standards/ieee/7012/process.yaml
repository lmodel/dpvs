      dpv_extension_slug: standards/ieee/7012

  AgreementRegistry:
    class_uri: standards_ieee_7012:AgreementRegistry
    description: |-
      A registry hosting agreements that acts as a common repository for
      parties to utilise as a reference within requests and for negotiating
      acceptable terms
    aliases:
