id: https://w3id.org/lmodel/dpv/ai
name: dpv_ai
title: DPV - Ai
description: |-
  LinkML schema generated from the DPV 2.3 extension `ai` (`ai-owl.ttl`),
  enriched with canonical SKOS metadata. Imports the semantic-group
  schema(s) `dpv:schema/dpv_common`, `dpv:schema/dpv_personal_data`,
  `dpv:schema/dpv_processing`, `dpv:schema/dpv_risk_notice` for the
  abstract parent classes this extension specialises (instead of the full
  umbrella `dpv:schema/dpv`).
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv/ai
- https://w3c.github.io/dpv/2.3/ai/
source: https://w3id.org/dpv/ai/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: ai
  source_ttl: upstream-releases/dpv/ai/ai-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/ai/ai.ttl
  upstream_owl_namespace: https://w3id.org/dpv/ai/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/ai#

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  ai: https://w3id.org/lmodel/dpv/ai/
  dpv_ai: https://w3id.org/dpv/ai#
  dpv_ai_owl: https://w3id.org/dpv/ai/owl#
  risk: https://w3id.org/lmodel/dpv/risk/
  dpv_risk: https://w3id.org/dpv/risk#
  dpv_risk_owl: https://w3id.org/dpv/risk/owl#
  tech: https://w3id.org/lmodel/dpv/tech/
  dpv_tech: https://w3id.org/dpv/tech#
  dpv_tech_owl: https://w3id.org/dpv/tech/owl#

default_prefix: ai
default_range: string
id_prefixes:
- ai
- dpv_ai
- dpv_ai_owl

imports:
- linkml:types
- dpv:schema/dpv_common
- dpv:schema/dpv_personal_data
- dpv:schema/dpv_processing
- dpv:schema/dpv_risk_notice
- dpv:schema/extensions/risk
- dpv:schema/extensions/tech

subsets:

  ai_subset:
    description: All entities from the DPV `ai` extension.

  ai_capabilities_subset:
    description: Entities from the DPV `ai/modules/capabilities` submodule.

  ai_core_subset:
    description: Entities from the DPV `ai/modules/core` submodule.

  ai_data_subset:
    description: Entities from the DPV `ai/modules/data` submodule.

  ai_development_subset:
    description: Entities from the DPV `ai/modules/development` submodule.

  ai_lifecycle_subset:
    description: Entities from the DPV `ai/modules/lifecycle` submodule.

  ai_measures_subset:
    description: Entities from the DPV `ai/modules/measures` submodule.

  ai_risks_subset:
    description: Entities from the DPV `ai/modules/risks` submodule.

  ai_systems_subset:
    description: Entities from the DPV `ai/modules/systems` submodule.

  ai_techniques_subset:
    description: Entities from the DPV `ai/modules/techniques` submodule.

slots:

  ai_has_capability:
    is_a: has_ai
    definition_uri: ai:hasCapability
    description: Indicates the use of AI capability for the associated context
    aliases:
    - has capability
    multivalued: true
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasCapability
    - dpv_ai_owl:hasCapability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasCapability
      dpv_extension_slug: ai

  ai_has_data:
    definition_uri: ai:hasData
    description: Associates data with an AI system or model or implementation
    aliases:
    - has data
    multivalued: true
    in_subset:
    - ai_data_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasData
    - dpv_ai_owl:hasData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasData
      dpv_extension_slug: ai

  ai_has_model:
    is_a: has_ai
    definition_uri: ai:hasModel
    description: Indicates the use of an AI model for the associated context
    aliases:
    - has model
    multivalued: true
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasModel
    - dpv_ai_owl:hasModel
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasModel
      dpv_extension_slug: ai

  has_ai:
    is_a: is_implemented_using_technology
    definition_uri: ai:hasAI
    description: Indicates the use of AI for the associated context
    aliases:
    - has AI
    multivalued: true
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasAI
    - dpv_ai_owl:hasAI
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasAI
      dpv_extension_slug: ai

  has_ai_system:
    is_a: has_ai
    definition_uri: ai:hasAISystem
    description: Indicates the use of AI system for the associated context
    aliases:
    - has AI system
    multivalued: true
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasAISystem
    - dpv_ai_owl:hasAISystem
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasAISystem
      dpv_extension_slug: ai

  has_gpai_model:
    is_a: ai_has_model
    definition_uri: ai:hasGPAIModel
    description: Indicates the use of an GPAI model for the associated context
    aliases:
    - has GPAI model
    multivalued: true
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasGPAIModel
    - dpv_ai_owl:hasGPAIModel
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasGPAIModel
      dpv_extension_slug: ai

  has_technique:
    is_a: has_ai
    definition_uri: ai:hasTechnique
    description: Indicates the use of AI technique for the associated context
    aliases:
    - has technique
    multivalued: true
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasTechnique
    - dpv_ai_owl:hasTechnique
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasTechnique
      dpv_extension_slug: ai

  has_testing_data:
    is_a: ai_has_data
    definition_uri: ai:hasTestingData
    description: Associates the data used for testing AI
    aliases:
    - has testing data
    multivalued: true
    in_subset:
    - ai_data_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasTestingData
    - dpv_ai_owl:hasTestingData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasTestingData
      dpv_extension_slug: ai

  has_training_data:
    is_a: ai_has_data
    definition_uri: ai:hasTrainingData
    description: Associates the data used for training AI
    aliases:
    - has training data
    multivalued: true
    in_subset:
    - ai_data_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasTrainingData
    - dpv_ai_owl:hasTrainingData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasTrainingData
      dpv_extension_slug: ai

  has_validation_data:
    is_a: ai_has_data
    definition_uri: ai:hasValidationData
    description: Associates the data used for validating AI
    aliases:
    - has validation data
    multivalued: true
    in_subset:
    - ai_data_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:hasValidationData
    - dpv_ai_owl:hasValidationData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasValidationData
      dpv_extension_slug: ai

classes:

  AGI:
    is_a: AiAISystem
    class_uri: ai:AGI
    description: |-
      Type of AI system that addresses a broad range of tasks with a
      satisfactory level of performance
    aliases:
    - Artificial General Intelligence (AGI)
    in_subset:
    - ai_systems_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:AGI
    - dpv_ai_owl:AGI
    annotations:
      dct_source: ISO/IEC 22989:2022
      upstream_iri: https://w3id.org/dpv/ai/owl#AGI
      dpv_extension_slug: ai

  AIAgent:
    is_a: AiAI
    mixins:
    - SoftwareAgent
    class_uri: ai:AIAgent
    description: |-
      An AI Agent, also known as an 'intelligent agent', is a software agent
      that utilises AI technologies
    aliases:
    - AI Agent
    comments:
    - |-
      Other definitions of AI Agents may include the perception of environment
      as some capacity to incorporate the environment through sensors (e.g.
      computer vision) or data (e.g. web environments), and to produce changes
      in outputs through some degree of autonomy (i.e. without human
      intervention). The definition of 'AI Agent' provided in this extension
      relaxes such requirements and instead focuses on classifying these
      agents based solely on their use of AI technologies to allow
      compatibility with the evolving definitions
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:AIAgent
    - dpv_ai_owl:AIAgent
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AIAgent
      dpv_extension_slug: ai

    close_mappings:
    - iso42001:AISystem
  AIBias:
    is_a: AiRiskConcept
    mixins:
    - RiskConcept
    - PotentialRisk
    - PotentialRiskSource
    - Bias
    class_uri: ai:AIBias
    description: |-
      Bias associated with development, use, or other activities involving an
      AI technology or system
    aliases:
    - AI Bias
    in_subset:
    - ai_risks_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:AIBias
    - dpv_ai_owl:AIBias
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AIBias
      dpv_extension_slug: ai

    close_mappings:
    - iso42001:AIRisk
  AIProcess:
    is_a: DpvProcess
    class_uri: ai:AIProcess
    description: A process involving AI technologies
    aliases:
    - AI Process
    comments:
    - |-
      This concept provides a convenient method to indicate AI is involved
      (somewhere) within the Process
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:AIProcess
    - dpv_ai_owl:AIProcess
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AIProcess
      dpv_extension_slug: ai

    related_mappings:
    - iso42001:AIManagementSystem
  AISystemRisk:
    is_a: AiRiskConcept
    mixins:
    - RiskConcept
    - PotentialRisk
    - PotentialRiskSource
    class_uri: ai:AISystemRisk
    description: Risks associated with AI Systems
    aliases:
    - AI System Risk
    in_subset:
    - ai_risks_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:AISystemRisk
    - dpv_ai_owl:AISystemRisk
    - iso42001:AIRisk
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AISystemRisk
      dpv_extension_slug: ai

  ActionRecognition:
    is_a: BiometricCapability
    mixins:
    - AiCapability
    - ComputerVision
    class_uri: ai:ActionRecognition
    description: Capability to recognise actions
    aliases:
    - Action Recognition
    in_subset:
    - ai_capabilities_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:ActionRecognition
    - dpv_ai_owl:ActionRecognition
    annotations:
      dct_source: ' Defining Artificial Intelligence 2.0'
      upstream_iri: https://w3id.org/dpv/ai/owl#ActionRecognition
      dpv_extension_slug: ai

  AdversarialAttack:
    is_a: AiSecurityAttack
    mixins:
    - RiskConcept
    - IntegrityConcept
    - PotentialConsequence
    - PotentialRisk
    - PotentialRiskSource
    class_uri: ai:AdversarialAttack
    description: Inputs designed to cause the model to make a mistake
    aliases:
    - Adversarial Attack
    in_subset:
    - ai_risks_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:AdversarialAttack
    - dpv_ai_owl:AdversarialAttack
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AdversarialAttack
      dpv_extension_slug: ai

    close_mappings:
    - iso42001:AIIncident
  AiAI:
    is_a: Technology
    class_uri: ai:AI
    description: |-
      A technical and scientific field devoted to the engineered system that
      generates outputs such as content, forecasts, recommendations or
      decisions for a given set of human-defined objectives
    aliases:
    - AI
    - Artificial Intelligence (AI)
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:AI
    - dpv_ai_owl:AI
    annotations:
      dct_source: ISO/IEC 22989:2022
      upstream_iri: https://w3id.org/dpv/ai/owl#AI
      dpv_extension_slug: ai

  AiAISystem:
    is_a: AiAI
    mixins:
    - TechSystem
    class_uri: ai:AISystem
    description: |-
      An engineered system that generates outputs such as content, forecasts,
      recommendations or decisions for a given set of human-defined objectives
      (ISO/IEC 22989:2022 definition); or A machine-based system that, for
      explicit or implicit objectives, infers, from the input it receives, how
      to generate outputs such as predictions, content, recommendations, or
      decisions that can influence physical or virtual environments. Different
      AI systems vary in their levels of autonomy and adaptiveness after
      deployment (OECD 2024 definition); or A machine-based system
      demonstrating varying degrees of autonomy and adaptiveness after
      deployment, generating outputs such as predictions, content,
      recommendations, or decisions to influence physical or virtual
      environments (EU Vocabularies' AI Taxonomy definition)
    aliases:
    - AISystem
    - AI System
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:AISystem
    - dpv_ai_owl:AISystem
    annotations:
      dct_source: ' ISO/IEC 22989:2022'
      upstream_iri: https://w3id.org/dpv/ai/owl#AISystem
      dpv_extension_slug: ai

  AiBiometricCategorisation:
    is_a: BiometricCapability
    mixins:
    - AiCapability
    class_uri: ai:BiometricCategorisation
    description: |-
      Capability involving assigning natural persons to specific categories
      based on their biometric data
    aliases:
    - BiometricCategorisation
    - Biometric Categorisation
    in_subset:
    - ai_capabilities_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:BiometricCategorisation
    - dpv_ai_owl:BiometricCategorisation
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiometricCategorisation
      dpv_extension_slug: ai

  AiBiometricIdentification:
    is_a: BiometricCapability
    mixins:
    - AiCapability
    - HumanIdentification
    class_uri: ai:BiometricIdentification
    description: |-
      Capability involving automated recognition of physical, physiological
      and behavioural human features such as the face, eye movement, body
      shape, voice, prosody, gait, posture, heart rate, blood pressure, odour,
      keystrokes characteristics, for the purpose of establishing an
      individual’s identity by comparing biometric data of that individual to
      stored biometric data of individuals in a reference database,
      irrespective of whether the individual has given its consent or not
    aliases:
    - BiometricIdentification
    - Biometric Identification
    in_subset:
    - ai_capabilities_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:BiometricIdentification
    - dpv_ai_owl:BiometricIdentification
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiometricIdentification
      dpv_extension_slug: ai

  AiCapability:
    is_a: AiAI
    class_uri: ai:Capability
    description: Capability or use of AI to achieve a technical goal or 
      objective
    aliases:
    - Capability
    comments:
    - |-
      This concept refers to the application of an AI technique to achieve a
      technical goal or function, and is necessary to distinguish the
      'algorithm' (ai:Technique) from the 'application' (ai:Capability) and
      'goal' (dpv:Purpose)
    in_subset:
    - ai_core_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:Capability
    - dpv_ai_owl:Capability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#Capability
      dpv_extension_slug: ai

  AiData:
    is_a: DpvData
    mixins:
    - InputOutput
    class_uri: ai:Data
    description: Data involved in the development and use of an AI system or 
      model
    aliases:
    - Data
    - AI Data
    in_subset:
    - ai_data_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:Data
    - dpv_ai_owl:Data
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#Data
      dpv_extension_slug: ai

  AiDataAggregationBias:
    is_a: AiDataBias
    mixins:
    - RiskConcept
    - PotentialRisk
    - PotentialRiskSource
    class_uri: ai:DataAggregationBias
    description: |-
      Bias that occurs from aggregating data covering different groups of
      objects that might have different statistical distributions which
      introduce bias into the data used to train AI systems
    aliases:
    - DataAggregationBias
    - Data Aggregation Bias
    in_subset:
    - ai_risks_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:DataAggregationBias
    - dpv_ai_owl:DataAggregationBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#DataAggregationBias
      dpv_extension_slug: ai

  AiDataBias:
    is_a: AIBias
    mixins:
    - RiskConcept
    - PotentialRisk
    - PotentialRiskSource
    class_uri: ai:DataBias
    description: |-
      Bias that occurs due to unaddressed data properties that lead to AI
      systems that perform better or worse for different groups
    aliases:
    - DataBias
    - Data Bias
    in_subset:
    - ai_risks_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:DataBias
    - dpv_ai_owl:DataBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#DataBias
      dpv_extension_slug: ai

  AiDataRisk:
    is_a: AiRiskConcept
    mixins:
    - RiskConcept
    - PotentialRisk
    - PotentialRiskSource
    class_uri: ai:DataRisk
    description: |-
      Risk associated with data used or produced or otherwise involved in the
      context of AI
    aliases:
    - DataRisk
    - Data Risk
    in_subset:
    - ai_risks_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:DataRisk
    - dpv_ai_owl:DataRisk
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataRisk
      dpv_extension_slug: ai

  AiEmotionRecognition:
    is_a: HumanOrientedCapability
    mixins:
    - AiCapability
    class_uri: ai:EmotionRecognition
    description: |-
      Capability for identifying and categorising emotions expressed in a
      piece of text, speech, video or image or combination thereof
    aliases:
    - EmotionRecognition
    - Emotion Recognition
    in_subset:
    - ai_capabilities_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:EmotionRecognition
    - dpv_ai_owl:EmotionRecognition
    annotations:
      dct_source: ISO/IEC 22989:2022 3.6.3
      upstream_iri: https://w3id.org/dpv/ai/owl#EmotionRecognition
      dpv_extension_slug: ai

  AiGPAIModel:
    is_a: AiModel
    class_uri: ai:GPAIModel
    description: |-
      A model that displays generality in terms of capabilities and potential
      applications
    aliases:
    - GPAIModel
    - General Purpose AI Model
    in_subset:
    - ai_systems_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:GPAIModel
    - dpv_ai_owl:GPAIModel
    annotations:
      dct_source: EU AI Act
      upstream_iri: https://w3id.org/dpv/ai/owl#GPAIModel
      dpv_extension_slug: ai

  AiInformativenessBias:
    is_a: EngineeringDecisionBias
    mixins:
    - RiskConcept
    - PotentialRisk
    - PotentialRiskSource
    class_uri: ai:InformativenessBias
    description: |-
      Bias that occurs or some groups, the mapping between inputs present in
      the data and outputs are more difficult to learn and where a model that
      only has one feature set available, can be biased against the group
      whose relationships are difficult to learn from available data
    aliases:
    - InformativenessBias
    - Informativeness Bias
    comments:
    - |-
      This can happen when some features are highly informative about one
      group, while a different set of features is highly informative about
      another group. If this is the case, then a model that only has one
      feature set available, can be biased against the group whose
      relationships are difficult to learn from available data
    in_subset:
    - ai_risks_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:InformativenessBias
    - dpv_ai_owl:InformativenessBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#InformativenessBias
      dpv_extension_slug: ai

  AiLifecycleStage:
    is_a: TechLifecycleStage
    class_uri: ai:LifecycleStage
    description: A stage in the lifecycle of AI
    aliases:
    - LifecycleStage
    - Lifecycle Stage
    in_subset:
    - ai_lifecycle_subset
    - ai_subset
    exact_mappings:
    - dpv_ai:LifecycleStage
    - dpv_ai_owl:LifecycleStage
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#LifecycleStage
      dpv_extension_slug: ai

  AiModel:
    is_a: AiAI
    mixins:
    - TechModel
    class_uri: ai:Model
    description: |-
      Physical, mathematical or otherwise logical representation of a system,
      entity, phenomenon, process or data involving the use of AI techniques
    aliases:
    - Model
