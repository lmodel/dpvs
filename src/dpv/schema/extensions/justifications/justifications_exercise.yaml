      dpv_extension_slug: justifications

  LegalObligation:
    is_a: ExerciseJustification
    mixins:
      - Justification
    class_uri: justifications:LegalObligation
    description: |-
      Justification that the process should be carried out due to it being a
      legal obligation
    aliases:
      - Legal Obligation
    in_subset:
      - justifications_justifications_exercise_subset
    exact_mappings:
      - dpv_justifications:LegalObligation
      - dpv_justifications_owl:LegalObligation
    related_mappings:
      - oscal:ResponsibilityStatement
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#LegalObligation
      dpv_extension_slug: justifications

  LegalityLackingObjection:
    is_a: Objection
    mixins:
      - Justification
    class_uri: justifications:LegalityLackingObjection
    description: |-
      Justification that the process should be carried out due to it being an
      objection to the lack of further legality or legal basis of specified
      context
    aliases:
      - Legality Lacking Objection
    in_subset:
      - justifications_justifications_exercise_subset
    exact_mappings:
      - dpv_justifications:LegalityLackingObjection
      - dpv_justifications_owl:LegalityLackingObjection
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#LegalityLackingObjection
      dpv_extension_slug: justifications

  NonNecessityObjection:
    is_a: Objection
    mixins:
      - Justification
    class_uri: justifications:NonNecessityObjection
    description: |-
      Justification that the process should be carried out due to it being an
      objection to the non-necessity of specified context
    aliases:
      - Non Necessity Objection
    in_subset:
      - justifications_justifications_exercise_subset
    exact_mappings:
      - dpv_justifications:NonNecessityObjection
      - dpv_justifications_owl:NonNecessityObjection
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#NonNecessityObjection
      dpv_extension_slug: justifications

  Objection:
    is_a: ExerciseJustification
    mixins:
      - Justification
    class_uri: justifications:Objection
    description: |-
      Justification that the process should be carried out due to specified
      objection(s)
    aliases:
      - Objection
    in_subset:
      - justifications_justifications_exercise_subset
    exact_mappings:
      - dpv_justifications:Objection
      - dpv_justifications_owl:Objection
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#Objection
      dpv_extension_slug: justifications

  UnlawfulActivityObjection:
    is_a: Objection
    mixins:
      - Justification
    class_uri: justifications:UnlawfulActivityObjection
    description: |-
      Justification that the process should be carried out due to it being an
      objection of unlawful activity
    aliases:
