default_prefix: justifications
default_range: string
id_prefixes:
  - justifications
  - dpv_justifications
  - dpv_justifications_owl

imports:
  - linkml:types
  - dpv:schema/dpv_common
  - dpv:schema/extensions/justifications

subsets:

  justifications_justifications_exercise_subset:
    description: |-
      Entities from the DPV `justifications/modules/justifications_exercise`
      submodule.

classes:

  ContestAccuracy:
    is_a: Objection
    mixins:
      - Justification
    class_uri: justifications:ContestAccuracy
    description: |-
      Justification that the process should be carried out due it being an
      objection to the accuracy e.g. of system, outputs, data
    aliases:
      - Contest Accuracy
    in_subset:
      - justifications_justifications_exercise_subset
    exact_mappings:
      - dpv_justifications:ContestAccuracy
      - dpv_justifications_owl:ContestAccuracy
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#ContestAccuracy
      dpv_extension_slug: justifications

  ExerciseJustification:
    is_a: Justification
    class_uri: justifications:ExerciseJustification
    description: Justification for why the process should be carried out
    aliases:
      - Exercise Justification
    in_subset:
      - justifications_justifications_exercise_subset
    exact_mappings:
      - dpv_justifications:ExerciseJustification
      - dpv_justifications_owl:ExerciseJustification
    related_mappings:
      - oscal:ResponsibilityStatement
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#ExerciseJustification
      dpv_extension_slug: justifications

  InformationSocietyServicesOffer:
    is_a: ExerciseJustification
    mixins:
      - Justification
    class_uri: justifications:InformationSocietyServicesOffer
    description: |-
      Justification that the process should be carried out due to it being
      related to the offer of information society services
    aliases:
      - Information Society Services Offer
    in_subset:
