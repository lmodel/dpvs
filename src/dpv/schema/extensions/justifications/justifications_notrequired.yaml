  dpv_justifications_owl: https://w3id.org/dpv/justifications/owl#

default_prefix: justifications
default_range: string
id_prefixes:
  - justifications
  - dpv_justifications
  - dpv_justifications_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/justifications

subsets:

  justifications_justifications_notrequired_subset:
    description: |-
      Entities from the DPV
      `justifications/modules/justifications_notrequired` submodule.

classes:

  NotRequiredJustification:
    is_a: Justification
    class_uri: justifications:NotRequiredJustification
    description: |-
      Justification to reject or not complete a process as it is not required
      or isn't applicable
    aliases:
      - Not Required Justification
    in_subset:
      - justifications_justifications_notrequired_subset
    exact_mappings:
      - dpv_justifications:NotRequiredJustification
      - dpv_justifications_owl:NotRequiredJustification
    related_mappings:
      - oscal:RiskAcceptance
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#NotRequiredJustification
      dpv_extension_slug: justifications

  ProcessSafeguarded:
    is_a: NotRequiredJustification
    mixins:
      - Justification
    class_uri: justifications:ProcessSafeguarded
    description: |-
      Justification that the process is not required as it is safeguarded by
      appropriate technical and organisational measures
    aliases:
      - Process Safeguarded
    in_subset:
      - justifications_justifications_notrequired_subset
    exact_mappings:
      - dpv_justifications:ProcessSafeguarded
      - dpv_justifications_owl:ProcessSafeguarded
    close_mappings:
      - oscal:RiskMitigatingFactor
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#ProcessSafeguarded
      dpv_extension_slug: justifications

  RightsFreedomsImpactUnlikely:
    is_a: NotRequiredJustification
    mixins:
      - Justification
    class_uri: justifications:RightsFreedomsImpactUnlikely
    description: |-
      Justification that the process is not required as it is considered to be
      an unlikely impact on rights and freedoms
    aliases:
      - Rights Freedoms Impact Unlikely
    in_subset:
      - justifications_justifications_notrequired_subset
    exact_mappings:
      - dpv_justifications:RightsFreedomsImpactUnlikely
      - dpv_justifications_owl:RightsFreedomsImpactUnlikely
    related_mappings:
      - oscal:RiskAcceptance
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#RightsFreedomsImpactUnlikely
      dpv_extension_slug: justifications

  RiskMitigated:
    is_a: NotRequiredJustification
    mixins:
      - Justification
    class_uri: justifications:RiskMitigated
    description: |-
      Justification that the process is not required as the risks have been
      effectively mitigated by technical and organisational measures
    aliases:
      - Risk Mitigated
    in_subset:
      - justifications_justifications_notrequired_subset
    exact_mappings:
      - dpv_justifications:RiskMitigated
      - dpv_justifications_owl:RiskMitigated
    close_mappings:
      - oscal:RiskMitigatingFactor
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#RiskMitigated
      dpv_extension_slug: justifications
