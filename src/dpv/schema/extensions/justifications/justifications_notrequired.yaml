version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: justifications
  dpv_submodule: justifications_notrequired
  source_ttl: |-
    upstream-releases/dpv/justifications/modules/justifications_notrequired-owl.ttl
  source_canonical_ttl: |-
    upstream-releases/dpv/justifications/modules/justifications_notrequired.ttl
  upstream_owl_namespace: https://w3id.org/dpv/justifications/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/justifications#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
