version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: justifications
  dpv_submodule: justifications_delay
  source_ttl: |-
    upstream-releases/dpv/justifications/modules/justifications_delay-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/justifications/modules/justifications_delay.ttl
  upstream_owl_namespace: https://w3id.org/dpv/justifications/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/justifications#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
