  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  justifications: https://w3id.org/lmodel/dpv/justifications/
  dpv_justifications: https://w3id.org/dpv/justifications#
  dpv_justifications_owl: https://w3id.org/dpv/justifications/owl#

default_prefix: justifications
default_range: string
id_prefixes:
  - justifications
  - dpv_justifications
  - dpv_justifications_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/justifications

subsets:

  justifications_justifications_delay_subset:
    description: |-
      Entities from the DPV `justifications/modules/justifications_delay`
      submodule.

classes:

  ComplexityOfProcess:
    is_a: DelayJustification
    mixins:
      - Justification
    class_uri: justifications:ComplexityOfProcess
    description: |-
      Justification that the process is delayed due to complexity in
      fulfilling it
    aliases:
      - Complexity Of Process
    in_subset:
      - justifications_justifications_delay_subset
    exact_mappings:
      - dpv_justifications:ComplexityOfProcess
      - dpv_justifications_owl:ComplexityOfProcess
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#ComplexityOfProcess
      dpv_extension_slug: justifications

  DelayJustification:
    is_a: Justification
    class_uri: justifications:DelayJustification
    description: Justification to delay a process
    aliases:
      - Delay Justification
    in_subset:
      - justifications_justifications_delay_subset
    exact_mappings:
      - dpv_justifications:DelayJustification
      - dpv_justifications_owl:DelayJustification
    related_mappings:
      - oscal:ResponsibilityStatement
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#DelayJustification
      dpv_extension_slug: justifications

  HighVolumeOfProcesses:
    is_a: DelayJustification
    mixins:
      - Justification
    class_uri: justifications:HighVolumeOfProcesses
    description: |-
      Justification that the process is delayed due to high volume of similar
      processes required to be fulfilled
    aliases:
      - High Volume Of Processes
    in_subset:
      - justifications_justifications_delay_subset
    exact_mappings:
      - dpv_justifications:HighVolumeOfProcesses
      - dpv_justifications_owl:HighVolumeOfProcesses
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#HighVolumeOfProcesses
      dpv_extension_slug: justifications

  IdentityVerificationRequired:
    is_a: DelayJustification
    mixins:
      - Justification
    class_uri: justifications:IdentityVerificationRequired
    description: |-
      Justification that the process could not be fulfilled or was not
      successful because identity verification is required
    aliases:
      - Identity Verification Required
    in_subset:
      - justifications_justifications_delay_subset
    exact_mappings:
      - dpv_justifications:IdentityVerificationRequired
      - dpv_justifications_owl:IdentityVerificationRequired
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#IdentityVerificationRequired
      dpv_extension_slug: justifications

  InformationRequired:
    is_a: DelayJustification
    mixins:
      - Justification
    class_uri: justifications:InformationRequired
    description: |-
      Justification that the process is delayed due to additional information
      being required
    aliases:
      - Information Required
    in_subset:
      - justifications_justifications_delay_subset
    exact_mappings:
      - dpv_justifications:InformationRequired
      - dpv_justifications_owl:InformationRequired
    annotations:
      upstream_iri: https://w3id.org/dpv/justifications/owl#InformationRequired
      dpv_extension_slug: justifications
