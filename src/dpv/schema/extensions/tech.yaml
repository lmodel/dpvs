  dpv_extension_slug: tech
  source_ttl: upstream-releases/dpv/tech/tech-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/tech/tech.ttl
  upstream_owl_namespace: https://w3id.org/dpv/tech/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/tech#

