id: https://w3id.org/lmodel/dpv/tech
name: dpv_tech
title: DPV - Tech
description: |-
  LinkML schema generated from the DPV 2.3 extension `tech`
  (`tech-owl.ttl`), enriched with canonical SKOS metadata. Imports the
  semantic-group schema(s) `dpv:schema/dpv_common`,
  `dpv:schema/dpv_legal_basis`, `dpv:schema/dpv_entities`,
  `dpv:schema/dpv_personal_data`, `dpv:schema/dpv_processing`,
  `dpv:schema/dpv_rights` for the abstract parent classes this extension
  specialises (instead of the full umbrella `dpv:schema/dpv`).
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv/tech
- https://w3c.github.io/dpv/2.3/tech/
source: https://w3id.org/dpv/tech/owl#
version: '2.3'
annotations:
