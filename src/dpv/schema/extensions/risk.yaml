  InterruptionControl:
    is_a: ReductionControl
    mixins:
    - RiskControl
    class_uri: risk:InterruptionControl
    description: |-
      Control that interrupts an event without removing the possibility for it
      to be resumed and where the aim is to stop the event
    aliases:
    - Interruption Control
    comments:
    - |-
      Interruption refers to the event being temporarily halted, such as an
      emergency measure while further suitable measures are identified and put
      in place. To indicate stopping the event completely rather than a
      temporary interruption, see risk:RemediationControl which fixes the
      underlying issue and risk:EliminationControl which prevents the event
      from occurring
    in_subset:
    - risk_risk_controls_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:InterruptionControl
    - dpv_risk_owl:InterruptionControl
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#InterruptionControl
      dpv_extension_slug: risk

  InterventionControl:
    is_a: ReductionControl
    mixins:
    - RiskControl
    class_uri: risk:InterventionControl
    description: |-
      Control that intervenes in the operations of the event to change some
      context with the aim of changing the event or the effects
    aliases:
    - Intervention Control
    comments:
    - |-
      Intervention implies taking steps to resolve the effects or to prevent
      further escalation while the event is still ongoing. For halting the
      event, see risk:InterruptionControl, for recovering and undoing the
      effects, see risk:RecoveryControl and risk:ReversalControl. Intervention
      is a temporary or stop-gap measure which is used while the event is
      ongoing to prevent it from escalating or creating additional issues
    in_subset:
    - risk_risk_controls_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:InterventionControl
    - dpv_risk_owl:InterventionControl
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#InterventionControl
      dpv_extension_slug: risk

  InvestigationControl:
    is_a: ReactiveControl
    mixins:
    - RiskControl
    class_uri: risk:InvestigationControl
    description: |-
      Control that identifies information through an investigative process
      about an event and its effects after it has occurred
    aliases:
    - Investigation Control
    comments:
    - |-
      Investigative controls are used to identify information about an event
      and its effects which can be used to identify further effective measures
      to address them, and to identify processes to remedy and recover from
      it. Investigation control therefore is focused on analysis of an event
      after its occurrence with the goal of identifying applicability and
      effectiveness of other controls to address it
    in_subset:
    - risk_risk_controls_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:InvestigationControl
    - dpv_risk_owl:InvestigationControl
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#InvestigationControl
      dpv_extension_slug: risk

