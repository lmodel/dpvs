      dpv_extension_slug: risk

  RightsDenied:
    is_a: RightsImpact
    mixins:
    - RiskConcept
    - PotentialConsequence
    - PotentialImpact
    - PotentialRisk
    class_uri: risk:RightsDenied
    description: |-
      The refusal or withholding or denial of the existence or applicability
      of rights
    aliases:
    - Rights Denied
    comments:
    - |-
      The denial of the right refers to the argument that a right does not
      apply at all for a particular case. Though specified as a plural i.e.
      'rights', this concept can be applied to a singular right
    in_subset:
    - risk_risk_taxonomy_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:RightsDenied
    - dpv_risk_owl:RightsDenied
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RightsDenied
      dpv_extension_slug: risk

  RightsEroded:
    is_a: RightsImpact
    mixins:
    - RiskConcept
    - PotentialConsequence
    - PotentialImpact
    - PotentialRisk
    class_uri: risk:RightsEroded
    description: |-
      The gradual weakening or reduction of the scope and protection of rights
    aliases:
    - Rights Eroded
    comments:
    - |-
      Erosion of rights typically only applies to passive rights which always
      apply, since for active rights the exercise of that right is what
      enables it. An active right can be eroded over time it is limited
      consistently and increasingly such that the scope of the right is
      reduced over time. Though specified as a plural i.e. 'rights', this
      concept can be applied to a singular right
    in_subset:
    - risk_risk_taxonomy_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:RightsEroded
    - dpv_risk_owl:RightsEroded
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RightsEroded
      dpv_extension_slug: risk

  RightsExercisePrevented:
    is_a: RightsImpact
    mixins:
    - RiskConcept
    - PotentialConsequence
    - PotentialImpact
    - PotentialRisk
    class_uri: risk:RightsExercisePrevented
    description: |-
      Actions or measures that prevent an individual or group from exercising
      their legal rights.
    aliases:
    - Rights Exercise Prevented
    comments:
    - |-
      This concept was called "PreventExercisingOfRights" in DPV 2.0.
      Violation of a right is a bar for actionable actions by an authority.
      Other impacts on right may be found to construe a violation of the
      right, but that is not necessarily always the case i.e. not all impacts
      are violations of a right. Though specified as a plural i.e. 'rights',
      this concept can be applied to a singular right
    in_subset:
    - risk_risk_taxonomy_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:RightsExercisePrevented
    - dpv_risk_owl:RightsExercisePrevented
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RightsExercisePrevented
      dpv_extension_slug: risk

  RightsImpact:
    is_a: SocietalRiskConcept
    mixins:
    - RiskConcept
    - PotentialConsequence
    - PotentialImpact
    - PotentialRisk
    class_uri: risk:RightsImpact
    description: Concept representing Impact to Rights
    aliases:
    - Rights Impact
    comments:
    - |-
      This concept was called "ImpactToRights" in DPV 2.0. Though specified as
      a plural i.e. 'rights', this concept can be applied to a singular right
    in_subset:
    - risk_risk_taxonomy_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:RightsImpact
    - dpv_risk_owl:RightsImpact
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RightsImpact
      dpv_extension_slug: risk

  RightsLimited:
    is_a: RightsImpact
    mixins:
    - RiskConcept
    - PotentialConsequence
    - PotentialImpact
    - PotentialRisk
    class_uri: risk:RightsLimited
    description: A limitation or restrictions on the scope or exercise of rights
    aliases:
    - Rights Limited
    comments:
    - |-
      This concept was called "LimitationOfRights" in DPV 2.0. The limitation
      refers to the applicability and scope of the right, and not in the
      ability to exercise that right. Limitation is therefore fulfilment of
      the right and its obligations - but for a scope other than what was
      intended or expected. Though specified as a plural i.e. 'rights', this
      concept can be applied to a singular right
    in_subset:
    - risk_risk_taxonomy_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:RightsLimited
    - dpv_risk_owl:RightsLimited
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RightsLimited
      dpv_extension_slug: risk

  RightsObstructed:
    is_a: RightsImpact
    mixins:
    - RiskConcept
    - PotentialConsequence
    - PotentialImpact
    - PotentialRisk
    class_uri: risk:RightsObstructed
    description: Interference with or blocking of the exercise of rights
    aliases:
    - Rights Obstructed
    comments:
    - |-
      In obstruction, the right is not denied, limited, or unfulfilled - but
      the requirements to enable exercise of the rights are increased to the
      point of discouraging or obstructing the exercise of that right. Though
      specified as a plural i.e. 'rights', this concept can be applied to a
      singular right
    in_subset:
    - risk_risk_taxonomy_subset
    - risk_subset
    exact_mappings:
    - dpv_risk:RightsObstructed
    - dpv_risk_owl:RightsObstructed
    annotations:
      upstream_iri: https://w3id.org/dpv/risk/owl#RightsObstructed
      dpv_extension_slug: risk

  RightsUnfulfilled:
    is_a: RightsImpact
    mixins:
    - RiskConcept
    - PotentialConsequence
    - PotentialImpact
    - PotentialRisk
    class_uri: risk:RightsUnfulfilled
    description: Failure to meet or complete the fulfilment of rights
    aliases:
    - Rights Unfulfilled
    comments:
    - |-
      Here unfulfilment refers to non-completion of the right's obligations
      and processes. Though specified as a plural i.e. 'rights', this concept
      can be applied to a singular right
