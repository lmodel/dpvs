default_range: string
id_prefixes:
  - ai
  - dpv_ai
  - dpv_ai_owl

imports:
  - linkml:types
  - dpv:schema/dpv_processing
  - dpv:schema/extensions/ai
  - dpv:schema/extensions/tech

subsets:

  ai_core_subset:
    description: Entities from the DPV `ai/modules/core` submodule.

slots:

  has_ai:
    is_a: is_implemented_using_technology
    definition_uri: ai:hasAI
    description: Indicates the use of AI for the associated context
    aliases:
      - has AI
    multivalued: true
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:hasAI
      - dpv_ai_owl:hasAI
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasAI
      dpv_extension_slug: ai

  has_ai_system:
    is_a: has_ai
    definition_uri: ai:hasAISystem
    description: Indicates the use of AI system for the associated context
    aliases:
      - has AI system
    multivalued: true
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:hasAISystem
      - dpv_ai_owl:hasAISystem
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasAISystem
      dpv_extension_slug: ai

  has_capability:
    is_a: has_ai
    definition_uri: ai:hasCapability
    description: Indicates the use of AI capability for the associated context
    aliases:
      - has capability
    multivalued: true
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:hasCapability
      - dpv_ai_owl:hasCapability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasCapability
      dpv_extension_slug: ai

  has_gpai_model:
    is_a: has_model
    definition_uri: ai:hasGPAIModel
    description: Indicates the use of an GPAI model for the associated context
    aliases:
      - has GPAI model
    multivalued: true
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:hasGPAIModel
      - dpv_ai_owl:hasGPAIModel
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasGPAIModel
      dpv_extension_slug: ai

  has_model:
    is_a: has_ai
    definition_uri: ai:hasModel
    description: Indicates the use of an AI model for the associated context
    aliases:
      - has model
    multivalued: true
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:hasModel
      - dpv_ai_owl:hasModel
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasModel
      dpv_extension_slug: ai

  has_technique:
    is_a: has_ai
    definition_uri: ai:hasTechnique
    description: Indicates the use of AI technique for the associated context
    aliases:
      - has technique
    multivalued: true
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:hasTechnique
      - dpv_ai_owl:hasTechnique
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasTechnique
      dpv_extension_slug: ai

classes:

  AI:
    is_a: Technology
    class_uri: ai:AI
    description: |-
      A technical and scientific field devoted to the engineered system that
      generates outputs such as content, forecasts, recommendations or
      decisions for a given set of human-defined objectives
    aliases:
      - Artificial Intelligence (AI)
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:AI
      - dpv_ai_owl:AI
    close_mappings:
      - iso42001:AISystem
    annotations:
      dct_source: ISO/IEC 22989:2022
      upstream_iri: https://w3id.org/dpv/ai/owl#AI
      dpv_extension_slug: ai

  AIAgent:
    is_a: AI
    mixins:
      - SoftwareAgent
    class_uri: ai:AIAgent
    description: |-
      An AI Agent, also known as an 'intelligent agent', is a software agent
      that utilises AI technologies
    aliases:
      - AI Agent
    comments:
      - |-
        Other definitions of AI Agents may include the perception of environment
        as some capacity to incorporate the environment through sensors (e.g.
        computer vision) or data (e.g. web environments), and to produce changes
        in outputs through some degree of autonomy (i.e. without human
        intervention). The definition of 'AI Agent' provided in this extension
        relaxes such requirements and instead focuses on classifying these
        agents based solely on their use of AI technologies to allow
        compatibility with the evolving definitions
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:AIAgent
      - dpv_ai_owl:AIAgent
    close_mappings:
      - iso42001:AISystem
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AIAgent
      dpv_extension_slug: ai

  AIProcess:
    is_a: DpvProcess
    class_uri: ai:AIProcess
    description: A process involving AI technologies
    aliases:
      - AI Process
    comments:
      - |-
        This concept provides a convenient method to indicate AI is involved
        (somewhere) within the Process
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:AIProcess
      - dpv_ai_owl:AIProcess
    related_mappings:
      - iso42001:AIManagementSystem
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AIProcess
      dpv_extension_slug: ai

  AISystem:
    is_a: AI
    mixins:
      - TechSystem
    class_uri: ai:AISystem
    description: |-
      An engineered system that generates outputs such as content, forecasts,
      recommendations or decisions for a given set of human-defined objectives
      (ISO/IEC 22989:2022 definition); or A machine-based system that, for
      explicit or implicit objectives, infers, from the input it receives, how
      to generate outputs such as predictions, content, recommendations, or
      decisions that can influence physical or virtual environments. Different
      AI systems vary in their levels of autonomy and adaptiveness after
      deployment (OECD 2024 definition); or A machine-based system
      demonstrating varying degrees of autonomy and adaptiveness after
      deployment, generating outputs such as predictions, content,
      recommendations, or decisions to influence physical or virtual
      environments (EU Vocabularies' AI Taxonomy definition)
    aliases:
      - AI System
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:AISystem
      - dpv_ai_owl:AISystem
      - iso42001:AISystem
    annotations:
      dct_source: ' ISO/IEC 22989:2022'
      upstream_iri: https://w3id.org/dpv/ai/owl#AISystem
      dpv_extension_slug: ai

  Capability:
    is_a: AI
    class_uri: ai:Capability
    description: Capability or use of AI to achieve a technical goal or objective
    aliases:
      - Capability
    comments:
      - |-
        This concept refers to the application of an AI technique to achieve a
        technical goal or function, and is necessary to distinguish the
        'algorithm' (ai:Technique) from the 'application' (ai:Capability) and
        'goal' (dpv:Purpose)
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:Capability
      - dpv_ai_owl:Capability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#Capability
      dpv_extension_slug: ai

  GenAI:
    is_a: AI
    class_uri: ai:GenAI
    description: |-
      Use of artificial intelligence models that can learn from and mimic
      large amounts of data to create content such as text, images, music,
      videos, code, and more, based on inputs or prompts
    aliases:
      - Generative AI
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:GenAI
      - dpv_ai_owl:GenAI
    close_mappings:
      - iso42001:AISystem
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#GenAI
      dpv_extension_slug: ai

  Model:
    is_a: AI
    class_uri: ai:Model
    description: |-
      Physical, mathematical or otherwise logical representation of a system,
      entity, phenomenon, process or data involving the use of AI techniques
    aliases:
      - Model
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:Model
      - dpv_ai_owl:Model
    annotations:
      dct_source: ' ISO/IEC 22989:2022'
      upstream_iri: https://w3id.org/dpv/ai/owl#Model
      dpv_extension_slug: ai

  Technique:
    is_a: AI
    class_uri: ai:Technique
    description: |-
      The underlying technological algorithm, method, or process that forms
      the technique for using or applying AI
    aliases:
      - Technique
    comments:
      - |-
        This concept refers to the foundational computational implementation and
        is necessary to distinguish the 'algorithm' (ai:Technique) from the
        'application' (ai:Capability) and 'goal' (dpv:Purpose)
    in_subset:
      - ai_core_subset
    exact_mappings:
      - dpv_ai:Technique
      - dpv_ai_owl:Technique
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#Technique
      dpv_extension_slug: ai
