id: https://w3id.org/lmodel/dpv/ai/measures
name: dpv_ai_measures
title: DPV - Ai / Measures
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `ai/modules/measures-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/ai
  - https://w3c.github.io/dpv/2.3/ai/
source: https://w3id.org/dpv/ai/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: ai
  dpv_submodule: measures
  source_ttl: upstream-releases/dpv/ai/modules/measures-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/ai/modules/measures.ttl
  upstream_owl_namespace: https://w3id.org/dpv/ai/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/ai#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  ai: https://w3id.org/lmodel/dpv/ai/
  dpv_ai: https://w3id.org/dpv/ai#
  dpv_ai_owl: https://w3id.org/dpv/ai/owl#

default_prefix: ai
default_range: string
id_prefixes:
  - ai
  - dpv_ai
  - dpv_ai_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/ai

subsets:

  ai_measures_subset:
    description: Entities from the DPV `ai/modules/measures` submodule.

classes:

  Benchmarking:
    is_a: DataQualityAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: ai:Benchmarking
    description: |-
      Measure where performance and outputs are compared to best practices,
      gold standards, or other forms of desired quality
    aliases:
      - Benchmarking
    in_subset:
      - ai_measures_subset
    exact_mappings:
      - dpv_ai:Benchmarking
      - dpv_ai_owl:Benchmarking
    close_mappings:
      - iso42001:InternalAudit
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#Benchmarking
      dpv_extension_slug: ai

  BiasAssessment:
    is_a: DataQualityAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: ai:BiasAssessment
    description: Examination of a data set, model, or AI system for bias
    aliases:
      - Bias Assessment
    in_subset:
      - ai_measures_subset
    exact_mappings:
      - dpv_ai:BiasAssessment
      - dpv_ai_owl:BiasAssessment
    close_mappings:
      - iso42001:AISystemImpactAssessment
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiasAssessment
      dpv_extension_slug: ai

  BiasDetection:
    is_a: BiasAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: ai:BiasDetection
    description: Indicates measures to detect bias
    aliases:
      - Bias Detection
    in_subset:
      - ai_measures_subset
    exact_mappings:
      - dpv_ai:BiasDetection
      - dpv_ai_owl:BiasDetection
    close_mappings:
      - iso42001:AISystemImpactAssessment
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiasDetection
      dpv_extension_slug: ai

  BiasMitigation:
    is_a: BiasAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: ai:BiasMitigation
    description: Indicates measures to mitigate bias
    aliases:
      - Bias Mitigation
    in_subset:
      - ai_measures_subset
    exact_mappings:
      - dpv_ai:BiasMitigation
      - dpv_ai_owl:BiasMitigation
    close_mappings:
      - iso42001:AIRiskTreatmentPlan
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiasMitigation
      dpv_extension_slug: ai

  BiasPrevention:
    is_a: BiasAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: ai:BiasPrevention
    description: Indicates measures to prevent bias
    aliases:
      - Bias Prevention
    in_subset:
      - ai_measures_subset
    exact_mappings:
      - dpv_ai:BiasPrevention
      - dpv_ai_owl:BiasPrevention
    close_mappings:
      - iso42001:AIRiskTreatmentPlan
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiasPrevention
      dpv_extension_slug: ai
