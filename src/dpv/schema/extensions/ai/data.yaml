id: https://w3id.org/lmodel/dpv/ai/data
name: dpv_ai_data
title: DPV - Ai / Data
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `ai/modules/data-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/ai
  - https://w3c.github.io/dpv/2.3/ai/
source: https://w3id.org/dpv/ai/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: ai
  dpv_submodule: data
  source_ttl: upstream-releases/dpv/ai/modules/data-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/ai/modules/data.ttl
  upstream_owl_namespace: https://w3id.org/dpv/ai/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/ai#

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  ai: https://w3id.org/lmodel/dpv/ai/
  dpv_ai: https://w3id.org/dpv/ai#
  dpv_ai_owl: https://w3id.org/dpv/ai/owl#
  tech: https://w3id.org/lmodel/dpv/tech/
  dpv_tech: https://w3id.org/dpv/tech#
  dpv_tech_owl: https://w3id.org/dpv/tech/owl#

default_prefix: ai
default_range: string
id_prefixes:
  - ai
  - dpv_ai
  - dpv_ai_owl

imports:
  - linkml:types
  - dpv:schema/dpv_personal_data
  - dpv:schema/extensions/ai
  - dpv:schema/extensions/tech

subsets:

  ai_data_subset:
    description: Entities from the DPV `ai/modules/data` submodule.

slots:

  has_data:
    definition_uri: ai:hasData
    description: Associates data with an AI system or model or implementation
    aliases:
      - has data
    multivalued: true
    in_subset:
      - ai_data_subset
    exact_mappings:
      - dpv_ai:hasData
      - dpv_ai_owl:hasData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasData
      dpv_extension_slug: ai

  has_testing_data:
    is_a: has_data
    definition_uri: ai:hasTestingData
    description: Associates the data used for testing AI
    aliases:
      - has testing data
    multivalued: true
    in_subset:
      - ai_data_subset
    exact_mappings:
      - dpv_ai:hasTestingData
      - dpv_ai_owl:hasTestingData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasTestingData
      dpv_extension_slug: ai

  has_training_data:
    is_a: has_data
    definition_uri: ai:hasTrainingData
    description: Associates the data used for training AI
    aliases:
      - has training data
    multivalued: true
    in_subset:
      - ai_data_subset
    exact_mappings:
      - dpv_ai:hasTrainingData
      - dpv_ai_owl:hasTrainingData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasTrainingData
      dpv_extension_slug: ai

  has_validation_data:
    is_a: has_data
    definition_uri: ai:hasValidationData
    description: Associates the data used for validating AI
    aliases:
      - has validation data
    multivalued: true
    in_subset:
      - ai_data_subset
    exact_mappings:
      - dpv_ai:hasValidationData
      - dpv_ai_owl:hasValidationData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#hasValidationData
      dpv_extension_slug: ai

classes:

  AiData:
    is_a: DpvData
    mixins:
      - InputOutput
    class_uri: ai:Data
    description: Data involved in the development and use of an AI system or model
    aliases:
      - Data
      - AI Data
    in_subset:
      - ai_data_subset
    exact_mappings:
      - dpv_ai:Data
      - dpv_ai_owl:Data
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#Data
      dpv_extension_slug: ai

  TestingData:
    is_a: AiData
    class_uri: ai:TestingData
    description: Data involved in the testing of an AI system or model
    aliases:
      - Testing Data
    in_subset:
      - ai_data_subset
    exact_mappings:
      - dpv_ai:TestingData
      - dpv_ai_owl:TestingData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#TestingData
      dpv_extension_slug: ai

  TrainingData:
    is_a: AiData
    class_uri: ai:TrainingData
    description: Data involved in the training of an AI system or model
    aliases:
      - Training Data
    in_subset:
      - ai_data_subset
    exact_mappings:
      - dpv_ai:TrainingData
      - dpv_ai_owl:TrainingData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#TrainingData
      dpv_extension_slug: ai

  ValidationData:
    is_a: AiData
    class_uri: ai:ValidationData
    description: Data involved in the validation of an AI system or model
    aliases:
      - Validation Data
    in_subset:
      - ai_data_subset
    exact_mappings:
      - dpv_ai:ValidationData
      - dpv_ai_owl:ValidationData
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ValidationData
      dpv_extension_slug: ai
