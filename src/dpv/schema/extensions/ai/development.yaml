    mixins:
      - Processing
      - Obtain
    class_uri: ai:DataUpdating
    description: |-
      Processing operation where data is updated, e.g. by adding the latest
      records
    aliases:
      - Data Updating
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:DataUpdating
      - dpv_ai_owl:DataUpdating
    close_mappings:
      - iso42001:DataResource
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataUpdating
      dpv_extension_slug: ai

  ModelFineTuning:
    is_a: ModelTraining
    mixins:
      - Processing
      - Transform
    class_uri: ai:ModelFineTuning
    description: |-
      Process where a pre-trained model is further refined through the use of
      a smaller training dataset
    aliases:
      - Model Fine-Tuning
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:ModelFineTuning
      - dpv_ai_owl:ModelFineTuning
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ModelFineTuning
      dpv_extension_slug: ai

  ModelTraining:
    is_a: Transform
    mixins:
      - Processing
    class_uri: ai:ModelTraining
    description: |-
      Process to determine or to improve the parameters of a machine learning
      model based on a machine learning technique by using training data
    aliases:
      - Model Training
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:ModelTraining
      - dpv_ai_owl:ModelTraining
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ModelTraining
      dpv_extension_slug: ai
