      upstream_iri: https://w3id.org/dpv/ai/owl#DataCleaning
      dpv_extension_slug: ai

  DataCollection:
    is_a: DataOperation
    mixins:
      - Processing
      - Collect
    class_uri: ai:DataCollection
    description: |-
      Processing operation where data is collected, e.g. in a raw or unrefined
      form
    aliases:
      - Data Collection
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:DataCollection
      - dpv_ai_owl:DataCollection
    close_mappings:
      - iso42001:DataResource
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataCollection
      dpv_extension_slug: ai

  DataEnrichment:
    is_a: DataPreparation
    mixins:
      - Processing
      - Obtain
    class_uri: ai:DataEnrichment
    description: |-
      Processing operation where data is enriced, e.g. by adding additional
      data that increases its value or usefulness
    aliases:
      - Data Enrichment
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:DataEnrichment
      - dpv_ai_owl:DataEnrichment
    close_mappings:
      - iso42001:DataResource
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataEnrichment
      dpv_extension_slug: ai

  DataLabelling:
    is_a: DataAnnotation
    mixins:
      - Processing
      - Obtain
    class_uri: ai:DataLabelling
    description: |-
      Processing operation where data annotation is carried out through
      labelling, e.g. by assigning tags or categories
    aliases:
      - Data Labelling
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:DataLabelling
      - dpv_ai_owl:DataLabelling
    close_mappings:
      - iso42001:DataResource
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataLabelling
      dpv_extension_slug: ai

  DataOperation:
    is_a: Processing
    class_uri: ai:DataOperation
    description: Processing of data for the development or use of AI models
    aliases:
      - DataOperation
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:DataOperation
      - dpv_ai_owl:DataOperation
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataOperation
      dpv_extension_slug: ai

  DataPreparation:
    is_a: DataOperation
    mixins:
      - Processing
      - Organise
      - Transform
    class_uri: ai:DataPreparation
    description: |-
      Processing operation where data is prepared, e.g. organising and
      transforming it to make it ready for use
    aliases:
      - Data Preparation
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:DataPreparation
      - dpv_ai_owl:DataPreparation
    close_mappings:
      - iso42001:DataResource
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataPreparation
      dpv_extension_slug: ai

