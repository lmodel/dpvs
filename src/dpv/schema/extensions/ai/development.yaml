subsets:

  ai_development_subset:
    description: Entities from the DPV `ai/modules/development` submodule.

classes:

  DataAggregation:
    is_a: DataPreparation
    mixins:
      - Processing
      - Transform
    class_uri: ai:DataAggregation
    description: |-
      Processing operation where data is aggregated, e.g. by combining
      multiple records into one
    aliases:
      - Data Aggregation
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:DataAggregation
      - dpv_ai_owl:DataAggregation
    close_mappings:
      - iso42001:DataResource
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataAggregation
      dpv_extension_slug: ai

  DataAnnotation:
    is_a: DataPreparation
    mixins:
      - Processing
      - Obtain
    class_uri: ai:DataAnnotation
    description: |-
      Processing operation where data is annoated, e.g. by adding additional
      metadata or context to make it useful
    aliases:
      - Data Annotation
    in_subset:
      - ai_development_subset
    exact_mappings:
      - dpv_ai:DataAnnotation
      - dpv_ai_owl:DataAnnotation
    close_mappings:
      - iso42001:DataResource
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataAnnotation
      dpv_extension_slug: ai

  DataCleaning:
    is_a: DataPreparation
    mixins:
      - Processing
      - Transform
    class_uri: ai:DataCleaning
    description: |-
      Processing operation where data is cleaned, e.g. by detecting and
      removing errors or unwanted records
    aliases:
      - Data Cleaning
    in_subset:
      - ai_development_subset
    exact_mappings:
