id: https://w3id.org/lmodel/dpv/ai/capabilities
name: dpv_ai_capabilities
title: DPV - Ai / Capabilities
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `ai/modules/capabilities-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/ai
  - https://w3c.github.io/dpv/2.3/ai/
source: https://w3id.org/dpv/ai/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: ai
  dpv_submodule: capabilities
  source_ttl: upstream-releases/dpv/ai/modules/capabilities-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/ai/modules/capabilities.ttl
  upstream_owl_namespace: https://w3id.org/dpv/ai/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/ai#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  ai: https://w3id.org/lmodel/dpv/ai/
  dpv_ai: https://w3id.org/dpv/ai#
  dpv_ai_owl: https://w3id.org/dpv/ai/owl#

default_prefix: ai
default_range: string
id_prefixes:
  - ai
  - dpv_ai
  - dpv_ai_owl

imports:
  - linkml:types
  - dpv:schema/extensions/ai

subsets:

  ai_capabilities_subset:
    description: Entities from the DPV `ai/modules/capabilities` submodule.

classes:

  ActionRecognition:
    is_a: BiometricCapability
    mixins:
      - Capability
      - ComputerVision
    class_uri: ai:ActionRecognition
    description: Capability to recognise actions
    aliases:
      - Action Recognition
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ActionRecognition
      - dpv_ai_owl:ActionRecognition
    annotations:
      dct_source: ' Defining Artificial Intelligence 2.0'
      upstream_iri: https://w3id.org/dpv/ai/owl#ActionRecognition
      dpv_extension_slug: ai

  AudioCapability:
    is_a: Capability
    class_uri: ai:AudioCapability
    description: Capabilities related to the processing and generation of audio
    aliases:
      - Audio Capability
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:AudioCapability
      - dpv_ai_owl:AudioCapability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AudioCapability
      dpv_extension_slug: ai

  AudioGeneration:
    is_a: AudioCapability
    mixins:
      - Capability
      - ContentGeneration
    class_uri: ai:AudioGeneration
    description: Capability to generate audio
    aliases:
      - Audio Generation
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:AudioGeneration
      - dpv_ai_owl:AudioGeneration
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AudioGeneration
      dpv_extension_slug: ai

  AutomaticSummarisation:
    is_a: InformationRetrieval
    mixins:
      - Capability
      - LanguageCapability
    class_uri: ai:AutomaticSummarisation
    description: |-
      Capability for shortening a portion of content such as text while
      retaining important semantic information
    aliases:
      - Automatic Summarisation
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:AutomaticSummarisation
      - dpv_ai_owl:AutomaticSummarisation
    annotations:
      dct_source: ISO/IEC 22989:2022 3.6.1
      upstream_iri: https://w3id.org/dpv/ai/owl#AutomaticSummarisation
      dpv_extension_slug: ai

  BehaviourAnalysis:
    is_a: HumanOrientedCapability
    mixins:
      - Capability
    class_uri: ai:BehaviourAnalysis
    description: Capability of a system in analysing people's behaviour
    aliases:
      - Behaviour Analysis
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:BehaviourAnalysis
      - dpv_ai_owl:BehaviourAnalysis
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BehaviourAnalysis
      dpv_extension_slug: ai

  BiometricCapability:
    is_a: HumanOrientedCapability
    mixins:
      - Capability
    class_uri: ai:BiometricCapability
    description: |-
      Capability involving processing of biometric data or related to
      biometrics
    aliases:
      - Biometric Capability
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:BiometricCapability
      - dpv_ai_owl:BiometricCapability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiometricCapability
      dpv_extension_slug: ai

  BiometricCategorisation:
    is_a: BiometricCapability
    mixins:
      - Capability
    class_uri: ai:BiometricCategorisation
    description: |-
      Capability involving assigning natural persons to specific categories
      based on their biometric data
    aliases:
      - Biometric Categorisation
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:BiometricCategorisation
      - dpv_ai_owl:BiometricCategorisation
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiometricCategorisation
      dpv_extension_slug: ai

  BiometricEmotionRecognition:
    is_a: EmotionRecognition
    mixins:
      - Capability
    class_uri: ai:BiometricEmotionRecognition
    description: Capability for recognising emotions based on biometrics information
    aliases:
      - Biometric Emotion Recognition
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:BiometricEmotionRecognition
      - dpv_ai_owl:BiometricEmotionRecognition
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiometricEmotionRecognition
      dpv_extension_slug: ai

  BiometricIdentification:
    is_a: BiometricCapability
    mixins:
      - Capability
      - HumanIdentification
    class_uri: ai:BiometricIdentification
    description: |-
      Capability involving automated recognition of physical, physiological
      and behavioural human features such as the face, eye movement, body
      shape, voice, prosody, gait, posture, heart rate, blood pressure, odour,
      keystrokes characteristics, for the purpose of establishing an
      individual’s identity by comparing biometric data of that individual to
      stored biometric data of individuals in a reference database,
      irrespective of whether the individual has given its consent or not
    aliases:
      - Biometric Identification
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:BiometricIdentification
      - dpv_ai_owl:BiometricIdentification
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#BiometricIdentification
      dpv_extension_slug: ai

  ChatbotCapability:
    is_a: NaturalLanguageProcessing
    mixins:
      - Capability
    class_uri: ai:ChatbotCapability
    description: |-
      Capability to simulate human-like conversation with a user through
      messaging platforms, websites, mobile apps, or telephone systems, often
      employing natural language processing and machine learning to engage in
      conversation mimicking human interaction
    aliases:
      - Chatbot Capability
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ChatbotCapability
      - dpv_ai_owl:ChatbotCapability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ChatbotCapability
      dpv_extension_slug: ai

  ComputationalCreativity:
    is_a: HumanOrientedCapability
    mixins:
      - Capability
    class_uri: ai:ComputationalCreativity
    description: |-
      computer systems that emulate human creative processes and produce
      artistic, design output that simulates innovation and originality
    aliases:
      - Computational Creativity
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ComputationalCreativity
      - dpv_ai_owl:ComputationalCreativity
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ComputationalCreativity
      dpv_extension_slug: ai

  ComputerVision:
    is_a: Capability
    class_uri: ai:ComputerVision
    description: |-
      Capability of a functional unit to acquire, process and interpret data
      representing images or video
    aliases:
      - Computer Vision
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ComputerVision
      - dpv_ai_owl:ComputerVision
    annotations:
      dct_source: ISO/IEC 22989:2022 3.7.1
      upstream_iri: https://w3id.org/dpv/ai/owl#ComputerVision
      dpv_extension_slug: ai

  ContentBasedRetrieval:
    is_a: InformationRetrieval
    mixins:
      - Capability
    class_uri: ai:ContentBasedRetrieval
    description: |-
      Capability for retrieval of information using the actual content to
      identify, select, filter, and provide results
    aliases:
      - Content-based Retrieval
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ContentBasedRetrieval
      - dpv_ai_owl:ContentBasedRetrieval
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ContentBasedRetrieval
      dpv_extension_slug: ai

  ContentGeneration:
    is_a: Capability
    class_uri: ai:ContentGeneration
    description: |-
      Capability to generate new content that is distinct from merely deriving
      or transforming existing content
    aliases:
      - Content Generation
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ContentGeneration
      - dpv_ai_owl:ContentGeneration
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ContentGeneration
      dpv_extension_slug: ai

  ContextAwareRetrieval:
    is_a: InformationRetrieval
    mixins:
      - Capability
    class_uri: ai:ContextAwareRetrieval
    description: |-
      Capability for retrieval of information that takes into account the
      user's context such as e.g., location, time, device, or activity to
      provide more relevant results
    aliases:
      - Context-aware Retrieval
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ContextAwareRetrieval
      - dpv_ai_owl:ContextAwareRetrieval
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ContextAwareRetrieval
      dpv_extension_slug: ai

  DialogueManagement:
    is_a: LanguageCapability
    mixins:
      - Capability
    class_uri: ai:DialogueManagement
    description: |-
      Capability for shortening a portion of content such as text while
      retaining important semantic information
    aliases:
      - Dialogue Management
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:DialogueManagement
      - dpv_ai_owl:DialogueManagement
    annotations:
      dct_source: ISO/IEC 22989:2022 3.6.14
      upstream_iri: https://w3id.org/dpv/ai/owl#DialogueManagement
      dpv_extension_slug: ai

  EmotionRecognition:
    is_a: HumanOrientedCapability
    mixins:
      - Capability
    class_uri: ai:EmotionRecognition
    description: |-
      Capability for identifying and categorising emotions expressed in a
      piece of text, speech, video or image or combination thereof
    aliases:
      - Emotion Recognition
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:EmotionRecognition
      - dpv_ai_owl:EmotionRecognition
    annotations:
      dct_source: ISO/IEC 22989:2022 3.6.3
      upstream_iri: https://w3id.org/dpv/ai/owl#EmotionRecognition
      dpv_extension_slug: ai

  FaceRecognition:
    is_a: BiometricCapability
    mixins:
      - Capability
      - ComputerVision
    class_uri: ai:FaceRecognition
    description: |-
      Capability involving automatic pattern recognition for comparing stored
      images of human faces with the image of an actual face, indicating any
      matching, if it exists, and any data, if they exist, identifying the
      person to whom the face belongs
    aliases:
      - Face Recognition
    comments:
      - |-
        EU Vocabularies' AI taxonomy defines 'Facial Recognition as "computer
        vision technology employing biometric analysis and mapping of facial
        characteristics for facial identification purposes, recognising and
        verifying an individual's identity", which not only refers to the
        capability for face recognition but also indicates the *purposes* for
        which this is being used. In DPV, such purposes are defined separately
        within the main DPV
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:FaceRecognition
      - dpv_ai_owl:FaceRecognition
    annotations:
      dct_source: ISO/IEC 22989:2022 3.7.2
      upstream_iri: https://w3id.org/dpv/ai/owl#FaceRecognition
      dpv_extension_slug: ai

  GestureRecognition:
    is_a: BiometricCapability
    mixins:
      - Capability
      - ComputerVision
    class_uri: ai:GestureRecognition
    description: Capability for recognising human gestures
    aliases:
      - Gesture Recognition
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:GestureRecognition
      - dpv_ai_owl:GestureRecognition
    annotations:
      dct_source: ' Defining Artificial Intelligence 2.0'
      upstream_iri: https://w3id.org/dpv/ai/owl#GestureRecognition
      dpv_extension_slug: ai

  HumanIdentification:
    is_a: HumanOrientedCapability
    mixins:
      - Capability
    class_uri: ai:HumanIdentification
    description: |-
      Capability of a system that identifies a human whether at an individual
      or group level
    aliases:
      - Human Identification
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:HumanIdentification
      - dpv_ai_owl:HumanIdentification
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#HumanIdentification
      dpv_extension_slug: ai

  HumanOrientedCapability:
    is_a: Capability
    class_uri: ai:HumanOrientedCapability
    description: |-
      Capabilities that are inherently about humans or oriented towards human
      characteristics and activities
    aliases:
      - Human-Oriented Capability
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:HumanOrientedCapability
      - dpv_ai_owl:HumanOrientedCapability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#HumanOrientedCapability
      dpv_extension_slug: ai

  ImageClassification:
    is_a: ComputerVision
    mixins:
      - Capability
    class_uri: ai:ImageClassification
    description: |-
      Capability of categorising and labelling groups of pixels or vectors
      within an image based on particular rules, involving the assignment of
      images to predefined classes or categories
    aliases:
      - Image Classification
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ImageClassification
      - dpv_ai_owl:ImageClassification
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ImageClassification
      dpv_extension_slug: ai

  ImageGeneration:
    is_a: ContentGeneration
    mixins:
      - Capability
    class_uri: ai:ImageGeneration
    description: Capability to generate image
    aliases:
      - Image Generation
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ImageGeneration
      - dpv_ai_owl:ImageGeneration
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ImageGeneration
      dpv_extension_slug: ai

  ImageRecognition:
    is_a: ComputerVision
    mixins:
      - Capability
    class_uri: ai:ImageRecognition
    description: |-
      Capability for image classification process that classifies object(s),
      pattern(s) or concept(s) in an image
    aliases:
      - Image Recognition
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ImageRecognition
      - dpv_ai_owl:ImageRecognition
    annotations:
      dct_source: ISO/IEC 22989:2022 3.7.4
      upstream_iri: https://w3id.org/dpv/ai/owl#ImageRecognition
      dpv_extension_slug: ai

  InformationRetrieval:
    is_a: Capability
    class_uri: ai:InformationRetrieval
    description: |-
      Capability for retrieving relevant documents or parts of documents from
      a dataset, typically based on keyword or natural language queries
    aliases:
      - Information Retrieval (IR)
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:InformationRetrieval
      - dpv_ai_owl:InformationRetrieval
    annotations:
      dct_source: ISO/IEC 22989:2022 3.6.4
      upstream_iri: https://w3id.org/dpv/ai/owl#InformationRetrieval
      dpv_extension_slug: ai

  LanguageCapability:
    is_a: Capability
    class_uri: ai:LanguageCapability
    description: Capabilities related to languages
    aliases:
      - Language Capability
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:LanguageCapability
      - dpv_ai_owl:LanguageCapability
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#LanguageCapability
      dpv_extension_slug: ai

  LieDetection:
    is_a: HumanOrientedCapability
    mixins:
      - Capability
    class_uri: ai:LieDetection
    description: |-
      Capability to detect lies in the context of human speech, behaviour,
      information, or activities
    aliases:
      - Lie Detection
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:LieDetection
      - dpv_ai_owl:LieDetection
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#LieDetection
      dpv_extension_slug: ai

  LocalBiometricIdentification:
    is_a: BiometricIdentification
    mixins:
      - Capability
    class_uri: ai:LocalBiometricIdentification
    description: Capability involving biometric identification carried out locally
    aliases:
      - Local Biometric Identification
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:LocalBiometricIdentification
      - dpv_ai_owl:LocalBiometricIdentification
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#LocalBiometricIdentification
      dpv_extension_slug: ai

  MachineTranslation:
    is_a: LanguageCapability
    mixins:
      - Capability
    class_uri: ai:MachineTranslation
    description: |-
      Capability for automated translation of text or speech from one natural
      language to another using a computer system
    aliases:
      - Machine Translation
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:MachineTranslation
      - dpv_ai_owl:MachineTranslation
    annotations:
      dct_source: ISO/IEC 22989:2022 3.6.5
      upstream_iri: https://w3id.org/dpv/ai/owl#MachineTranslation
      dpv_extension_slug: ai

  MotionAnalysis:
    is_a: ComputerVision
    mixins:
      - Capability
    class_uri: ai:MotionAnalysis
    description: |-
      Capability of deriving meaningful information about motion from visual
      data, including tracking objects across frames, analysing trajectories,
      estimating velocity and acceleration, and interpreting the meaning of
      motion patterns
    aliases:
      - Motion Analysis
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:MotionAnalysis
      - dpv_ai_owl:MotionAnalysis
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#MotionAnalysis
      dpv_extension_slug: ai

  MultiModalRetrieval:
    is_a: InformationRetrieval
    mixins:
      - Capability
    class_uri: ai:MultiModalRetrieval
    description: |-
      Capability for retrieval of information using multiple modalities such
      as text, images, audio, and video and supporting cross-modal queries
      such as taking text as input to search images
    aliases:
      - Multi-modal Retrieval
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:MultiModalRetrieval
      - dpv_ai_owl:MultiModalRetrieval
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#MultiModalRetrieval
      dpv_extension_slug: ai

  MusicInformationRetrieval:
    is_a: InformationRetrieval
    mixins:
      - Capability
    class_uri: ai:MusicInformationRetrieval
    description: |-
      Capability for retrieving, analysing, and categorising music-related
      information such as audio files, melodies, or lyrics using audio
      features, metadata, and user queries
    aliases:
      - Music Information Retrieval (MIR)
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:MusicInformationRetrieval
      - dpv_ai_owl:MusicInformationRetrieval
    annotations:
      dct_source: ' Defining Artificial Intelligence 2.0'
      upstream_iri: https://w3id.org/dpv/ai/owl#MusicInformationRetrieval
      dpv_extension_slug: ai

  NamedEntityRecognition:
    is_a: LanguageCapability
    mixins:
      - Capability
    class_uri: ai:NamedEntityRecognition
    description: |-
      Capability for recognising and labelling the denotational names of
      entities and their categories for sequences of words in a stream of text
      or speech
    aliases:
      - Named Entity Recognition
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:NamedEntityRecognition
      - dpv_ai_owl:NamedEntityRecognition
    annotations:
      dct_source: ISO/IEC 22989:2022 3.6.6
      upstream_iri: https://w3id.org/dpv/ai/owl#NamedEntityRecognition
      dpv_extension_slug: ai

  NaturalLanguageGeneration:
    is_a: LanguageCapability
    mixins:
      - Capability
    class_uri: ai:NaturalLanguageGeneration
    description: Converting data carrying semantics into natural language
    aliases:
      - Natural Language Generation
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:NaturalLanguageGeneration
      - dpv_ai_owl:NaturalLanguageGeneration
    annotations:
      dct_source: ISO/IEC 22989:2022 3.6.8
      upstream_iri: https://w3id.org/dpv/ai/owl#NaturalLanguageGeneration
      dpv_extension_slug: ai

  NaturalLanguageProcessing:
    is_a: LanguageCapability
    mixins:
      - Capability
    class_uri: ai:NaturalLanguageProcessing
    description: |-
      Capability enabling computers to understand and communicate with human
      language
    aliases:
      - Natural Language Processing
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:NaturalLanguageProcessing
      - dpv_ai_owl:NaturalLanguageProcessing
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#NaturalLanguageProcessing
      dpv_extension_slug: ai

  ObjectDetection:
    is_a: ComputerVision
    mixins:
      - Capability
    class_uri: ai:ObjectDetection
    description: |-
      computer vision technology that detects instances of semantic objects in
      digital images and videos, covering domains like face detection and
      pedestrian detection, with applications spanning image retrieval and
      video surveillance
    aliases:
      - Object Detection
    in_subset:
      - ai_capabilities_subset
    exact_mappings:
      - dpv_ai:ObjectDetection
