default_prefix: ai
default_range: string
id_prefixes:
  - ai
  - dpv_ai
  - dpv_ai_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core
  - dpv:schema/extensions/ai
  - dpv:schema/extensions/risk

subsets:

  ai_risks_subset:
    description: Entities from the DPV `ai/modules/risks` submodule.

classes:

  AIBias:
    is_a: RiskConcept
    mixins:
      - PotentialRisk
      - PotentialRiskSource
      - Bias
    class_uri: ai:AIBias
    description: |-
      Bias associated with development, use, or other activities involving an
      AI technology or system
    aliases:
      - AI Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:AIBias
      - dpv_ai_owl:AIBias
    close_mappings:
      - iso42001:AIRisk
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AIBias
      dpv_extension_slug: ai

  AISystemRisk:
    is_a: RiskConcept
    mixins:
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:AISystemRisk
    description: Risks associated with AI Systems
    aliases:
      - AI System Risk
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:AISystemRisk
      - dpv_ai_owl:AISystemRisk
      - iso42001:AIRisk
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AISystemRisk
      dpv_extension_slug: ai

  AdversarialAttack:
    is_a: SecurityAttack
    mixins:
      - RiskConcept
      - IntegrityConcept
      - PotentialConsequence
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:AdversarialAttack
    description: Inputs designed to cause the model to make a mistake
    aliases:
      - Adversarial Attack
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:AdversarialAttack
      - dpv_ai_owl:AdversarialAttack
    close_mappings:
      - iso42001:AIIncident
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#AdversarialAttack
      dpv_extension_slug: ai

  AlgorithmSelectionBias:
    is_a: EngineeringDecisionBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:AlgorithmSelectionBias
    description: |-
      Bias that occurs from the selection of machine learning algorithms built
      into the AI system which introduce unwanted bias in predictions made by
      the system because the type of algorithm used introduces a variation in
      the performance of the ML model
    aliases:
      - Algorithm Selection Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:AlgorithmSelectionBias
      - dpv_ai_owl:AlgorithmSelectionBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#AlgorithmSelectionBias
      dpv_extension_slug: ai

  AutomationBias:
    is_a: AIBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
      - CognitiveBias
    class_uri: ai:AutomationBias
    description: |-
      Bias that occurs due to propensity for humans to favour suggestions from
      automated decision-making systems and to ignore contradictory
      information made without automation, even if it is correct
    aliases:
      - Automation Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:AutomationBias
      - dpv_ai_owl:AutomationBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#AutomationBias
      dpv_extension_slug: ai

  DataAggregationBias:
    is_a: DataBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:DataAggregationBias
    description: |-
      Bias that occurs from aggregating data covering different groups of
      objects that might have different statistical distributions which
      introduce bias into the data used to train AI systems
    aliases:
      - Data Aggregation Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:DataAggregationBias
      - dpv_ai_owl:DataAggregationBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#DataAggregationBias
      dpv_extension_slug: ai

  DataBias:
    is_a: AIBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:DataBias
    description: |-
      Bias that occurs due to unaddressed data properties that lead to AI
      systems that perform better or worse for different groups
    aliases:
      - Data Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:DataBias
      - dpv_ai_owl:DataBias
    related_mappings:
      - iso42001:AIRisk
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#DataBias
      dpv_extension_slug: ai

  DataLabellingProcessBias:
    is_a: DataBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:DataLabellingProcessBias
    description: |-
      Bias that occurs due to the labelling process itself introducing
      societal or cognitive biases
    aliases:
      - Data Labelling Process Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:DataLabellingProcessBias
      - dpv_ai_owl:DataLabellingProcessBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#DataLabellingProcessBias
      dpv_extension_slug: ai

  DataPoisoning:
    is_a: SecurityAttack
    mixins:
      - RiskConcept
      - IntegrityConcept
      - PotentialConsequence
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:DataPoisoning
    description: Attack trying to manipulate the training dataset
    aliases:
      - Data Poisoning
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:DataPoisoning
      - dpv_ai_owl:DataPoisoning
    close_mappings:
      - iso42001:AIIncident
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataPoisoning
      dpv_extension_slug: ai

  DataRisk:
    is_a: RiskConcept
    mixins:
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:DataRisk
    description: |-
      Risk associated with data used or produced or otherwise involved in the
      context of AI
    aliases:
      - Data Risk
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:DataRisk
      - dpv_ai_owl:DataRisk
    related_mappings:
      - iso42001:AIRisk
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#DataRisk
      dpv_extension_slug: ai

  DistributedTrainingBias:
    is_a: DataBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:DistributedTrainingBias
    description: |-
      Bias that occurs due to distributed machine having different sources of
      data that do not have the same distribution of feature space
    aliases:
      - Distributed Training Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:DistributedTrainingBias
      - dpv_ai_owl:DistributedTrainingBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#DistributedTrainingBias
      dpv_extension_slug: ai

  EngineeringDecisionBias:
    is_a: AIBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:EngineeringDecisionBias
    description: |-
      Bias that occurs due to machine learning model architectures -
      encompassing all model specifications, parameters and manually designed
      features
    aliases:
      - Engineering Decision Bias
    comments:
      - Data bias and human cognitive bias can contribute to such bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:EngineeringDecisionBias
      - dpv_ai_owl:EngineeringDecisionBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#EngineeringDecisionBias
      dpv_extension_slug: ai

  ExplainabilityRisk:
    is_a: RiskConcept
    mixins:
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:ExplainabilityRisk
    description: |-
      Risk that an AI's decisions or behaviors cannot be adequately
      understood, interpreted, or justified by relevant stakeholders.
    aliases:
      - Explainability Risk
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:ExplainabilityRisk
      - dpv_ai_owl:ExplainabilityRisk
    close_mappings:
      - iso42001:AIRisk
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#ExplainabilityRisk
      dpv_extension_slug: ai

  FeatureEngineeringBias:
    is_a: EngineeringDecisionBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:FeatureEngineeringBias
    description: |-
      Bias that occurs from steps such as encoding, data type conversion,
      dimensionality reduction and feature selection which are subject to
      choices made by the AI developer and introduce bias in the ML model
    aliases:
      - Feature Engineering Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:FeatureEngineeringBias
      - dpv_ai_owl:FeatureEngineeringBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#FeatureEngineeringBias
      dpv_extension_slug: ai

  HyperparameterTuningBias:
    is_a: EngineeringDecisionBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:HyperparameterTuningBias
    description: |-
      Bias that occurs from hyperparameters defining how the model is
      structured and which cannot be directly trained from the data like model
      parameters, where hyperparameters affect the model functioning and
      accuracy of the model
    aliases:
      - Hyperparameter Tuning Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:HyperparameterTuningBias
      - dpv_ai_owl:HyperparameterTuningBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#HyperparameterTuningBias
      dpv_extension_slug: ai

  InformativenessBias:
    is_a: EngineeringDecisionBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InformativenessBias
    description: |-
      Bias that occurs or some groups, the mapping between inputs present in
      the data and outputs are more difficult to learn and where a model that
      only has one feature set available, can be biased against the group
      whose relationships are difficult to learn from available data
    aliases:
      - Informativeness Bias
    comments:
      - |-
        This can happen when some features are highly informative about one
        group, while a different set of features is highly informative about
        another group. If this is the case, then a model that only has one
        feature set available, can be biased against the group whose
        relationships are difficult to learn from available data
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InformativenessBias
      - dpv_ai_owl:InformativenessBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#InformativenessBias
      dpv_extension_slug: ai

  InputDataBias:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataBias
    description: |-
      Concept representing input data containing or potentially containing
      bias
    aliases:
      - Input Data Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InputDataBias
      - dpv_ai_owl:InputDataBias
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataBias
      dpv_extension_slug: ai

  InputDataInaccurate:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataInaccurate
    description: Concept representing input data being inaccurate
    aliases:
