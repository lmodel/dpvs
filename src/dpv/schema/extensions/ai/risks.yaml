  MissingFeaturesBias:
    is_a: DataBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:MissingFeaturesBias
    description: |-
      Bias that occurs when features are missing from individual training
      samples
    aliases:
      - Missing Features Bias
    comments:
      - |-
        If the frequency of missing features is higher for one group than
        another then this presents another vector for bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:MissingFeaturesBias
      - dpv_ai_owl:MissingFeaturesBias
    annotations:
      dct_source: ISO/IEC 24027:2021
      upstream_iri: https://w3id.org/dpv/ai/owl#MissingFeaturesBias
      dpv_extension_slug: ai

  ModelBias:
    is_a: EngineeringDecisionBias
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:ModelBias
    description: |-
      Bias that occurs when ML uses functions like a maximum likelihood
      estimator to determine parameters, and there is data skew or
      under-representation present in the data, where the maximum likelihood
      estimation tends to amplify any underlying bias in the distribution
    aliases:
      - Model Bias
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:ModelBias
      - dpv_ai_owl:ModelBias
