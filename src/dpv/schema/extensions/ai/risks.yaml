    exact_mappings:
      - dpv_ai:InputDataInappropriate
      - dpv_ai_owl:InputDataInappropriate
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataInappropriate
      dpv_extension_slug: ai

  InputDataIncomplete:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataIncomplete
    description: Concept representing input data being incomplete
    aliases:
      - Input Data Incomplete
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InputDataIncomplete
      - dpv_ai_owl:InputDataIncomplete
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataIncomplete
      dpv_extension_slug: ai

  InputDataInconsistent:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataInconsistent
    description: Concept representing input data being inconsistent
    aliases:
      - Input Data Inconsistent
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InputDataInconsistent
      - dpv_ai_owl:InputDataInconsistent
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataInconsistent
      dpv_extension_slug: ai

  InputDataMisclassified:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataMisclassified
    description: Concept representing input data being misclassified
    aliases:
