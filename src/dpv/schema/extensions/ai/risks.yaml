    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataMisclassified
      dpv_extension_slug: ai

  InputDataMisinterpretation:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataMisinterpretation
    description: Concept representing input data being misinterpreted
    aliases:
      - Input Data Misinterpretation
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InputDataMisinterpretation
      - dpv_ai_owl:InputDataMisinterpretation
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataMisinterpretation
      dpv_extension_slug: ai

  InputDataNoise:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataNoise
    description: Concept representing input data being noisy
    aliases:
      - Input Data Noise
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InputDataNoise
      - dpv_ai_owl:InputDataNoise
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataNoise
      dpv_extension_slug: ai

  InputDataOutdated:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataOutdated
    description: Concept representing input data being outdated
    aliases:
      - Input Data Outdated
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InputDataOutdated
      - dpv_ai_owl:InputDataOutdated
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataOutdated
      dpv_extension_slug: ai

  InputDataRisk:
    is_a: DataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataRisk
    description: Risks and risk concepts related to input data
    aliases:
      - Input Data Risk
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InputDataRisk
      - dpv_ai_owl:InputDataRisk
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataRisk
      dpv_extension_slug: ai

  InputDataSelectionError:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataSelectionError
    description: Concept representing an error in input data selection
    aliases:
      - Input Data Selection Error
    in_subset:
      - ai_risks_subset
    exact_mappings:
      - dpv_ai:InputDataSelectionError
      - dpv_ai_owl:InputDataSelectionError
    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataSelectionError
      dpv_extension_slug: ai

  InputDataSparse:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
