    annotations:
      upstream_iri: https://w3id.org/dpv/ai/owl#InputDataInaccurate
      dpv_extension_slug: ai

  InputDataInappropriate:
    is_a: InputDataRisk
    mixins:
      - RiskConcept
      - PotentialRisk
      - PotentialRiskSource
    class_uri: ai:InputDataInappropriate
    description: Concept representing input data being inappropriate
    aliases:
