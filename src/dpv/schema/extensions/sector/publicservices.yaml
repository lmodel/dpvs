  dpv_sector_publicservices: https://w3id.org/dpv/sector/publicservices#
  dpv_sector_publicservices_owl: https://w3id.org/dpv/sector/publicservices/owl#

default_prefix: sector_publicservices
default_range: string
id_prefixes:
  - sector_publicservices
  - dpv_sector_publicservices
  - dpv_sector_publicservices_owl

imports:
  - linkml:types
  - dpv:schema/dpv_core

subsets:

  sector_publicservices_subset:
    description: All entities from the DPV `sector/publicservices` extension.

  sector_publicservices_purposes_subset:
    description: |-
      Entities from the DPV `sector/publicservices/modules/purposes`
      submodule.

classes:

  HousingWelfareManagement:
    is_a: SocialAssistanceManagement
    mixins:
      - Purpose
    class_uri: sector_publicservices:HousingWelfareManagement
    description: |-
      Purposes associated with management of housing as part of social
      assistance and welfare services
    aliases:
      - Housing Welfare Management
    in_subset:
      - sector_publicservices_subset
    exact_mappings:
      - dpv_sector_publicservices:HousingWelfareManagement
      - dpv_sector_publicservices_owl:HousingWelfareManagement
    annotations:
      upstream_iri: |-
        https://w3id.org/dpv/sector/publicservices/owl#HousingWelfareManagement
      dpv_extension_slug: sector/publicservices

  PublicServiceDistributionManagement:
    is_a: PublicServiceProvision
    mixins:
      - Purpose
    class_uri: sector_publicservices:PublicServiceDistributionManagement
    description: |-
      Purposes associated with managing the distribution in relation to public
      services, such as increasing, decreasing, granting, revoking, or
      reducing the service or related benefits
    aliases:
      - Public Service Distribution Management
    in_subset:
      - sector_publicservices_subset
    exact_mappings:
      - dpv_sector_publicservices:PublicServiceDistributionManagement
      - dpv_sector_publicservices_owl:PublicServiceDistributionManagement
    annotations:
      upstream_iri: |-
        https://w3id.org/dpv/sector/publicservices/owl#PublicServiceDistributionManagement
