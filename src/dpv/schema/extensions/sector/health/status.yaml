id: https://w3id.org/lmodel/dpv/sector/health/status
name: dpv_sector_health_status
title: DPV - Sector - Health / Status
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `sector/health/modules/status-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/sector/health
  - https://w3c.github.io/dpv/2.3/sector/health/
source: https://w3id.org/dpv/sector/health/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: sector/health
  dpv_submodule: status
  source_ttl: upstream-releases/dpv/sector/health/modules/status-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/sector/health/modules/status.ttl
  upstream_owl_namespace: https://w3id.org/dpv/sector/health/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/sector/health#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  sector_health: https://w3id.org/lmodel/dpv/sector/health/
  dpv_sector_health: https://w3id.org/dpv/sector/health#
  dpv_sector_health_owl: https://w3id.org/dpv/sector/health/owl#

default_prefix: sector_health
default_range: string
id_prefixes:
  - sector_health
  - dpv_sector_health
  - dpv_sector_health_owl

imports:
  - linkml:types
  - dpv:schema/extensions/sector/health

subsets:

  sector_health_status_subset:
    description: Entities from the DPV `sector/health/modules/status` submodule.

classes:

  CompatibilityUnknown:
    mixins:
      - ReuseCompatibility
    class_uri: sector_health:CompatibilityUnknown
    description: |-
      Status indicating the compatibility for reuse of health data for the
      context is currently unknown
    aliases:
      - Compatibility Unknown
    in_subset:
      - sector_health_status_subset
    exact_mappings:
      - dpv_sector_health:CompatibilityUnknown
      - dpv_sector_health_owl:CompatibilityUnknown
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#CompatibilityUnknown
      dpv_extension_slug: sector/health

  PrimaryUse:
    mixins:
      - ReuseCompatibility
    class_uri: sector_health:PrimaryUse
    description: |-
      Status indicating the reuse of health is compatible with the original
      purpose or use i.e. it can be considered as 'Primary Use'
    aliases:
      - Primary Use
    comments:
      - |-
        Primary Use refers to an assessment where two contexts are found to be
        compatible, e.g. if purpose is used to test compatibility, then for two
        activities the second activity is said be the primary use if its purpose
        is compatible with the first activity's purpose
    in_subset:
      - sector_health_status_subset
    exact_mappings:
      - dpv_sector_health:PrimaryUse
      - dpv_sector_health_owl:PrimaryUse
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#PrimaryUse
      dpv_extension_slug: sector/health

  ReuseCompatibility:
    class_uri: sector_health:ReuseCompatibility
    description: |-
      Status indicating whether the reuse of health data is compatible for
      given context
    aliases:
      - ReuseCompatibility
    comments:
      - |-
        Compatibility refers to whether two contexts, such as dpv:Process
        instances, are compatible with each other based on a criteria which is
        not defined by the concept. This criteria can be based on requirements
        from law, such as GDPR's purpose compatibility or can be based on
        privacy norms such as contextual integrity. To express such
        interpretations, further concepts should be expanded from this base
        concept
    in_subset:
      - sector_health_status_subset
    exact_mappings:
      - dpv_sector_health:ReuseCompatibility
      - dpv_sector_health_owl:ReuseCompatibility
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#ReuseCompatibility
      dpv_extension_slug: sector/health

  SecondaryUse:
    mixins:
      - ReuseCompatibility
    class_uri: sector_health:SecondaryUse
    description: |-
      Status indicating the reuse of health is incompatible with the original
      purpose or use i.e. it is considered as 'Secondary Use'
    aliases:
      - Secondary Use
    comments:
      - |-
        Secondary Use refers to an assessment where two contexts are found to be
        incompatible, e.g. if purpose is used to test compatibility, then for
        two activities the second activity is said be the secondary use if its
        purpose is incompatible with the first activity's purpose
    in_subset:
      - sector_health_status_subset
    exact_mappings:
      - dpv_sector_health:SecondaryUse
      - dpv_sector_health_owl:SecondaryUse
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#SecondaryUse
      dpv_extension_slug: sector/health
