default_prefix: sector_health
default_range: string
id_prefixes:
  - sector_health
  - dpv_sector_health
  - dpv_sector_health_owl

imports:
  - linkml:types
  - dpv:schema/dpv_processing
  - dpv:schema/extensions/sector/health
  - dpv:schema/extensions/tech

subsets:

  sector_health_technology_subset:
    description: Entities from the DPV `sector/health/modules/technology` submodule.

classes:

  DpvSystem:
    mixins:
      - Technology
    class_uri: sector_health:System
    description: |-
      A system whereby the software and/or hardware allows personal electronic
      health data to be collected and processed, to be used by healthcare
      providers when providing patient care or by patients when accessing
      their electronic health data
    aliases:
      - System
      - Electronic Health Record System
    in_subset:
      - sector_health_technology_subset
    exact_mappings:
      - dpv_sector_health:System
      - dpv_sector_health_owl:System
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#System
      dpv_extension_slug: sector/health

  EHRSystem:
    is_a: DpvSystem
    mixins:
      - Technology
    class_uri: sector_health:EHRSystem
    description: |-
      A system whereby the software and/or hardware allows electronic health
      record data to be collected and processed, to be used by healthcare
      providers when providing patient care or by patients when accessing
      their electronic health data
    aliases:
      - Electronic Health Record System
    in_subset:
      - sector_health_technology_subset
    exact_mappings:
      - dpv_sector_health:EHRSystem
      - dpv_sector_health_owl:EHRSystem
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#EHRSystem
      dpv_extension_slug: sector/health

  ElectronicHealthDataAccessService:
    is_a: DpvService
    mixins:
      - Technology
    class_uri: sector_health:ElectronicHealthDataAccessService
    description: |-
      Technical service, such as an online portal or application, that allows
      data subjects to access their electronic health data or the electronic
      health data of those natural persons whose electronic health data they
      are legally authorised to access
    aliases:
      - Electronic Health Data Access Service
    in_subset:
      - sector_health_technology_subset
    exact_mappings:
      - dpv_sector_health:ElectronicHealthDataAccessService
      - dpv_sector_health_owl:ElectronicHealthDataAccessService
    annotations:
      upstream_iri: |-
        https://w3id.org/dpv/sector/health/owl#ElectronicHealthDataAccessService
      dpv_extension_slug: sector/health

  HealthApplication:
    is_a: DpvApplication
    mixins:
      - Technology
    class_uri: sector_health:HealthApplication
    description: |-
      Software component for the processing of electronic health data,
      specifically for providing information on the health of natural persons,
      or the delivery of care for purposes other than the provision of
      healthcare
    aliases:
      - Health Application
    in_subset:
      - sector_health_technology_subset
    exact_mappings:
      - dpv_sector_health:HealthApplication
      - dpv_sector_health_owl:HealthApplication
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#HealthApplication
      dpv_extension_slug: sector/health

  HealthProfessionalAccessService:
    is_a: DpvService
    mixins:
      - Technology
    class_uri: sector_health:HealthProfessionalAccessService
    description: |-
      Technical service, supported by an EHR system, that enables health
      professionals to access data of natural persons under their care
    aliases:
      - Health Professional Access Service
    in_subset:
      - sector_health_technology_subset
    exact_mappings:
      - dpv_sector_health:HealthProfessionalAccessService
      - dpv_sector_health_owl:HealthProfessionalAccessService
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#HealthProfessionalAccessService
      dpv_extension_slug: sector/health

  InteroperabilitySoftwareForEHRSystem:
    is_a: Software
    mixins:
      - Technology
    class_uri: sector_health:InteroperabilitySoftwareForEHRSystem
    description: |-
      Software component of the EHR system which provides and receives
      personal electronic health data under a priority category for primary
      use established under the EHDS Regulation in the European electronic
      health record exchange format
    aliases:
      - Interoperability Software for EHR System
    in_subset:
      - sector_health_technology_subset
    exact_mappings:
      - dpv_sector_health:InteroperabilitySoftwareForEHRSystem
      - dpv_sector_health_owl:InteroperabilitySoftwareForEHRSystem
    annotations:
      upstream_iri: |-
        https://w3id.org/dpv/sector/health/owl#InteroperabilitySoftwareForEHRSystem
      dpv_extension_slug: sector/health

  LoggingSoftwareForEHRSystem:
    is_a: Software
    mixins:
      - Technology
    class_uri: sector_health:LoggingSoftwareForEHRSystem
    description: |-
      Software component of the EHR system which provides logging information
      related to access by health professionals or other individuals to
      priority categories of personal electronic health data
    aliases:
      - Logging Software for EHR System
    in_subset:
      - sector_health_technology_subset
    exact_mappings:
      - dpv_sector_health:LoggingSoftwareForEHRSystem
      - dpv_sector_health_owl:LoggingSoftwareForEHRSystem
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#LoggingSoftwareForEHRSystem
      dpv_extension_slug: sector/health

  WellnessApplication:
    is_a: HealthApplication
    mixins:
      - Technology
    class_uri: sector_health:WellnessApplication
    description: |-
      Software component for the processing of electronic health data
      originating from wellness applications
    aliases:
      - Wellness Application
    in_subset:
      - sector_health_technology_subset
    exact_mappings:
      - dpv_sector_health:WellnessApplication
      - dpv_sector_health_owl:WellnessApplication
    annotations:
      upstream_iri: https://w3id.org/dpv/sector/health/owl#WellnessApplication
      dpv_extension_slug: sector/health
