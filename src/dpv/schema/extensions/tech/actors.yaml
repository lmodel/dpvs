classes:

  Deployer:
    is_a: Actor
    class_uri: tech:Deployer
    description: Actor that deploys Technology
    aliases:
      - Deployer
    in_subset:
      - tech_actors_subset
    exact_mappings:
      - dpv_tech:Deployer
      - dpv_tech_owl:Deployer
    close_mappings:
      - iso22989:Stakeholder
    annotations:
      dct_source: AI Act
      upstream_iri: https://w3id.org/dpv/tech/owl#Deployer
      dpv_extension_slug: tech

  Designer:
    is_a: Actor
    class_uri: tech:Designer
    description: Actor that designs Technology
    aliases:
      - Designer
    in_subset:
      - tech_actors_subset
    exact_mappings:
      - dpv_tech:Designer
      - dpv_tech_owl:Designer
    close_mappings:
      - iso22989:Stakeholder
    annotations:
