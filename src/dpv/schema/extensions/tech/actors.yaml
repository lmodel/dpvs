      upstream_iri: https://w3id.org/dpv/tech/owl#Maintainer
      dpv_extension_slug: tech

  Manufacturer:
    is_a: Actor
    class_uri: tech:Manufacturer
    description: Actor that manufactures Technology
    aliases:
      - Manufacturer
    in_subset:
      - tech_actors_subset
    exact_mappings:
      - dpv_tech:Manufacturer
      - dpv_tech_owl:Manufacturer
    annotations:
      dct_source: DGA 26.3
      upstream_iri: https://w3id.org/dpv/tech/owl#Manufacturer
      dpv_extension_slug: tech

  Owner:
    is_a: Actor
    class_uri: tech:Owner
    description: Actor that owns Technology
    aliases:
      - Owner
    in_subset:
      - tech_actors_subset
    exact_mappings:
      - dpv_tech:Owner
      - dpv_tech_owl:Owner
    annotations:
      dct_source: DGA 26.3
      upstream_iri: https://w3id.org/dpv/tech/owl#Owner
      dpv_extension_slug: tech

  Partner:
    is_a: Actor
    class_uri: tech:Partner
    description: Actor that provides services in the context of Technology
    aliases:
      - Partner
    comments:
      - |-
        "Partner" is a vague term and should not be used - instead the more
        specific terms provided in this vocabulary should be used. Partner
        refers to entities that provide services for the technology (as opposed
        to for using the technology) - for example to further develop or refine
        it, or to test or audit it.
    in_subset:
      - tech_actors_subset
    exact_mappings:
      - dpv_tech:Partner
      - dpv_tech_owl:Partner
    annotations:
      dct_source: ISO/IEC 22989:2022
      upstream_iri: https://w3id.org/dpv/tech/owl#Partner
      dpv_extension_slug: tech

  Purchaser:
    is_a: Actor
