id: https://w3id.org/lmodel/dpv/tech/docs
name: dpv_tech_docs
title: DPV - Tech / Docs
description: |-
  LinkML schema generated from the DPV 2.3 extension module
  `tech/modules/docs-owl.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv/tech
  - https://w3c.github.io/dpv/2.3/tech/
source: https://w3id.org/dpv/tech/owl#
version: '2.3'
annotations:
  dpv_version: '2.3'
  dpv_extension_slug: tech
  dpv_submodule: docs
  source_ttl: upstream-releases/dpv/tech/modules/docs-owl.ttl
  source_canonical_ttl: upstream-releases/dpv/tech/modules/docs.ttl
  upstream_owl_namespace: https://w3id.org/dpv/tech/owl#
  upstream_canonical_namespace: https://w3id.org/dpv/tech#

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/
  tech: https://w3id.org/lmodel/dpv/tech/
  dpv_tech: https://w3id.org/dpv/tech#
  dpv_tech_owl: https://w3id.org/dpv/tech/owl#

default_prefix: tech
default_range: string
id_prefixes:
  - tech
  - dpv_tech
  - dpv_tech_owl

imports:
  - linkml:types
  - dpv:schema/extensions/tech

subsets:

  tech_docs_subset:
    description: Entities from the DPV `tech/modules/docs` submodule.

classes:

  DevelopmentPlan:
    is_a: Plan
    mixins:
      - Documentation
    class_uri: tech:DevelopmentPlan
    description: Plan associated with developing technology
    aliases:
      - Development Plan
    in_subset:
      - tech_docs_subset
    exact_mappings:
      - dpv_tech:DevelopmentPlan
      - dpv_tech_owl:DevelopmentPlan
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#DevelopmentPlan
      dpv_extension_slug: tech

  Guide:
    is_a: Documentation
    class_uri: tech:Guide
    description: Documentation that provides guidance regarding the technology
    aliases:
      - Guide
    in_subset:
      - tech_docs_subset
    exact_mappings:
      - dpv_tech:Guide
      - dpv_tech_owl:Guide
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Guide
      dpv_extension_slug: tech

  Instructions:
    is_a: Documentation
    class_uri: tech:Instructions
    description: Instructions related to technology
    aliases:
      - Instructions
    in_subset:
      - tech_docs_subset
    exact_mappings:
      - dpv_tech:Instructions
      - dpv_tech_owl:Instructions
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Instructions
      dpv_extension_slug: tech

  Manual:
    is_a: Documentation
    class_uri: tech:Manual
    description: |-
      Documentation that provides instructions for using, maintaining,
      developing, or performing other activities regarding the technology
    aliases:
      - Manual
    in_subset:
      - tech_docs_subset
    exact_mappings:
      - dpv_tech:Manual
      - dpv_tech_owl:Manual
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Manual
      dpv_extension_slug: tech

  Plan:
    is_a: Documentation
    class_uri: tech:Plan
    description: |-
      Plan associated with using, maintaining, developing, or performing other
      activities associated with technology
    aliases:
      - Plan
    in_subset:
      - tech_docs_subset
    exact_mappings:
      - dpv_tech:Plan
      - dpv_tech_owl:Plan
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Plan
      dpv_extension_slug: tech

  Specification:
    is_a: Documentation
    class_uri: tech:Specification
    description: |-
      Documentation that specifies requirements that must be satisfied by the
      technology
    aliases:
      - Specification
    in_subset:
      - tech_docs_subset
    exact_mappings:
      - dpv_tech:Specification
      - dpv_tech_owl:Specification
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Specification
      dpv_extension_slug: tech

  TestingPlan:
    is_a: Plan
    mixins:
      - Documentation
    class_uri: tech:TestingPlan
    description: Plan associated with testing technology
    aliases:
      - Testing Plan
    in_subset:
      - tech_docs_subset
    exact_mappings:
      - dpv_tech:TestingPlan
      - dpv_tech_owl:TestingPlan
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#TestingPlan
      dpv_extension_slug: tech
