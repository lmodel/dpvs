classes:

  Actor:
    is_a: DpvEntity
    class_uri: tech:Actor
    description: |-
      Actors and Entities involved in provision, use, and management of
      Technology
    aliases:
      - Actor
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:Actor
      - dpv_tech_owl:Actor
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Actor
      dpv_extension_slug: tech

  Capability:
    class_uri: tech:Capability
    description: Expression of what the technology is capable of achieving or providing
    aliases:
      - Capability
    comments:
      - |-
        Examples of capabilities are image recognition, sentiment analysis,
        machine translation
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:Capability
      - dpv_tech_owl:Capability
    related_mappings:
      - iso22989:AICapability
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Capability
      dpv_extension_slug: tech

  CommunicationMechanism:
    is_a: Technology
    class_uri: tech:CommunicationMechanism
    description: Communication mechanism used or provided by Technology
    aliases:
      - Communication Mechanism
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:CommunicationMechanism
      - dpv_tech_owl:CommunicationMechanism
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#CommunicationMechanism
      dpv_extension_slug: tech

  DeploymentLocation:
    is_a: DpvLocation
    class_uri: tech:DeploymentLocation
    description: Location for where technology is deployed and used
    aliases:
      - Deployment Location
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:DeploymentLocation
      - dpv_tech_owl:DeploymentLocation
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#DeploymentLocation
      dpv_extension_slug: tech

  Documentation:
    class_uri: tech:Documentation
    description: |-
      Information describing use, functionality, design, or other technical
      aspects of the Technology
    aliases:
      - Documentation
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:Documentation
      - dpv_tech_owl:Documentation
    close_mappings:
      - iso22989:Documentation
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Documentation
      dpv_extension_slug: tech

  InputOutput:
    class_uri: tech:InputOutput
    description: Forms of inputs and outputs associated with a technology
    aliases:
      - Input/Output
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:InputOutput
      - dpv_tech_owl:InputOutput
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#InputOutput
      dpv_extension_slug: tech

  IntendedUse:
    class_uri: tech:IntendedUse
    description: Describes the 'intended' use of the technology
    aliases:
      - Intended Use
    comments:
      - |-
        Intended use can be used to describe how the developer or provider of
        technology intends it to be used e.g. use a database to store data, and
        to describe the plan or 'intent' to use the technology by a user or
        operator e.g. use a database to store and analyse data. Intended Use can
        involve any concept e.g. DPV's purpose, processing, tech/org measures,
        and can be low-level purely technical uses such as store data or
        high-level goals such as legal compliance. Intended Use only describes
        the intent or ex-ante intention, and may be different from how the
        technology is being actually used - which is indicated by using
        isImplementedUsingTechnology in a process or other relevant context.
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:IntendedUse
      - dpv_tech_owl:IntendedUse
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#IntendedUse
      dpv_extension_slug: tech

  License:
    is_a: LicenseAgreement
    class_uri: tech:License
    description: |-
      A legal agreement that allows or provides a license for the use or other
      operations involving a technology
    aliases:
      - License
    comments:
      - |-
        This concept is derived from license agreements and contracts which are
        legal bases, and therefore can also be used as a legal basis
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:License
      - dpv_tech_owl:License
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#License
      dpv_extension_slug: tech

  LifecycleStage:
    class_uri: tech:LifecycleStage
    description: A stage within the lifecycle of technology
    aliases:
      - Lifecycle Stage
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:LifecycleStage
      - dpv_tech_owl:LifecycleStage
    close_mappings:
      - iso22989:AISystemLifecycle
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#LifecycleStage
      dpv_extension_slug: tech

  OperatingEnvironment:
    class_uri: tech:OperatingEnvironment
    description: The environment within which the technology operates
    aliases:
      - Operating Environment
    comments:
      - |-
        Environment here is a broad term used to refer to the immediate
        surroundings and parts of it that form the context of where the
        technology operates, for example a room or in open air where specific
        machines are set up. This helps describe the expectations and set up of
        systems and, to specify and compare them against ideal conditions or
        environments
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:OperatingEnvironment
      - dpv_tech_owl:OperatingEnvironment
    annotations:
      dct_source: Model Cards by Mitchell et al. (2019)
      upstream_iri: https://w3id.org/dpv/tech/owl#OperatingEnvironment
      dpv_extension_slug: tech

  OperatingFactor:
    class_uri: tech:OperatingFactor
    description: A 'factor' affecting the operation and outcomes of the technology
    aliases:
      - Operating Factor
    comments:
      - |-
        Examples of operating factor could be equipment characteristics,
        lighting conditions for camera operations, connectivity for
        communications. This helps indicate whether specific factors are ideal
        i.e. they will give the best performance, or are problematic i.e. they
        will cause issues
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:OperatingFactor
      - dpv_tech_owl:OperatingFactor
    annotations:
      dct_source: Model Cards by Mitchell et al. (2019)
      upstream_iri: https://w3id.org/dpv/tech/owl#OperatingFactor
      dpv_extension_slug: tech

  ProvisionMethod:
    is_a: Technology
    class_uri: tech:ProvisionMethod
    description: Method associated with provision or use of technology
    aliases:
      - Provision Method
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:ProvisionMethod
      - dpv_tech_owl:ProvisionMethod
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#ProvisionMethod
      dpv_extension_slug: tech

  TechFunction:
    class_uri: tech:Function
    description: |-
      Expression of what goals or purposes the technology's capabilities are
      being used towards or developed for
    aliases:
      - Function
    comments:
      - |-
        Function is a broad concept that can include purposes such as identify
        verification, capability such as image recognition, or specific security
        measures such as encryption
    in_subset:
      - tech_core_subset
    exact_mappings:
      - dpv_tech:Function
      - dpv_tech_owl:Function
    annotations:
      upstream_iri: https://w3id.org/dpv/tech/owl#Function
      dpv_extension_slug: tech
