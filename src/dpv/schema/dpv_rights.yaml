id: https://w3id.org/lmodel/dpv/dpv_rights
name: dpv_rights
title: DPV - Rights
description: |-
  LinkML schema for DPV 2.3 semantic group: Rights, remedies, and
  requests. This schema imports only its direct upstream module
  dependencies (rights) rather than all 965 DPV classes.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv_common

subsets:

  rights_subset:
    description: Entities from the DPV `rights` semantic group.

slots:

  has_right:
    definition_uri: dpv:hasRight
    description: Indicates use or applicability of Right
    aliases:
      - has right
    multivalued: true
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:hasRight
      - dpv_owl:hasRight
    annotations:
      skos_in_scheme: rights-properties

  has_status:
    definition_uri: dpv:hasStatus
    description: Indicates the status of specified concept
    aliases:
      - has status
    comments:
      - Also used to Indicate the status of a Right Exercise Activity
    multivalued: true
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:hasStatus
      - dpv_owl:hasStatus
    annotations:
      skos_in_scheme: rights-properties, status-properties

  is_exercised_at:
    definition_uri: dpv:isExercisedAt
    description: Indicates context or information about exercising a right
    aliases:
      - is exercised at
    multivalued: true
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:isExercisedAt
      - dpv_owl:isExercisedAt
    annotations:
      skos_in_scheme: rights-properties

classes:

  ActiveRight:
    is_a: Right
    class_uri: dpv:ActiveRight
    description: |-
      The right(s) applicable, provided, or expected that need to be
      (actively) exercised
    aliases:
      - Active Right
    comments:
      - |-
        Active rights require the entity to expressly exercise them. For
        example, a Data Subject exercising their right to withdraw their
        consent.
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:ActiveRight
      - dpv_owl:ActiveRight
    annotations:
      skos_in_scheme: rights-classes

  DataSubjectRight:
    is_a: Right
    class_uri: dpv:DataSubjectRight
    description: The rights applicable or provided to a Data Subject
    aliases:
      - Data Subject Right
    comments:
      - |-
        Based on use of definitions, the notion of 'Data Subject Right' can be
        equivalent to 'Individual Right' or 'Right of a Person'
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:DataSubjectRight
      - dpv_owl:DataSubjectRight
    annotations:
      skos_in_scheme: rights-classes

  PassiveRight:
    is_a: Right
    class_uri: dpv:PassiveRight
    description: |-
      The right(s) applicable, provided, or expected that are always
      (passively) applicable
    aliases:
      - Passive Right
    comments:
      - |-
        Passive rights do not require the entity to request or exercise them.
        They are considered to be always applicable. For example, the Right to
        Privacy (in EU) does not require an exercise for it to be fulfilled.
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:PassiveRight
      - dpv_owl:PassiveRight
    annotations:
      skos_in_scheme: rights-classes

  Right:
    is_a: DpvThing
    class_uri: dpv:Right
    description: The right(s) applicable, provided, or expected
    aliases:
      - Right
    comments:
      - |-
        A 'right' is a legal, social, or ethical principle of freedom or
        entitlement which dictate the norms regarding what is allowed or owed.
        Rights as a concept encompass a broad area of norms and entities, and
        are not specific to Individuals or Data Protection / Privacy. For
        individual specific rights, see dpv:DataSubjectRight
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:Right
      - dpv_owl:Right
    annotations:
      skos_in_scheme: rights-classes

  RightExerciseActivity:
    is_a: OrganisationalMeasure
    class_uri: dpv:RightExerciseActivity
    description: An activity representing an exercising of an active right
    aliases:
      - Right Exercise Activity
    comments:
      - |-
        There may be multiple activities associated with exercising and
        fulfilling rights. See the RightExerciseRecord concept for
        record-keeping of such activities in a cohesive manner.
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:RightExerciseActivity
      - dpv_owl:RightExerciseActivity
    annotations:
      skos_in_scheme: rights-classes

  RightExerciseNotice:
    is_a: RightNotice
    mixins:
      - OrganisationalMeasure
    class_uri: dpv:RightExerciseNotice
    description: |-
      Information associated with exercising of an active right such as where
      and how to exercise the right, information required for it, or updates
      on an exercised rights request
    aliases:
      - Right Exercise Notice
    comments:
      - |-
        This concept is intended for providing information regarding a right
        exercise. For specific instances of such exercises, see
        RightExerciseActivity and RightExerciseRecord.
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:RightExerciseNotice
      - dpv_owl:RightExerciseNotice
    annotations:
      skos_in_scheme: rights-classes

  RightExerciseRecord:
    is_a: RecordsOfActivities
    mixins:
      - OrganisationalMeasure
    class_uri: dpv:RightExerciseRecord
    description: Record of a Right being exercised
    aliases:
      - Right Exercise Record
    comments:
      - |-
        This concept represents a record of one or more right exercise
        activities, such as those associated with a single data subject or
        service or entity
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:RightExerciseRecord
      - dpv_owl:RightExerciseRecord
    annotations:
      skos_in_scheme: rights-classes

  RightFulfilmentNotice:
    is_a: RightExerciseNotice
    mixins:
      - OrganisationalMeasure
    class_uri: dpv:RightFulfilmentNotice
    description: Notice provided regarding fulfilment of a right
    aliases:
      - Right Fulfilment Notice
    comments:
      - |-
        This notice is associated with situations where information is provided
        with the intention of progressing the fulfilment of a right. For
        example, a notice asking for more information regarding the scope of the
        right, or providing information on where to access the data provided
        under a right.
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:RightFulfilmentNotice
      - dpv_owl:RightFulfilmentNotice
    annotations:
      skos_in_scheme: rights-classes

  RightNonFulfilmentNotice:
    is_a: RightExerciseNotice
    mixins:
      - OrganisationalMeasure
    class_uri: dpv:RightNonFulfilmentNotice
    description: Notice provided regarding non-fulfilment of a right
    aliases:
      - Right Non-Fulfilment Notice
    comments:
      - |-
        This notice is associated with situations where information is provided
        with the intention of communicating non-fulfilment of a right. For
        example, to provide justifications on why a right could not be fulfilled
        or providing information about another entity who should be approached
        for exercising this right.
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:RightNonFulfilmentNotice
      - dpv_owl:RightNonFulfilmentNotice
    annotations:
      skos_in_scheme: rights-classes

  RightNotice:
    is_a: Notice
    mixins:
      - OrganisationalMeasure
    class_uri: dpv:RightNotice
    description: |-
      Information associated with rights, such as which rights exist, when and
      where they are applicable, and other relevant information
    aliases:
      - Right Notice
    comments:
      - |-
        This concept also covers information about rights exercise, with
        dpv:RightExerciseNotice specifically representing information provided
        in connection with exercising of rights. Both notices may be needed,
        e.g. RightNotice for providing information about existence and exercise
        of rights, and RightExerciseNotice for providing additional information
        specifically about exercise of rights - such as to request more
        information or provide updates on an exercised rights request
    in_subset:
      - rights_subset
    exact_mappings:
      - dpv_upstream:RightNotice
      - dpv_owl:RightNotice
    annotations:
      skos_in_scheme: rights-classes
