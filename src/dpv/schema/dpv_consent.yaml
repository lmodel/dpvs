id: https://w3id.org/lmodel/dpv/dpv_consent
name: dpv_consent
title: DPV - Consent
description: |-
  LinkML schema for DPV 2.3 semantic group: Consent lifecycle and
  management. This schema imports only its direct upstream module
  dependencies (consent, consent_controls, consent_status, consent_types)
  rather than all 965 DPV classes.
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv
- https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv_common

subsets:

  consent_subset:
    description: Entities from the DPV `consent` semantic group.

slots:

  has_consent_control:
    definition_uri: dpv:hasConsentControl
    description: Specific a control associated with consent
    aliases:
    - has consent control
    multivalued: true
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:hasConsentControl
    - dpv_owl:hasConsentControl
    annotations:
      skos_in_scheme: consent-properties

  has_consent_status:
    definition_uri: dpv:hasConsentStatus
    description: Specifies the state or status of consent
    aliases:
    - has consent status
    multivalued: true
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:hasConsentStatus
    - dpv_owl:hasConsentStatus
    annotations:
      skos_in_scheme: consent-properties

classes:

  ConsentControl:
    is_a: EntityInvolvement
    class_uri: dpv:ConsentControl
    description: |-
      The control or activity associated with obtaining, providing,
      withdrawing, or reaffirming consent
    aliases:
    - Consent Control
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentControl
    - dpv_owl:ConsentControl
    annotations:
      skos_in_scheme: consent-controls-classes

  ConsentExpired:
    is_a: ConsentStatusInvalidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentExpired
    description: |-
      The state where the temporal or contextual validity of consent has
      'expired'
    aliases:
    - Consent Expired
    comments:
    - |-
      An example of this state is when the obtained consent has been assigned
      a duration - which has lapsed or 'expired', making it invalid to be used
      further for processing data
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentExpired
    - dpv_owl:ConsentExpired
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentGiven:
    is_a: ConsentStatusValidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentGiven
    description: The state where consent has been given
    aliases:
    - Consent Given
    comments:
    - |-
      An example of this state is when the individual clicks on a button,
      ticks a checkbox, verbally agrees - or any other form that communicates
      their decision agreeing to the processing of data
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentGiven
    - dpv_owl:ConsentGiven
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentInvalidated:
    is_a: ConsentStatusInvalidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentInvalidated
    description: The state where consent has been deemed to be invalid
    aliases:
    - Consent Invalidated
    comments:
    - |-
      An example of this state is where an investigating authority or a court
      finds the collected consent did not meet requirements, and 'invalidates'
      both prior and future uses of it to carry out processing
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentInvalidated
    - dpv_owl:ConsentInvalidated
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentRefused:
    is_a: ConsentStatusInvalidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentRefused
    description: The state where consent has been refused
    aliases:
    - Consent Refused
    comments:
    - |-
      An example of this state is when the individual clicks on a 'disagree'
      or 'reject' or 'refuse' button, or leaves a checkbox unticked
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentRefused
    - dpv_owl:ConsentRefused
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentRequestDeferred:
    is_a: ConsentStatusInvalidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentRequestDeferred
    description: State where a request for consent has been deferred without a 
      decision
    aliases:
    - Consent Request Deferred
    comments:
    - |-
      An example of this state is when the individual closes or dismisses a
      notice without making a decision. This state is intended for making the
      distinction between a notice being provided (as a consent request) and
      the individual interacting with the notice without making a decision -
      where the 'ignoring of a notice' is taken as consent being neither given
      nor refused
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentRequestDeferred
    - dpv_owl:ConsentRequestDeferred
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentRequested:
    is_a: ConsentStatusInvalidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentRequested
    description: |-
      State where a request for consent has been made and is awaiting a
      decision
    aliases:
    - Consent Requested
    comments:
    - |-
      An example of this state is when a notice has been presented to the
      individual but they have not made a decision
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentRequested
    - dpv_owl:ConsentRequested
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentRevoked:
    is_a: ConsentStatusInvalidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentRevoked
    description: |-
      The state where the consent is revoked by an entity other than the data
      subject and which prevents it from being further used as a valid state
    aliases:
    - Consent Revoked
    comments:
    - |-
      An example of this state is when a Data Controller stops utilising
      previously obtaining consent, such as when that service no longer exists
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentRevoked
    - dpv_owl:ConsentRevoked
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentStatus:
    is_a: Status
    class_uri: dpv:ConsentStatus
    description: |-
      The state or status of 'consent' that provides information reflecting
      its operational status and validity for processing data
    aliases:
    - Consent Status
    comments:
    - |-
      States are useful as information artefacts to implement them in
      controlling processing, and to reflect the process and flow of obtaining
      and maintaining consent. For example, a database table that stores
      consent states for specific processing and can be queried to obtain them
      in an efficient manner. States are also useful in investigations to
      determine the use and validity of consenting practices
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentStatus
    - dpv_owl:ConsentStatus
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentStatusInvalidForProcessing:
    is_a: ConsentStatus
    class_uri: dpv:ConsentStatusInvalidForProcessing
    description: |-
      States of consent that cannot be used as valid justifications for
      processing data
    aliases:
    - Consent Status Invalid for Processing
    comments:
    - |-
      This identifies the stages associated with consent that should not be
      used to process data
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentStatusInvalidForProcessing
    - dpv_owl:ConsentStatusInvalidForProcessing
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentStatusValidForProcessing:
    is_a: ConsentStatus
    class_uri: dpv:ConsentStatusValidForProcessing
    description: |-
      States of consent that can be used as valid justifications for
      processing data
    aliases:
    - Consent Status Valid for Processing
    comments:
    - Practically, given consent is the only valid state for processing
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentStatusValidForProcessing
    - dpv_owl:ConsentStatusValidForProcessing
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentUnknown:
    is_a: ConsentStatusInvalidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentUnknown
    description: State where information about consent is not available or is 
      unknown
    aliases:
    - Consent Unknown
    comments:
    - |-
      Consent states can be unknown, for example, when information is not
      available, or cannot be trusted, or is known to be inaccurate
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentUnknown
    - dpv_owl:ConsentUnknown
    annotations:
      skos_in_scheme: consent-status-classes

  ConsentWithdrawn:
    is_a: ConsentStatusInvalidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:ConsentWithdrawn
    description: |-
      The state where the consent is withdrawn or revoked specifically by the
      data subject and which prevents it from being further used as a valid
      state
    aliases:
    - Consent Withdrawn
    comments:
    - |-
      This state can be considered a form of 'revocation' of consent, where
      the revocation can only be performed by the data subject. Therefore we
      suggest using ConsentRevoked when it is a non-data-subject entity, and
      ConsentWithdrawn when it is the data subject
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ConsentWithdrawn
    - dpv_owl:ConsentWithdrawn
    annotations:
      skos_in_scheme: consent-status-classes

  ExplicitlyExpressedConsent:
    is_a: ExpressedConsent
    mixins:
    - LegalBasis
    class_uri: dpv:ExplicitlyExpressedConsent
    description: |-
      Consent that is expressed through an explicit action solely conveying a
      consenting decision
    aliases:
    - Explicitly Expressed Consent
    comments:
    - |-
      Explicitly expressed consent is a more specific form of Expressed
      consent where the action taken must 'explicitly' relate to only the
      consent decision. Expressed consent where the consenting is part of
      other matters therefore cannot satisfy the requirements of explicitly
      expressed consent. An example of explicit action expressing the
      consenting decision is a button on a web form where the form only
      relates to consent, or it is accompanied with suitable text that
      reiterates what the consenting decision is about
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ExplicitlyExpressedConsent
    - dpv_owl:ExplicitlyExpressedConsent
    annotations:
      skos_in_scheme: consent-types-classes

  ExpressedConsent:
    is_a: InformedConsent
    mixins:
    - LegalBasis
    class_uri: dpv:ExpressedConsent
    description: |-
      Consent that is expressed through an action intended to convey a
      consenting decision
    aliases:
    - Expressed Consent
    comments:
    - |-
      Expressed consent requires the individual take a specific and
      unambiguous action that directly indicates their consent. This action
      may be a part of other processes such as setting preferences, or
      agreeing to a contract, or other matters not relating to consent. An
      example of expressed consent is interacting with a checkbox within a
      dashboard or clicking a button on a web form
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ExpressedConsent
    - dpv_owl:ExpressedConsent
    annotations:
      skos_in_scheme: consent-types-classes

  ImpliedConsent:
    is_a: InformedConsent
    mixins:
    - LegalBasis
    class_uri: dpv:ImpliedConsent
    description: |-
      Consent that is implied indirectly through an action not associated
      solely with conveying a consenting decision
    aliases:
    - Implied Consent
    comments:
    - |-
      Implied consent is expected to also be Informed Consent. An example is a
      CCTV notice outside a monitored area that informs the individuals that
      by walking in they would be consenting to the use of camera for
      surveillance.
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ImpliedConsent
    - dpv_owl:ImpliedConsent
    annotations:
      skos_in_scheme: consent-types-classes

  InformedConsent:
    is_a: Consent
    mixins:
    - LegalBasis
    class_uri: dpv:InformedConsent
    description: |-
      Consent that is informed i.e. with the requirement to provide sufficient
      information to make a consenting decision
    aliases:
    - Informed Consent
    comments:
    - |-
      The specifics for what information should be provided or made available
      will depend on the context, use-case, or relevant legal requirements
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:InformedConsent
    - dpv_owl:InformedConsent
    - iso29100:Consent
    annotations:
      skos_in_scheme: consent-types-classes

    close_mappings:
    - iso29100:ConsentMechanism
  ManageConsent:
    is_a: ProvideConsent
    mixins:
    - ReaffirmConsent
    - WithdrawConsent
    class_uri: dpv:ManageConsent
    description: |-
      Control for managing a given consent in terms of providing, reaffirming,
      or withdrawing it
    aliases:
    - Manage Consent
    comments:
    - |-
      Indicates how the data subject can manage their consent in terms of
      providing it, or reaffirming or withdrawing a given consent. This
      concept is useful to represent a single location or interface where
      multiple controls are provided for consent
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ManageConsent
    - dpv_owl:ManageConsent
    annotations:
      skos_in_scheme: consent-controls-classes

  ObtainConsent:
    is_a: ConsentControl
    class_uri: dpv:ObtainConsent
    description: Control for obtaining consent
    aliases:
    - Obtain Consent
    comments:
    - |-
      Indicates how the controller or entity can obtain consent e.g. used with
      dpv:isExercisedAt
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ObtainConsent
    - dpv_owl:ObtainConsent
    annotations:
      skos_in_scheme: consent-controls-classes

  ProvideConsent:
    is_a: ConsentControl
    mixins:
    - OptingInToProcess
    class_uri: dpv:ProvideConsent
    description: Control for providing consent
    aliases:
    - Provide Consent
    comments:
    - |-
      Indicates how the data subject can provide consent e.g. used with
      dpv:isExercisedAt
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ProvideConsent
    - dpv_owl:ProvideConsent
    annotations:
      skos_in_scheme: consent-controls-classes

  ReaffirmConsent:
    is_a: ConsentControl
    class_uri: dpv:ReaffirmConsent
    description: Control for affirming consent
    aliases:
    - Reaffirm Consent
    comments:
    - |-
      Indicates how the controller (with dpv:ObtainConsent) or data subject
      (with dpv:ProvideConsent) can reaffirm consent e.g. used with
      dpv:isExercisedAt
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:ReaffirmConsent
    - dpv_owl:ReaffirmConsent
    annotations:
      skos_in_scheme: consent-controls-classes

  RefuseConsent:
    is_a: ConsentControl
    class_uri: dpv:RefuseConsent
    description: Control for refusing consent
    aliases:
    - Refuse Consent
    comments:
    - |-
      Indicates how the controller (with dpv:ObtainConsent) or data subject
      (with dpv:ProvideConsent) can reaffirm consent e.g. used with
      dpv:isExercisedAt
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:RefuseConsent
    - dpv_owl:RefuseConsent
    annotations:
      skos_in_scheme: consent-controls-classes

  RenewedConsentGiven:
    is_a: ConsentStatusValidForProcessing
    mixins:
    - ConsentStatus
    class_uri: dpv:RenewedConsentGiven
    description: |-
      The state where a previously given consent has been 'renewed' or
      'refreshed' or 'reaffirmed' to form a new instance of given consent
    aliases:
    - Renewed Consent Given
    comments:
    - |-
      An example of this state is when a previously given consent has expired,
      and the individual is presented a notice regarding continuing associated
      processing operations - to which they agree. This state can be useful to
      keep track of 'reconfirmed' or 'refreshed' consent within consent
      records, assist notices and contextual agents to create better
      consenting dialogues, and assist with specific legal obligations related
      to subsequent consenting
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:RenewedConsentGiven
    - dpv_owl:RenewedConsentGiven
    annotations:
      skos_in_scheme: consent-status-classes

  UninformedConsent:
    is_a: Consent
    mixins:
    - LegalBasis
    class_uri: dpv:UninformedConsent
    description: |-
      Consent that is uninformed i.e. without requirement to provide
      sufficient information to make a consenting decision
    aliases:
    - Uninformed Consent
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:UninformedConsent
    - dpv_owl:UninformedConsent
    annotations:
      skos_in_scheme: consent-types-classes

  WithdrawConsent:
    is_a: ConsentControl
    mixins:
    - WithdrawingFromProcess
    class_uri: dpv:WithdrawConsent
    description: Control for withdrawing consent
    aliases:
    - Withdraw Consent
    comments:
    - |-
      Indicates how the data subject can withdraw consent e.g. used with
      dpv:isExercisedAt
    in_subset:
    - consent_subset
    exact_mappings:
    - dpv_upstream:WithdrawConsent
    - dpv_owl:WithdrawConsent
    annotations:
      skos_in_scheme: consent-controls-classes
