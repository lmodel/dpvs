id: https://w3id.org/lmodel/dpv/dpv_entities
name: dpv_entities
title: DPV - Entities
description: |-
  LinkML schema for DPV 2.3 semantic group: Organisational and legal
  entities. This schema imports only its direct upstream module
  dependencies (entities, entities_authority, entities_datasubject,
  entities_legalrole, entities_organisation) rather than all 965 DPV
  classes.
license: CC-BY-4.0
see_also:
- https://w3id.org/dpv
- https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://w3id.org/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gist: https://w3id.org/lmodel/gist/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
- linkml:types
- dpv:schema/dpv_common

subsets:

  entities_subset:
    description: Entities from the DPV `entities` semantic group.

slots:

  has_address:
    definition_uri: dpv:hasAddress
    description: Specifies address of a legal entity such as street address or 
      pin code
    aliases:
    - has address
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasAddress
    - dpv_owl:hasAddress
    annotations:
      skos_in_scheme: entities-properties

  has_authority:
    definition_uri: dpv:hasAuthority
    description: Indicates applicability of authority for a jurisdiction
    aliases:
    - has authority
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasAuthority
    - dpv_owl:hasAuthority
    annotations:
      skos_in_scheme: entities-authority-properties

  has_contact:
    definition_uri: dpv:hasContact
    description: Specifies contact details of a legal entity such as phone or 
      email
    aliases:
    - has contact
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasContact
    - dpv_owl:hasContact
    annotations:
      skos_in_scheme: entities-properties

  has_data_controller:
    is_a: has_entity
    definition_uri: dpv:hasDataController
    description: Indicates association with Data Controller
    aliases:
    - has data controller
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasDataController
    - dpv_owl:hasDataController
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_data_exporter:
    is_a: has_entity
    definition_uri: dpv:hasDataExporter
    description: |-
      Indicates inclusion or applicability of a LegalEntity in the role of
      Data Exporter
    aliases:
    - has data exporter
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasDataExporter
    - dpv_owl:hasDataExporter
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_data_importer:
    is_a: has_recipient
    definition_uri: dpv:hasDataImporter
    description: |-
      Indicates inclusion or applicability of a LegalEntity in the role of
      Data Importer
    aliases:
    - has data importer
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasDataImporter
    - dpv_owl:hasDataImporter
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_data_processor:
    is_a: has_recipient
    definition_uri: dpv:hasDataProcessor
    description: Indicates inclusion or applicability of a Data Processor
    aliases:
    - has data processor
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasDataProcessor
    - dpv_owl:hasDataProcessor
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_data_protection_officer:
    is_a: has_representative
    definition_uri: dpv:hasDataProtectionOfficer
    description: Specifies an associated data protection officer
    aliases:
    - has data protection officer
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasDataProtectionOfficer
    - dpv_owl:hasDataProtectionOfficer
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_data_subject:
    is_a: has_human_subject
    definition_uri: dpv:hasDataSubject
    description: Indicates association with Data Subject
    aliases:
    - has data subject
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasDataSubject
    - dpv_owl:hasDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-properties

  has_entity:
    definition_uri: dpv:hasEntity
    description: Indicates inclusion or applicability of an entity to some 
      concept
    aliases:
    - has entity
    comments:
    - |-
      parent property for controller, processor, data subject, authority,
      etc.?
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasEntity
    - dpv_owl:hasEntity
    annotations:
      skos_in_scheme: entities-properties

  has_human_subject:
    is_a: has_entity
    definition_uri: dpv:hasHumanSubject
    description: Indicates association with Human Subject
    aliases:
    - has human subject
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasHumanSubject
    - dpv_owl:hasHumanSubject
    annotations:
      skos_in_scheme: entities-datasubject-properties

  has_joint_data_controllers:
    is_a: has_data_controller
    definition_uri: dpv:hasJointDataControllers
    description: Indicates inclusion or applicability of a Joint Data Controller
    aliases:
    - has joint data controllers
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasJointDataControllers
    - dpv_owl:hasJointDataControllers
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_name:
    definition_uri: dpv:hasName
    description: Specifies name of a legal entity
    aliases:
    - has name
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasName
    - dpv_owl:hasName
    annotations:
      skos_in_scheme: entities-properties

  has_organisational_unit:
    is_a: has_entity
    definition_uri: dpv:hasOrganisationalUnit
    description: Indicates the specified entity is a unit of the organisation
    aliases:
    - has organisational unit
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasOrganisationalUnit
    - dpv_owl:hasOrganisationalUnit
    annotations:
      skos_in_scheme: entities-properties

  has_recipient:
    is_a: has_entity
    definition_uri: dpv:hasRecipient
    description: Indicates Recipient of Data
    aliases:
    - has recipient
    comments:
    - Also used to indicate the Recipient of a Right Exercise Activity
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasRecipient
    - dpv_owl:hasRecipient
    annotations:
      skos_in_scheme: entities-legalrole-properties, rights-properties

  has_recipient_data_controller:
    is_a: has_recipient
    definition_uri: dpv:hasRecipientDataController
    description: |-
      Indicates inclusion or applicability of a Data Controller as a Recipient
      of personal data
    aliases:
    - has recipient data controller
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasRecipientDataController
    - dpv_owl:hasRecipientDataController
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_recipient_third_party:
    is_a: has_recipient
    definition_uri: dpv:hasRecipientThirdParty
    description: |-
      Indicates inclusion or applicability of a Third Party as a Recipient of
      personal data
    aliases:
    - has recipient third party
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasRecipientThirdParty
    - dpv_owl:hasRecipientThirdParty
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_relation_with_data_subject:
    is_a: has_entity
    definition_uri: dpv:hasRelationWithDataSubject
    description: Indicates the relation between specified Entity and Data 
      Subject
    aliases:
    - has relation with data subject
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasRelationWithDataSubject
    - dpv_owl:hasRelationWithDataSubject
    annotations:
      skos_in_scheme: entities-datasubject-properties

  has_representative:
    is_a: has_entity
    definition_uri: dpv:hasRepresentative
    description: Specifies representative of the legal entity
    aliases:
    - has representative
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasRepresentative
    - dpv_owl:hasRepresentative
    annotations:
      skos_in_scheme: entities-properties

  has_responsible_entity:
    is_a: has_entity
    definition_uri: dpv:hasResponsibleEntity
    description: Specifies the indicated entity is responsible within some 
      context
    aliases:
    - has responsible entity
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasResponsibleEntity
    - dpv_owl:hasResponsibleEntity
    annotations:
      skos_in_scheme: entities-properties

  has_service_consumer:
    is_a: has_entity
    definition_uri: dpv:hasServiceConsumer
    description: Indicates the entity that consumes or receives the associated 
      service
    aliases:
    - has service consumer
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasServiceConsumer
    - dpv_owl:hasServiceConsumer
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_service_provider:
    is_a: has_entity
    definition_uri: dpv:hasServiceProvider
    description: Indicates the entity that provides the associated service
    aliases:
    - has service provider
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasServiceProvider
    - dpv_owl:hasServiceProvider
    annotations:
      skos_in_scheme: entities-legalrole-properties

  has_subsidiary:
    is_a: has_entity
    definition_uri: dpv:hasSubsidiary
    description: Indicates this entity has the specified entity as its 
      subsidiary
    aliases:
    - has subsidiary
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasSubsidiary
    - dpv_owl:hasSubsidiary
    annotations:
      skos_in_scheme: entities-properties

  has_third_party:
    is_a: has_entity
    definition_uri: dpv:hasThirdParty
    description: Indicates association with Third Party
    aliases:
    - has third party
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:hasThirdParty
    - dpv_owl:hasThirdParty
    annotations:
      skos_in_scheme: entities-legalrole-properties

  is_authority_for:
    definition_uri: dpv:isAuthorityFor
    description: Indicates area, scope, or applicability of an Authority
    aliases:
    - is authority for
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:isAuthorityFor
    - dpv_owl:isAuthorityFor
    annotations:
      skos_in_scheme: entities-authority-properties

  is_organisational_unit_of:
    is_a: has_entity
    definition_uri: dpv:isOrganisationalUnitOf
    description: |-
      Indicates this entity is an organisational unit of the specified entity
    aliases:
    - is organisational unit of
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:isOrganisationalUnitOf
    - dpv_owl:isOrganisationalUnitOf
    annotations:
      skos_in_scheme: entities-properties

  is_representative_for:
    is_a: has_entity
    definition_uri: dpv:isRepresentativeFor
    description: Indicates the entity is a representative for specified entity
    aliases:
    - is representative for
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:isRepresentativeFor
    - dpv_owl:isRepresentativeFor
    annotations:
      skos_in_scheme: entities-properties

  is_subsidiary_of:
    is_a: has_entity
    definition_uri: dpv:isSubsidiaryOf
    description: Indicates this entity is the subsidiary of the specified entity
    aliases:
    - is subsidiary of
    multivalued: true
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:isSubsidiaryOf
    - dpv_owl:isSubsidiaryOf
    annotations:
      skos_in_scheme: entities-properties

classes:

  AcademicScientificOrganisation:
    is_a: DpvOrganisation
    class_uri: dpv:AcademicScientificOrganisation
    description: |-
      Organisations related to academia or scientific pursuits e.g.
      Universities, Schools, Research Bodies
    aliases:
    - Academic or Scientific Organisation
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:AcademicScientificOrganisation
    - dpv_owl:AcademicScientificOrganisation
    annotations:
      skos_in_scheme: entities-organisation-classes

  Adult:
    is_a: HumanSubject
    class_uri: dpv:Adult
    description: |-
      A natural person that is not a child i.e. has attained some legally
      specified age of adulthood
    aliases:
    - Adult
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:Adult
    - dpv_owl:Adult
    annotations:
      skos_in_scheme: entities-datasubject-classes

  AmbulanceProvider:
    is_a: EmergencyServiceProvider
    class_uri: dpv:AmbulanceProvider
    description: |-
      An organisation that that offers transportation and medical care to
      patients requiring urgent medical attention
    aliases:
    - Ambulance Provider
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:AmbulanceProvider
    - dpv_owl:AmbulanceProvider
    annotations:
      skos_in_scheme: entities-organisation-classes

  Applicant:
    is_a: HumanSubject
    class_uri: dpv:Applicant
    description: Humans that are applicants in some context
    aliases:
    - Applicant
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:Applicant
    - dpv_owl:Applicant
    annotations:
      skos_in_scheme: entities-datasubject-classes

  AsylumSeeker:
    is_a: VulnerableHuman
    mixins:
    - HumanSubject
    class_uri: dpv:AsylumSeeker
    description: Humans that are asylum seekers
    aliases:
    - Asylum Seeker
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:AsylumSeeker
    - dpv_owl:AsylumSeeker
    annotations:
      skos_in_scheme: entities-datasubject-classes

  CharityOrganisation:
    is_a: LegalEntity
    class_uri: dpv:CharityOrganisation
    description: |-
      A nonprofit entity dedicated to providing assistance or raising funds
      for social, educational, religious, or other philanthropic purposes
    aliases:
    - Charity Organisation
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:CharityOrganisation
    - dpv_owl:CharityOrganisation
    annotations:
      skos_in_scheme: entities-organisation-classes

  Child:
    is_a: VulnerableHuman
    mixins:
    - HumanSubject
    class_uri: dpv:Child
    description: |-
      A 'child' is a natural legal person who is below a certain legal age
      depending on the legal jurisdiction.
    aliases:
    - Child
    comments:
    - |-
      The legality of age defining a child varies by jurisdiction. In
      addition, 'child' is distinct from a 'minor'. For example, the legal age
      for consumption of alcohol can be 21, which makes a person of age 20 a
      'minor' in this context. In other cases, 'minor' and 'child' are used
      interchangeably to refer to a person below some legally defined age.
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:Child
    - dpv_owl:Child
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Citizen:
    is_a: HumanSubject
    class_uri: dpv:Citizen
    description: Humans that are citizens (for a jurisdiction)
    aliases:
    - Citizen
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:Citizen
    - dpv_owl:Citizen
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Client:
    is_a: DpvCustomer
    mixins:
    - HumanSubject
    class_uri: dpv:Client
    description: Humans that are clients or recipients of services
    aliases:
    - Client
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:Client
    - dpv_owl:Client
    annotations:
      skos_in_scheme: entities-datasubject-classes

  Clinic:
    is_a: DpvOrganisation
    class_uri: dpv:Clinic
    description: |-
      An organisation that is a smaller healthcare facility offering
      outpatient medical services for diagnosis and treatment
    aliases:
    - Clinic
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:Clinic
    - dpv_owl:Clinic
    annotations:
      skos_in_scheme: entities-organisation-classes

  DataController:
    is_a: LegalEntity
    class_uri: dpv:DataController
    description: |-
      The individual or organisation that decides (or controls) the purpose(s)
      of processing personal data.
    aliases:
    - Data Controller
    comments:
    - |-
      The terms 'Controller', 'Data Controller', and 'PII Controller' refer to
      the same concept
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:DataController
    - dpv_owl:DataController
    - iso29100:PIIController
    annotations:
      skos_in_scheme: entities-legalrole-classes

    related_mappings:
    - common_domain_model:Counterparty
    - iso22989:AIProvider
    - iso27001:Organization
    - nist_ai_rmf:AiActor
    - oscal:ResponsibleParty
  DataExporter:
    is_a: LegalEntity
    class_uri: dpv:DataExporter
    description: |-
      An entity that 'exports' data where exporting is considered a form of
      data transfer
    aliases:
    - Data Exporter
    comments:
    - |-
      The term 'Data Exporter' is used by the EU-EDPB as the entity that
      transfer data across borders. While the EDPB refers to the
      jurisdictional border of EU, the term within DPV can be used to denote
      any 'export' or transfer or transmission of data and is thus a broader
      concept than the EDPB's definition.
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:DataExporter
    - dpv_owl:DataExporter
    annotations:
      skos_in_scheme: entities-legalrole-classes

  DataImporter:
    is_a: DpvRecipient
    class_uri: dpv:DataImporter
    description: |-
      An entity that 'imports' data where importing is considered a form of
      data transfer
    aliases:
    - Data Importer
    comments:
    - |-
      The term 'Data Importer' is used by the EU-EDPB as the entity that
      receives transferred data across borders. While the EDPB refers to the
      jurisdictional border of EU, the term within DPV can be used to denote
      any 'import' or reception of transfer or transmission of data and is
      thus a broader concept than the EDPB's definition.
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:DataImporter
    - dpv_owl:DataImporter
    annotations:
      skos_in_scheme: entities-legalrole-classes

  DataProcessor:
    is_a: DpvRecipient
    class_uri: dpv:DataProcessor
    description: |-
      A ‘processor’ means a natural or legal person, public authority, agency
      or other body which processes data on behalf of the controller.
    aliases:
    - Data Processor
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:DataProcessor
    - dpv_owl:DataProcessor
    - iso29100:PIIProcessor
    annotations:
      skos_in_scheme: entities-legalrole-classes

    related_mappings:
    - common_domain_model:Counterparty
    - iso27001:Organization
  DataProtectionAuthority:
    is_a: DpvAuthority
    class_uri: dpv:DataProtectionAuthority
    description: |-
      An authority tasked with overseeing legal compliance regarding privacy
      and data protection laws.
    aliases:
    - Data Protection Authority
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:DataProtectionAuthority
    - dpv_owl:DataProtectionAuthority
    annotations:
      skos_in_scheme: entities-authority-classes

    related_mappings:
    - nist_csf_v2:ResponsibleParty
    - oscal:ResponsibleParty
  DataProtectionOfficer:
    is_a: Representative
    class_uri: dpv:DataProtectionOfficer
    description: |-
      An entity within or authorised by an organisation to monitor internal
      compliance, inform and advise on data protection obligations and act as
      a contact point for data subjects and the supervisory authority.
    aliases:
    - Data Protection Officer
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:DataProtectionOfficer
    - dpv_owl:DataProtectionOfficer
    annotations:
      skos_in_scheme: entities-legalrole-classes

    related_mappings:
    - oscal:ResponsibleRole
  DataSubProcessor:
    is_a: DataProcessor
    class_uri: dpv:DataSubProcessor
    description: A 'sub-processor' is a processor engaged by another processor
    aliases:
    - Data Sub-Processor
    comments:
    - |-
      A 'Sub-Processor' is always a 'Processor' with the distinction of not
      directly being appointed by the 'Controller'
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:DataSubProcessor
    - dpv_owl:DataSubProcessor
    annotations:
      skos_in_scheme: entities-legalrole-classes

  DataSubject:
    is_a: HumanSubject
    class_uri: dpv:DataSubject
    description: |-
      The individual (or category of individuals) whose personal data is being
      processed
    aliases:
    - Data Subject
    comments:
    - |-
      The term 'data subject' is specific to the GDPR, but is functionally
      equivalent to the term 'individual associated with data' and the ISO/IEC
      term 'PII Principle'
    in_subset:
    - entities_subset
    exact_mappings:
    - dpv_upstream:DataSubject
    - dpv_owl:DataSubject
    - iso29100:PIIPrincipal
    - iso22989:DataSubject
    annotations:
      skos_in_scheme: entities-datasubject-classes

    narrow_mappings:
    - common_domain_model:NaturalPerson
    - gists:Person
    related_mappings:
    - iso27001:InterestedParty
  DpvAgent:
    is_a: DpvEntity
    class_uri: dpv:Agent
    description: |-
      An Agent is a dpv:Entity that is (a) acting on behalf of another Entity;
      and (b) is authorised to do so by that Entity
    aliases:
    - Agent
    comments:
    - |-
