id: https://w3id.org/lmodel/dpv/dpv_processing
name: dpv_processing
title: DPV - Processing
description: |-
  LinkML schema for DPV 2.3 semantic group: Processing activities,
  purposes, and context. This schema imports only its direct upstream
  module dependencies (processing, process, processing_context,
  processing_scale, purposes) rather than all 965 DPV classes.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpv: https://github.com/lmodel/dpv/
  dpv_upstream: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpv
default_range: string

imports:
  - linkml:types
  - dpv:schema/dpv_common
  - dpv:schema/dpv_personal_data

subsets:

  processing_subset:
    description: Entities from the DPV `processing` semantic group.

slots:

  has_active_entity:
    is_a: has_entity
    definition_uri: dpv:hasActiveEntity
    description: indicates the entity is actively involved in specified context
    aliases:
      - has active entity
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasActiveEntity
      - dpv_owl:hasActiveEntity
    annotations:
      skos_in_scheme: processing-context-properties

  has_algorithmic_logic:
    definition_uri: dpv:hasAlgorithmicLogic
    description: |-
      Indicates the logic used in processing such as for automated decision
      making
    aliases:
      - has algorithmic logic
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasAlgorithmicLogic
      - dpv_owl:hasAlgorithmicLogic
    annotations:
      skos_in_scheme: processing-context-properties

  has_automation_level:
    definition_uri: dpv:hasAutomationLevel
    description: |-
      Indicates the level of automation involved in implementation of the
      specified context
    aliases:
      - has automation level
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasAutomationLevel
      - dpv_owl:hasAutomationLevel
    annotations:
      skos_in_scheme: processing-context-properties

  has_data_source:
    definition_uri: dpv:hasDataSource
    description: Indicates the source or origin of data being processed
    aliases:
      - has data source
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasDataSource
      - dpv_owl:hasDataSource
    annotations:
      skos_in_scheme: processing-context-properties

  has_data_subject_scale:
    is_a: has_scale
    definition_uri: dpv:hasDataSubjectScale
    description: Indicates the scale of data subjects
    aliases:
      - has data subject scale
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasDataSubjectScale
      - dpv_owl:hasDataSubjectScale
    annotations:
      skos_in_scheme: processing-scale-properties

  has_data_volume:
    is_a: has_scale
    definition_uri: dpv:hasDataVolume
    description: Indicates the volume of data
    aliases:
      - has data volume
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasDataVolume
      - dpv_owl:hasDataVolume
    annotations:
      skos_in_scheme: processing-scale-properties

  has_entity_involvement:
    definition_uri: dpv:hasEntityInvolvement
    description: Indicates involvement of an entity in specified context
    aliases:
      - has entity involvement
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasEntityInvolvement
      - dpv_owl:hasEntityInvolvement
    annotations:
      skos_in_scheme: processing-context-properties

  has_geographic_coverage:
    is_a: has_scale
    definition_uri: dpv:hasGeographicCoverage
    description: Indicates the geographic coverage (of specified context)
    aliases:
      - has geographic coverage
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasGeographicCoverage
      - dpv_owl:hasGeographicCoverage
    annotations:
      skos_in_scheme: processing-scale-properties

  has_human_involvement:
    definition_uri: dpv:hasHumanInvolvement
    description: |-
      Indicates Involvement of humans in processing such as within automated
      decision making process
    aliases:
      - has human involvement
    comments:
      - Human involvement is also relevant to 'human in the loop'
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasHumanInvolvement
      - dpv_owl:hasHumanInvolvement
    annotations:
      skos_in_scheme: processing-context-properties

  has_non_involved_entity:
    is_a: has_entity
    definition_uri: dpv:hasNonInvolvedEntity
    description: indicates the entity is not involved in specified context
    aliases:
      - has non-involved entity
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasNonInvolvedEntity
      - dpv_owl:hasNonInvolvedEntity
    annotations:
      skos_in_scheme: processing-context-properties

  has_non_personal_data_process:
    definition_uri: dpv:hasNonPersonalDataProcess
    description: Indicates association with a Non-Personal Data Process
    aliases:
      - has non-personal data process
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasNonPersonalDataProcess
      - dpv_owl:hasNonPersonalDataProcess
    annotations:
      skos_in_scheme: process-properties

  has_passive_entity:
    is_a: has_entity
    definition_uri: dpv:hasPassiveEntity
    description: indicates the entity is passively involved in specified context
    aliases:
      - has passive entity
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasPassiveEntity
      - dpv_owl:hasPassiveEntity
    annotations:
      skos_in_scheme: processing-context-properties

  has_personal_data_handling:
    definition_uri: dpv:hasPersonalDataHandling
    description: Indicates association with Personal Data Handling
    aliases:
      - has personal data handling
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasPersonalDataHandling
      - dpv_owl:hasPersonalDataHandling
    annotations:
      skos_in_scheme: process-properties

  has_personal_data_process:
    definition_uri: dpv:hasPersonalDataProcess
    description: Indicates association with a Personal Data Process
    aliases:
      - has personal data process
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasPersonalDataProcess
      - dpv_owl:hasPersonalDataProcess
    annotations:
      skos_in_scheme: process-properties

  has_process:
    definition_uri: dpv:hasProcess
    description: Indicates association with a Process
    aliases:
      - has process
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasProcess
      - dpv_owl:hasProcess
    annotations:
      skos_in_scheme: process-properties

  has_processing:
    definition_uri: dpv:hasProcessing
    description: Indicates association with Processing
    aliases:
      - has processing
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasProcessing
      - dpv_owl:hasProcessing
    annotations:
      skos_in_scheme: processing-properties

  has_processing_condition:
    definition_uri: dpv:hasProcessingCondition
    description: Indicates information about processing condition
    aliases:
      - has processing condition
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasProcessingCondition
      - dpv_owl:hasProcessingCondition
    annotations:
      skos_in_scheme: processing-context-properties

  has_processing_scale:
    is_a: has_scale
    definition_uri: dpv:hasProcessingScale
    description: Indicates the scale of processing operations
    aliases:
      - has processing scale
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasProcessingScale
      - dpv_owl:hasProcessingScale
    annotations:
      skos_in_scheme: processing-scale-properties

  has_purpose:
    definition_uri: dpv:hasPurpose
    description: Indicates association with Purpose
    aliases:
      - has purpose
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasPurpose
      - dpv_owl:hasPurpose
    annotations:
      skos_in_scheme: purposes-properties

  has_scale:
    definition_uri: dpv:hasScale
    description: Indicates the scale of specified concept
    aliases:
      - has scale
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasScale
      - dpv_owl:hasScale
    annotations:
      skos_in_scheme: processing-scale-properties

  has_sector:
    definition_uri: dpv:hasSector
    description: |-
      Indicates the purpose is associated with activities in the indicated
      (Economic) Sector(s)
    aliases:
      - has sector
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasSector
      - dpv_owl:hasSector
    annotations:
      skos_in_scheme: purposes-properties

  has_service:
    definition_uri: dpv:hasService
    description: Indicates associated with the specified service
    aliases:
      - has service
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasService
      - dpv_owl:hasService
    annotations:
      skos_in_scheme: process-properties

  has_storage_condition:
    is_a: has_processing_condition
    definition_uri: dpv:hasStorageCondition
    description: Indicates information about storage condition
    aliases:
      - has storage condition
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:hasStorageCondition
      - dpv_owl:hasStorageCondition
    annotations:
      skos_in_scheme: processing-context-properties

  is_determined_by_entity:
    is_a: has_entity
    definition_uri: dpv:isDeterminedByEntity
    description: Indicates the context is determined by the specified entity
    aliases:
      - is determined by entity
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:isDeterminedByEntity
      - dpv_owl:isDeterminedByEntity
    annotations:
      skos_in_scheme: processing-context-properties

  is_implemented_by_entity:
    definition_uri: dpv:isImplementedByEntity
    description: Indicates implementation details such as entities or agents
    aliases:
      - is implemented by entity
    comments:
      - |-
        Also used to indicate the Entity that implements or performs a Right
        Exercise Activity
      - |-
        The use of 'entity' is inclusive of entities (e.g. Data Processor) as
        well as 'agent' (e.g. DPO). For indicating technological implementation,
        the property isImplementedByTechnology should be used.
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:isImplementedByEntity
      - dpv_owl:isImplementedByEntity
    annotations:
      skos_in_scheme: processing-context-properties, rights-properties

  is_implemented_using_technology:
    definition_uri: dpv:isImplementedUsingTechnology
    description: Indicates implementation details such as technologies or processes
    aliases:
      - is implemented using technology
    comments:
      - |-
        The term 'technology' is inclusive of technologies, processes, and
        methods.
    multivalued: true
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:isImplementedUsingTechnology
      - dpv_owl:isImplementedUsingTechnology
    annotations:
      skos_in_scheme: processing-context-properties

classes:

  AcademicResearch:
    is_a: ResearchAndDevelopment
    mixins:
      - Purpose
    class_uri: dpv:AcademicResearch
    description: |-
      Purposes associated with conducting or assisting with research conducted
      in an academic context e.g. within universities
    aliases:
      - Academic Research
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:AcademicResearch
      - dpv_owl:AcademicResearch
    related_mappings:
      - svpu:Education
    annotations:
      skos_in_scheme: purposes-classes

  Access:
    is_a: Use
    mixins:
      - Processing
    class_uri: dpv:Access
    description: to access data
    aliases:
      - Access
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Access
      - dpv_owl:Access
    annotations:
      skos_in_scheme: processing-classes

  AccountManagement:
    is_a: Purpose
    class_uri: dpv:AccountManagement
    description: |-
      Account Management refers to purposes associated with account
      management, such as to create, provide, maintain, and manage accounts
    aliases:
      - Account Management
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:AccountManagement
      - dpv_owl:AccountManagement
    annotations:
      skos_in_scheme: purposes-classes

  Acquire:
    is_a: Obtain
    mixins:
      - Processing
    class_uri: dpv:Acquire
    description: to come into possession or control of the data
    aliases:
      - Acquire
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Acquire
      - dpv_owl:Acquire
    annotations:
      skos_in_scheme: processing-classes

  Adapt:
    is_a: Transform
    mixins:
      - Processing
    class_uri: dpv:Adapt
    description: to modify the data, often rewritten into a new form for a new use
    aliases:
      - Adapt
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Adapt
      - dpv_owl:Adapt
    annotations:
      skos_in_scheme: processing-classes

  Advertising:
    is_a: Marketing
    mixins:
      - Purpose
    class_uri: dpv:Advertising
    description: |-
      Purposes associated with conducting advertising i.e. process or artefact
      used to call attention to a product, service, etc. through
      announcements, notices, or other forms of communication
    aliases:
      - Advertising
    comments:
      - |-
        Advertising is a subset of Marketing. Advertising by itself does not
        indicate 'personalisation' i.e. personalised ads.
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Advertising
      - dpv_owl:Advertising
    annotations:
      skos_in_scheme: purposes-classes

  AgeVerification:
    is_a: Verification
    mixins:
      - Purpose
    class_uri: dpv:AgeVerification
    description: |-
      Purposes associated with verifying or authenticating age or age related
      information as a form of security
    aliases:
      - Age Verification
    comments:
      - |-
        Age Verification can include verification of the exact age, e.g. being
        21 years old, a date, e.g. birth date is 01 January 1969, or a
        condition, e.g. age is over 21 years and the person is an adult.
        Specific dedicated resources should be used to further express
        information and processes associated with Age Verification, for example
        the Age Verification Vocabulary https://w3id.org/age/
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:AgeVerification
      - dpv_owl:AgeVerification
    annotations:
      skos_in_scheme: purposes-classes

  Aggregate:
    is_a: Alter
    mixins:
      - Processing
    class_uri: dpv:Aggregate
    description: to aggregate data
    aliases:
      - Aggregate
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Aggregate
      - dpv_owl:Aggregate
    related_mappings:
      - svpr:Aggregate
    annotations:
      skos_in_scheme: processing-classes

  AlgorithmicLogic:
    is_a: ProcessingContext
    class_uri: dpv:AlgorithmicLogic
    description: The algorithmic logic applied or used
    aliases:
      - Algorithmic Logic
    comments:
      - |-
        Algorithmic Logic is intended as a broad concept for explaining the use
        of algorithms and automated decisions making within Processing. To
        describe the actual algorithm, see the Algorithm concept.
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:AlgorithmicLogic
      - dpv_owl:AlgorithmicLogic
    annotations:
      skos_in_scheme: processing-context-classes

  Align:
    is_a: Transform
    mixins:
      - Processing
    class_uri: dpv:Align
    description: to adjust the data to be in relation to another data
    aliases:
      - Align
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Align
      - dpv_owl:Align
    annotations:
      skos_in_scheme: processing-classes

  Alter:
    is_a: Transform
    mixins:
      - Processing
    class_uri: dpv:Alter
    description: to change the data without changing it into something else
    aliases:
      - Alter
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Alter
      - dpv_owl:Alter
    annotations:
      skos_in_scheme: processing-classes

  Analyse:
    is_a: Use
    mixins:
      - Processing
    class_uri: dpv:Analyse
    description: to study or examine the data in detail
    aliases:
      - Analyse
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Analyse
      - dpv_owl:Analyse
    related_mappings:
      - svpr:Analyse
    annotations:
      skos_in_scheme: processing-classes

  Anonymise:
    is_a: Transform
    mixins:
      - Processing
    class_uri: dpv:Anonymise
    description: |-
      to irreversibly alter personal data in such a way that an unique data
      subject can no longer be identified directly or indirectly or in
      combination with other data
    aliases:
      - Anonymise
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Anonymise
      - dpv_owl:Anonymise
    related_mappings:
      - svpr:Anonymise
    annotations:
      skos_in_scheme: processing-classes

  Assess:
    is_a: Use
    mixins:
      - Processing
    class_uri: dpv:Assess
    description: to assess data for some criteria
    aliases:
      - Assess
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Assess
      - dpv_owl:Assess
    annotations:
      skos_in_scheme: processing-classes

  AssistiveAutomation:
    is_a: AutomationLevel
    class_uri: dpv:AssistiveAutomation
    description: |-
      Level of automation corresponding to Level 1 in ISO/IEC 22989:2022 where
      automation is limited to parts of the system or a specific part of the
      system in a manner that does not change the control of the human in
      using/driving the system
    aliases:
      - Assistive Automation
    comments:
      - |-
        Human Involvement is implied here, specifically the ability to make
        decisions regarding operations, but also possibly for intervention,
        oversight, and verification
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:AssistiveAutomation
      - dpv_owl:AssistiveAutomation
    annotations:
      skos_in_scheme: processing-context-classes

  AutomatedDecisionMaking:
    is_a: DecisionMaking
    class_uri: dpv:AutomatedDecisionMaking
    description: Processing that involves automated decision making
    aliases:
      - Automated Decision Making
    comments:
      - |-
        Automated decision making can be defined as “the ability to make
        decisions by technological means without human involvement.”
        (“Guidelines on Automated individual decision-making and Profiling for
        the purposes of Regulation 2016/679 (wp251rev.01)”, 2018, p. 8)
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:AutomatedDecisionMaking
      - dpv_owl:AutomatedDecisionMaking
    related_mappings:
      - iso22989:Decision
    annotations:
      skos_in_scheme: processing-context-classes

  AutomatedScoringOfIndividuals:
    is_a: ScoringOfIndividuals
    class_uri: dpv:AutomatedScoringOfIndividuals
    description: Processing that involves automated scoring of individuals
    aliases:
      - Automated Scoring of Individuals
    comments:
      - |-
        Scoring can lead to the action being considered Decision Making if the
        scoring is itself a decision - see 2023-MAR-16 opinion of Advocate
        General on Case C 634/21. Therefore, the assessment of whether scoring
        was automated or not is important given the legal obligations
        surrounding automated decision making e.g. in GDPR
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:AutomatedScoringOfIndividuals
      - dpv_owl:AutomatedScoringOfIndividuals
    annotations:
      skos_in_scheme: processing-context-classes

  AutomationLevel:
    is_a: ProcessingContext
    class_uri: dpv:AutomationLevel
    description: |-
      Indication of degree or level of automation associated with specified
      context
    aliases:
      - Automation Level
    comments:
      - This concept was called 'Automation' in previous versions
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:AutomationLevel
      - dpv_owl:AutomationLevel
    annotations:
      skos_in_scheme: processing-context-classes

  Autonomous:
    is_a: AutomationLevel
    class_uri: dpv:Autonomous
    description: |-
      Level of automation corresponding to Level 6 in ISO/IEC 22989:2022 where
      the automation in system is capable of modifying its operation domain or
      its goals without external intervention, control or oversight
    aliases:
      - Autonomous
    comments:
      - |-
        Though Autonomous, such operations can still be associated with
        dpv:HumanInvolved e.g. for inputs, oversight or verification
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:Autonomous
      - dpv_owl:Autonomous
    annotations:
      skos_in_scheme: processing-context-classes

  CannotChallengeProcess:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpv:CannotChallengeProcess
    description: |-
      Involvement where entity cannot challenge the process of specified
      context
    aliases:
      - Cannot Challenge Process
    comments:
      - |-
        Challenge refers to raising questions about validity, necessity,
        correctness, or other similar 'trustworthiness' attributes regarding the
        process or plan or implementation
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:CannotChallengeProcess
      - dpv_owl:CannotChallengeProcess
    annotations:
      skos_in_scheme: processing-context-classes

  CannotChallengeProcessInput:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpv:CannotChallengeProcessInput
    description: Involvement where entity cannot challenge input of specified context
    aliases:
      - Cannot Challenge Process Input
    in_subset:
      - processing_subset
    exact_mappings:
      - dpv_upstream:CannotChallengeProcessInput
      - dpv_owl:CannotChallengeProcessInput
    annotations:
      skos_in_scheme: processing-context-classes

  CannotChallengeProcessOutput:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpv:CannotChallengeProcessOutput
    description: |-
      Involvement where entity cannot challenge the output of specified
      context
    aliases:
      - Cannot Challenge Process Output
    comments:
      - |-
