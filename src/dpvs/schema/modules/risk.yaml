id: https://w3id.org/lmodel/dpvs/risk
name: dpvs_risk
title: DPV — Risk
description: |-
  LinkML schema generated from the DPV 2.3 module `modules/risk-owl.ttl`
  (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  risk_subset:
    description: Entities from the DPV `risk` module.

slots:

  has_consequence:
    definition_uri: dpvs:hasConsequence
    description: Indicates consequence(s) possible or arising from specified concept
    aliases:
      - has consequence
    comments:
      - Removed plural suffix for consistency
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasConsequence
      - dpv_owl:hasConsequence
    annotations:
      skos_in_scheme: risk-properties

  has_consequence_on:
    definition_uri: dpvs:hasConsequenceOn
    description: |-
      Indicates the thing (e.g. plan, process, or entity) affected by a
      consequence
    aliases:
      - has consequence on
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasConsequenceOn
      - dpv_owl:hasConsequenceOn
    annotations:
      skos_in_scheme: risk-properties

  has_impact:
    is_a: has_consequence
    definition_uri: dpvs:hasImpact
    description: |-
      Indicates impact(s) possible or arising as consequences from specified
      concept
    aliases:
      - has impact
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasImpact
      - dpv_owl:hasImpact
    annotations:
      skos_in_scheme: risk-properties

  has_impact_assessment:
    is_a: has_assessment
    definition_uri: dpvs:hasImpactAssessment
    description: Indicates an impact assessment associated with the specific context
    aliases:
      - has impact assessment
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasImpactAssessment
      - dpv_owl:hasImpactAssessment
    annotations:
      skos_in_scheme: risk-properties

  has_impact_on:
    is_a: has_consequence_on
    definition_uri: dpvs:hasImpactOn
    description: |-
      Indicates the thing (e.g. plan, process, or entity) affected by an
      impact
    aliases:
      - has impact on
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasImpactOn
      - dpv_owl:hasImpactOn
    annotations:
      skos_in_scheme: risk-properties

  has_likelihood:
    definition_uri: dpvs:hasLikelihood
    description: Indicates the likelihood associated with a concept
    aliases:
      - has likelihood
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasLikelihood
      - dpv_owl:hasLikelihood
    annotations:
      skos_in_scheme: risk-properties

  has_residual_risk:
    definition_uri: dpvs:hasResidualRisk
    description: |-
      Indicates the associated risk is the remaining or residual risk from
      applying mitigation measures or treatments to this risk
    aliases:
      - has residual risk
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasResidualRisk
      - dpv_owl:hasResidualRisk
    annotations:
      skos_in_scheme: risk-properties

  has_risk:
    definition_uri: dpvs:hasRisk
    description: Indicates applicability of Risk for this concept
    aliases:
      - has risk
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasRisk
      - dpv_owl:hasRisk
    annotations:
      skos_in_scheme: risk-properties

  has_risk_assessment:
    is_a: has_assessment
    definition_uri: dpvs:hasRiskAssessment
    description: Indicates an associated risk assessment
    aliases:
      - has risk assessment
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasRiskAssessment
      - dpv_owl:hasRiskAssessment
    annotations:
      skos_in_scheme: risk-properties

  has_risk_level:
    definition_uri: dpvs:hasRiskLevel
    description: Indicates the associated risk level associated with a risk
    aliases:
      - has risk level
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasRiskLevel
      - dpv_owl:hasRiskLevel
    annotations:
      skos_in_scheme: risk-properties

  has_sensitivity_level:
    definition_uri: dpvs:hasSensitivityLevel
    description: Indicates the associated level of sensitivity
    aliases:
      - has sensitivity level
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasSensitivityLevel
      - dpv_owl:hasSensitivityLevel
    annotations:
      skos_in_scheme: risk-properties

  has_severity:
    definition_uri: dpvs:hasSeverity
    description: Indicates the severity associated with a concept
    aliases:
      - has severity
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:hasSeverity
      - dpv_owl:hasSeverity
    annotations:
      skos_in_scheme: risk-properties

  is_mitigated_by_measure:
    is_a: has_technical_organisational_measure
    definition_uri: dpvs:isMitigatedByMeasure
    description: Indicate a risk is mitigated by specified measure
    aliases:
      - is mitigated by measure
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:isMitigatedByMeasure
      - dpv_owl:isMitigatedByMeasure
    annotations:
      skos_in_scheme: risk-properties

  is_residual_risk_of:
    definition_uri: dpvs:isResidualRiskOf
    description: |-
      Indicates this risk is the remaining or residual risk from applying
      mitigation measures or treatments to specified risk
    aliases:
      - is residual risk of
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:isResidualRiskOf
      - dpv_owl:isResidualRiskOf
    annotations:
      skos_in_scheme: risk-properties

  mitigates_risk:
    definition_uri: dpvs:mitigatesRisk
    description: Indicates risks mitigated by this concept
    aliases:
      - mitigates risk
    multivalued: true
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:mitigatesRisk
      - dpv_owl:mitigatesRisk
    annotations:
      skos_in_scheme: risk-properties

classes:

  Consequence:
    is_a: RiskConcept
    class_uri: dpvs:Consequence
    description: The consequence(s) possible or arising from specified context
    aliases:
      - Consequence
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:Consequence
      - dpv_owl:Consequence
    annotations:
      skos_in_scheme: risk-classes

  ConsequenceAsSideEffect:
    is_a: Consequence
    class_uri: dpvs:ConsequenceAsSideEffect
    description: |-
      The consequence(s) possible or arising as a side-effect of specified
      context
    aliases:
      - Consequence as Side-Effect
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:ConsequenceAsSideEffect
      - dpv_owl:ConsequenceAsSideEffect
    annotations:
      skos_in_scheme: risk-classes

  ConsequenceOfFailure:
    is_a: Consequence
    class_uri: dpvs:ConsequenceOfFailure
    description: |-
      The consequence(s) possible or arising from failure of specified context
    aliases:
      - Consequence of Failure
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:ConsequenceOfFailure
      - dpv_owl:ConsequenceOfFailure
    annotations:
      skos_in_scheme: risk-classes

  ConsequenceOfSuccess:
    is_a: Consequence
    class_uri: dpvs:ConsequenceOfSuccess
    description: |-
      The consequence(s) possible or arising from success of specified context
    aliases:
      - Consequence of Success
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:ConsequenceOfSuccess
      - dpv_owl:ConsequenceOfSuccess
    annotations:
      skos_in_scheme: risk-classes

  CybersecurityAssessment:
    is_a: SecurityAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:CybersecurityAssessment
    description: |-
      Assessment of cybersecurity capabilities in terms of vulnerabilities and
      effectiveness of controls
    aliases:
      - Cybersecurity Assessment
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:CybersecurityAssessment
      - dpv_owl:CybersecurityAssessment
    annotations:
      skos_in_scheme: risk-classes

  DPIA:
    is_a: RightsImpactAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:DPIA
    description: |-
      Impact assessment determining the potential and actual impact of
      processing activities on individuals or groups of individuals and taking
      into account the impacts of activities on their rights and freedoms
    aliases:
      - Data Protection Impact Assessment (DPIA)
    comments:
      - |-
        Specific requirements and procedures for DPIA are defined in GDPR Art.35
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:DPIA
      - dpv_owl:DPIA
    annotations:
      skos_in_scheme: risk-classes
      dct_source: GDPR Art. 35

  DataBreachImpactAssessment:
    is_a: RightsImpactAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:DataBreachImpactAssessment
    description: |-
      Impact Assessment concerning the consequences and impacts of a data
      breach
    aliases:
      - Data Breach Impact Assessment (DBIA)
    comments:
      - |-
        Data Breach assessments can require additional non-security related
        assessments such as GDPR Art.34 Rights Impact Assessment
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:DataBreachImpactAssessment
      - dpv_owl:DataBreachImpactAssessment
    annotations:
      skos_in_scheme: risk-classes

  DataTransferImpactAssessment:
    is_a: ImpactAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:DataTransferImpactAssessment
    description: Impact Assessment for conducting data transfers
    aliases:
      - Data Transfer Impact Assessment
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:DataTransferImpactAssessment
      - dpv_owl:DataTransferImpactAssessment
    annotations:
      skos_in_scheme: risk-classes

  FRIA:
    is_a: RightsImpactAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:FRIA
    description: |-
      Impact assessment which assesses the potential and actual impact on
      fundamental rights occurring due to processing activities
    aliases:
      - Fundamental Rights Impact Assessment (FRIA)
    comments:
      - |-
        The fundamental rights and freedoms may be those defined in law or other
        norms, and may be bound to a jurisdiction - for example see EU Charter
        of Fundamental Rights
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:FRIA
      - dpv_owl:FRIA
    annotations:
      skos_in_scheme: risk-classes
      dct_source: AI Act Art.27

  Impact:
    is_a: Consequence
    class_uri: dpvs:Impact
    description: |-
      The impact(s) possible or arising as a consequence from specified
      context
    aliases:
      - Impact
    comments:
      - |-
        Impact is a stronger notion of consequence in terms of influence,
        change, or effect on something e.g. for impact assessments
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:Impact
      - dpv_owl:Impact
    annotations:
      skos_in_scheme: risk-classes

  ImpactAssessment:
    is_a: RiskAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:ImpactAssessment
    description: |-
      Calculating or determining the likelihood of impact of an existing or
      proposed process, which can involve risks or detriments.
    aliases:
      - Impact Assessment
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:ImpactAssessment
      - dpv_owl:ImpactAssessment
    annotations:
      skos_in_scheme: risk-classes

  Likelihood:
    class_uri: dpvs:Likelihood
    description: |-
      The likelihood or probability or chance of something taking place or
      occurring
    aliases:
      - Likelihood
    comments:
      - |-
        Likelihood can be expressed in a subjective manner, such as 'Unlikely',
        or in a quantitative manner such as "Twice in a Day" (frequency per
        period). The suggestion is to use quantitative values, or to associate
        them with subjective terms used so as to enable accurate interpretations
        and interoperability. See the concepts related to Frequency and Duration
        for possible uses as a combination to express Likelihood.
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:Likelihood
      - dpv_owl:Likelihood
    annotations:
      skos_in_scheme: risk-classes

  PIA:
    is_a: ImpactAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:PIA
    description: Impact assessment regarding privacy risks
    aliases:
      - Privacy Impact Assessment (PIA)
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:PIA
      - dpv_owl:PIA
    annotations:
      skos_in_scheme: risk-classes

  ResidualRisk:
    is_a: Risk
    class_uri: dpvs:ResidualRisk
    description: Risk remaining after treatment or mitigation
    aliases:
      - Residual Risk
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:ResidualRisk
      - dpv_owl:ResidualRisk
    annotations:
      skos_in_scheme: risk-classes

  RightsImpactAssessment:
    is_a: ImpactAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:RightsImpactAssessment
    description: |-
      Impact assessment which involves determining the impact on rights and
      freedoms
    aliases:
      - Rights Impact Assessment
    comments:
      - |-
        The rights and freedoms may be those defined in law or other norms, and
        may be bound to a jurisdiction
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:RightsImpactAssessment
      - dpv_owl:RightsImpactAssessment
    annotations:
      skos_in_scheme: risk-classes

  Risk:
    is_a: RiskConcept
    class_uri: dpvs:Risk
    description: |-
      A risk or possibility or uncertainty of negative effects, impacts, or
      consequences
    aliases:
      - Risk
    comments:
      - |-
        Risks can be associated with one or more different concepts such as
        purpose, processing, personal data, technical or organisational measure
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:Risk
      - dpv_owl:Risk
    annotations:
      skos_in_scheme: risk-classes

  RiskAssessment:
    is_a: Assessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:RiskAssessment
    description: Assessment involving identification, analysis, and evaluation of risk
    aliases:
      - Risk Assessment
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:RiskAssessment
      - dpv_owl:RiskAssessment
    annotations:
      skos_in_scheme: risk-classes

  RiskConcept:
    class_uri: dpvs:RiskConcept
    description: |-
      Parent concept for combining concepts associated with risk assessment
      such as actual and potential Risk, Risk Source, Consequences, and
      Impacts
    aliases:
      - Risk Concept
    comments:
      - |-
        RiskConcept is a generic concept used for creation of specific
        taxonomies in the RISK extension to provide guidance on how a concept
        can potentially be a risk, risk source, consequence, and impact. It is
        not intended to be used directly and is only created for organisation of
        concepts in DPV vocabularies
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:RiskConcept
      - dpv_owl:RiskConcept
    annotations:
      skos_in_scheme: risk-classes

  RiskLevel:
    class_uri: dpvs:RiskLevel
    description: |-
      The magnitude of a risk expressed as an indication to aid in its
      management
    aliases:
      - Risk Level
    comments:
      - |-
        Risk Levels can be defined as a combination of different
        characteristics. For example, ISO 31073:2022 defines it as a combination
        of consequences and their likelihood. Another example would be the Risk
        Matrix where Risk Level is defined as a combination of Likelihood and
        Severity associated with the Risk.
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:RiskLevel
      - dpv_owl:RiskLevel
    annotations:
      skos_in_scheme: risk-classes

  RiskMitigationMeasure:
    is_a: TechnicalOrganisationalMeasure
    class_uri: dpvs:RiskMitigationMeasure
    description: Measures intended to mitigate, minimise, or prevent risk.
    aliases:
      - Risk Mitigation Measure
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:RiskMitigationMeasure
      - dpv_owl:RiskMitigationMeasure
    annotations:
      skos_in_scheme: risk-classes

  SecurityAssessment:
    is_a: RiskAssessment
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:SecurityAssessment
    description: |-
      Assessment of security intended to identify gaps, vulnerabilities,
      risks, and effectiveness of controls
    aliases:
      - Security Assessment
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:SecurityAssessment
      - dpv_owl:SecurityAssessment
    annotations:
      skos_in_scheme: risk-classes

  SensitivityLevel:
    is_a: Severity
    class_uri: dpvs:SensitivityLevel
    description: |-
      Sensitivity' reflects the risk of impact if not secured or utilised with
      appropriate measures and controls e.g. for sensitive data
    aliases:
      - Sensitivity Level
    comments:
      - |-
        ISO/IEC TS 38505-3:2021 defines 'data sensitivity' as the potential harm
        of unauthorised disclosure. DPV's use of the concept goes beyond
        disclosure as it refers to the level of safeguards or controls the data
        requires as a reflection of its 'sensitive' nature. To indicate
        quantified levels of sensitivity, e.g. "high sensitivity", instances of
        severity can be directly used or specialised
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:SensitivityLevel
      - dpv_owl:SensitivityLevel
    annotations:
      skos_in_scheme: risk-classes

  Severity:
    class_uri: dpvs:Severity
    description: |-
      The magnitude of being unwanted or having negative effects such as
      harmful impacts
    aliases:
      - Severity
    comments:
      - Severity can be associated with Risk, or its Consequences and Impacts
    in_subset:
      - risk_subset
    exact_mappings:
      - dpv:Severity
      - dpv_owl:Severity
    annotations:
      skos_in_scheme: risk-classes
