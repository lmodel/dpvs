id: https://w3id.org/lmodel/dpvs/contract
name: dpvs_contract
title: DPV — Contract
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/contract-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  contract_subset:
    description: Entities from the DPV `contract` module.

slots:

  has_contract_control:
    definition_uri: dpvs:hasContractControl
    description: Indicates the contract to be used with a contract
    aliases:
      - has contract control
    multivalued: true
    in_subset:
      - contract_subset
    exact_mappings:
      - dpv:hasContractControl
      - dpv_owl:hasContractControl
    annotations:
      skos_in_scheme: contract-properties

  has_contract_status:
    is_a: has_status
    definition_uri: dpvs:hasContractStatus
    description: Indicates the status of the contract
    aliases:
      - has contract status
    multivalued: true
    in_subset:
      - contract_subset
    exact_mappings:
      - dpv:hasContractStatus
      - dpv_owl:hasContractStatus
    annotations:
      skos_in_scheme: contract-properties

  has_contractual_clause:
    definition_uri: dpvs:hasContractualClause
    description: |-
      Indicates the association or involvement of specified contractual clause
    aliases:
      - has contractual clause
    multivalued: true
    in_subset:
      - contract_subset
    exact_mappings:
      - dpv:hasContractualClause
      - dpv_owl:hasContractualClause
    annotations:
      skos_in_scheme: contract-properties

  has_contractual_fulfilment_status:
    is_a: has_contract_status
    definition_uri: dpvs:hasContractualFulfilmentStatus
    description: Indicates the fulfilment status of a contract or a contractual clause
    aliases:
      - has contractual fulfilment status
    multivalued: true
    in_subset:
      - contract_subset
    exact_mappings:
      - dpv:hasContractualFulfilmentStatus
      - dpv_owl:hasContractualFulfilmentStatus
    annotations:
      skos_in_scheme: contract-properties

  has_party:
    definition_uri: dpvs:hasParty
    description: Indicates a legal entity involved as a party in a contract
    aliases:
      - has party
    multivalued: true
    in_subset:
      - contract_subset
    exact_mappings:
      - dpv:hasParty
      - dpv_owl:hasParty
    annotations:
      skos_in_scheme: contract-properties
