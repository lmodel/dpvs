id: https://w3id.org/lmodel/dpvs/physical_measures
name: dpvs_physical_measures
title: DPV — Physical Measures
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/physical_measures-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  physical_measures_subset:
    description: Entities from the DPV `physical_measures` module.

classes:

  EnvironmentalProtection:
    is_a: PhysicalMeasure
    class_uri: dpvs:EnvironmentalProtection
    description: |-
      Physical protection against environmental threats such as fire, floods,
      storms, etc.
    aliases:
      - Environmental Protection
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:EnvironmentalProtection
      - dpv_owl:EnvironmentalProtection
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-13

  PhysicalAccessControlMethod:
    is_a: AccessControlMethod
    mixins:
      - PhysicalMeasure
    class_uri: dpvs:PhysicalAccessControlMethod
    description: Access control applied for physical access e.g. premises or equipment
    aliases:
      - Physical Access Control Method
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalAccessControlMethod
      - dpv_owl:PhysicalAccessControlMethod
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-12

  PhysicalAuthentication:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalAuthentication
    description: |-
      Physical implementation of authentication e.g. by matching the person to
      their ID card
    aliases:
      - Physical Authentication
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalAuthentication
      - dpv_owl:PhysicalAuthentication
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-15

  PhysicalAuthorisation:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalAuthorisation
    description: |-
      Physical implementation of authorisation e.g. by stamping a visitor pass
    aliases:
      - Physical Authorisation
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalAuthorisation
      - dpv_owl:PhysicalAuthorisation
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-16

  PhysicalDeviceSecurity:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalDeviceSecurity
    description: Physical protection for devices and equipment
    aliases:
      - Physical Device Security
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalDeviceSecurity
      - dpv_owl:PhysicalDeviceSecurity
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-19

  PhysicalInterceptionProtection:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalInterceptionProtection
    description: Physical protection against interception e.g. by posting a guard
    aliases:
      - Physical Interception Protection
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalInterceptionProtection
      - dpv_owl:PhysicalInterceptionProtection
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-20

  PhysicalInterruptionProtection:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalInterruptionProtection
    description: |-
      Physical protection against interruptions e.g. electrical supply
      interruption
    aliases:
      - Physical Interruption Protection
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalInterruptionProtection
      - dpv_owl:PhysicalInterruptionProtection
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-18

  PhysicalNetworkSecurity:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalNetworkSecurity
    description: |-
      Physical protection for networks and networking related infrastructure
      e.g. by isolating networking equipments
    aliases:
      - Physical Network Security
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalNetworkSecurity
      - dpv_owl:PhysicalNetworkSecurity
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-17

  PhysicalSecureStorage:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalSecureStorage
    description: |-
      Physical protection for storage of information or equipment e.g. secure
      storage for files
    aliases:
      - Physical Secure Storage
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalSecureStorage
      - dpv_owl:PhysicalSecureStorage
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-171

  PhysicalSupplySecurity:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalSupplySecurity
    description: Physically securing the supply of resources
    aliases:
      - Physical Supply Security
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalSupplySecurity
      - dpv_owl:PhysicalSupplySecurity
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-14

  PhysicalSurveillance:
    is_a: PhysicalMeasure
    class_uri: dpvs:PhysicalSurveillance
    description: Physically monitoring areas via surveillance
    aliases:
      - Physical Surveillance
    in_subset:
      - physical_measures_subset
    exact_mappings:
      - dpv:PhysicalSurveillance
      - dpv_owl:PhysicalSurveillance
    annotations:
      skos_in_scheme: physical-measures-classes
      dct_source: NIST SP 800-171
