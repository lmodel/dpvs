id: https://w3id.org/lmodel/dpvs/contract_types
name: dpvs_contract_types
title: DPV — Contract Types
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/contract_types-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  contract_types_subset:
    description: Entities from the DPV `contract_types` module.

classes:

  B2B2CContract:
    is_a: B2BContract
    mixins:
      - LegalBasis
      - B2CContract
    class_uri: dpvs:B2B2CContract
    description: |-
      A contract between two businesses who partner together to provide
      services to a consumer
    aliases:
      - Business-to-Business-to-Consumer Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:B2B2CContract
      - dpv_owl:B2B2CContract
    annotations:
      skos_in_scheme: contract-types-classes

  B2BContract:
    is_a: ContractByEntityType
    mixins:
      - LegalBasis
    class_uri: dpvs:B2BContract
    description: A contract between two businesses
    aliases:
      - Business-to-Business Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:B2BContract
      - dpv_owl:B2BContract
    annotations:
      skos_in_scheme: contract-types-classes

  B2CContract:
    is_a: ContractByEntityType
    mixins:
      - LegalBasis
    class_uri: dpvs:B2CContract
    description: |-
      A contract between a business and a consumer where the business provides
      goods or services to the consumer
    aliases:
      - Business-to-Consumer Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:B2CContract
      - dpv_owl:B2CContract
    annotations:
      skos_in_scheme: contract-types-classes

  C2BContract:
    is_a: ContractByEntityType
    mixins:
      - LegalBasis
    class_uri: dpvs:C2BContract
    description: |-
      A contract between a consumer and a business where the business
      purchases goods or services from the consumer
    aliases:
      - Consumer-to-Business Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:C2BContract
      - dpv_owl:C2BContract
    annotations:
      skos_in_scheme: contract-types-classes

  C2CContract:
    is_a: ContractByEntityType
    mixins:
      - LegalBasis
    class_uri: dpvs:C2CContract
    description: A contract between two consumers
    aliases:
      - Consumer-to-Consumer Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:C2CContract
      - dpv_owl:C2CContract
    annotations:
      skos_in_scheme: contract-types-classes

  ConsumerStandardFormContract:
    is_a: StandardFormContract
    mixins:
      - LegalBasis
    class_uri: dpvs:ConsumerStandardFormContract
    description: |-
      A contract where the terms and conditions are determined by parties in
      the role of a 'consumer' - whether an entity or an individual, and the
      other parties have negligible or no ability to negotiate the terms and
      conditions
    aliases:
      - Consumer Standard Form Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ConsumerStandardFormContract
      - dpv_owl:ConsumerStandardFormContract
    annotations:
      skos_in_scheme: contract-types-classes

  ContractByDomain:
    is_a: Contract
    mixins:
      - LegalBasis
    class_uri: dpvs:ContractByDomain
    description: |-
      A generic concept representing contracts categorised by specific domains
      which dictate the drafting and interpretation of contracts
    aliases:
      - Contract by Domain
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ContractByDomain
      - dpv_owl:ContractByDomain
    annotations:
      skos_in_scheme: contract-types-classes

  ContractByEntityType:
    is_a: Contract
    mixins:
      - LegalBasis
    class_uri: dpvs:ContractByEntityType
    description: |-
      A generic concept representing contracts categorised by the type of
      entities involved - such as Businesses (B), Consumers (C), and
      Governments (G)
    aliases:
      - Contract by Entity Type
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ContractByEntityType
      - dpv_owl:ContractByEntityType
    annotations:
      skos_in_scheme: contract-types-classes

  ContractByNegotiationType:
    is_a: Contract
    mixins:
      - LegalBasis
    class_uri: dpvs:ContractByNegotiationType
    description: |-
      A generic concept representing contracts categorised based on their use
      or absence of negotiation in the contract forming process
    aliases:
      - Contract by Negotiation Type
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ContractByNegotiationType
      - dpv_owl:ContractByNegotiationType
    annotations:
      skos_in_scheme: contract-types-classes

  ControllerDataSubjectAgreement:
    is_a: DataSubjectContract
    mixins:
      - LegalBasis
      - LegalMeasure
    class_uri: dpvs:ControllerDataSubjectAgreement
    description: |-
      An agreement outlining conditions, criteria, obligations,
      responsibilities, and specifics for carrying out processing of data
      between a Data Controller and a Data Subject
    aliases:
      - Controller-Data Subject Agreement
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ControllerDataSubjectAgreement
      - dpv_owl:ControllerDataSubjectAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  ControllerProcessorAgreement:
    is_a: DataProcessorContract
    mixins:
      - LegalBasis
      - LegalMeasure
    class_uri: dpvs:ControllerProcessorAgreement
    description: |-
      An agreement outlining conditions, criteria, obligations,
      responsibilities, and specifics for carrying out processing of data
      between a Data Controller and a Data Processor
    aliases:
      - Controller-Processor Agreement
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ControllerProcessorAgreement
      - dpv_owl:ControllerProcessorAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  DataControllerContract:
    is_a: DataProcessingAgreement
    mixins:
      - LegalBasis
    class_uri: dpvs:DataControllerContract
    description: |-
      Creation, completion, fulfilment, or performance of a contract, with
      Data Controllers as parties being Joint Data Controllers, and involving
      specified processing of data or technologies. NOTE: This concept is
      being deprecated - use dpv:JointDataControllersAgreement which has a
      more explicit definition of the entities involved and the intent of the
      contract
    aliases:
      - Data Controller Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:DataControllerContract
      - dpv_owl:DataControllerContract
    annotations:
      skos_in_scheme: contract-types-classes

  DataProcessingAgreement:
    is_a: Contract
    mixins:
      - LegalBasis
      - LegalMeasure
    class_uri: dpvs:DataProcessingAgreement
    description: |-
      An agreement outlining conditions, criteria, obligations,
      responsibilities, and specifics for carrying out processing of data
    aliases:
      - Data Processing Agreement
    comments:
      - |-
        For specific role-based data processing agreements, see concepts for
        Processors and JointDataController agreements.
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:DataProcessingAgreement
      - dpv_owl:DataProcessingAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  DataProcessorContract:
    is_a: DataProcessingAgreement
    mixins:
      - LegalBasis
    class_uri: dpvs:DataProcessorContract
    description: |-
      Creation, completion, fulfilment, or performance of a contract, with the
      Data Controller and Data Processor as parties, and involving specified
      processing of data or technologies. NOTE: This concept is being
      deprecated - use dpv:ControllerProcessorAgreement which has a more
      explicit definition of the entities involved and the intent of the
      contract
    aliases:
      - Data Processor Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:DataProcessorContract
      - dpv_owl:DataProcessorContract
    annotations:
      skos_in_scheme: contract-types-classes

  DataSubjectContract:
    is_a: DataProcessingAgreement
    mixins:
      - LegalBasis
    class_uri: dpvs:DataSubjectContract
    description: |-
      Creation, completion, fulfilment, or performance of a contract, with the
      Data Controller and Data Subject as parties, and involving specified
      processing of data or technologies. NOTE: This concept is being
      deprecated - use dpv:ControllerDataSubjectAgreement which has a more
      explicit definition of the entities involved and the intent of the
      contract
    aliases:
      - Data Subject Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:DataSubjectContract
      - dpv_owl:DataSubjectContract
    annotations:
      skos_in_scheme: contract-types-classes

  DistributionAgreement:
    is_a: ContractByDomain
    mixins:
      - LegalBasis
    class_uri: dpvs:DistributionAgreement
    description: |-
      A contract regarding supply of data or technologies between a
      distributor and a supplier
    aliases:
      - Distribution Agreement
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:DistributionAgreement
      - dpv_owl:DistributionAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  EULA:
    is_a: LicenseAgreement
    mixins:
      - LegalBasis
    class_uri: dpvs:EULA
    description: |-
      End User License Agreement is a contract entered into between a software
      (or service) developer or provider with the (end-)user
    aliases:
      - End User License Agreement (EULA)
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:EULA
      - dpv_owl:EULA
    annotations:
      skos_in_scheme: contract-types-classes

  EmploymentContract:
    is_a: ContractByDomain
    mixins:
      - LegalBasis
    class_uri: dpvs:EmploymentContract
    description: A contract regarding employment between an employer and an employee
    aliases:
      - Employment Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:EmploymentContract
      - dpv_owl:EmploymentContract
    annotations:
      skos_in_scheme: contract-types-classes

  G2BContract:
    is_a: ContractByEntityType
    mixins:
      - LegalBasis
    class_uri: dpvs:G2BContract
    description: A contract between a government and a business
    aliases:
      - Government-to-Business Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:G2BContract
      - dpv_owl:G2BContract
    annotations:
      skos_in_scheme: contract-types-classes

  G2CContract:
    is_a: ContractByEntityType
    mixins:
      - LegalBasis
    class_uri: dpvs:G2CContract
    description: A contract between a government and consumers
    aliases:
      - Government-to-Consumer Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:G2CContract
      - dpv_owl:G2CContract
    annotations:
      skos_in_scheme: contract-types-classes

  G2GContract:
    is_a: ContractByEntityType
    mixins:
      - LegalBasis
    class_uri: dpvs:G2GContract
    description: A contract between two governments or government departments or units
    aliases:
      - Government-to-Government Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:G2GContract
      - dpv_owl:G2GContract
    annotations:
      skos_in_scheme: contract-types-classes

  JointDataControllersAgreement:
    is_a: DataControllerContract
    mixins:
      - LegalBasis
      - LegalMeasure
    class_uri: dpvs:JointDataControllersAgreement
    description: |-
      An agreement outlining conditions, criteria, obligations,
      responsibilities, and specifics for carrying out processing of data
      between Controllers within a Joint Controllers relationship
    aliases:
      - Joint Data Controllers Agreement
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:JointDataControllersAgreement
      - dpv_owl:JointDataControllersAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  LicenseAgreement:
    is_a: ContractByDomain
    mixins:
      - LegalBasis
    class_uri: dpvs:LicenseAgreement
    description: |-
      A Legal Document providing permission to utilise data or resource and
      outlining the conditions under which such use is considered valid
    aliases:
      - License Agreement
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:LicenseAgreement
      - dpv_owl:LicenseAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  NegotiatedContract:
    is_a: ContractByNegotiationType
    mixins:
      - LegalBasis
    class_uri: dpvs:NegotiatedContract
    description: |-
      A contract where the terms and conditions are determined with all
      parties having the ability to negotiate the terms and conditions
    aliases:
      - Negotiated Contract
    comments:
      - |-
        Negotiation here refers to the opportunity for a party on their own
        initiative to modify or dictate terms and conditions within a contract.
        If the party is provided a set of options to choose from or in other
        ways is dictated which terms and conditions can be present in the
        contract, neither of these should be considered a negotiation
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:NegotiatedContract
      - dpv_owl:NegotiatedContract
    annotations:
      skos_in_scheme: contract-types-classes

  ProviderStandardFormContract:
    is_a: StandardFormContract
    mixins:
      - LegalBasis
    class_uri: dpvs:ProviderStandardFormContract
    description: |-
      A contract where the terms and conditions are determined by parties in
      the role of a 'provider', and the other parties have negligible or no
      ability to negotiate the terms and conditions
    aliases:
      - Provider Standard Form Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ProviderStandardFormContract
      - dpv_owl:ProviderStandardFormContract
    annotations:
      skos_in_scheme: contract-types-classes

  ServiceLevelAgreement:
    is_a: ContractByDomain
    mixins:
      - LegalBasis
    class_uri: dpvs:ServiceLevelAgreement
    description: |-
      A contract regarding the provision of a service which outlines the
      acceptable metrics and performance of the service for the consumer
    aliases:
      - Service Level Agreement (SLA)
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ServiceLevelAgreement
      - dpv_owl:ServiceLevelAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  StandardFormContract:
    is_a: ContractByNegotiationType
    mixins:
      - LegalBasis
    class_uri: dpvs:StandardFormContract
    description: |-
      A contract where the terms and conditions are determined by one or more
      of the parties, and the other parties have negligible or no ability to
      negotiate the terms and conditions
    aliases:
      - Standard Form Contract
    comments:
      - |-
        Such a contract results in the unempowered parties being in a "take it
        or leave it" position as they can only accept or reject the contract.
        Standard form contracts are also known as "Adhesion contract" or
        "Boilerplate contract"
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:StandardFormContract
      - dpv_owl:StandardFormContract
    annotations:
      skos_in_scheme: contract-types-classes

  SubProcessorAgreement:
    is_a: DataProcessingAgreement
    mixins:
      - LegalBasis
      - LegalMeasure
    class_uri: dpvs:SubProcessorAgreement
    description: |-
      An agreement outlining conditions, criteria, obligations,
      responsibilities, and specifics for carrying out processing of data
      between a Data Processor and a Data (Sub-)Processor
    aliases:
      - Sub-Processor Agreement
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:SubProcessorAgreement
      - dpv_owl:SubProcessorAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  ThirdPartyAgreement:
    is_a: ThirdPartyContract
    mixins:
      - LegalBasis
      - LegalMeasure
    class_uri: dpvs:ThirdPartyAgreement
    description: |-
      An agreement outlining conditions, criteria, obligations,
      responsibilities, and specifics for carrying out processing of data
      between a Data Controller or Processor and a Third Party
    aliases:
      - Third-Party Agreement
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ThirdPartyAgreement
      - dpv_owl:ThirdPartyAgreement
    annotations:
      skos_in_scheme: contract-types-classes

  ThirdPartyContract:
    is_a: DataProcessingAgreement
    mixins:
      - LegalBasis
    class_uri: dpvs:ThirdPartyContract
    description: |-
      Creation, completion, fulfilment, or performance of a contract, with the
      Data Controller and Third Party as parties, and involving specified
      processing of data or technologies. NOTE: This concept is being
      deprecated - use dpv:ThirdPartyAgreement which has a more explicit
      definition of the entities involved and the intent of the contract
    aliases:
      - Third Party Contract
    in_subset:
      - contract_types_subset
    exact_mappings:
      - dpv:ThirdPartyContract
      - dpv_owl:ThirdPartyContract
    annotations:
      skos_in_scheme: contract-types-classes
