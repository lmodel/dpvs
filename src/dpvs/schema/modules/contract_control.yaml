id: https://w3id.org/lmodel/dpvs/contract_control
name: dpvs_contract_control
title: DPV — Contract Control
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/contract_control-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  contract_control_subset:
    description: Entities from the DPV `contract_control` module.

classes:

  AcceptContract:
    is_a: ContractControl
    class_uri: dpvs:AcceptContract
    description: Control for accepting a contract
    aliases:
      - Accept Contract
    in_subset:
      - contract_control_subset
    exact_mappings:
      - dpv:AcceptContract
      - dpv_owl:AcceptContract
    annotations:
      skos_in_scheme: contract-control-classes

  ContractControl:
    is_a: EntityInvolvement
    class_uri: dpvs:ContractControl
    description: |-
      The control or activity associated with accepting, refusing, and other
      actions associated with a contract
    aliases:
      - Contract Control
    in_subset:
      - contract_control_subset
    exact_mappings:
      - dpv:ContractControl
      - dpv_owl:ContractControl
    annotations:
      skos_in_scheme: contract-control-classes

  NegotiateContract:
    is_a: ContractControl
    class_uri: dpvs:NegotiateContract
    description: Control for negotiating a contract
    aliases:
      - Negotiate Contract
    in_subset:
      - contract_control_subset
    exact_mappings:
      - dpv:NegotiateContract
      - dpv_owl:NegotiateContract
    annotations:
      skos_in_scheme: contract-control-classes

  OfferContract:
    is_a: ContractControl
    class_uri: dpvs:OfferContract
    description: Control for offering a contract
    aliases:
      - Offer Contract
    in_subset:
      - contract_control_subset
    exact_mappings:
      - dpv:OfferContract
      - dpv_owl:OfferContract
    annotations:
      skos_in_scheme: contract-control-classes

  RefuseContract:
    is_a: ContractControl
    class_uri: dpvs:RefuseContract
    description: Control for refusing a contract
    aliases:
      - Refuse Contract
    in_subset:
      - contract_control_subset
    exact_mappings:
      - dpv:RefuseContract
      - dpv_owl:RefuseContract
    annotations:
      skos_in_scheme: contract-control-classes

  TerminateContract:
    is_a: ContractControl
    class_uri: dpvs:TerminateContract
    description: Control for terminating a contract
    aliases:
      - Terminate Contract
    in_subset:
      - contract_control_subset
    exact_mappings:
      - dpv:TerminateContract
      - dpv_owl:TerminateContract
    annotations:
      skos_in_scheme: contract-control-classes
