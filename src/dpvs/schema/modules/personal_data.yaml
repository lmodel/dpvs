id: https://w3id.org/lmodel/dpvs/personal_data
name: dpvs_personal_data
title: DPV — Personal Data
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/personal_data-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  personal_data_subset:
    description: Entities from the DPV `personal_data` module.

slots:

  has_data:
    definition_uri: dpvs:hasData
    description: Indicates associated with Data (may or may not be personal)
    aliases:
      - has data
    multivalued: true
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:hasData
      - dpv_owl:hasData
    annotations:
      skos_in_scheme: personal-data-properties

  has_personal_data:
    is_a: has_data
    definition_uri: dpvs:hasPersonalData
    description: Indicates association with Personal Data
    aliases:
      - has personal data
    multivalued: true
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:hasPersonalData
      - dpv_owl:hasPersonalData
    annotations:
      skos_in_scheme: personal-data-properties

  has_uncategorised_data:
    is_a: has_data
    definition_uri: dpvs:hasUncategorisedData
    description: Indicates association with the specified uncategorised data
    aliases:
      - has uncategorised data
    multivalued: true
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:hasUncategorisedData
      - dpv_owl:hasUncategorisedData
    annotations:
      skos_in_scheme: personal-data-properties

  has_unstructured_data:
    is_a: has_data
    definition_uri: dpvs:hasUnstructuredData
    description: Indicates association with the specified unstructured data
    aliases:
      - has unstructured data
    multivalued: true
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:hasUnstructuredData
      - dpv_owl:hasUnstructuredData
    annotations:
      skos_in_scheme: personal-data-properties

classes:

  AnonymisedData:
    is_a: NonPersonalData
    class_uri: dpvs:AnonymisedData
    description: |-
      Personal Data that has been (fully and completely) anonymised so that it
      is no longer considered Personal Data
    aliases:
      - Anonymised Data
    comments:
      - |-
        It is advised to carefully consider indicating data is fully or
        completely anonymised by determining whether the data by itself or in
        combination with other data can identify a person. Failing this
        condition, the data should be denoted as PseudonymisedData. To indicate
        data is anonymised only for a specified entity (e.g. within an
        organisation), the concept ContextuallyAnonymisedData (as subclass of
        PseudonymisedData) should be used instead of AnonymisedData.
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:AnonymisedData
      - dpv_owl:AnonymisedData
    annotations:
      skos_in_scheme: personal-data-classes

  CollectedData:
    is_a: DpvData
    class_uri: dpvs:CollectedData
    description: Data that has been obtained by collecting it from a source
    aliases:
      - Collected Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:CollectedData
      - dpv_owl:CollectedData
    annotations:
      skos_in_scheme: personal-data-classes

  CollectedPersonalData:
    is_a: CollectedData
    mixins:
      - PersonalData
    class_uri: dpvs:CollectedPersonalData
    description: |-
      Personal Data that has been collected from another source such as the
      Data Subject
    aliases:
      - Collected Personal Data
    comments:
      - |-
        To indicate the source of data, use the DataSource concept with the
        hasDataSource relation
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:CollectedPersonalData
      - dpv_owl:CollectedPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  CommerciallyConfidentialData:
    is_a: ConfidentialData
    class_uri: dpvs:CommerciallyConfidentialData
    description: |-
      Data that is considered confidential due to business/trade secrets,
      confidentiality agreements, or company secrets
    aliases:
      - Commercially Confidential Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:CommerciallyConfidentialData
      - dpv_owl:CommerciallyConfidentialData
    annotations:
      skos_in_scheme: personal-data-classes
      dct_source: DGA 6.5(c)

  ConfidentialData:
    is_a: DpvData
    class_uri: dpvs:ConfidentialData
    description: Data deemed confidential
    aliases:
      - Confidential Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:ConfidentialData
      - dpv_owl:ConfidentialData
    annotations:
      skos_in_scheme: personal-data-classes
      dct_source: DGA 5.10

  ContextuallyAnonymisedData:
    is_a: PseudonymisedData
    class_uri: dpvs:ContextuallyAnonymisedData
    description: |-
      Data that can be considered as being fully anonymised within the context
      but in actuality is not fully anonymised and is still personal data as
      it can be de-anonymised outside that context
    aliases:
      - Contextually Anonymised Data
    comments:
      - |-
        To distinguish between partially anonymised data that can be effectively
        treated as anonymised data (e.g. in processing) within a context (e.g.
        an organisation), the concept ContextuallyAnonymisedData should be used
        instead of AnonymisedData. Transfer of this data outside of the context
        should consider that it is not fully anonymised and that it is still
        personal data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:ContextuallyAnonymisedData
      - dpv_owl:ContextuallyAnonymisedData
    annotations:
      skos_in_scheme: personal-data-classes

  DerivedData:
    is_a: DpvData
    class_uri: dpvs:DerivedData
    description: Data that has been obtained through derivations of other data
    aliases:
      - Derived Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:DerivedData
      - dpv_owl:DerivedData
    annotations:
      skos_in_scheme: personal-data-classes

  DerivedPersonalData:
    is_a: DerivedData
    mixins:
      - PersonalData
    class_uri: dpvs:DerivedPersonalData
    description: Personal Data that is obtained or derived from other data
    aliases:
      - Derived Personal Data
    comments:
      - |-
        Derived Data is data that is obtained through processing of existing
        data, e.g. deriving first name from full name. To indicate data that is
        derived but which was not present or evident within the source data,
        InferredPersonalData should be used.
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:DerivedPersonalData
      - dpv_owl:DerivedPersonalData
    related_mappings:
      - svd:Derived
    annotations:
      skos_in_scheme: personal-data-classes

  DpvData:
    class_uri: dpvs:Data
    description: A broad concept representing 'data' or 'information'
    aliases:
      - Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:Data
      - dpv_owl:Data
    annotations:
      skos_in_scheme: personal-data-classes

  GeneratedData:
    is_a: DpvData
    class_uri: dpvs:GeneratedData
    description: |-
      Data that is generated or brought into existence without relation to
      existing data i.e. it is not derived or inferred from other data
    aliases:
      - Generated Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:GeneratedData
      - dpv_owl:GeneratedData
    annotations:
      skos_in_scheme: personal-data-classes

  GeneratedPersonalData:
    is_a: PersonalData
    class_uri: dpvs:GeneratedPersonalData
    description: |-
      Personal Data that is generated or brought into existence without
      relation to existing data i.e. it is not derived or inferred from other
      data
    aliases:
      - Generated Personal Data
    comments:
      - |-
        Generated Data is used to indicate data that is produced and is not
        derived or inferred from other data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:GeneratedPersonalData
      - dpv_owl:GeneratedPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  IdentifyingPersonalData:
    is_a: PersonalData
    class_uri: dpvs:IdentifyingPersonalData
    description: |-
      Personal Data that explicitly and by itself is sufficient to identify a
      person
    aliases:
      - Identifying Personal Data
    comments:
      - |-
        DPV does not use PII ('Personally Identifiable Information') as it has
        varying and conflicting definitions across sources. Instead the concept
        'identifying personal data' is intended to provide a clear
        categorisation of its interpretation. Where multiple data categories can
        be combined to create an 'identifying' category e.g. fingerprinting,
        this concept represents the combined category.
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:IdentifyingPersonalData
      - dpv_owl:IdentifyingPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  IncorrectData:
    is_a: DpvData
    class_uri: dpvs:IncorrectData
    description: |-
      Data that is known to be incorrect or inconsistent with some
      requirements
    aliases:
      - Incorrect Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:IncorrectData
      - dpv_owl:IncorrectData
    annotations:
      skos_in_scheme: personal-data-classes

  InferredData:
    is_a: DerivedData
    class_uri: dpvs:InferredData
    description: Data that has been obtained through inferences of other data
    aliases:
      - Inferred Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:InferredData
      - dpv_owl:InferredData
    annotations:
      skos_in_scheme: personal-data-classes

  InferredPersonalData:
    is_a: DerivedPersonalData
    mixins:
      - InferredData
    class_uri: dpvs:InferredPersonalData
    description: Personal Data that is obtained through inference from other data
    aliases:
      - Inferred Personal Data
    comments:
      - |-
        Inferred Data is derived data generated from existing data, but which
        did not originally exist within it, e.g. inferring demographics from
        browsing history.
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:InferredPersonalData
      - dpv_owl:InferredPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  IntellectualPropertyData:
    is_a: ConfidentialData
    class_uri: dpvs:IntellectualPropertyData
    description: Data protected by Intellectual Property rights and regulations
    aliases:
      - Intellectual Property Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:IntellectualPropertyData
      - dpv_owl:IntellectualPropertyData
    annotations:
      skos_in_scheme: personal-data-classes
      dct_source: DGA 5.10

  NonPersonalData:
    is_a: DpvData
    class_uri: dpvs:NonPersonalData
    description: Data that is not Personal Data
    aliases:
      - Non-Personal Data
    comments:
      - |-
        The term NonPersonalData is provided to distinguish between PersonalData
        and other data, e.g. for indicating which data is regulated by privacy
        laws. To specify personal data that has been anonymised, the concept
        AnonymisedData should be used as the anonymisation process has a risk of
        not being fully effective and such anonymous data may be found to be
        personal data depending on circumstances.
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:NonPersonalData
      - dpv_owl:NonPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  ObservedData:
    is_a: CollectedData
    class_uri: dpvs:ObservedData
    description: Data that has been obtained through observations of a source
    aliases:
      - Observed Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:ObservedData
      - dpv_owl:ObservedData
    annotations:
      skos_in_scheme: personal-data-classes

  ObservedPersonalData:
    is_a: CollectedPersonalData
    mixins:
      - ObservedData
    class_uri: dpvs:ObservedPersonalData
    description: |-
      Personal Data that has been collected through observation of the Data
      Subject(s)
    aliases:
      - Observed Personal Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:ObservedPersonalData
      - dpv_owl:ObservedPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  PersonalData:
    is_a: DpvData
    class_uri: dpvs:PersonalData
    description: Data directly or indirectly associated or related to an individual
    aliases:
      - Personal Data
    comments:
      - |-
        This definition of personal data encompasses the concepts used in GDPR
        Art.4-1 for 'personal data' and ISO/IEC 2700 for 'personally
        identifiable information (PII)'.
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:PersonalData
      - dpv_owl:PersonalData
    related_mappings:
      - usage_policy:AnyData
    annotations:
      skos_in_scheme: personal-data-classes

  ProfessionalConfidentialData:
    is_a: ConfidentialData
    class_uri: dpvs:ProfessionalConfidentialData
    description: |-
      Data protected by professional secrecy or confidentiality, including but
      not limited to data covered by professional privilege or secrecy
      obligations such as that covered by lawyer or doctor-patient
      confidentiality and other forms of recognised professional
      confidentiality obligations
    aliases:
      - Professional Confidential Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:ProfessionalConfidentialData
      - dpv_owl:ProfessionalConfidentialData
    annotations:
      skos_in_scheme: personal-data-classes

  ProvidedData:
    is_a: CollectedData
    class_uri: dpvs:ProvidedData
    description: Data that has been provided by an entity
    aliases:
      - Provided Data
    comments:
      - |-
        Provided data involves one entity explicitly providing the data, which
        the other entity then collects
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:ProvidedData
      - dpv_owl:ProvidedData
    annotations:
      skos_in_scheme: personal-data-classes

  ProvidedPersonalData:
    is_a: CollectedPersonalData
    mixins:
      - ProvidedData
    class_uri: dpvs:ProvidedPersonalData
    description: |-
      Personal Data that has been provided by an entity such as the Data
      Subject
    aliases:
      - Provided Personal Data
    comments:
      - |-
        Provided personal data involves one entity (e.g. data subject)
        explicitly providing the data, which the other entity (e.g. data
        controller) then collects
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:ProvidedPersonalData
      - dpv_owl:ProvidedPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  PseudonymisedData:
    is_a: PersonalData
    class_uri: dpvs:PseudonymisedData
    description: |-
      Pseudonymised Data is data that has gone a partial or incomplete
      anonymisation process by replacing the identifiable information with
      artificial identifiers or 'pseudonyms', and is still considered as
      personal data
    aliases:
      - Pseudonymised Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:PseudonymisedData
      - dpv_owl:PseudonymisedData
    annotations:
      skos_in_scheme: personal-data-classes

  SensitiveData:
    is_a: DpvData
    class_uri: dpvs:SensitiveData
    description: Data deemed sensitive
    aliases:
      - Sensitive Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:SensitiveData
      - dpv_owl:SensitiveData
    annotations:
      skos_in_scheme: personal-data-classes

  SensitiveNonPersonalData:
    is_a: SensitiveData
    class_uri: dpvs:SensitiveNonPersonalData
    description: Non-personal data deemed sensitive
    aliases:
      - Sensitive Non Personal Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:SensitiveNonPersonalData
      - dpv_owl:SensitiveNonPersonalData
    annotations:
      skos_in_scheme: personal-data-classes
      dct_source: DGA 30(a)

  SensitivePersonalData:
    is_a: PersonalData
    mixins:
      - SensitiveData
    class_uri: dpvs:SensitivePersonalData
    description: |-
      Personal data that is considered 'sensitive' in terms of privacy and/or
      impact, and therefore requires additional considerations and/or
      protection
    aliases:
      - Sensitive Personal Data
    comments:
      - |-
        Sensitivity' is a matter of context, and may be defined within legal
        frameworks. For GDPR, Special categories of personal data are considered
        a subset of sensitive data. To illustrate the difference between the
        two, consider the situation where Location data is collected, and which
        is considered 'sensitive' but not 'special'. As a probable rule,
        sensitive data require additional considerations whereas special
        category data requires additional legal basis / justifications.
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:SensitivePersonalData
      - dpv_owl:SensitivePersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  SpecialCategoryPersonalData:
    is_a: SensitivePersonalData
    class_uri: dpvs:SpecialCategoryPersonalData
    description: |-
      Sensitive Personal Data whose use requires specific additional legal
      permission or justification
    aliases:
      - Special Category Personal Data
    comments:
      - |-
        The term 'special category' is based on GDPR Art.9, but should not be
        considered as exclusive to it. DPV considers all Special Categories to
        also be Sensitive, but whose use is either prohibited or regulated and
        therefore requires additional legal basis for justification that is
        separate from that for general personal data.
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:SpecialCategoryPersonalData
      - dpv_owl:SpecialCategoryPersonalData
    annotations:
      skos_in_scheme: personal-data-classes

  StatisticallyConfidentialData:
    is_a: ConfidentialData
    class_uri: dpvs:StatisticallyConfidentialData
    description: |-
      Data protected through Statistical Confidentiality regulations and
      agreements
    aliases:
      - Statistically Confidential Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:StatisticallyConfidentialData
      - dpv_owl:StatisticallyConfidentialData
    annotations:
      skos_in_scheme: personal-data-classes
      dct_source: DGA 2(20)

  SyntheticData:
    is_a: GeneratedData
    class_uri: dpvs:SyntheticData
    description: |-
      Synthetic data refers to artificially created data such that it is
      intended to resemble real data (personal or non-personal), but does not
      refer to any specific identified or identifiable individual, or to the
      real measure of an observable parameter in the case of non-personal data
    aliases:
      - Synthetic Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:SyntheticData
      - dpv_owl:SyntheticData
    annotations:
      skos_in_scheme: personal-data-classes

  UncategorisedData:
    is_a: DpvData
    class_uri: dpvs:UncategorisedData
    description: |-
      Data whose categorisation is not known e.g. whether it is personal or
      non-personal data
    aliases:
      - Uncategorised Data
    comments:
      - |-
        This concept is intended for indicating that a legally relevant
        categorisation of data has not been made - specifically regarding
        whether it is personal data or not, but it can also be extended for
        other categorisations such as sensitive data or domain-specific
        confidential data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:UncategorisedData
      - dpv_owl:UncategorisedData
    annotations:
      skos_in_scheme: personal-data-classes

  UnstructuredData:
    is_a: DpvData
    class_uri: dpvs:UnstructuredData
    description: |-
      Data that is without a predefined data model or is not organised in a
      pre-defined manner
    aliases:
      - Unstructured Data
    comments:
      - |-
        This concept is relevant to application of privacy/data protection
        regulations like GDPR as unstructured data may contain PII/personal data
        and it is useful to flag such data with unknown or incomplete modelling
        information for audits. It is also useful to flag data for potential
        quality issues
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:UnstructuredData
      - dpv_owl:UnstructuredData
    annotations:
      skos_in_scheme: personal-data-classes

  UnverifiedData:
    is_a: DpvData
    class_uri: dpvs:UnverifiedData
    description: |-
      Data that has not been verified in terms of accuracy, inconsistency, or
      quality
    aliases:
      - Unverified Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:UnverifiedData
      - dpv_owl:UnverifiedData
    annotations:
      skos_in_scheme: personal-data-classes

  VerifiedData:
    is_a: DpvData
    class_uri: dpvs:VerifiedData
    description: |-
      Data that has been verified in terms of accuracy, consistency, or
      quality
    aliases:
      - Verified Data
    in_subset:
      - personal_data_subset
    exact_mappings:
      - dpv:VerifiedData
      - dpv_owl:VerifiedData
    annotations:
      skos_in_scheme: personal-data-classes
