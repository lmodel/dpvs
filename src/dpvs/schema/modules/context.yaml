id: https://w3id.org/lmodel/dpvs/context
name: dpvs_context
title: DPV — Context
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/context-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  context_subset:
    description: Entities from the DPV `context` module.

slots:

  has_applicability:
    definition_uri: dpvs:hasApplicability
    description: |-
      Indicates situations where the context is not applicable, information is
      not available, or this is unknown. An appropriate instance of
      dpv:Applicability should be used with this relation to express the
      situation
    aliases:
      - has applicability
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasApplicability
      - dpv_owl:hasApplicability
    annotations:
      skos_in_scheme: context-properties

  has_context:
    definition_uri: dpvs:hasContext
    description: Indicates a purpose is restricted to the specified context(s)
    aliases:
      - has context
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasContext
      - dpv_owl:hasContext
    annotations:
      skos_in_scheme: context-properties

  has_duration:
    definition_uri: dpvs:hasDuration
    description: Indicates information about duration
    aliases:
      - has duration
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasDuration
      - dpv_owl:hasDuration
    annotations:
      skos_in_scheme: context-properties

  has_fee:
    definition_uri: dpvs:hasFee
    description: Indicates whether a fee is required for the specified context
    aliases:
      - has fee
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasFee
      - dpv_owl:hasFee
    annotations:
      skos_in_scheme: context-properties

  has_frequency:
    definition_uri: dpvs:hasFrequency
    description: Indicates the frequency with which something takes place
    aliases:
      - has frequency
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasFrequency
      - dpv_owl:hasFrequency
    annotations:
      skos_in_scheme: context-properties

  has_identifier:
    definition_uri: dpvs:hasIdentifier
    description: Indicates an identifier associated for identification or reference
    aliases:
      - has identifier
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasIdentifier
      - dpv_owl:hasIdentifier
    annotations:
      skos_in_scheme: context-properties

  has_importance:
    definition_uri: dpvs:hasImportance
    description: Indicates the importance for specified context or criteria
    aliases:
      - has importance
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasImportance
      - dpv_owl:hasImportance
    annotations:
      skos_in_scheme: context-properties

  has_justification:
    definition_uri: dpvs:hasJustification
    description: Indicates a justification for specified concept or context
    aliases:
      - has justification
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasJustification
      - dpv_owl:hasJustification
    annotations:
      skos_in_scheme: context-properties

  has_necessity:
    definition_uri: dpvs:hasNecessity
    description: Indicates the necessity for specified context or criteria
    aliases:
      - has necessity
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasNecessity
      - dpv_owl:hasNecessity
    annotations:
      skos_in_scheme: context-properties

  has_outcome:
    definition_uri: dpvs:hasOutcome
    description: Indicates an outcome of specified concept or context
    aliases:
      - has outcome
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasOutcome
      - dpv_owl:hasOutcome
    annotations:
      skos_in_scheme: context-properties

  has_scope:
    definition_uri: dpvs:hasScope
    description: Indicates the scope of specified concept or context
    aliases:
      - has scope
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:hasScope
      - dpv_owl:hasScope
    annotations:
      skos_in_scheme: context-properties

  is_after:
    definition_uri: dpvs:isAfter
    description: |-
      Indicates the specified concepts is 'after' this concept in some context
    aliases:
      - is after
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:isAfter
      - dpv_owl:isAfter
    annotations:
      skos_in_scheme: context-properties

  is_applicable_for:
    definition_uri: dpvs:isApplicableFor
    description: |-
      Indicates the concept or information is applicable for specified context
    aliases:
      - is applicable for
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:isApplicableFor
      - dpv_owl:isApplicableFor
    annotations:
      skos_in_scheme: context-properties

  is_before:
    definition_uri: dpvs:isBefore
    description: |-
      Indicates the specified concepts is 'before' this concept in some
      context
    aliases:
      - is before
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:isBefore
      - dpv_owl:isBefore
    annotations:
      skos_in_scheme: context-properties

  is_during:
    definition_uri: dpvs:isDuring
    description: |-
      Indicates the specified concepts occur 'during' this concept in some
      context
    aliases:
      - is during
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:isDuring
      - dpv_owl:isDuring
    annotations:
      skos_in_scheme: context-properties

  is_not_applicable_for:
    definition_uri: dpvs:isNotApplicableFor
    description: |-
      Indicates the concept or information is not applicable for specified
      context
    aliases:
      - is not applicable for
    multivalued: true
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:isNotApplicableFor
      - dpv_owl:isNotApplicableFor
    annotations:
      skos_in_scheme: context-properties

classes:

  Applicability:
    is_a: Context
    class_uri: dpvs:Applicability
    description: |-
      Concept provided to represent indication of cases where the information
      or context is not applicable (N/A) or not available or this is not known
      or determined yet. If the information is applicable and available, this
      concept should not be used.
    aliases:
      - Applicability
    comments:
      - |-
        These concepts are useful in closed-world interpretations, for example
        in forms where a field must have a value to explicitly denote it is not
        applicable or the information is not available yet.
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Applicability
      - dpv_owl:Applicability
    annotations:
      skos_in_scheme: context-classes

  Context:
    class_uri: dpvs:Context
    description: Contextually relevant information
    aliases:
      - Context
    comments:
      - |-
        Context is a catch-all concept for information of relevance not possible
        to represent through other core concepts. DPV offers specific contextual
        concepts such as Necessity, Frequency, and Duration. More can be created
        by extending Context within use-cases.
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Context
      - dpv_owl:Context
    annotations:
      skos_in_scheme: context-classes

  ContinuousFrequency:
    is_a: Frequency
    class_uri: dpvs:ContinuousFrequency
    description: Frequency where occurrences are continuous
    aliases:
      - Continuous Frequency
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:ContinuousFrequency
      - dpv_owl:ContinuousFrequency
    annotations:
      skos_in_scheme: context-classes

  DpvDuration:
    is_a: Context
    class_uri: dpvs:Duration
    description: The duration or temporal limitation
    aliases:
      - Duration
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Duration
      - dpv_owl:Duration
    annotations:
      skos_in_scheme: context-classes

  DpvOptional:
    is_a: Necessity
    class_uri: dpvs:Optional
    description: Indication of 'optional' or 'voluntary'
    aliases:
      - Optional
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Optional
      - dpv_owl:Optional
    annotations:
      skos_in_scheme: context-classes

  EndlessDuration:
    is_a: DpvDuration
    class_uri: dpvs:EndlessDuration
    description: |-
      Duration that is (known or intended to be) open ended or without an end
    aliases:
      - Endless Duration
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:EndlessDuration
      - dpv_owl:EndlessDuration
    annotations:
      skos_in_scheme: context-classes

  FeeNotRequired:
    is_a: FeeRequirement
    class_uri: dpvs:FeeNotRequired
    description: |-
      Concept indicating a fee is not required. This is distinct from a Fee of
      zero as it indicates a fee is not applicable in the context
    aliases:
      - Fee Not Required
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:FeeNotRequired
      - dpv_owl:FeeNotRequired
    annotations:
      skos_in_scheme: context-classes

  FeeRequired:
    is_a: FeeRequirement
    class_uri: dpvs:FeeRequired
    description: |-
      Concept indicating a fee is required. The value of the fee should be
      specified using rdf:value or an another relevant means
    aliases:
      - Fee Required
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:FeeRequired
      - dpv_owl:FeeRequired
    annotations:
      skos_in_scheme: context-classes

  FeeRequirement:
    is_a: Context
    class_uri: dpvs:FeeRequirement
    description: Concept indicating whether a fee is required
    aliases:
      - Fee Requirement
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:FeeRequirement
      - dpv_owl:FeeRequirement
    annotations:
      skos_in_scheme: context-classes

  FixedOccurrencesDuration:
    is_a: DpvDuration
    class_uri: dpvs:FixedOccurrencesDuration
    description: Duration that takes place a fixed number of times e.g. 3 times
    aliases:
      - Fixed Occurrences Duration
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:FixedOccurrencesDuration
      - dpv_owl:FixedOccurrencesDuration
    annotations:
      skos_in_scheme: context-classes

  Frequency:
    is_a: Context
    class_uri: dpvs:Frequency
    description: |-
      The frequency or information about periods and repetitions in terms of
      recurrence.
    aliases:
      - Frequency
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Frequency
      - dpv_owl:Frequency
    annotations:
      skos_in_scheme: context-classes

  Importance:
    is_a: Context
    class_uri: dpvs:Importance
    description: An indication of 'importance' within a context
    aliases:
      - Importance
    comments:
      - |-
        Importance can be used to express importance, desirability, relevance,
        or significance as a context.
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Importance
      - dpv_owl:Importance
    annotations:
      skos_in_scheme: context-classes

  IndeterminateDuration:
    is_a: DpvDuration
    class_uri: dpvs:IndeterminateDuration
    description: Duration that is indeterminate or cannot be determined
    aliases:
      - Indeterminate Duration
    comments:
      - |-
        Indeterminate means (exact or otherwise) information about the duration
        cannot be determined, which is distinct from 'EndlessDuration' where it
        is known (or decided) that the duration is open-ended or without an end.
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:IndeterminateDuration
      - dpv_owl:IndeterminateDuration
    annotations:
      skos_in_scheme: context-classes

  Justification:
    is_a: Context
    class_uri: dpvs:Justification
    description: |-
      A form of documentation providing reasons, explanations, or
      justifications
    aliases:
      - Justification
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Justification
      - dpv_owl:Justification
    annotations:
      skos_in_scheme: context-classes

  Necessity:
    is_a: Context
    class_uri: dpvs:Necessity
    description: An indication of 'necessity' within a context
    aliases:
      - Necessity
    comments:
      - |-
        Necessity can be used to express need, essentiality, requirement, or
        compulsion.
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Necessity
      - dpv_owl:Necessity
    annotations:
      skos_in_scheme: context-classes

  NotApplicable:
    is_a: Applicability
    class_uri: dpvs:NotApplicable
    description: Concept indicating the information or context is not applicable
    aliases:
      - Not Applicable
    comments:
      - |-
        This relates to a 'Stop' state as distinct from a 'Halt' state. It makes
        no comments on whether the Activity can be resumed or continued towards
        completion.
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:NotApplicable
      - dpv_owl:NotApplicable
    annotations:
      skos_in_scheme: context-classes

  NotAvailable:
    is_a: Applicability
    class_uri: dpvs:NotAvailable
    description: |-
      Concept indicating the information or context is applicable but
      information is not yet available
    aliases:
      - Not Available
    comments:
      - |-
        This concept is useful when describing situations where information is
        required but is not available (yet). For example, if in a form a field
        asks about whether a process X was completed, and it is correct to
        interpret that process X is applicable and must be completed, but the
        information is not yet available as to whether this was done - then
        NotAvailable is useful to represent this.
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:NotAvailable
      - dpv_owl:NotAvailable
    annotations:
      skos_in_scheme: context-classes

  NotRequired:
    is_a: Necessity
    class_uri: dpvs:NotRequired
    description: |-
      Indication of neither being required nor optional i.e. not relevant or
      needed
    aliases:
      - Not Required
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:NotRequired
      - dpv_owl:NotRequired
    annotations:
      skos_in_scheme: context-classes

  OftenFrequency:
    is_a: Frequency
    class_uri: dpvs:OftenFrequency
    description: Frequency where occurrences are often or frequent, but not continuous
    aliases:
      - Often Frequency
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:OftenFrequency
      - dpv_owl:OftenFrequency
    annotations:
      skos_in_scheme: context-classes

  PrimaryImportance:
    is_a: Importance
    class_uri: dpvs:PrimaryImportance
    description: Indication of 'primary' or 'main' or 'core' importance
    aliases:
      - Primary Importance
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:PrimaryImportance
      - dpv_owl:PrimaryImportance
    annotations:
      skos_in_scheme: context-classes

  Required:
    is_a: Necessity
    class_uri: dpvs:Required
    description: Indication of 'required' or 'necessary'
    aliases:
      - Required
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Required
      - dpv_owl:Required
    annotations:
      skos_in_scheme: context-classes

  Scope:
    is_a: Context
    class_uri: dpvs:Scope
    description: |-
      Indication of the extent or range or boundaries associated with(in) a
      context
    aliases:
      - Scope
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:Scope
      - dpv_owl:Scope
    annotations:
      skos_in_scheme: context-classes

  SecondaryImportance:
    is_a: Importance
    class_uri: dpvs:SecondaryImportance
    description: Indication of 'secondary' or 'minor' or 'auxiliary' importance
    aliases:
      - Secondary Importance
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:SecondaryImportance
      - dpv_owl:SecondaryImportance
    annotations:
      skos_in_scheme: context-classes

  SingularFrequency:
    is_a: Frequency
    class_uri: dpvs:SingularFrequency
    description: |-
      Frequency where occurrences are singular i.e. they take place only once
    aliases:
      - Singular Frequency
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:SingularFrequency
      - dpv_owl:SingularFrequency
    annotations:
      skos_in_scheme: context-classes

  SporadicFrequency:
    is_a: Frequency
    class_uri: dpvs:SporadicFrequency
    description: Frequency where occurrences are sporadic or infrequent or sparse
    aliases:
      - Sporadic Frequency
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:SporadicFrequency
      - dpv_owl:SporadicFrequency
    annotations:
      skos_in_scheme: context-classes

  TemporalDuration:
    is_a: DpvDuration
    class_uri: dpvs:TemporalDuration
    description: Duration that has a fixed temporal duration e.g. 6 months
    aliases:
      - Temporal Duration
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:TemporalDuration
      - dpv_owl:TemporalDuration
    annotations:
      skos_in_scheme: context-classes

  UnknownApplicability:
    is_a: Applicability
    class_uri: dpvs:UnknownApplicability
    description: |-
      Concept indicating information or context availability is unknown i.e.
      it is not known if the information exists or is applicable and therefore
      statements about its availability cannot be made (yet)
    aliases:
      - Unknown Applicability
    comments:
      - |-
        This concept is useful when describing situations where it cannot be
        stated whether the context applies or whether the information is not
        available yet. For example, if a form field asks about whether a process
        X was completed and it is not yet known whether X applies or not and
        therefore it is also unclear whether X was completed or not. Using
        UnknownApplicability is a signal that the applicability of X should be
        assessed, and if applicable, then information about X should be
        identified and used here.
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:UnknownApplicability
      - dpv_owl:UnknownApplicability
    annotations:
      skos_in_scheme: context-classes

  UntilEventDuration:
    is_a: DpvDuration
    class_uri: dpvs:UntilEventDuration
    description: |-
      Duration that takes place until a specific event occurs e.g. Account
      Closure
    aliases:
      - Until Event Duration
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:UntilEventDuration
      - dpv_owl:UntilEventDuration
    annotations:
      skos_in_scheme: context-classes

  UntilTimeDuration:
    is_a: DpvDuration
    class_uri: dpvs:UntilTimeDuration
    description: Duration that has a fixed end date e.g. 2022-12-31
    aliases:
      - Until Time Duration
    in_subset:
      - context_subset
    exact_mappings:
      - dpv:UntilTimeDuration
      - dpv_owl:UntilTimeDuration
    annotations:
      skos_in_scheme: context-classes
