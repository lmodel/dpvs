id: https://w3id.org/lmodel/dpvs/processing_context
name: dpvs_processing_context
title: DPV — Processing Context
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/processing_context-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  processing_context_subset:
    description: Entities from the DPV `processing_context` module.

slots:

  has_active_entity:
    is_a: has_entity
    definition_uri: dpvs:hasActiveEntity
    description: indicates the entity is actively involved in specified context
    aliases:
      - has active entity
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasActiveEntity
      - dpv_owl:hasActiveEntity
    annotations:
      skos_in_scheme: processing-context-properties

  has_algorithmic_logic:
    definition_uri: dpvs:hasAlgorithmicLogic
    description: |-
      Indicates the logic used in processing such as for automated decision
      making
    aliases:
      - has algorithmic logic
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasAlgorithmicLogic
      - dpv_owl:hasAlgorithmicLogic
    annotations:
      skos_in_scheme: processing-context-properties

  has_automation_level:
    definition_uri: dpvs:hasAutomationLevel
    description: |-
      Indicates the level of automation involved in implementation of the
      specified context
    aliases:
      - has automation level
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasAutomationLevel
      - dpv_owl:hasAutomationLevel
    annotations:
      skos_in_scheme: processing-context-properties

  has_data_source:
    definition_uri: dpvs:hasDataSource
    description: Indicates the source or origin of data being processed
    aliases:
      - has data source
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasDataSource
      - dpv_owl:hasDataSource
    annotations:
      skos_in_scheme: processing-context-properties

  has_entity_involvement:
    definition_uri: dpvs:hasEntityInvolvement
    description: Indicates involvement of an entity in specified context
    aliases:
      - has entity involvement
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasEntityInvolvement
      - dpv_owl:hasEntityInvolvement
    annotations:
      skos_in_scheme: processing-context-properties

  has_human_involvement:
    definition_uri: dpvs:hasHumanInvolvement
    description: |-
      Indicates Involvement of humans in processing such as within automated
      decision making process
    aliases:
      - has human involvement
    comments:
      - Human involvement is also relevant to 'human in the loop'
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasHumanInvolvement
      - dpv_owl:hasHumanInvolvement
    annotations:
      skos_in_scheme: processing-context-properties

  has_non_involved_entity:
    is_a: has_entity
    definition_uri: dpvs:hasNonInvolvedEntity
    description: indicates the entity is not involved in specified context
    aliases:
      - has non-involved entity
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasNonInvolvedEntity
      - dpv_owl:hasNonInvolvedEntity
    annotations:
      skos_in_scheme: processing-context-properties

  has_passive_entity:
    is_a: has_entity
    definition_uri: dpvs:hasPassiveEntity
    description: indicates the entity is passively involved in specified context
    aliases:
      - has passive entity
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasPassiveEntity
      - dpv_owl:hasPassiveEntity
    annotations:
      skos_in_scheme: processing-context-properties

  has_processing_condition:
    definition_uri: dpvs:hasProcessingCondition
    description: Indicates information about processing condition
    aliases:
      - has processing condition
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasProcessingCondition
      - dpv_owl:hasProcessingCondition
    annotations:
      skos_in_scheme: processing-context-properties

  has_storage_condition:
    is_a: has_processing_condition
    definition_uri: dpvs:hasStorageCondition
    description: Indicates information about storage condition
    aliases:
      - has storage condition
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:hasStorageCondition
      - dpv_owl:hasStorageCondition
    annotations:
      skos_in_scheme: processing-context-properties

  is_determined_by_entity:
    is_a: has_entity
    definition_uri: dpvs:isDeterminedByEntity
    description: Indicates the context is determined by the specified entity
    aliases:
      - is determined by entity
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:isDeterminedByEntity
      - dpv_owl:isDeterminedByEntity
    annotations:
      skos_in_scheme: processing-context-properties

  is_implemented_by_entity:
    definition_uri: dpvs:isImplementedByEntity
    description: Indicates implementation details such as entities or agents
    aliases:
      - is implemented by entity
    comments:
      - |-
        The use of 'entity' is inclusive of entities (e.g. Data Processor) as
        well as 'agent' (e.g. DPO). For indicating technological implementation,
        the property isImplementedByTechnology should be used.
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:isImplementedByEntity
      - dpv_owl:isImplementedByEntity
    annotations:
      skos_in_scheme: processing-context-properties

  is_implemented_using_technology:
    definition_uri: dpvs:isImplementedUsingTechnology
    description: Indicates implementation details such as technologies or processes
    aliases:
      - is implemented using technology
    comments:
      - |-
        The term 'technology' is inclusive of technologies, processes, and
        methods.
    multivalued: true
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:isImplementedUsingTechnology
      - dpv_owl:isImplementedUsingTechnology
    annotations:
      skos_in_scheme: processing-context-properties

classes:

  AlgorithmicLogic:
    is_a: ProcessingContext
    class_uri: dpvs:AlgorithmicLogic
    description: The algorithmic logic applied or used
    aliases:
      - Algorithmic Logic
    comments:
      - |-
        Algorithmic Logic is intended as a broad concept for explaining the use
        of algorithms and automated decisions making within Processing. To
        describe the actual algorithm, see the Algorithm concept.
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:AlgorithmicLogic
      - dpv_owl:AlgorithmicLogic
    annotations:
      skos_in_scheme: processing-context-classes

  AssistiveAutomation:
    is_a: AutomationLevel
    class_uri: dpvs:AssistiveAutomation
    description: |-
      Level of automation corresponding to Level 1 in ISO/IEC 22989:2022 where
      automation is limited to parts of the system or a specific part of the
      system in a manner that does not change the control of the human in
      using/driving the system
    aliases:
      - Assistive Automation
    comments:
      - |-
        Human Involvement is implied here, specifically the ability to make
        decisions regarding operations, but also possibly for intervention,
        oversight, and verification
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:AssistiveAutomation
      - dpv_owl:AssistiveAutomation
    annotations:
      skos_in_scheme: processing-context-classes

  AutomatedDecisionMaking:
    is_a: DecisionMaking
    class_uri: dpvs:AutomatedDecisionMaking
    description: Processing that involves automated decision making
    aliases:
      - Automated Decision Making
    comments:
      - |-
        Automated decision making can be defined as “the ability to make
        decisions by technological means without human involvement.”
        (“Guidelines on Automated individual decision-making and Profiling for
        the purposes of Regulation 2016/679 (wp251rev.01)”, 2018, p. 8)
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:AutomatedDecisionMaking
      - dpv_owl:AutomatedDecisionMaking
    annotations:
      skos_in_scheme: processing-context-classes

  AutomatedScoringOfIndividuals:
    is_a: ScoringOfIndividuals
    class_uri: dpvs:AutomatedScoringOfIndividuals
    description: Processing that involves automated scoring of individuals
    aliases:
      - Automated Scoring of Individuals
    comments:
      - |-
        Scoring can lead to the action being considered Decision Making if the
        scoring is itself a decision - see 2023-MAR-16 opinion of Advocate
        General on Case C 634/21. Therefore, the assessment of whether scoring
        was automated or not is important given the legal obligations
        surrounding automated decision making e.g. in GDPR
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:AutomatedScoringOfIndividuals
      - dpv_owl:AutomatedScoringOfIndividuals
    annotations:
      skos_in_scheme: processing-context-classes

  AutomationLevel:
    is_a: ProcessingContext
    class_uri: dpvs:AutomationLevel
    description: |-
      Indication of degree or level of automation associated with specified
      context
    aliases:
      - Automation Level
    comments:
      - This concept was called 'Automation' in previous versions
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:AutomationLevel
      - dpv_owl:AutomationLevel
    annotations:
      skos_in_scheme: processing-context-classes

  Autonomous:
    is_a: AutomationLevel
    class_uri: dpvs:Autonomous
    description: |-
      Level of automation corresponding to Level 6 in ISO/IEC 22989:2022 where
      the automation in system is capable of modifying its operation domain or
      its goals without external intervention, control or oversight
    aliases:
      - Autonomous
    comments:
      - |-
        Though Autonomous, such operations can still be associated with
        dpv:HumanInvolved e.g. for inputs, oversight or verification
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:Autonomous
      - dpv_owl:Autonomous
    annotations:
      skos_in_scheme: processing-context-classes

  CannotChallengeProcess:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotChallengeProcess
    description: |-
      Involvement where entity cannot challenge the process of specified
      context
    aliases:
      - Cannot Challenge Process
    comments:
      - |-
        Challenge refers to raising questions about validity, necessity,
        correctness, or other similar 'trustworthiness' attributes regarding the
        process or plan or implementation
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotChallengeProcess
      - dpv_owl:CannotChallengeProcess
    annotations:
      skos_in_scheme: processing-context-classes

  CannotChallengeProcessInput:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotChallengeProcessInput
    description: Involvement where entity cannot challenge input of specified context
    aliases:
      - Cannot Challenge Process Input
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotChallengeProcessInput
      - dpv_owl:CannotChallengeProcessInput
    annotations:
      skos_in_scheme: processing-context-classes

  CannotChallengeProcessOutput:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotChallengeProcessOutput
    description: |-
      Involvement where entity cannot challenge the output of specified
      context
    aliases:
      - Cannot Challenge Process Output
    comments:
      - |-
        Challenge refers to raising questions about validity, necessity,
        correctness, or other similar 'trustworthiness' attributes regarding the
        output of the process or plan or implementation (where output is
        distinct from the process itself)
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotChallengeProcessOutput
      - dpv_owl:CannotChallengeProcessOutput
    annotations:
      skos_in_scheme: processing-context-classes

  CannotCorrectProcess:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotCorrectProcess
    description: |-
      Involvement where entity cannot correct the process of specified context
    aliases:
      - Cannot Correct Process
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotCorrectProcess
      - dpv_owl:CannotCorrectProcess
    annotations:
      skos_in_scheme: processing-context-classes

  CannotCorrectProcessInput:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotCorrectProcessInput
    description: Involvement where entity cannot correct input of specified context
    aliases:
      - Cannot Correct Process Input
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotCorrectProcessInput
      - dpv_owl:CannotCorrectProcessInput
    annotations:
      skos_in_scheme: processing-context-classes

  CannotCorrectProcessOutput:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotCorrectProcessOutput
    description: |-
      Involvement where entity cannot correct the output of specified context
    aliases:
      - Cannot Correct Process Output
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotCorrectProcessOutput
      - dpv_owl:CannotCorrectProcessOutput
    annotations:
      skos_in_scheme: processing-context-classes

  CannotObjectToProcess:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotObjectToProcess
    description: Involvement where entity cannot object to process of specified context
    aliases:
      - Cannot Object to Process
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotObjectToProcess
      - dpv_owl:CannotObjectToProcess
    annotations:
      skos_in_scheme: processing-context-classes

  CannotOptInToProcess:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotOptInToProcess
    description: Involvement where entity cannot opt-in to specified context
    aliases:
      - Cannot Opt-in to Process
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotOptInToProcess
      - dpv_owl:CannotOptInToProcess
    annotations:
      skos_in_scheme: processing-context-classes

  CannotOptOutFromProcess:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotOptOutFromProcess
    description: Involvement where entity cannot opt-out from specified context
    aliases:
      - Cannot Opt-out from Process
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotOptOutFromProcess
      - dpv_owl:CannotOptOutFromProcess
    annotations:
      skos_in_scheme: processing-context-classes

  CannotReverseProcessEffects:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotReverseProcessEffects
    description: Involvement where entity cannot reverse effects of specified context
    aliases:
      - Cannot Reverse Process Effects
    comments:
      - |-
        Effects refer to consequences and impacts arising from the process or
        from the outputs of a process
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotReverseProcessEffects
      - dpv_owl:CannotReverseProcessEffects
    annotations:
      skos_in_scheme: processing-context-classes

  CannotReverseProcessInput:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotReverseProcessInput
    description: Involvement where entity cannot reverse input of specified context
    aliases:
      - Cannot Reverse Process Input
    comments:
      - |-
        Reversion can be considered a form of correction in some instances. We
        welcome inputs to further explore and define this relation between
        correction and reversion concepts.
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotReverseProcessInput
      - dpv_owl:CannotReverseProcessInput
    annotations:
      skos_in_scheme: processing-context-classes

  CannotReverseProcessOutput:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotReverseProcessOutput
    description: Involvement where entity cannot reverse output of specified context
    aliases:
      - Cannot Reverse Process Output
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotReverseProcessOutput
      - dpv_owl:CannotReverseProcessOutput
    annotations:
      skos_in_scheme: processing-context-classes

  CannotWithdrawFromProcess:
    is_a: EntityNonPermissiveInvolvement
    class_uri: dpvs:CannotWithdrawFromProcess
    description: |-
      Involvement where entity cannot withdraw a previously given assent from
      specified context
    aliases:
      - Cannot Withdraw from Process
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CannotWithdrawFromProcess
      - dpv_owl:CannotWithdrawFromProcess
    annotations:
      skos_in_scheme: processing-context-classes

  ChallengingProcess:
    is_a: EntityPermissiveInvolvement
    class_uri: dpvs:ChallengingProcess
    description: |-
      Involvement where entity can challenge the process of specified context
    aliases:
      - Challenging Process
    comments:
      - |-
        Challenge refers to raising questions about validity, necessity,
        correctness, or other similar 'trustworthiness' attributes regarding the
        process or plan or implementation
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:ChallengingProcess
      - dpv_owl:ChallengingProcess
    annotations:
      skos_in_scheme: processing-context-classes

  ChallengingProcessInput:
    is_a: EntityPermissiveInvolvement
    class_uri: dpvs:ChallengingProcessInput
    description: Involvement where entity can challenge input of specified context
    aliases:
      - Challenging Process Input
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:ChallengingProcessInput
      - dpv_owl:ChallengingProcessInput
    annotations:
      skos_in_scheme: processing-context-classes

  ChallengingProcessOutput:
    is_a: EntityPermissiveInvolvement
    class_uri: dpvs:ChallengingProcessOutput
    description: Involvement where entity can challenge the output of specified context
    aliases:
      - Challenging Process Output
    comments:
      - |-
        Challenge refers to raising questions about validity, necessity,
        correctness, or other similar 'trustworthiness' attributes regarding the
        output of the process or plan or implementation (where output is
        distinct from the process itself)
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:ChallengingProcessOutput
      - dpv_owl:ChallengingProcessOutput
    annotations:
      skos_in_scheme: processing-context-classes

  ConditionalAutomation:
    is_a: AutomationLevel
    class_uri: dpvs:ConditionalAutomation
    description: |-
      Level of automation corresponding to Level 3 in ISO/IEC 22989:2022 where
      the automation is sufficient to perform most tasks of the system with
      the human present to take over where necessary
    aliases:
      - Conditional Automation
    comments:
      - |-
        Human Involvement is implied here, e.g. for intervention, input,
        decisions
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:ConditionalAutomation
      - dpv_owl:ConditionalAutomation
    annotations:
      skos_in_scheme: processing-context-classes

  CorrectingProcess:
    is_a: EntityPermissiveInvolvement
    class_uri: dpvs:CorrectingProcess
    description: Involvement where entity can correct the process of specified context
    aliases:
      - Correcting Process
    comments:
      - |-
        Correction of process refers to the ability to change how the process
        takes place
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CorrectingProcess
      - dpv_owl:CorrectingProcess
    annotations:
      skos_in_scheme: processing-context-classes

  CorrectingProcessInput:
    is_a: EntityPermissiveInvolvement
    class_uri: dpvs:CorrectingProcessInput
    description: Involvement where entity can correct input of specified context
    aliases:
      - Correcting Process Input
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CorrectingProcessInput
      - dpv_owl:CorrectingProcessInput
    annotations:
      skos_in_scheme: processing-context-classes

  CorrectingProcessOutput:
    is_a: EntityPermissiveInvolvement
    class_uri: dpvs:CorrectingProcessOutput
    description: Involvement where entity can correct the output of specified context
    aliases:
      - Correcting Process Output
    comments:
      - |-
        Correction of outputs allows modification of the output - implying
        continuation of the process. This is distinct from reversing of outputs
        which revert the output back to its previous value and possibly imply
        not continuing with the process
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:CorrectingProcessOutput
      - dpv_owl:CorrectingProcessOutput
    annotations:
      skos_in_scheme: processing-context-classes

  DataControllerDataSource:
    is_a: DataSource
    class_uri: dpvs:DataControllerDataSource
    description: |-
      Data Sourced from Data Controller(s), e.g. a Controller inferring data
      or generating data
    aliases:
      - Data Controller as Data Source
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:DataControllerDataSource
      - dpv_owl:DataControllerDataSource
    annotations:
      skos_in_scheme: processing-context-classes

  DataPublishedByDataSubject:
    is_a: DataSubjectDataSource
    class_uri: dpvs:DataPublishedByDataSubject
    description: Data is published by the data subject
    aliases:
      - Data published by Data Subject
    comments:
      - |-
        This refers to where that data was made publicly available by the data
        subject. An example of this would be a social media profile that the
        data subject has made publicly accessible.
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:DataPublishedByDataSubject
      - dpv_owl:DataPublishedByDataSubject
    annotations:
      skos_in_scheme: processing-context-classes

  DataSource:
    is_a: ProcessingContext
    class_uri: dpvs:DataSource
    description: The source or origin of data
    aliases:
      - Data Source
    comments:
      - |-
        Source' is the direct point of data collection; 'origin' would indicate
        the original/others points of where the data originates from.
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:DataSource
      - dpv_owl:DataSource
    annotations:
      skos_in_scheme: processing-context-classes

  DataSubjectDataSource:
    is_a: DataSource
    class_uri: dpvs:DataSubjectDataSource
    description: |-
      Data Sourced from Data Subject(s), e.g. when data is collected via a
      form or observed from their activities
    aliases:
      - Data Subject as Data Source
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:DataSubjectDataSource
      - dpv_owl:DataSubjectDataSource
    annotations:
      skos_in_scheme: processing-context-classes

  DecisionMaking:
    is_a: ProcessingContext
    class_uri: dpvs:DecisionMaking
    description: Processing that involves decision making
    aliases:
      - Decision Making
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:DecisionMaking
      - dpv_owl:DecisionMaking
    annotations:
      skos_in_scheme: processing-context-classes

  EntityActiveInvolvement:
    is_a: EntityInvolvement
    class_uri: dpvs:EntityActiveInvolvement
    description: Involvement where entity is 'actively' involved
    aliases:
      - Entity Active Involvement
    in_subset:
      - processing_context_subset
    exact_mappings:
      - dpv:EntityActiveInvolvement
      - dpv_owl:EntityActiveInvolvement
    annotations:
      skos_in_scheme: processing-context-classes

  EntityIntendedInvolvement:
    is_a: EntityInvolvement
    mixins:
