id: https://w3id.org/lmodel/dpvs/entities
name: dpvs_entities
title: DPV — Entities
description: |-
  LinkML schema generated from the DPV 2.3 module
  `modules/entities-owl.ttl` (Data Privacy Vocabulary).
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types
  - dpvs:schema/dpvs_core

subsets:

  entities_subset:
    description: Entities from the DPV `entities` module.

slots:

  has_address:
    definition_uri: dpvs:hasAddress
    description: Specifies address of a legal entity such as street address or pin code
    aliases:
      - has address
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:hasAddress
      - dpv_owl:hasAddress
    annotations:
      skos_in_scheme: entities-properties

  has_contact:
    definition_uri: dpvs:hasContact
    description: Specifies contact details of a legal entity such as phone or email
    aliases:
      - has contact
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:hasContact
      - dpv_owl:hasContact
    annotations:
      skos_in_scheme: entities-properties

  has_entity:
    definition_uri: dpvs:hasEntity
    description: Indicates inclusion or applicability of an entity to some concept
    aliases:
      - has entity
    comments:
      - |-
        parent property for controller, processor, data subject, authority,
        etc.?
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:hasEntity
      - dpv_owl:hasEntity
    annotations:
      skos_in_scheme: entities-properties

  has_name:
    definition_uri: dpvs:hasName
    description: Specifies name of a legal entity
    aliases:
      - has name
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:hasName
      - dpv_owl:hasName
    annotations:
      skos_in_scheme: entities-properties

  has_organisational_unit:
    is_a: has_entity
    definition_uri: dpvs:hasOrganisationalUnit
    description: Indicates the specified entity is a unit of the organisation
    aliases:
      - has organisational unit
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:hasOrganisationalUnit
      - dpv_owl:hasOrganisationalUnit
    annotations:
      skos_in_scheme: entities-properties

  has_representative:
    is_a: has_entity
    definition_uri: dpvs:hasRepresentative
    description: Specifies representative of the legal entity
    aliases:
      - has representative
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:hasRepresentative
      - dpv_owl:hasRepresentative
    annotations:
      skos_in_scheme: entities-properties

  has_responsible_entity:
    is_a: has_entity
    definition_uri: dpvs:hasResponsibleEntity
    description: Specifies the indicated entity is responsible within some context
    aliases:
      - has responsible entity
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:hasResponsibleEntity
      - dpv_owl:hasResponsibleEntity
    annotations:
      skos_in_scheme: entities-properties

  has_subsidiary:
    is_a: has_entity
    definition_uri: dpvs:hasSubsidiary
    description: Indicates this entity has the specified entity as its subsidiary
    aliases:
      - has subsidiary
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:hasSubsidiary
      - dpv_owl:hasSubsidiary
    annotations:
      skos_in_scheme: entities-properties

  is_organisational_unit_of:
    is_a: has_entity
    definition_uri: dpvs:isOrganisationalUnitOf
    description: |-
      Indicates this entity is an organisational unit of the specified entity
    aliases:
      - is organisational unit of
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:isOrganisationalUnitOf
      - dpv_owl:isOrganisationalUnitOf
    annotations:
      skos_in_scheme: entities-properties

  is_representative_for:
    is_a: has_entity
    definition_uri: dpvs:isRepresentativeFor
    description: Indicates the entity is a representative for specified entity
    aliases:
      - is representative for
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:isRepresentativeFor
      - dpv_owl:isRepresentativeFor
    annotations:
      skos_in_scheme: entities-properties

  is_subsidiary_of:
    is_a: has_entity
    definition_uri: dpvs:isSubsidiaryOf
    description: Indicates this entity is the subsidiary of the specified entity
    aliases:
      - is subsidiary of
    multivalued: true
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:isSubsidiaryOf
      - dpv_owl:isSubsidiaryOf
    annotations:
      skos_in_scheme: entities-properties

classes:

  DpvAgent:
    is_a: DpvEntity
    class_uri: dpvs:Agent
    description: |-
      An Agent is a dpv:Entity that is (a) acting on behalf of another Entity;
      and (b) is authorised to do so by that Entity
    aliases:
      - Agent
    comments:
      - |-
        the Entity the Agent is acting on behalf of can be a human or non-human
        and a legal or non-legal entity. For specific distinction, see
        dpv:LegalAgent and tech:MachineAgent. The form and validity of
        authorisation through which the Agent is empowered to represent and act
        on behalf of the Entity is not defined or covered in this concept
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:Agent
      - dpv_owl:Agent
    annotations:
      skos_in_scheme: entities-classes

  DpvEntity:
    class_uri: dpvs:Entity
    description: A human or non-human 'thing' that constitutes as an entity
    aliases:
      - Entity
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:Entity
      - dpv_owl:Entity
    annotations:
      skos_in_scheme: entities-classes

  LegalAgent:
    is_a: DpvAgent
    mixins:
      - LegalEntity
    class_uri: dpvs:LegalAgent
    description: |-
      A Legal Agent is a Legal Entity that is authorised to act on behalf of
      another entity
    aliases:
      - Legal Agent
    comments:
      - |-
        Legal agents may be human or non-human (e.g. an organisation), but they
        must be 'legal persons' i.e. recognised by law as such. The agency and
        the mechanisms through which it is given, acquired, or expressed is
        governed by relevant jurisdictional frameworks e.g. power of attorney
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:LegalAgent
      - dpv_owl:LegalAgent
    annotations:
      skos_in_scheme: entities-classes

  LegalEntity:
    is_a: DpvEntity
    class_uri: dpvs:LegalEntity
    description: |-
      A human or non-human 'thing' that constitutes as an entity and which is
      recognised and defined in law
    aliases:
      - Legal Entity
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:LegalEntity
      - dpv_owl:LegalEntity
      - common_domain_model:LegalEntity
    close_mappings:
      - gists:Organization
      - ocsf:Organization
      - oscal:Party
    annotations:
      skos_in_scheme: entities-classes

  NaturalPerson:
    is_a: DpvEntity
    class_uri: dpvs:NaturalPerson
    description: A human
    aliases:
      - Natural Person
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:NaturalPerson
      - dpv_owl:NaturalPerson
      - common_domain_model:NaturalPerson
      - gists:Person
    close_mappings:
      - ocsf:User
    narrow_mappings:
      - oscal:Party
    annotations:
      skos_in_scheme: entities-classes

  ParentLegalEntity:
    is_a: DpvOrganisation
    class_uri: dpvs:ParentLegalEntity
    description: |-
      A legal entity that has one or more subsidiary entities operating under
      it
    aliases:
      - Parent Legal Entity
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:ParentLegalEntity
      - dpv_owl:ParentLegalEntity
    annotations:
      skos_in_scheme: entities-classes

  PublicRegisterOfEntities:
    class_uri: dpvs:PublicRegisterOfEntities
    description: |-
      A publicly available list of entities e.g. to indicate which entities
      perform a certain activity within a certain location or jurisdiction
    aliases:
      - Public Register of Entities
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:PublicRegisterOfEntities
      - dpv_owl:PublicRegisterOfEntities
    annotations:
      skos_in_scheme: entities-classes

  Representative:
    is_a: LegalEntity
    class_uri: dpvs:Representative
    description: A representative of a legal entity
    aliases:
      - Representative
    comments:
      - |-
        A representative may not be a 'legal agent' if it is authorised to only
        represent the entity and not to take actions on its behalf
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:Representative
      - dpv_owl:Representative
    annotations:
      skos_in_scheme: entities-classes

  SubsidiaryLegalEntity:
    is_a: DpvOrganisation
    class_uri: dpvs:SubsidiaryLegalEntity
    description: A legal entity that operates as a subsidiary of another legal entity
    aliases:
      - Subsidiary Legal Entity
    in_subset:
      - entities_subset
    exact_mappings:
      - dpv:SubsidiaryLegalEntity
      - dpv_owl:SubsidiaryLegalEntity
    annotations:
      skos_in_scheme: entities-classes
