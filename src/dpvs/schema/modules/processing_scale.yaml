  LargeScaleProcessing:
    is_a: ProcessingScale
    class_uri: dpvs:LargeScaleProcessing
    description: |-
      Processing that takes place at large scales (as specified by some
      criteria)
    aliases:
      - Large Scale Processing
    comments:
      - |-
        The exact definition of what constitutes "large scale" depends on use of
        jurisdictional, domain-specific, or other forms of externally defined
        criteria. Where possible, this should be reflected by extending this
