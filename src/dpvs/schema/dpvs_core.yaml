    description: |-
      Human involvement for the purposes of exercising control over the
      specified operations in context
    aliases:
      - Human Involvement for control
    comments:
      - |-
        Control is a broad term that can be applied to various stages and
        operations. It maps to None, Assistive, and Partial automation models.
    in_subset:
      - processing_context_subset
      - core_subset
    exact_mappings:
      - dpv:HumanInvolvementForControl
