    class_uri: dpvs:RightExerciseNotice
    description: |-
      Information associated with exercising of an active right such as where
      and how to exercise the right, information required for it, or updates
      on an exercised rights request
    aliases:
      - Right Exercise Notice
    comments:
      - |-
        This concept is intended for providing information regarding a right
        exercise. For specific instances of such exercises, see
        RightExerciseActivity and RightExerciseRecord.
    in_subset:
      - rights_subset
      - core_subset
    exact_mappings:
      - dpv:RightExerciseNotice
      - dpv_owl:RightExerciseNotice
    annotations:
      skos_in_scheme: rights-classes

  RightExerciseRecord:
