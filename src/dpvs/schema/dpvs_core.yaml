id: https://w3id.org/lmodel/dpvs/core
name: dpvs_core
title: DPV Core
description: |-
  Aggregate LinkML schema generated from the full DPV 2.3 OWL release
  (`dpv-owl.ttl`), enriched with canonical SKOS metadata from `dpv.ttl`.
license: CC-BY-4.0
see_also:
  - https://w3id.org/dpv
  - https://w3c.github.io/dpv/
source: https://w3id.org/dpv/owl#
version: '2.3'

prefixes:
  dpvs: https://w3id.org/lmodel/dpvs/
  dpv: https://w3id.org/dpv#
  dpv_owl: https://w3id.org/dpv/owl#
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
  owl: http://www.w3.org/2002/07/owl#
  skos: http://www.w3.org/2004/02/skos/core#
  dcterms: http://purl.org/dc/terms/
  dcat: http://www.w3.org/ns/dcat#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  org: http://www.w3.org/ns/org#
  prof: http://www.w3.org/ns/dx/prof/
  svd: https://specialprivacy.ercim.eu/vocabs/data#
  svpr: https://specialprivacy.ercim.eu/vocabs/processing#
  svpu: https://specialprivacy.ercim.eu/vocabs/purposes#
  usage_policy: https://specialprivacy.ercim.eu/langs/usage-policy#
  shex: http://www.w3.org/ns/shex#
  common_domain_model: https://w3id.org/lmodel/common-domain-model/
  gists: https://w3id.org/lmodel/gists/
  iso22989: https://w3id.org/lmodel/iso22989/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  iso42001: https://w3id.org/lmodel/iso42001/
  nist_ai_rmf: https://w3id.org/lmodel/nist-ai-rmf/
  nist_csf_v2: https://w3id.org/lmodel/nist-csf-v2/
  ocsf: https://w3id.org/lmodel/ocsf/
  oscal: https://w3id.org/lmodel/oscal/

default_prefix: dpvs
default_range: string

imports:
  - linkml:types

subsets:

  core_subset:
    description: All classes and slots from the aggregate DPV OWL release.

  consent_subset:
    description: Entities from the DPV `consent` module.

  consent_controls_subset:
    description: Entities from the DPV `consent_controls` module.

  consent_status_subset:
    description: Entities from the DPV `consent_status` module.

  consent_types_subset:
    description: Entities from the DPV `consent_types` module.

  context_subset:
    description: Entities from the DPV `context` module.

  contract_subset:
    description: Entities from the DPV `contract` module.

  contract_clause_subset:
    description: Entities from the DPV `contract_clause` module.

  contract_control_subset:
    description: Entities from the DPV `contract_control` module.

  contract_status_subset:
    description: Entities from the DPV `contract_status` module.

  contract_types_subset:
    description: Entities from the DPV `contract_types` module.

  entities_subset:
    description: Entities from the DPV `entities` module.

  entities_authority_subset:
    description: Entities from the DPV `entities_authority` module.

  entities_datasubject_subset:
    description: Entities from the DPV `entities_datasubject` module.

  entities_legalrole_subset:
    description: Entities from the DPV `entities_legalrole` module.

  entities_organisation_subset:
    description: Entities from the DPV `entities_organisation` module.

  jurisdiction_subset:
    description: Entities from the DPV `jurisdiction` module.

  legal_basis_subset:
    description: Entities from the DPV `legal_basis` module.

  legal_basis_status_subset:
    description: Entities from the DPV `legal_basis_status` module.

  legal_measures_subset:
    description: Entities from the DPV `legal_measures` module.

  notice_subset:
    description: Entities from the DPV `notice` module.

  organisational_measures_subset:
    description: Entities from the DPV `organisational_measures` module.

  personal_data_subset:
    description: Entities from the DPV `personal_data` module.

  physical_measures_subset:
    description: Entities from the DPV `physical_measures` module.

  process_subset:
    description: Entities from the DPV `process` module.

  processing_subset:
    description: Entities from the DPV `processing` module.

  processing_context_subset:
    description: Entities from the DPV `processing_context` module.

  processing_scale_subset:
    description: Entities from the DPV `processing_scale` module.

  purposes_subset:
    description: Entities from the DPV `purposes` module.

  rights_subset:
    description: Entities from the DPV `rights` module.

  risk_subset:
    description: Entities from the DPV `risk` module.

  rules_subset:
    description: Entities from the DPV `rules` module.

  status_subset:
    description: Entities from the DPV `status` module.

  technical_measures_subset:
    description: Entities from the DPV `technical_measures` module.

  tom_subset:
    description: Entities from the DPV `tom` module.

slots:

  has_active_entity:
    is_a: has_entity
    definition_uri: dpvs:hasActiveEntity
    description: indicates the entity is actively involved in specified context
    aliases:
      - has active entity
    multivalued: true
    in_subset:
      - processing_context_subset
      - core_subset
    exact_mappings:
      - dpv:hasActiveEntity
      - dpv_owl:hasActiveEntity
    annotations:
      skos_in_scheme: processing-context-properties

  has_activity_status:
    is_a: has_status
    definition_uri: dpvs:hasActivityStatus
    description: Indicates the status of activity of specified concept
    aliases:
      - has activity status
    multivalued: true
    in_subset:
      - status_subset
      - core_subset
    exact_mappings:
      - dpv:hasActivityStatus
      - dpv_owl:hasActivityStatus
    annotations:
      skos_in_scheme: status-properties

  has_address:
    definition_uri: dpvs:hasAddress
    description: Specifies address of a legal entity such as street address or pin code
    aliases:
      - has address
    multivalued: true
    in_subset:
      - entities_subset
      - core_subset
    exact_mappings:
      - dpv:hasAddress
      - dpv_owl:hasAddress
    annotations:
      skos_in_scheme: entities-properties

  has_algorithmic_logic:
    definition_uri: dpvs:hasAlgorithmicLogic
    description: |-
      Indicates the logic used in processing such as for automated decision
      making
    aliases:
      - has algorithmic logic
    multivalued: true
    in_subset:
      - processing_context_subset
      - core_subset
    exact_mappings:
      - dpv:hasAlgorithmicLogic
      - dpv_owl:hasAlgorithmicLogic
    annotations:
      skos_in_scheme: processing-context-properties

  has_applicability:
    definition_uri: dpvs:hasApplicability
    description: |-
      Indicates situations where the context is not applicable, information is
      not available, or this is unknown. An appropriate instance of
      dpv:Applicability should be used with this relation to express the
      situation
    aliases:
      - has applicability
    multivalued: true
    in_subset:
      - context_subset
      - core_subset
    exact_mappings:
      - dpv:hasApplicability
      - dpv_owl:hasApplicability
    annotations:
      skos_in_scheme: context-properties

  has_applicable_law:
    definition_uri: dpvs:hasApplicableLaw
    description: Indicates applicability of a Law
    aliases:
      - has applicable law
    multivalued: true
    in_subset:
      - jurisdiction_subset
      - core_subset
    exact_mappings:
      - dpv:hasApplicableLaw
      - dpv_owl:hasApplicableLaw
    annotations:
      skos_in_scheme: jurisdiction-properties

  has_assessment:
    is_a: has_organisational_measure
    definition_uri: dpvs:hasAssessment
    description: Indicates a relevant assessment associated with the specific context
    aliases:
      - has assessment
    multivalued: true
    in_subset:
      - tom_subset
      - core_subset
    exact_mappings:
      - dpv:hasAssessment
      - dpv_owl:hasAssessment
    annotations:
      skos_in_scheme: TOM-properties

  has_audit_status:
    is_a: has_status
    definition_uri: dpvs:hasAuditStatus
    description: Indicates the status of audit associated with specified concept
    aliases:
      - has audit status
    multivalued: true
    in_subset:
      - status_subset
      - core_subset
    exact_mappings:
      - dpv:hasAuditStatus
      - dpv_owl:hasAuditStatus
    annotations:
      skos_in_scheme: status-properties

  has_authority:
    definition_uri: dpvs:hasAuthority
    description: Indicates applicability of authority for a jurisdiction
    aliases:
      - has authority
    multivalued: true
    in_subset:
      - entities_authority_subset
      - core_subset
    exact_mappings:
      - dpv:hasAuthority
      - dpv_owl:hasAuthority
    annotations:
      skos_in_scheme: entities-authority-properties

  has_automation_level:
    definition_uri: dpvs:hasAutomationLevel
    description: |-
      Indicates the level of automation involved in implementation of the
