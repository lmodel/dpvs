  has_consequence:
    definition_uri: dpvs:hasConsequence
    description: Indicates consequence(s) possible or arising from specified concept
    aliases:
      - has consequence
    comments:
      - Removed plural suffix for consistency
    multivalued: true
    in_subset:
      - risk_subset
      - core_subset
    exact_mappings:
      - dpv:hasConsequence
      - dpv_owl:hasConsequence
    annotations:
      skos_in_scheme: risk-properties

  has_consequence_on:
    definition_uri: dpvs:hasConsequenceOn
    description: |-
