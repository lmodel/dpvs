      - OrganisationalMeasure
    class_uri: dpvs:RightExerciseRecord
    description: Record of a Right being exercised
    aliases:
      - Right Exercise Record
    comments:
      - |-
        This concept represents a record of one or more right exercise
        activities, such as those associated with a single data subject or
        service or entity
    in_subset:
      - rights_subset
      - core_subset
    exact_mappings:
      - dpv:RightExerciseRecord
      - dpv_owl:RightExerciseRecord
    annotations:
      skos_in_scheme: rights-classes

  RightFulfilmentNotice:
    is_a: RightExerciseNotice
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:RightFulfilmentNotice
    description: Notice provided regarding fulfilment of a right
    aliases:
      - Right Fulfilment Notice
    comments:
      - |-
        This notice is associated with situations where information is provided
        with the intention of progressing the fulfilment of a right. For
        example, a notice asking for more information regarding the scope of the
        right, or providing information on where to access the data provided
        under a right.
    in_subset:
      - rights_subset
      - core_subset
    exact_mappings:
      - dpv:RightFulfilmentNotice
      - dpv_owl:RightFulfilmentNotice
    annotations:
      skos_in_scheme: rights-classes

  RightNonFulfilmentNotice:
    is_a: RightExerciseNotice
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:RightNonFulfilmentNotice
    description: Notice provided regarding non-fulfilment of a right
    aliases:
      - Right Non-Fulfilment Notice
    comments:
      - |-
        This notice is associated with situations where information is provided
        with the intention of communicating non-fulfilment of a right. For
        example, to provide justifications on why a right could not be fulfilled
        or providing information about another entity who should be approached
        for exercising this right.
    in_subset:
      - rights_subset
      - core_subset
    exact_mappings:
      - dpv:RightNonFulfilmentNotice
      - dpv_owl:RightNonFulfilmentNotice
    annotations:
      skos_in_scheme: rights-classes

  RightNotice:
    is_a: Notice
    mixins:
      - OrganisationalMeasure
    class_uri: dpvs:RightNotice
    description: |-
      Information associated with rights, such as which rights exist, when and
      where they are applicable, and other relevant information
    aliases:
      - Right Notice
    comments:
      - |-
        This concept also covers information about rights exercise, with
        dpv:RightExerciseNotice specifically representing information provided
        in connection with exercising of rights. Both notices may be needed,
        e.g. RightNotice for providing information about existence and exercise
        of rights, and RightExerciseNotice for providing additional information
        specifically about exercise of rights - such as to request more
