    aliases:
      - Right
    comments:
      - |-
        A 'right' is a legal, social, or ethical principle of freedom or
        entitlement which dictate the norms regarding what is allowed or owed.
        Rights as a concept encompass a broad area of norms and entities, and
        are not specific to Individuals or Data Protection / Privacy. For
        individual specific rights, see dpv:DataSubjectRight
    in_subset:
      - rights_subset
      - core_subset
    exact_mappings:
      - dpv:Right
      - dpv_owl:Right
    annotations:
      skos_in_scheme: rights-classes

  RightExerciseActivity:
    is_a: OrganisationalMeasure
    class_uri: dpvs:RightExerciseActivity
    description: An activity representing an exercising of an active right
    aliases:
      - Right Exercise Activity
    comments:
      - |-
        There may be multiple activities associated with exercising and
        fulfilling rights. See the RightExerciseRecord concept for
        record-keeping of such activities in a cohesive manner.
    in_subset:
      - rights_subset
      - core_subset
    exact_mappings:
      - dpv:RightExerciseActivity
      - dpv_owl:RightExerciseActivity
    annotations:
      skos_in_scheme: rights-classes

  RightExerciseNotice:
